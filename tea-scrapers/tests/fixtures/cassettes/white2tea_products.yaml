        Amalgamation of Capital\",\"handle\":\"2020-amalgamation-of-capital\",\"body_html\":\"The
        2020 Amalgamation of Capital Puer was processed using a \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        target=\\\"_blank\\\" title=\\\"What is Traditional Bamboo Puer Processing?\\\"
        rel=\\\"noopener noreferrer\\\"\\u003etraditional technique of bamboo processing\\u003c\\/a\\u003e
        where the tea is pressed into fresh fragrant bamboo and hand roasted over
        an open flame before being dried for long term storage.\\u003cbr\\u003e\\u003cbr\\u003eThis
        small batch blend was roasted for our tea club and we had a bit extra to throw
        onto the site. Heavy mouthfeel with a silky texture, the flavors of the shou
        Puer are complimented wonderfully with depth from the roast and the juices
        of the fresh fragrant bamboo which have infused into the leaves. A real treat.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase for a 100g piece will come enclosed in a bamboo shell similar to
        the one pictured, sizes and thicknesses will vary as one would expect with
