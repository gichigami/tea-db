        Green Hype\",\"handle\":\"2019-green-hype\",\"body_html\":\"A full 200g cake
        of this tea will be featured in our June tea club. \\u003ca href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\"
        title=\\\"tea club membership\\\" target=\\\"_blank\\\"\\u003eJoin before
        May 31st to be a part of the club!\\u003c\\/a\\u003e\\u003cbr\\u003e\\u003cbr\\u003eThe
        latest version of our lauded \\u003ca href=\\\"https:\\/\\/white2tea.com\\/products\\/2018-green-hype\\\"
        target=\\\"_blank\\\" title=\\\"2018 Green Hype\\\" rel=\\\"noopener noreferrer\\\"\\u003e2018
        Green Hype\\u003c\\/a\\u003e. The 2019 Green Hype has a significant amount
        of aged material in the blend to smooth it out from the start. A formidable
        thickness and full bodied mouthfeel with an intense \\u003cem\\u003ehuigan\\u003c\\/em\\u003e
        [the lingering sweetness in the mouth after drinking a tea]. Excellent daily
        drinking raw Puer with plenty of intrigue and character to keep you engaged
        from cup to cup. Age or chug immediately as you please.\\u003cbr\\u003e\\u003cbr\\u003eEach
        cake is 200 grams.\\u003cbr\\u003e\\u003cbr\\u003eThe stamp on this cake is
        incorrect, reading 2018-8, rather than 2019-4, when it was actually pressed.
        This was a mistake during stamping\\/wrapping at the factory, but the correct
