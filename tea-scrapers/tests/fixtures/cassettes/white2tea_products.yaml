        Bamboo Dove\",\"handle\":\"2020-bamboo-dove\",\"body_html\":\"\\u003cp\\u003eA
        long time coming; the remake of our first ever hand roasted bamboo white tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur
        classic sun dried Yunnan \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/white-tea\\\"
        target=\\\"_blank\\\" title=\\\"White Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003ewhite
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e, Turtle Dove, roasted inside
        fragrant bamboo. The aromatics of the bamboo and the touch of the open flame
        are integrated with the white tea in a beautiful way. It has a complex character
        of sweetness and smoothness, melded with the heavy nature of the roast.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eAs
        with many bamboo teas, the processing tends to break the leaves a bit, leading
        to a more intense brew than usual. You might enjoy it better by knocking down
        your usual brew weight by a gram or two - or fly away on dove wings, if you
        prefer.\\u003cbr\\u003e\\u003cbr\\u003eEach purchase is for 200 grams.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-03-12T02:26:19-08:00\",\"created_at\":\"2021-03-11T04:01:01-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"White
