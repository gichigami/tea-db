        Hot Brandy\",\"handle\":\"2016-hot-brandy\",\"body_html\":\"A blend of both
        white and black tea, Hot Brandy is a completely new style of cake that was
        born of experimentation. The soup is thick, smooth, and fragrant. It fairs
