        Dark Peony\",\"handle\":\"2024-dark-peony-1\",\"body_html\":\"\\u003cp\\u003eYet
        another oddball white2tea processing adventure. Our 2024 Dark Peony is a Yunnan
        tea produced at our behest with a sort of combination between Fujian white
        tea style processing with the addition of oxidation that mimics an aged white
        or black tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eDark Peony
        has a complex aromatic profile that lilts between the brighter tones of a
        fresh white tea and the deeper ripe stone fruits of a black tea. The soup's
        character is somewhere in between sharp and soft, with a playful little dancing
        between personalities that make it both engaging and difficult to pin down.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        cake is 200g. The cakes are in bamboo tongs, with five cakes per tong. Pressed
        in 2024.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch6\\u003e*For categorical
        boxes, Dark Peony doesn't quite fit into either the white or black tea box,
        and technically is probably an oolong, due to it's partial oxidation during
        processing. However, for ease of understanding of this tea, since it drinks
        more like a black tea\\/white tea hybrid, we have listed it across those two
        categories rather than as an oolong tea, which in practice, it does not really
        resemble at all.\\u003c\\/h6\\u003e\",\"published_at\":\"2024-06-28T05:25:50-07:00\",\"created_at\":\"2024-06-26T21:15:34-07:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Black
