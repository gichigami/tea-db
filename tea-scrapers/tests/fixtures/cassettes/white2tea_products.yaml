        Great Blue Heron Minis\",\"handle\":\"2024-great-blue-heron-minis\",\"body_html\":\"\\u003cp\\u003eA
        blend of our own aged Yunnan raw Puer maocha spanning the mid-2010's, sent
        to a smokehouse in Tongmuguan village to be pine smoked by a veteran Lapsang
        smoker. The three day smoking process occurs at temperatures from 100C to
        120C in an old style Lapsang smokehouse.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        perfect fit for Scotch whisky lovers and cigar fans who want tea in the morning,
        but this tea is a surprise that will likely garner even fans who are wary
        of smoke as well. Smoked and meaty, with herbaceous tobacco aromas and a middle
        aged woody incense at the base.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        mini is ~7g.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch5\\u003eFor aging,
        we recommend that smoked teas be sealed and separated from other teas, as
        the fresh smoke will pass along to the teas next to it. Or you can keep them
        with your cigars.\\u003c\\/h5\\u003e\",\"published_at\":\"2024-03-01T04:35:13-08:00\",\"created_at\":\"2024-02-29T02:01:50-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
        Puer Tea\",\"tags\":[\"Raw Puer Tea\",\"Raw Puer Tea: 2024\",\"Smoked\"],\"variants\":[{\"id\":44658073305316,\"title\":\"~7g\",\"option1\":\"~7g\",\"option2\":null,\"option3\":null,\"sku\":\"22402A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"2.25\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":8173656178916,\"created_at\":\"2024-02-29T02:01:50-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"}],\"images\":[{\"id\":65696993902820,\"created_at\":\"2024-02-29T02:03:24-08:00\",\"position\":1,\"updated_at\":\"2024-02-29T02:03:34-08:00\",\"product_id\":8173656178916,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Heron-Minis-Tea.jpg?v=1709201014\",\"width\":800,\"height\":800},{\"id\":65696994033892,\"created_at\":\"2024-02-29T02:03:24-08:00\",\"position\":2,\"updated_at\":\"2024-02-29T02:03:34-08:00\",\"product_id\":8173656178916,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Heron-Minis-Tea-2.jpg?v=1709201014\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"~7g\"]}]},{\"id\":8173654016228,\"title\":\"2023
        Sheddan\",\"handle\":\"2024-sheddan\",\"body_html\":\"\\u003cp\\u003eA \\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        title=\\\"What is Traditional Bamboo Puer Processing?\\\" target=\\\"_blank\\\"\\u003ehand
        roasted bamboo\\u003c\\/a\\u003e raw Puer blend made from high-quality raw
        Puer material. The bamboo processing of this tea means that the leaves are
        broken up, so the tea will brew faster and stronger due to the increased surface
        area. Fired and pressed in late 2023, rested until 2024 spring before release.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eSticky
        mouthfeel, intense \\u003cem\\u003ehuigan,\\u003c\\/em\\u003e intense aromatics.
        If you're a fan of high octance brews with a penchant for higher quality raw
        Puer material, this will be a perfect fit. If you're new to raw Puer tea,
        brew this with a light hand. The tight compression and broken leaves can easily
        become overwhelming.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        piece of bamboo was pressed with 200 grams of tea. \\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2024-03-01T04:35:13-08:00\",\"created_at\":\"2024-02-29T01:55:22-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
        Puer Tea\",\"tags\":[\"Bamboo Roasted\",\"Raw Puer Tea\",\"Raw Puer Tea: 2023\"],\"variants\":[{\"id\":44658041913572,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"22414A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"69.00\",\"grams\":200,\"compare_at_price\":null,\"position\":1,\"product_id\":8173654016228,\"created_at\":\"2024-02-29T01:55:22-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"},{\"id\":44658041946340,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"22414B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"10.50\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":8173654016228,\"created_at\":\"2024-02-29T01:55:22-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"}],\"images\":[{\"id\":65737389572324,\"created_at\":\"2024-02-29T23:47:16-08:00\",\"position\":1,\"updated_at\":\"2024-02-29T23:47:32-08:00\",\"product_id\":8173654016228,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Sheddan-Bamboo-Roasted-Dai-Tea.jpg?v=1709279252\",\"width\":800,\"height\":800},{\"id\":65737389637860,\"created_at\":\"2024-02-29T23:47:16-08:00\",\"position\":2,\"updated_at\":\"2024-02-29T23:47:32-08:00\",\"product_id\":8173654016228,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Sheddan-Bamboo-Roasted-Dai-Tea-2.jpg?v=1709279252\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8173651984612,\"title\":\"2024
        Swayback\",\"handle\":\"2024-swayback\",\"body_html\":\"The 2024 Swayback
        ripe Puer was processed using a \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        title=\\\"What is Traditional Bamboo Puer Processing?\\\" rel=\\\"noopener
        noreferrer\\\" target=\\\"_blank\\\"\\u003etraditional technique of bamboo
        processing\\u003c\\/a\\u003e where the tea is pressed into fresh fragrant
        bamboo and hand roasted over an open flame before being dried for long term
        storage.\\u003cbr\\u003e\\u003cbr\\u003eA blend of several small batch shou
        Puer teas, married together by the flame of the charcoal and the steam juices
        of fresh fragrant bamboo. We feel this style of tea is underappreciated, and
        continue to commission it year after year (though it's been far too long since
        we made a high-end shou). The charcoal roast, the bright sweet bamboo aromatics
        and the deep molasses of the shou sing together in perfect harmony.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase for a 200g piece will come enclosed in a bamboo shell similar to
        the one pictured, sizes and thicknesses will vary as one would expect with
        a plant.\\u003cbr\\u003e\",\"published_at\":\"2024-03-01T04:35:12-08:00\",\"created_at\":\"2024-02-29T01:49:59-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
        Puer Tea\",\"tags\":[\"Bamboo Roasted\",\"Ripe Puer Tea\",\"Ripe Puer Tea:
        2024\",\"Small Batch Ripe Puer\"],\"variants\":[{\"id\":44658019238116,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"12411A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"78.00\",\"grams\":200,\"compare_at_price\":null,\"position\":1,\"product_id\":8173651984612,\"created_at\":\"2024-02-29T01:49:59-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"},{\"id\":44658019270884,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"12411B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"11.50\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":8173651984612,\"created_at\":\"2024-02-29T01:49:59-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"}],\"images\":[{\"id\":65737389834468,\"created_at\":\"2024-02-29T23:47:28-08:00\",\"position\":1,\"updated_at\":\"2024-02-29T23:47:37-08:00\",\"product_id\":8173651984612,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Swayback-Roasted-Bamboo-Shou-Puerh-Tea.jpg?v=1709279257\",\"width\":800,\"height\":800},{\"id\":65737389801700,\"created_at\":\"2024-02-29T23:47:28-08:00\",\"position\":2,\"updated_at\":\"2024-02-29T23:47:37-08:00\",\"product_id\":8173651984612,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Swayback-Roasted-Bamboo-Shou-Puerh-Tea-2.jpg?v=1709279257\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8173649461476,\"title\":\"2024
        5th Wave\",\"handle\":\"2024-5th-wave\",\"body_html\":\"\\u003cp data-mce-fragment=\\\"1\\\"\\u003eA
        blend of several small batch ripe Puer teas fermented using our own material
        in Menghai, our 5th Wave blend was then sent to Fujian province to be charcoal
        roasted by hand by veteran Wuyi Yancha makers in late 2023 and pressed in
        early 2024 in Yunnan after a period of rest.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003ePeople often ask us, \\\"What tea should
        I drink as a coffee drinker?\\\", so we made an honest attempt at answering
        that questions by fiddling around with our small batch shou Puer blending
        capabilities and then making a hybrid roasted tea with the help of our friends
        in Fujian. The results may not be beans, but considering our leaf-bound limitations,
        I'd say we could almost pass this off as shitty diner coffee. Thick bodied,
        roasted, with a lingering bitterness; goes well grandpa style with bacon and
        eggs, side of toast.\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eEach
        cake is 200 grams of tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2024-03-01T04:35:11-08:00\",\"created_at\":\"2024-02-29T01:42:07-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
