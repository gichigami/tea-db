        Airing the Linens\",\"handle\":\"2025-airing-the-linens\",\"body_html\":\"\\u003cp\\u003eAiring
        the Linens is a blend of aged raw Puer \\u003cem\\u003ehuangpian\\u003c\\/em\\u003e
        [the older, larger leaves of Puer picking] that we stored in Menghai under
        dry conditions before sending to Fujian to be charcoal roasted by hand in
        2024. The roasted material was rested until pressing in 2025.\\u003c\\/p\\u003e\\n\\u003cp\\u003eAged
        huangpian and a smooth charcoal roast together at last. Tropical fruit sweetness
        reminiscent of character often associated with oolong styles, but with the
        endurance and strength of a raw Puer. The sweet aromas stay with you long
        after the tea is gone.\\u003c\\/p\\u003e\\n\\u003cp\\u003ePressed in 2025.
        Each cake is 200g. The cakes are wrapped in bamboo leaf tongs, with five cakes
