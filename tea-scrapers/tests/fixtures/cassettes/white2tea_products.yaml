\":\"2025
        Laocong Lapsun Mini\",\"handle\":\"2025-laocong-lapsun-mini\",\"body_html\":\"\\u003cp\\u003eSun
        dried old arbor assamica varietal from Yunnan province that is typically made
        into raw Puer.\\u003cstrong\\u003e \\u003c\\/strong\\u003eWe commissioned
        these black tea productions in 2024 and sent the blend to a smokehouse in
        Tongmuguan village in Fujian to be pine smoked by a veteran Lapsang smoker.
        The three day smoking process occurs at temperatures from 100C to 120C in
        an old style Lapsang smokehouse. Pressed in Yunnan in 2025.\\u003c\\/p\\u003e\\n\\u003cp\\u003eAn
        answer to a question that nobody asked, \\\"What if high quality old arbor
        Yunnan black tea materials were made into Lapsang.\\\" The result is what
        you'd expect; all of the heavy full bodied soup and full feeling of quality
        Yunnan material with aromatics that mirror the traditional Fujian smoke, all
        singing together in harmony. We blended four different old arbor black teas
        in 2024 to create this blend. The result is a truly special treat for black
        tea lovers and smoke aficionados alike.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        purchase is for one ~ 7 gram ball.\\u003cbr\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-28T02:26:49-08:00\",\"created_at\":\"2025-02-27T00:31:56-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Black
        Tea\",\"tags\":[\"Black Tea\",\"Smoked\"],\"variants\":[{\"id\":46107786215652,\"title\":\"~7g\",\"option1\":\"~7g\",\"option2\":null,\"option3\":null,\"sku\":\"52502A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"3.30\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":8600972329188,\"created_at\":\"2025-02-27T00:31:56-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74354866520292,\"created_at\":\"2025-02-27T00:33:26-08:00\",\"position\":1,\"updated_at\":\"2025-02-27T00:38:51-08:00\",\"product_id\":8600972329188,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025LaocongLapsunMinis.jpg?v=1740645531\",\"width\":800,\"height\":800},{\"id\":74354866553060,\"created_at\":\"2025-02-27T00:33:26-08:00\",\"position\":2,\"updated_at\":\"2025-02-27T00:38:51-08:00\",\"product_id\":8600972329188,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025LaocongLapsunMinis-2.jpg?v=1740645531\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Size\",\"position\":1,\"values\":[\"~7g\"]}]},{\"id\":8600969314532,\"title\":\"2025
        Auntie Stacks\",\"handle\":\"2025-auntie-stacks\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eA blend of Yunnan raw Puer, sent to a smokehouse
        in Tongmuguan village in Fujian to be pine smoked by a veteran Lapsang smoker.
        The three day smoking process occurs at temperatures from 100C to 120C in
        an old style Lapsang smokehouse.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        natural fit for cigar lovers and Scotch whisky fanatics who want tea in the
        morning, but this tea is a surprise that will likely garner even fans who
        are wary of smoke as well.\\u003c\\/p\\u003e\\n\\u003cp\\u003eStrong bitterness
        and full body with heavy feeling. Top quality huangpian elevated with the
        added dimension of the flame. Seared leather and tobacco notes underneath
        the smoke cloud. Burly intensity when pushed, with a dynamic character that
        will only improve with age.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003ePressed
        in 2020. Each cake is 200g. The cakes are wrapped in bamboo leaf tongs, with
        five cakes per tong.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch6\\u003eFor
