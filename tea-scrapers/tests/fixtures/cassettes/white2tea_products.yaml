        of bitterness and smoke over the rich and velvety shou mouthfeel. Perfect
        tea for cold weather or a rainy day.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        purchase is for one 7 gram mini.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cem\\u003eFor
        aging, we recommend that smoked teas be sealed and separated from other teas,
        as the fresh smoke will pass along to the teas next to it. Or you can keep
        them with your cigars.\\u003c\\/em\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-10-10T02:22:03-07:00\",\"created_at\":\"2021-10-08T23:36:38-07:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
        Puer Tea\",\"tags\":[\"Ripe Puer Tea\",\"Ripe Puer Tea: 2021\",\"Small Batch
        Ripe Puer\",\"Smoked\"],\"variants\":[{\"id\":40849653661887,\"title\":\"7g\",\"option1\":\"7g\",\"option2\":null,\"option3\":null,\"sku\":\"12114A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"4.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":7010586296511,\"created_at\":\"2021-10-08T23:36:38-07:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\"}],\"images\":[{\"id\":30459855765695,\"created_at\":\"2021-10-08T23:37:00-07:00\",\"position\":1,\"updated_at\":\"2021-10-08T23:37:02-07:00\",\"product_id\":7010586296511,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Smoke-shou-mini-Dragon-Ball-Tea.jpg?v=1633761422\",\"width\":800,\"height\":800},{\"id\":30459855700159,\"created_at\":\"2021-10-08T23:37:00-07:00\",\"position\":2,\"updated_at\":\"2021-10-08T23:37:02-07:00\",\"product_id\":7010586296511,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Smoke-shou-mini-Dragon-Ball-Tea-2.jpg?v=1633761422\",\"width\":800,\"height\":800},{\"id\":30459855601855,\"created_at\":\"2021-10-08T23:37:00-07:00\",\"position\":3,\"updated_at\":\"2021-10-08T23:37:01-07:00\",\"product_id\":7010586296511,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Smoke-shou-mini-Dragon-Ball-Tea-3.jpg?v=1633761421\",\"width\":800,\"height\":800},{\"id\":30459855634623,\"created_at\":\"2021-10-08T23:37:00-07:00\",\"position\":4,\"updated_at\":\"2021-10-08T23:37:02-07:00\",\"product_id\":7010586296511,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Smoke-shou-mini-Dragon-Ball-Tea-4.jpg?v=1633761422\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"7g\"]}]},{\"id\":7010582167743,\"title\":\"2021
        Pyrolad\",\"handle\":\"2021-pyrolad\",\"body_html\":\"\\u003cp data-mce-fragment=\\\"1\\\"\\u003eWe
        called our friends in Fujian in early spring and reserved pine wood for tea
        smoking, anxiously awaiting our space in line. Our Puer all blended in Yunnan,
        we shipped the blends to Fujian in summer. A veteran Lapsang smoker spent
        3 days smoking our tea, smoking at temperatures from 100C to 120C in an old
        style Lapsang smokehouse in Tongmuguan village.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThe unity of old school Fujian tea processing
        techniques with high quality base materials yields a totally unique smoke
        experience that pushes the tradition of smoked Puer tea in Yunnan (both the
        intentional and haphazard unintentional versions).\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThe pine smoke character is laced through
        the blend with an intense nose that will settle into the base of the tea with
        aging, eventually transforming into a rare combination of flavors and aromas
        that few Puer teas can mimic.\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eAs
        for the tea blend, you can imagine that we wouldn't phone-in a blend that
        requires so much planning and legwork to process, suffice it to say it's fantastic.
        Burly, full bodied, deep returning sweetness, layered nuance and heavy feel.\\u003c\\/p\\u003e\\n\\u003cp\\u003eObviously
        this tea is a natural fit for cigar lovers and Scotch whisky fanatics who
        want tea in the morning, but this tea is a surprise that will likely garner
        even fans who are wary of smoke.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        cake is 200 grams.\\u003cbr\\u003e\\u003cbr\\u003ePressed in 2020. Each cake
        is 200g. The cakes are wrapped in bamboo leaf tongs, with five cakes per tong.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch6\\u003eFor
        aging, we recommend that smoked teas be sealed and separated from other teas,
        as the fresh smoke will pass along to the teas next to it. Or you can keep
        them with your cigars.\\u003c\\/h6\\u003e\",\"published_at\":\"2021-10-10T02:22:02-07:00\",\"created_at\":\"2021-10-08T23:32:11-07:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
