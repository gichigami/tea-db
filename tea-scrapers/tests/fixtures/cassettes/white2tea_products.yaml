        is an \\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        title=\\\"Oolong Tea\\\" target=\\\"_blank\\\"\\u003eoolong tea\\u003c\\/a\\u003e
        from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003eJinmudan
        is a cultivar that was created starting in 1978 in Fujian using the \\u003cem\\u003etieguanyin\\u003c\\/em\\u003e
        oolong varietal as the mother and using another varietal called \\u003cem\\u003ehuangdan\\u003c\\/em\\u003e.
        The resulting cultivar is a tight and floral explosion with a long returning
        sweetness and mineral character. This one comes out swinging.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams of tea.\\u003cbr\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-03-03T06:02:55-08:00\",\"created_at\":\"2023-02-28T21:42:56-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":43824155001060,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32301A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"8.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":7945266692324,\"created_at\":\"2023-02-28T21:42:57-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":47701659746532,\"created_at\":\"2023-02-28T21:43:04-08:00\",\"position\":1,\"updated_at\":\"2023-02-28T21:43:05-08:00\",\"product_id\":7945266692324,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2023-Jinmudan-Tea.jpg?v=1677649385\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":7945265905892,\"title\":\"Foshou\",\"handle\":\"foshou\",\"body_html\":\"\\u003cp\\u003eFoshou
        is an \\u003ca title=\\\"Oolong Tea\\\" href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        target=\\\"_blank\\\"\\u003eoolong tea\\u003c\\/a\\u003e from the Fujian province
        of China.\\u003cbr\\u003e\\u003cbr\\u003e\\u003cem\\u003eFoshou\\u003c\\/em\\u003e
        is a varietal that is often sold in the market under the name \\u003cem\\u003exueli\_\\u003c\\/em\\u003eor
        snow pear. The reason for the use of snow pear as a name is that it makes
        the character of the tea a bit more obvious than \\u003cem\\u003efoshou\\u003c\\/em\\u003e\uFEFF
        which literally translates as Buddha Hand. (easier to tell people something
        smells like snow pears than deity appendages) Our foshou was roasted 3 times
        using charcoal, with a heavier hand than most. The fruity character lies beneath
        the roast, which has settled out a bit already. An engaging cup of yancha.
        \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach purchase
        is for 25 grams of tea.\\u003cbr\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-03-03T06:02:54-08:00\",\"created_at\":\"2023-02-28T21:38:26-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":43824150839524,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32302A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"9.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":7945265905892,\"created_at\":\"2023-02-28T21:38:26-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":47701618065636,\"created_at\":\"2023-02-28T21:42:06-08:00\",\"position\":1,\"updated_at\":\"2023-02-28T21:42:07-08:00\",\"product_id\":7945265905892,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2023-Foshou-Rock-Oolong-Tea.jpg?v=1677649327\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":7945264890084,\"title\":\"Meizhan\",\"handle\":\"meizhan\",\"body_html\":\"\\u003cp\\u003eMeizhan
        is an \\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        title=\\\"Oolong Tea\\\" target=\\\"_blank\\\"\\u003eoolong tea\\u003c\\/a\\u003e
        from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003e\\u003cem\\u003eMeizhan\\u003c\\/em\\u003e
        is a classic varietal of \\u003cem\\u003eyancha\\u003c\\/em\\u003e [rock oolong]
        that is usually used in blends to make \\u003cem\\u003edahongpao\\u003c\\/em\\u003e.
        Due to this blending, the average yancha drinker loves meizhan character,
        but has never had pure meizhan. It's a remarkably good yancha on its own,
        so we decided to purchase a pure production of meizhan varietal this year
        to bring a little recognition to a varietal that has done plenty of heavy
        lifting for the fame of the dahongpao moniker. It's all of the classic minerality,
        roast and upfront presence of yancha that you know and love. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams of tea.\\u003cbr\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-03-03T06:02:54-08:00\",\"created_at\":\"2023-02-28T21:32:05-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":43824148512996,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32303A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"9.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":7945264890084,\"created_at\":\"2023-02-28T21:32:05-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":47700687093988,\"created_at\":\"2023-02-28T21:32:15-08:00\",\"position\":1,\"updated_at\":\"2023-02-28T21:32:16-08:00\",\"product_id\":7945264890084,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2023-Meizhan-oolong-Tea.jpg?v=1677648736\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":7945264595172,\"title\":\"Spring
