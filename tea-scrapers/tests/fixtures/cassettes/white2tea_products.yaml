        Raw Spring Liubao\",\"handle\":\"2021-raw-liubao\",\"body_html\":\"\\u003cp\\u003eLiubao
        \\u003cem\\u003eheicha\\u003c\\/em\\u003e, also known as dark tea, a post
        fermented tea from Guangxi province in China. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea was made on commission for white2tea in early spring of 2021 for \\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\" target=\\\"_blank\\\"\\u003eour
        wonderful tea club\\u003c\\/a\\u003e. We did not have enough left for baskets,
        but had a little loose tea left for our new heicha section.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eNot
        the typical mass produced and pile fermented dark liubao. Raw may be a misnomer,
        but calling it green doesn\u2019t quite seem right either, and some folk have
        even suggested this tea qualify as a yellow tea or some hybrid unfermented
        heicha. In China people often call it \\u003cem\\u003enongjia\\u003c\\/em\\u003e
        or farmer style, though it is rarely sold on the open market due to small
        production sizes and lack of proper accreditation. You will find similarities
        in this tea that spans genres \u2013 green tea, yellow tea, heicha, raw Puer
        \u2013 there is a reason you can\u2019t pin it down easily.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eBright
        aromas and sweetness with a hefty \\u003cem\\u003e\uFEFFhuigan\\u003c\\/em\\u003e\uFEFF
        (returning sweetness) that is sticky and refreshing. Lovely to drink now or
        age as you desire.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach purchase is for
        25g of loose tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-12-10T04:32:50-08:00\",\"created_at\":\"2021-12-08T22:46:01-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Heicha\",\"tags\":[\"Heicha\"],\"variants\":[{\"id\":42170665238756,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"92101B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"8.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":7480094785764,\"created_at\":\"2021-12-08T22:46:01-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":36262367985892,\"created_at\":\"2021-12-08T22:46:23-08:00\",\"position\":1,\"updated_at\":\"2021-12-08T22:46:30-08:00\",\"product_id\":7480094785764,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Spring-Liubao-Raw-Guangxi-Tea.jpg?v=1639032390\",\"width\":800,\"height\":800},{\"id\":36262367953124,\"created_at\":\"2021-12-08T22:46:23-08:00\",\"position\":2,\"updated_at\":\"2021-12-08T22:46:30-08:00\",\"product_id\":7480094785764,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Spring-Liubao-Raw-Guangxi-Tea-2.jpg?v=1639032390\",\"width\":800,\"height\":800},{\"id\":36262368018660,\"created_at\":\"2021-12-08T22:46:23-08:00\",\"position\":3,\"updated_at\":\"2021-12-08T22:46:30-08:00\",\"product_id\":7480094785764,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2021-Spring-Liubao-Raw-Guangxi-Tea-3.jpg?v=1639032390\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":7480091148516,\"title\":\"2021
        Lu'An Tegong\",\"handle\":\"2021-liuan-tegong\",\"body_html\":\"\\u003cp\\u003eLu'An
