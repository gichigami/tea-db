        Censers\",\"handle\":\"2018-censers\",\"body_html\":\"\\u003cdiv class=\\\"short-description\\\"\\u003eA
        specially commissioned baimudan grade white tea from Guizhou province. We
        tried and fell in love with this tea in 2017, but were too late to buy any
        of the material. In the spring of 2018 we had our money in the producers hands
        before the buds were plucked.\\u003c\\/div\\u003e\\u003cbr\\u003e\\u003cdiv\\u003e\\u003c\\/div\\u003e\\u003cbr\\u003e\\u003cdiv
        class=\\\"short-description\\\"\\u003eCensers is an elegant white tea with
        a full bodied smoothness. The tea has a bright and complex fragrance that
        endures throughout a long session, lingering in the mouth and the cups long
        after the tea has gone. The fragrances and flavors shift between sweet floral
