        U 2 CAN HELP\",\"handle\":\"2017-u-2-can-help\",\"body_html\":\"The 2017 U
        2 CAN HELP is a cake we made to help out Education In Sight, a non-profit
        organization that focuses on helping children in rural Yunnan get the eyeglasses
        and eye-care that they need.\\u003cbr\\u003e\\u003cbr\\u003eFor each raw Puer
        tea cake purchased, white2tea will donate one eye exam, a pair of glasses,
        and eye education to a child in need in rural Yunnan via Education in Sight.
        Our goal is to sell out 100 cakes and help out 100 kids in 2017. We \\u003cstrong\\u003ereally
        \\u003c\\/strong\\u003eappreciate your support and it'd be amazing if you'd
        help spread the word!\\u003cbr\\u003e\\u003cbr\\u003eThe material of the tea
        cake is from Lincang, with a strong fragrance and thick mouth feel, this tea
        is sweet and floral. The loose tea from this cake was featured in the \\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\" target=\\\"_blank\\\"
        title=\\\"Tea Club\\\" rel=\\\"noopener noreferrer\\\"\\u003ewhite2tea club\\u003c\\/a\\u003e
        in May of 2017. We are not selling samples of this tea, it's about the charity
        as much as the tea.\\u003cbr\\u003e\\u003cbr\\u003eEven if you aren't into
        this tea cake, you can still donate to Education in Sight and get involved
        with their cause. Visit their website, or take a look at the information below
        to learn more about their mission.\\u003cbr\\u003e\\u003cbr\\u003eEducation
        In Sight is a non-profit organization whose vision is a China where every
        rural student has the eyeglasses they need to see clearly. Over 30 million
        students across rural China don't have the eyeglasses they need to see clearly
        in school. As a result, they suffer from significantly poorer academic performance,
        and much higher drop out rates. At Education In Sight, we work with local
        government and private partners to bring high quality eye exams and eye care
        directly to students inside the classroom, so they have no barriers to clear
        vision and can achieve life-long success.\\u003cbr\\u003e\\u003cbr\\u003eTo
        date, Education In Sight has coordinated over 150,000 eye exams, and delivered
        over 19,000 eyeglasses to students in Yunnan province. Their goal is to solve
        this problem for students both now and in the long-term, so that every rural
        student has the chance to see clearly and succeed.\\u003cbr\\u003eThe 2017
