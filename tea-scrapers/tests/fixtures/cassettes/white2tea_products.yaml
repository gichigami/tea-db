        Flapjacks Raw Puer\",\"handle\":\"2018-flapjacks-raw-puer\",\"body_html\":\"Flap
        Jacks raw was pressed in 2018. Each flap jack is roughly 7 grams, with 7 flapjacks
        in each short stack.\\u003cbr\\u003e\\u003cbr\\u003eConveniently pressed into
        an easy single steep shape, the tea is still young and astringent as one would
