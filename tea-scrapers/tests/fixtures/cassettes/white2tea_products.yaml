        Turtle Dove\",\"handle\":\"2019-turtle-dove\",\"body_html\":\"The 2019 Turtle
        Dove is a pressed white tea from Yunnan. Made from large leaf varietal material
        that is sun dried with no machine processing involved.\\u003cbr\\u003e\\u003cbr\\u003eOur
        classic white tea has a thick body, soft mouthfeel, and a unique natural fragrance.
        Sweet and succulent with plenty of endurance for re-steeping. This tea is
        very forgiving with any type of brewing, including gongfu, western, or grandpa
        style. A perfect white tea to drink daily without much fuss.\\u003cbr\\u003e\\u003cbr\\u003e
