        Dove\",\"handle\":\"bamboo-dove\",\"body_html\":\"This tea was produced in
        autumn of 2017 using a \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        title=\\\"What is Traditional Bamboo Puer Processing?\\\" target=\\\"_blank\\\"\\u003etraditional
        technique for bamboo Puer pressing\\u003c\\/a\\u003e and a specific variety
        of fragrant bamboo. The base material is identical to our \\u003ca href=\\\"https:\\/\\/white2tea.com\\/products\\/2017-turtle-dove\\\"
        title=\\\"2017 Turtle Dove\\\" target=\\\"_blank\\\"\\u003e2017 Turtle Dove\\u003c\\/a\\u003e.\\u003cbr\\u003e\\u003cbr\\u003eThe
        aromatics of the bamboo and the roast of the fire have engulfed with the \\u003cstrong\\u003e\\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/collections\\/white-tea\\\" target=\\\"_blank\\\"
        title=\\\"White Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003ewhite tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e
        to make a very unique tea. It has a complex character of sweetness and smoothness,
        melded with the heavy nature of being roasted on an open flame.\\u003cbr\\u003e\\u003cbr\\u003eThe
        tea will benefit from a few months of rest, as it was processed in late October
        of 2017, and as of the release the taste of the roast is still quite fresh.
        Drink now or aged as desired.\\u003cbr\\u003e\\u003cbr\\u003eWe decided to
        produce this tea according to the natural shapes of the bamboo rather than
        waste pieces that didn\u2019t fit our ideal shape or size. We will break apart
        the amount you choose and send it in a sealed bag. If you would like an entire
        piece with the bamboo, please contact us directly and we will help you choose
        a size. Most are around 400 grams.\\u003cbr\\u003e\\u003cbr\\u003eEach purchase
        is for 50 grams.\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:37:19-08:00\",\"created_at\":\"2020-01-24T19:37:19-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"White
