        \\u003cem data-mce-fragment=\\\"1\\\"\\u003eheicha\\u003c\\/em\\u003e, also
        known as dark tea, a post fermented tea from Guangxi province in China. \\u003cbr
        data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eThis
        \\u003cem\\u003elaochapo\\u003c\\/em\\u003e was a commisioned production of
        the late autumn, early winter coarse leaf style popular in Liubao. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThis tea can be brewed gongfu style with
        long steeps or even simmered to release the flavors from the older leaves
        and stems. A very rustic style of tea, some of the bricks may have naturally
        occurring \\u003cem\\u003ejinhua \\u003c\\/em\\u003e(eurotium cristatum),
        as well as all manner of odd bits one can expect in a rural, lower grade heicha.\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eNot the typical mass produced and pile fermented
        dark liubao. Raw may be a misnomer, but calling it green doesn\u2019t quite
        seem right either, and some folk have even suggested this tea qualify as a
        yellow tea or some hybrid unfermented heicha. In China people often call it
        \\u003cem data-mce-fragment=\\\"1\\\"\\u003enongjia\\u003c\\/em\\u003e or
        farmer style, though it is rarely sold on the open market due to small production
        sizes and lack of proper accreditation. You will find similarities in this
        tea that spans genres \u2013 green tea, yellow tea, heicha, raw Puer \u2013
        there is a reason you can\u2019t pin it down easily.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
