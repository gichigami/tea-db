        Gaiwan \\u0026 1 Cup\"]}]},{\"id\":8942134755556,\"title\":\"2026 Almond Dancong
        Maocha\",\"handle\":\"2026-almond-dancong-maocha\",\"body_html\":\"\\u003cp\\u003eA
        higher-end variation on our Milan Maocha brick. Maocha is a bit of a misnomer,
        how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea]
        and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. \\u003cbr\\u003e\\u003cbr\\u003eThe brick has a strong almond
        aroma with marzipan sweetness behind the roast. A delectable treat for oolong
        lovers.\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur Dancong oolong tea bricks are
        a little tricky to brew. Very punchy when pushed, we recommend dropping your
        leaf down a couple of grams and doing flash steeps gongfu style. The tea can
        often be heavily fragmented when broken off of the brick, which means the
        surface area is multiplied and the tea steeps fast and strong. For example,
        we usually brew 6 grams of raw Puer in a 100ml gaiwan, but for this tea we
        drop down to around 4 grams for a more even session. \\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. This is a 2024 Dancong, pressed in early 2025.\\u003c\\/p\\u003e\",\"published_at\":\"2026-03-05T07:06:54-08:00\",\"created_at\":\"2026-03-04T03:04:34-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":47992552423652,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32602A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"69.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8942134755556,\"created_at\":\"2026-03-04T03:04:34-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":47992552456420,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32602B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"10.20\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8942134755556,\"created_at\":\"2026-03-04T03:04:34-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":80960308576484,\"created_at\":\"2026-03-04T22:22:19-08:00\",\"position\":1,\"updated_at\":\"2026-03-04T22:22:41-08:00\",\"product_id\":8942134755556,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2026AlmondDancongOolongBrickTea.jpg?v=1772691761\",\"width\":800,\"height\":800},{\"id\":80960308510948,\"created_at\":\"2026-03-04T22:22:19-08:00\",\"position\":2,\"updated_at\":\"2026-03-04T22:22:41-08:00\",\"product_id\":8942134755556,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2026AlmondDancongOolongBrickTea-2.jpg?v=1772691761\",\"width\":800,\"height\":800},{\"id\":80960308543716,\"created_at\":\"2026-03-04T22:22:19-08:00\",\"position\":3,\"updated_at\":\"2026-03-04T22:22:41-08:00\",\"product_id\":8942134755556,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2026AlmondDancongOolongBrickTea-3.jpg?v=1772691761\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8942134526180,\"title\":\"2026
        Milan Maocha Top Shelf\",\"handle\":\"2026-milan-maocha-top-shelf\",\"body_html\":\"\\u003cp\\u003eA
        higher-end variation on our Milan Maocha brick. Maocha is a bit of a misnomer,
        how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea]
        and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. \\u003cbr\\u003e\\u003cbr\\u003eThe brick is incredibly fragrant,
        with deeper honey and floral flavors emerging throughout the course of a session.
        Beautiful complexity between the roast and traditional honey orchid style.
        Drink now or age as you please.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur
        Dancong oolong tea bricks are a little tricky to brew. Very punchy when pushed,
        we recommend dropping your leaf down a couple of grams and doing flash steeps
        gongfu style. The tea can often be heavily fragmented when broken off of the
        brick, which means the surface area is multiplied and the tea steeps fast
        and strong. For example, we usually brew 6 grams of raw Puer in a 100ml gaiwan,
        but for this tea we drop down to around 4 grams for a more even session. \\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. This is a 2024 Dancong, pressed in early 2025.\\u003c\\/p\\u003e\",\"published_at\":\"2026-03-05T07:06:53-08:00\",\"created_at\":\"2026-03-04T03:04:05-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":47992552161508,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32601A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"66.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8942134526180,\"created_at\":\"2026-03-04T03:04:05-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":47992552194276,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32601B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"9.90\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8942134526180,\"created_at\":\"2026-03-04T03:04:05-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":80960195264740,\"created_at\":\"2026-03-04T22:17:36-08:00\",\"position\":1,\"updated_at\":\"2026-03-04T22:17:58-08:00\",\"product_id\":8942134526180,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2026MilanDancongTopShelf.jpg?v=1772691478\",\"width\":800,\"height\":800},{\"id\":80960195199204,\"created_at\":\"2026-03-04T22:17:36-08:00\",\"position\":2,\"updated_at\":\"2026-03-04T22:17:58-08:00\",\"product_id\":8942134526180,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2026MilanDancongTopShelf-2.jpg?v=1772691478\",\"width\":800,\"height\":800},{\"id\":80960195231972,\"created_at\":\"2026-03-04T22:17:36-08:00\",\"position\":3,\"updated_at\":\"2026-03-04T22:17:58-08:00\",\"product_id\":8942134526180,\"variant_ids\":[],\"src\":\"htt