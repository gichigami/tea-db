        Mushroom\"]}]},{\"id\":4509351739529,\"title\":\"2015 Tuhao as #$\\u0026%\",\"handle\":\"2015-tuhao-2-hao-as-f\",\"body_html\":\"2015
        Tuhao Raw Puer Tea from White2tea.\\u003cbr\\u003e\\u003cbr\\u003eThis tea
        is our attempt at blending a tea with character similar to Laobanzhang, without
        using any actual Laobanzhang material. Though Laobanzhang character is not
        a singular thing, and can mean literally hundreds of different things, we
        opted for a tea with a lighter bitterness and more sweetness and internal
        strength.\\u003cbr\\u003e\\u003cbr\\u003eThe cake is a commentary on the focus
        on brand name, fame, and authenticity. The tea itself is excellent quality.
        Despite not being \\\"real\\\" Laobanzhang, it is real tea.\\u003cbr\\u003ePressed
        in 2015 by stone. 200g cakes, with 5 cakes in a bamboo tong.\\u003cbr\\u003e\\u003cbr\\u003eWhat
        does \u571F\u8C6A [\\u003ca href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Tuhao\\\"\\u003e\\u003cem\\u003eTuhao\\u003c\\/em\\u003e\\u003c\\/a\\u003e]
        mean? \\u003cem\\u003eTuhao\\u003c\\/em\\u003e are the newly wealthy class
        of China, known for a lack of taste ( gaudy fashion sense, gold, jaguar print,
        etc.) and buying what is expensive, rather than what is good. 2 Hao [\u597D\uFF3Dis
        a \\u003ca href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Pinyin\\\"\\u003epinyin\\u003c\\/a\\u003e\\/english
        pun, meaning \\\"too good\\\".\",\"published_at\":\"2020-01-24T19:32:55-08:00\",\"created_at\":\"2020-01-24T19:32:55-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
