        Hong\",\"handle\":\"borderline-hong\",\"body_html\":\"This Fujian \u201Cblack\u201D
        tea is on the edge of what can truly fit the fully oxidized definition, but
        it\u2019s close. The tea maker has opted to coax out more aroma and keep it
        bright, teasing oxidation up to the border of \\u003cem\\u003ehong cha\\u003c\\/em\\u003e,
        but never quite crossing into full black tea territory. The result is a highly
        aromatic and very enjoyable tea with a silky texture and complex flavor profile.
        If you don\u2019t fall in love with this tea gongfu style, worst case scenario
        you can make decadent iced tea with it for a summer afternoon. Or maybe that\u2019s
        the best case scenario. \\u003cbr\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        purchase is for 25g of tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-09-08T06:47:35-07:00\",\"created_at\":\"2023-09-07T21:45:50-07:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Black
