        monthly tea club subscription\",\"handle\":\"monthly-tea-club-subscription\",\"body_html\":\"\\u003cp\\u003eUnique
        teas delivered to your door step every month. Every month we curate a special
        package for our members to enjoy and every month is a unique surprise. We
        have pressed small batch commissioned productions, roasted one-of-a-kind oolongs,
        and overseen productions from the fresh leaf to the finished product; all
        for the club. No other tea club offers a unique monthly experience quite like
        white2tea. \_\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach purchase for one month
        is a recurring $29.99 with shipping included. You only need to purchase one
        month, the payment will be charged automatically on the same date of the following
        month and you can cancel anytime via the customer portal in your welcome email.\\u003c\\/p\\u003e\\n\\u003cp\\u003ePlease
        ensure that your address for your order is both correct and up to date. You
        can edit your address via your customer portal as well. Each payment is for
        the following month and will be shipped on the first of the month. (For example;
        a July 5th payment would be for the August tea club, which would ship on August
        1st)\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eIf you'd like more
        information about our club, please read the \\u003ca rel=\\\"noopener\\\"
        title=\\\"white2tea tea club FAQ\\\" href=\\\"https:\\/\\/white2tea.com\\/pages\\/white2tea-tea-club-faq\\\"
        target=\\\"_blank\\\"\\u003etea club FAQ section\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp\\u003ePlease
        note that if an order contains other teas along with an order for the tea
        club that they will all be shipped together. This means that your order will
        need to wait until the next tea club is shipped.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch5\\u003eEach
        purchase below is for a one month subscription for the white2tea club. Each
        payment is for the following month and the final date to participate is the
        last day of the month, for example, September 30th is the last day to sign
        up for the October club. Please contact us directly if you'd like to receive
        any previous months and we can invoice them separately.\\u003c\\/h5\\u003e\",\"published_at\":\"2024-08-01T02:13:22-07:00\",\"created_at\":\"2020-01-24T19:39:22-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"\",\"tags\":[\"Monthly
