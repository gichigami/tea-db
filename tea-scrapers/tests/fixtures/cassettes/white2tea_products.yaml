        Astro Kittens\",\"handle\":\"2019-astro-kittens\",\"body_html\":\"The 2019
        Astro Kittens is for bitter lovers. Bitterness that is extremely heavy, yet
        integrated with a complexity that few bitter teas offer. Depth, heavy feeling
        and a slight internal smokiness that flits over the tide of an intensely bitter
        body. Heavy enough to crush the spirits of most aspiring young sheng drinkers.
