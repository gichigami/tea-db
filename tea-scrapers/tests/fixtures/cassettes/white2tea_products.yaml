        \\u003cbr\\u003e\\u003cbr\\u003eThe spring, autumn, and \\u003cem\\u003ehuangpian\\u003c\\/em\\u003e\\u003cem\\u003e
        \\u003c\\/em\\u003e[the larger, older leaves] teas are all from the same village\\/producer,
