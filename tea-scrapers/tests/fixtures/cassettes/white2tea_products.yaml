        Bloom Dancong\",\"handle\":\"moon-bloom-dancong\",\"body_html\":\"\\u003cp\\u003eFrom
        the Guangdong province of China, our Moon Bloom Dancong \\u003cstrong\\u003e\\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\" target=\\\"_blank\\\"
        title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003eoolong tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e
        is made from \\u003cem\\u003eyelaixiang\\u003c\\/em\\u003e varietal.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        varietal name \\u003cem\\u003eYelaixiang\\u003c\\/em\\u003e roughly translates
        as \\\"fragrance that arrives in the night\\\". Though the varietal does not
        share the same notoriety as Milan due to its much smaller production size,
        the lack of fame shouldn't deter you from trying it. Our Moon Bloom is heavily
        oxidized and has a smooth, reddish liquor. The flavors are fruity and floral,
        with heavy fragrances throughout.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
