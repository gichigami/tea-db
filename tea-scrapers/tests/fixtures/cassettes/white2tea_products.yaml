        Fade\",\"handle\":\"2016-fade-raw-puer-huangpian-brick\",\"body_html\":\"The
        Fade brick is a raw Puer tea, pressed in 2016 using 2015 Yiwu \\u003cem\\u003eHuangpian
        \\u003c\\/em\\u003e[the largest leaf in Puer processing] material.\\u003cbr\\u003e\\u003cbr\\u003eWhile
        huangpian are often considered to be inexpensive, the quality of the material
        in this blend is very high. The tea is sweet and thick. There is a slight
        sour note in the tea which will give way to honey and smoothness with further
        aging. We also feel this tea has a strong body feeling, though that varies
        from person to person.\\u003cbr\\u003e\\u003cbr\\u003eSuitable to drink now
