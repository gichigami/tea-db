        Title\"]}]},{\"id\":4509352329353,\"title\":\"2015 72Hours\",\"handle\":\"2015-72hours-raw-puer-tea\",\"body_html\":\"2015
        72Hours from White2tea.\\u003cbr\\u003e\\u003cbr\\u003eOur highest quality
        and most complex blend from 2015. A tea worthy of aging, but a joy to drink
        for lovers of young raw Puer tea. The 72Hours blend is intensely sweet and
        has a variety of engaging characteristics. We recommend this as a tea for
        special occasions or focused brewing.\\u003cbr\\u003e\\u003cbr\\u003eThe material
        in this blend crosses many regions and mountains, but all of the material
        used is of excellent quality. We have been studying this blend of material
        for several years and after short term aging (~5 years) the soup becomes increasingly
        viscous and sweet, with an intense body feel.\\u003cbr\\u003eThe 72Hours was
        stone pressed by hand on June 16th,2015 at Hexing Tea Factory, one of the
        highest quality hand pressing operations in all of Yunnan.  200g cakes, with
        5 cakes per tong.\",\"published_at\":\"2020-01-24T19:33:17-08:00\",\"created_at\":\"2020-01-24T19:33:17-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
