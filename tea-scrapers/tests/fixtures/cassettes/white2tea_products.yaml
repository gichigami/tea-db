        Flower Dancong\",\"handle\":\"ginger-flower-dancong\",\"body_html\":\"\\u003cp\\u003eFrom
        the Guangdong province of China, our Full House Dancong oolong tea is made
        from\\u003cem\\u003e jianghuaxiang\\u003c\\/em\\u003e varietal.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        name\_\\u003cem data-mce-fragment=\\\"1\\\"\\u003ejianghuaxiang\\u003c\\/em\\u003e
        translates literally as \\\"ginger flower fragrance\\\". The floral and subtly
