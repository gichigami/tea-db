        Lucky Puppy\",\"handle\":\"2018-lucky-puppy\",\"body_html\":\"The most complex
        blend of 2018, involving a wide range of high end material from several regions.
        The unique character of this tea is heavy with strength. Lucky Puppy evolves
        from steep to steep in a gongfu brewing session, displaying a wide array of
        characteristics and a unique experience. The tea has a powerful aggressive
        character in earlier steeps, with a lasting huigan and depth of returning
        flavor. The later steeps trail off into smooth sweetness and can be resteeped
        many times. Drink now or age if you can keep your hands off this puppy.\\u003cbr\\u003e\\u003cbr\\u003eEach
        cake is 200 grams.\\u003cbr\\u003e\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:38:02-08:00\",\"created_at\":\"2020-01-24T19:38:02-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
