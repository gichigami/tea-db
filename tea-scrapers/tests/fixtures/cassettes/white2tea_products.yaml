        target=\\\"_blank\\\" title=\\\"White Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003ewhite
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from Yunnan province. This production
        was made entirely of old arbor tea that is usually destined to be raw Puer
        tea. If you are accustomed to drinking yueguangbai teas with a bud heavy picking
        standard, you may notice that this tea has a lot of larger leaves; this is
        because when you make an old arbor tea you want to pick whatever the trees
        are giving and not waste a bit of it. The bamboo processing of this tea means
        that the leaves are broken up, so the tea will brew faster and stronger due
        to the increased surface area.\\u003cbr\\u003e\\u003cbr\\u003eThis tea has
        a thick enduring aroma and flavor with a hefty, silky body. The base character
