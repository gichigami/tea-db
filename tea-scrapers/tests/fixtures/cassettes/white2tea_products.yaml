57,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2017-bamboo-dove-white-tea-5.jpg?v=1580937339\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"50g\"]}]},{\"id\":4509358129289,\"title\":\"2017
        Mengsong Old Arbor\",\"handle\":\"2017-autumn-mengsong-old-arbor-raw-puer\",\"body_html\":\"Autumn
        raw Puer \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea] from old arbor
        trees in a single grove in the Mengsong mountain range. The tea is bright
        and mildly astringent, with a lasting sweetness and the floral characteristics
        of youth. Drink now or age as you please.\\u003cbr\\u003e\\u003cbr\\u003eEach
        package is for 50 grams of loose tea.\\u003cbr\\u003e\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:37:18-08:00\",\"created_at\":\"2020-01-24T19:37:18-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
