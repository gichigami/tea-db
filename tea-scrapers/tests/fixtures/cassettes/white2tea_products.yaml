        Laocong Lapsun\",\"handle\":\"2025-laocong-lapsun\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eSun dried old arbor assamica varietal from
        Yunnan province that is typically made into raw Puer.\\u003cstrong data-mce-fragment=\\\"1\\\"\\u003e
        \\u003c\\/strong\\u003eWe commissioned these black tea productions in 2024
        and sent the blend to a smokehouse in Tongmuguan village in Fujian to be pine
        smoked by a veteran Lapsang smoker. The three day smoking process occurs at
        temperatures from 100C to 120C in an old style Lapsang smokehouse.\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eAn answer to a question that nobody asked,
        \\\"What if high quality old arbor Yunnan black tea materials were made into
        Lapsang.\\\" The result is what you'd expect; all of the heavy full bodied
        soup and full feeling of quality Yunnan material with aromatics that mirror
        the traditional Fujian smoke, all singing together in harmony. We blended
        four different old arbor black teas in 2024 to create this blend. The result
        is a truly special treat for black tea lovers and smoke aficionados alike.\\u003c\\/p\\u003e\\n\\u003cp\\u003ePressed
        in 2025. Each cake is 200g. The cakes are in bamboo tongs, with five cakes
        per tong.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-28T02:26:50-08:00\",\"created_at\":\"2025-02-27T00:32:09-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Black
