        target=\\\"_blank\\\" title=\\\"white2tea tea club\\\" rel=\\\"noopener noreferrer\\\"\\u003eour
        tea club\\u003c\\/a\\u003e years ago. We commissioned a Sichuan green tea
        farmer to use some of their purple varietal material to produce a white tea
        using Fujian style processing.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        results were a creamy, sweet and succulent white tea with bright aromatics
