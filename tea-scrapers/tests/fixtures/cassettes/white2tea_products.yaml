        Wood Chips Laochatou\",\"handle\":\"wood-chips-laochatou\",\"body_html\":\"\\u003cp\\u003e\\u003cem\\u003eLaochatou\\u003c\\/em\\u003e
        are a condensed nugget of tea that naturally fuses together during the shou
        Puer pile process. These are from a 2021 batch.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        woody style of shou Puer from a big old pile. Smooth soup, aromatic and thick
        when pushed. A great daily drinker for lovers of shou Puer with a forest-centric
        palate. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eAvailable in 50g
        and 250g bags of loose laochatou.\\u003c\\/p\\u003e\\n\\u003cp\\u003eA word
        of fair warning, normally shou Puer can be sorted out using machines to remove
        most unwanted bits like hair, stray threads and the like, but with chatou
        the tea is fused together. So, if you are faint of heart and scared of a few
        stray bits here and there, skip this tea and go for a pressed cake like Lumber
        Slut. If you're not afraid of some white spots and surprises, this is a rewarding
        pile of nuggets. No need to break them apart, just hit them with a boiling
        rinse and you're off to the races. \\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-06-23T08:16:58-07:00\",\"created_at\":\"2023-06-22T13:01:54-07:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
