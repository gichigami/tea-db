        WTCCCTV\",\"handle\":\"2019-wtccctv\",\"body_html\":\"\\u003cdiv class=\\\"short-description\\\"\\u003eThe
        2019 WTCCCTV is made from old arbor large leaf varietal tea that is usually
        destined to be made in raw Puer, picked and processed in \\u003cem\\u003eshaihong\\u003c\\/em\\u003e
        [sun dried black tea] style tea with no machine processing.\\u003c\\/div\\u003e\\n\\u003cbr\\u003e\\n\\u003cdiv\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv\\u003eWTCCCTV
        is a heavily sweet and full bodied black tea with a range of honey and fruit
        flavors that fluctuate between sweet grass and unripe pear. The natural style
        of sun dried processing means that leaves range in oxidation level, allowing
        for a complex experience with a bit of variation from session to session.
        This is an enduring and heavy black tea best suited for a longer, gongfu style
        tea session.\\u003c\\/div\\u003e\\n\\u003cbr\\u003ePressed in 2019. Each cake
