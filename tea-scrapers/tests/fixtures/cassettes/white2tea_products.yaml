        Teacup\"]}]},{\"id\":8897010729188,\"title\":\"2022 Airtanker\",\"handle\":\"2022-airtanker\",\"body_html\":\"\\u003cp\\u003eIn
        2022 we pressed a series of \\u003ca title=\\\"small batch shou Puerh tea
        from white2tea\\\" href=\\\"https:\\/\\/white2tea.com\\/blogs\\/blog\\/what-is-small-batch-shou-puerh-tea\\\"
        target=\\\"_blank\\\"\\u003esmall batch shou Puer blends\\u003c\\/a\\u003e
        that incorporated experimental lighter ferment styles of shou Puer with the
        intent to age them before release. These teas are now being released in 2026
