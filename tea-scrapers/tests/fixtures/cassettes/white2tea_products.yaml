ive
        Pile Laochatou\",\"handle\":\"five-pile-laochatou\",\"body_html\":\"\\u003cp\\u003e\\u003cem\\u003eLaochatou\\u003c\\/em\\u003e
        are a condensed nugget of tea that naturally fuses together during the shou
        Puer pile process. A very small amount of chatou are produced from a pile,
        so we have taken the chatou from five of our piles and blended them together.\\u003c\\/p\\u003e\\n\\u003cp\\u003eGiven
        the nature of this blend (large chunks of tea from disparate materials and
        differing fermentation levels and producers) each session will be a bit of
        a surprise \u2013 just want you to know what you\u2019re signing up for. That
        said, the materials are all excellent and we tried our best to blend materials
        that complement each other well. The youngest material in the blend is nearly
        2 years old.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eAvailable
        in 50g and 250g bags of loose laochatou.\\u003c\\/p\\u003e\\n\\u003cp\\u003eOne
        last word to the wise, if you fall in love with this tea, buy as much as you
        can reasonably afford as this production will be impossible to duplicate.\\u003c\\/p\\u003e\",\"published_at\":\"2022-09-09T02:07:24-07:00\",\"created_at\":\"2022-09-07T03:56:11-07:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
