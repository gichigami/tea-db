        Cloth\"]}]},{\"id\":8730639827172,\"title\":\"Loot Bag Pound of Minis\",\"handle\":\"loot-bag-pound-of-minis\",\"body_html\":\"\\u003cp\\u003eOur
        new bag of raw Puer minis available for a\_\\u003cstrong\\u003elimited time
        only!\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis package
        contains a mixed bag of just over a pound of our blended raw Puer mini coins.
        Perfect convenience, keep a bag of minis near the door for when you need tea
        on the go.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach bag will
        contain\_ ~455g of tea (~one pound), with a random mix of sheng Puer mini
        coins from white2tea with more than ten blends in total, including some of
        our regular tea blends and several special pressings for the loot bag. We
        really went for it on this one, don't miss it.\\u003c\\/p\\u003e\\n\\u003cp\\u003eBrewing
        instructions: We recommend boiling water and a ~90 second rinse to open up
        the coin. From there it is dealer's choice on \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/blog\\/how-to-brew-puer-tea\\\"
        title=\\\"How to brew tea\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\"\\u003ehow
        you brew your tea\\u003c\\/a\\u003e, but we recommend \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/blog\\/how-to-brew-gongfu-style-an-expert-guide-to-making-tea\\\"
        title=\\\"Gongfu tea brewing, how to brew Puer tea\\\" rel=\\\"noopener\\\"
        target=\\\"_blank\\\"\\u003egongfu tea brewing\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003ch6\\u003e*Note:
        There are two blends with the back stickers mixed up, Afterclang and Anzac.
        Forgive the factory, they accidentally saw they both started with \\\"A\\\".
        It's really our fault for having too many blends. Anzac is easily identified
