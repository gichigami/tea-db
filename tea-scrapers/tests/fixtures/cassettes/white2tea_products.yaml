        Tale Chaser\",\"handle\":\"2022-tale-chaser\",\"body_html\":\"\\u003cp\\u003eA
        project that began in 2019, this tea is a culmination of several years of
        fermentation and experimentation. A blend of several small batch ripe Puer
        teas fermented using our own material and under our own supervision spanning
        several years, Tale Chasers was then sent to Fujian province to be charcoal
        roasted by hand by veteran Wuyi Yancha makers. The result is a truly unique
        tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eTale Chasers is a
        complex blend with nuanced character that spans genres and drinks more like
        an aged shou Puer than a tea from recent years. Though freshly pressed, this
        material is a blend of teas that are 1-3 years old. A must try tea for those
        interested in unique production methods and hybrid tea making styles.\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eEach cake is 200 grams of tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-03-11T06:14:09-08:00\",\"created_at\":\"2022-03-09T00:57:39-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
