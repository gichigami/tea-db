        Builders\",\"handle\":\"2019-builders\",\"body_html\":\"A \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        target=\\\"_blank\\\" title=\\\"What is Traditional Bamboo Puer Processing?\\\"
        rel=\\\"noopener noreferrer\\\"\\u003ehand roasted bamboo\\u003c\\/a\\u003e
        black tea, the 2019 Builders is a perfect balance of working class utility
        and artisan tea snobbery. It is our white2tea twist on the classic concept
        strong style of \\\"\\u003ca href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Builder%27s_tea\\\"
        target=\\\"_blank\\\"\\u003ebuilder's tea\\u003c\\/a\\u003e\\\" from the UK.
        This bud heavy whole leaf Yunnan sun dried tea was mercilessly crammed into
        bamboo and hand roasted over an open flame.\\u003cbr\\u003e\\u003cbr\\u003eThe
        result is a shard heavy tea with many of broken bits and plenty of surface
        area which cause the tea to steep out very quickly making a very potent brew
        for an afternoon pick me up or a morning eye opener. This tea is very versatile
        with a heavy aroma of fragrant bamboo, malt and honey; not to mention a booming
        lingering aftertaste. Steep in gongfu style like a bamboo loving connoisseur
        or western style topped off with cream like you have a job to do.\\u003cbr\\u003e\\u003cbr\\u003eThe
        mash up of style and function makes this unique tea a common morning cup in
