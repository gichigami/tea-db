        Boat Captain\",\"handle\":\"2017-boat-captain\",\"body_html\":\"You've been
        at sea for weeks and you're bone-tired. The tattered sails need repairs and
        your crew is working frantically to mend them; storm clouds loom on the horizon.
        They are fatigued from a full day's labor. Murmurs and complaints linger on
        the breeze. The faint stench of mutiny. Your mates grow weary, wondering if
        they'll ever see port again. Lily-livered bastards.  Is it the weeks of subsisting
        on mussels and whale meat? Straw mat beds and the churning waters that ceaselessly
        toy with our vessel? No matter. This is what they signed up for and you've
        got bigger fish to fry. The crew continues sewing the sails as you plot the
        next move. Your throat is raw from barking orders. The briny sea air and your
        pipe tobacco haven't helped a bit.\\u003cbr\\u003e\\u003cbr\\u003eYour first
        mate pokes his head through the door, \\\"Your tea is ready, Captain.\\\"\\u003cbr\\u003e\\u003cbr\\u003eEach
        mini cake is 8 grams, each purchase is for one mini cake.\\u003cbr\\u003eRoughly
        8 gram mini cakes of raw Puer tea.\\u003cbr\\u003e\\u003cbr\\u003eYou still
        want tasting notes? Is that why you're down here?\\u003cbr\\u003e\\u003cbr\\u003eNot
        cool, cap'n.\\u003cbr\\u003e\\u003cbr\\u003eThis is a harsh, bully of a tea.
        Smoke \\u0026amp; pipe tobacco, with an aggressive, punchy power that leaves
        a wake of sweetness. A burly, heavy hitter. Will definitely benefit from aging,
