        Repave\",\"handle\":\"2007-repave-hekai\",\"body_html\":\"Repave was made
        with aged puer tea material from 2007, which was stored in Menghai for 7 1\\/2
        years prior to being pressed in November of 2014. The soup is already a dark
        bronze color, sweet and soft. The material is from Hekai. This is the second
        and final pressing of this material. Some of the wrappers were stamped incorrectly
        as 2006.\\u003cbr\\u003eAged Puer tea made with 2007 Spring raw material from
        Hekai (We are unable to say with certainty the age of the trees, but the material
        is very good quality), stored in Menghai for 7 years and pressed in 2014.
        200 gram cake. Hand processed, stone pressed, and sun dried. Easily the best
        bargain of our \\\"2014\\\" White2tea selection.\\u003cbr\\u003e\\u003cbr\\u003eNormally
        we are wary of purchasing older \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        [loose puer material], however this tea was purchased directly from a farmer
        who we have known for years and trust. This is the second and final pressing
        of this material. When it is gone, it is gone for good.\",\"published_at\":\"2020-01-24T19:32:17-08:00\",\"created_at\":\"2020-01-24T19:32:17-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
