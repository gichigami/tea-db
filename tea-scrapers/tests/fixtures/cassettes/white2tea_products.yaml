-02-05T05:49:36-08:00\",\"product_id\":4509354590345,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2016-trap-bird-shou-Puerh-tea-5.jpg?v=1580910576\",\"width\":800,\"height\":800},{\"id\":14311416004745,\"created_at\":\"2020-02-05T05:49:39-08:00\",\"position\":6,\"updated_at\":\"2020-02-05T05:49:39-08:00\",\"product_id\":4509354590345,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2016-trap-bird-shou-Puerh-tea-6.jpg?v=1580910579\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":4509354557577,\"title\":\"2016
        Sister Brother\",\"handle\":\"2016-sister-brother\",\"body_html\":\"\\u003cstrong\\u003eFree
        Shipping anywhere on Earth, coupon code: basics\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cbr\\u003eThe
        Sister Brother set is a comparison sample set that illustrates the difference
        in processing styles that can exist between two different people, in this
        case a sister and brother.\\u003cbr\\u003e\\u003cbr\\u003eThe material in
        the bricks is identical Nannuo mountain material, but each brick was commissioned
        to be processed by only one person. The sister brick is material processed
        with a \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/information\\/how-is-puer-tea-made\\\"
        target=\\\"_blank\\\" title=\\\"How is Puer Tea Made?\\\" rel=\\\"noopener
        noreferrer\\\"\\u003eshorter kill green phase\\u003c\\/a\\u003e at a lower
        temperature, where as the brother brick is processed with a higher flame and
        fried for a longer time. These are their natural processing styles as people,
        I simply told them to process the tea as they normally would and to keep their
        respective materials separate for pressing.\\u003cbr\\u003e\\u003cbr\\u003eThis
        set is best used in a side by side comparison to see how the person processing
        a tea can influence the end results of identical material. It should shed
        light on how much variation can truly occur, not only within a \\\"single
        origin\\\" tea, but even within a family using identical material from a single
        tea garden.\\u003cbr\\u003e\\u003cbr\\u003eEach set is 200 grams of raw Puer
