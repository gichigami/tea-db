        Smokeshou\",\"handle\":\"2021-smokeshou\",\"body_html\":\"\\u003cp data-mce-fragment=\\\"1\\\"\\u003eWe
        called our friends in Fujian in early spring and reserved pine wood for tea
        smoking, anxiously awaiting our space in line. Our Puer all blended in Yunnan,
        we shipped the blends to Fujian in summer. A veteran Lapsang smoker spent
        3 days smoking our tea, smoking at temperatures from 100C to 120C in an old
        style Lapsang smokehouse in Tongmuguan village.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThe unity of old school Fujian tea processing
        techniques with high quality base materials yields a totally unique smoke
        experience that pushes the tradition of smoked Puer tea in Yunnan (both the
        intentional and haphazard unintentional versions).\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThe pine smoke character is laced through
        the blend with an intense nose that will settle into the base of the tea with
        aging, eventually transforming into a rare combination of flavors and aromas
        that few Puer teas can mimic.\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eObviously
        this tea is a natural fit for cigar lovers and Scotch whisky fanatics who
        want tea in the morning, but this tea is a surprise that will likely garner
        even fans who are wary of smoke.\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eSmokeshou
        is a blend of our own \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/blog\\/what-is-small-batch-shou-puerh-tea\\\"
        target=\\\"_blank\\\" title=\\\"Small Batch Shu Puerh\\\" rel=\\\"noopener
        noreferrer\\\"\\u003esmall batch shou Puer\\u003c\\/a\\u003e. A thick bodied
        tea with layers of bitterness and smoke over the rich and velvety shou mouthfeel.
        Perfect tea for cold weather or a rainy day.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eEach cake is 200 grams of tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eFor aging, we recommend that smoked teas
        be sealed and separated from other teas, as the fresh smoke will pass along
        to the teas next to it. Or you can keep them with your cigars.\\u003c\\/p\\u003e\",\"published_at\":\"2021-10-10T02:22:03-07:00\",\"created_at\":\"2021-10-08T23:41:05-07:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
