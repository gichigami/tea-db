        Guan Yin Type C\",\"handle\":\"tie-guan-yin-type-c\",\"body_html\":\"\\u003cp\\u003eOur
        Type C Tie Guan Yin is processed with an emphasis on traditional style tieguanyin
        oolong processing. There is a heavier oxidation than is typically found in
        the broader market. \\u003cbr\\u003e\\u003cbr\\u003eThe type of \\u003cstrong\\u003e\\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\" target=\\\"_blank\\\"
        title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003eoolong\\u003c\\/a\\u003e\\u003c\\/strong\\u003e
