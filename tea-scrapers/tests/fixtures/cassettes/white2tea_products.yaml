        Towel\"]}]},{\"id\":8105050931428,\"title\":\"2023 Yulan Maocha Brick\",\"handle\":\"2023-yulan-maocha-brick\",\"body_html\":\"\\u003cp\\u003eA
        first time release, our new Yulan Maocha brick. Maocha is a bit of a misnomer,
        how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea]
        and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. \\u003cbr\\u003e\\u003cbr\\u003eJuicy florals and fruity sweetness
        permeate from the rinse. The traditional magnolia aroma and style present
        throughout the session, leaving a lingering sugar cookie sweetness behind.
        Strong when pushed, some might prefer a lighter session with very little leaf.
        We look forward to this tea as it ages in the coming years.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur
        Dancong oolong tea bricks are a little tricky to brew. Very punchy when pushed,
        we recommend dropping your leaf down a couple of grams and doing flash steeps
        gongfu style. The tea can often be heavily fragmented when broken off of the
        brick, which means the surface area is multiplied and the tea steeps fast
        and strong. For example, we usually brew 6 grams of raw Puer in a 100ml gaiwan,
        but for this tea we drop down to around 4 grams for a more even session. \\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. Each brick will be shipped in an individual paper wrapper,
        or two bricks (or multiples of two) will be shipped in a bamboo leaf (there
        are two bricks wrapped in a bamboo leaf per \\\"tong\\\"). Some of the outer
        wrappers have some slight yellowing from the bamboo leaf, it's nothing to
        worry about.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-12-15T07:48:58-08:00\",\"created_at\":\"2023-12-14T20:04:34-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":44402559320292,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32320A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"73.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8105050931428,\"created_at\":\"2023-12-14T20:04:34-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"},{\"id\":44402559353060,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32320B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"10.90\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8105050931428,\"created_at\":\"2023-12-14T20:04:34-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"}],\"images\":[{\"id\":63158264103140,\"created_at\":\"2023-12-14T20:04:49-08:00\",\"position\":1,\"updated_at\":\"2023-12-14T20:04:53-08:00\",\"product_id\":8105050931428,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2023YulanMaochaBrick.jpg?v=1702613093\",\"width\":800,\"height\":800},{\"id\":63158262530276,\"created_at\":\"2023-12-14T20:04:48-08:00\",\"position\":2,\"updated_at\":\"2023-12-14T20:04:53-08:00\",\"product_id\":8105050931428,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2023YulanMaochaBrick-2.jpg?v=1702613093\",\"width\":800,\"height\":800},{\"id\":63158261317860,\"created_at\":\"2023-12-14T20:04:49-08:00\",\"position\":3,\"updated_at\":\"2023-12-14T20:04:53-08:00\",\"product_id\":8105050931428,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2023YulanMaochaBrick-3.jpg?v=1702613093\",\"width\":800,\"height\":800},{\"id\":63158260269284,\"created_at\":\"2023-12-14T20:04:49-08:00\",\"position\":4,\"updated_at\":\"2023-12-14T20:04:53-08:00\",\"product_id\":8105050931428,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2023YulanMaochaBrick-4.jpg?v=1702613093\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8105048113380,\"title\":\"2023
        Milan Maocha Brick\",\"handle\":\"2023-milan-maocha-brick\",\"body_html\":\"\\u003cp\\u003eThe
        return of our classic Milan Maocha brick. Maocha is a bit of a misnomer, how
        can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea] and
        a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. \\u003cbr\\u003e\\u003cbr\\u003eA perfect way to stretch your
        Dancong budget. Heavy intensity of flavor, aroma and huigan with loud honey
        florals and layered flavor and fragrance complexity. Drink now or age as you
        please. A little bit goes a long way.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur
        Dancong oolong tea bricks are a little tricky to brew. Very punchy when pushed,
        we recommend dropping your leaf down a couple of grams and doing flash steeps
        gongfu style. The tea can often be heavily fragmented when broken off of the
        brick, which means the surface area is multiplied and the tea steeps fast
        and strong. For example, we usually brew 6 grams of raw Puer in a 100ml gaiwan,
        but for this tea we drop down to around 4 grams for a more even session.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. Each brick will be shipped in an individual paper wrapper,
        or two bricks (or multiples of two) will be shipped in a bamboo leaf (there
        are two bricks wrapped in a bamboo leaf per \\\"tong\\\"). Some of the outer
        wrappers have some slight yellowing from the bamboo leaf, it's nothing to
        worry about.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-12-15T07:48:58-08:00\",\"created_at\":\"2023-12-14T20:00:03-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":44402549784804,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32310A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"54.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8105048113380,\"created_at\":\"2023-12-14T20:00:03-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"},{\"id\":44402549817572,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32310B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"8.20\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8105048113380,\"created_at\":\"2023-12-14T20:00:03-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\"}],\"images\":[{\"id\":63158184411364,\"created_at\":\"2023-12-14T20:00:34-08:00\",\"position\":1,\"updated_at\":\"2023-12-14T20:00:41-08:00\",\"product_id\":8105048113380,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2023MilanMaochaBrick.jpg?v=1702612841\",\"width\":800,\"height\":800},{\"id\":63158182510820,\"created_at\":\"2023-12-14T20:00:33-08:00\",\"position\":2,\"updated_at\":\"2023-12-14T20:00:41-08:00\",\"product_id\":8105048113380,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2023MilanMaochaBrick-2.jpg?v=1702612841\",\"width\":800,\"height\":800},{\"id\":63158184771812,\"created_at\":\"2023-12-14T20:00:34-08:00\",\"position\":3,\"updated_at\":\"2023-12-14T20:00:41-08:00\",\"product_id\":8105048113380,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/031