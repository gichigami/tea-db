        Raw Puer\",\"handle\":\"decaf-raw-puer\",\"body_html\":\"\\u003cp\\u003eOne
        of our new Decaf tea experiments. We commissioned this tea to be decaffeinated
        using the CO2 process to lower the caffeine to the EU standard. This does
        not mean that the tea is caffeine free, but it does mean that it only has
