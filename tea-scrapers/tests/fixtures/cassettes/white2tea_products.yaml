        both steal boats\",\"handle\":\"2019-both-steal-boats-and-meet-halfway\",\"body_html\":\"This
        blend has a fair amount of aged material in the mix. The smooth and quiet
        initial steeps of the tea belie a layered complexity with a focus on sweeter
        Menghai style character. The intense feel of the tea creeps up on feather
        foot steps and strikes out of nowhere. The aromas have a range from grapes
        to sweet honey, with a bit of fresh florals from the younger materials. Not
        the type of tea you would want to chug at work, better to set aside time for
        a long session.\\u003cbr\\u003e\\u003cbr\\u003eEach cake is 200 grams.\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:39:53-08:00\",\"created_at\":\"2020-01-24T19:39:53-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
