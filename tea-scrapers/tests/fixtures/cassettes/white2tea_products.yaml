        Sample\"]}]},{\"id\":4509351968905,\"title\":\"2015 Brown Sugar\",\"handle\":\"2015-brown-sugar-ripe-puer-tea\",\"body_html\":\"Ripe
        Puer Tea from White2tea, made using 2012 material, pressed in 2015.\\u003cbr\\u003e\\u003cbr\\u003eThis
        tea is made from a pile fermented exclusively with top tier \\u003cem\\u003ehuangpian\\u003c\\/em\\u003e
        [the largest leaf used in Puer production]. The Brown Sugar brick has Menghai
        character. The soup is sweet and smooth. It was rested for over two years
        prior to pressing and is ready to drink now or store for the long term. The
        material used is of uncommonly high quality. Later steeps are light in color,
        with a sweet and soft profile.\\u003cbr\\u003e\\u003cbr\\u003eThe fermentation
        level of this tea was around 65%, which is considered light. Some leaves may
        even be slightly greenish, and will continue to become darker with further
        aging.\\u003cbr\\u003eThe Brown Sugar brick was pressed in 2015 using 2012
        ripe Puer \\u003cem\\u003ehuangpian\\u003c\\/em\\u003e [large leaf] material,
        which underwent shu Puer processing in 2o13.  250g brick shape pressing. Sorry
        Mom, for the casual swearing.\\u003cbr\\u003e\\u003cbr\\u003eThe soup of this
        tea might be slightly cloudy, due to its recent pressing. It will become increasingly
        clear with time.\",\"published_at\":\"2020-01-24T19:33:03-08:00\",\"created_at\":\"2020-01-24T19:33:03-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
