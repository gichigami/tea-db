        Teacup\"]}]},{\"id\":7461878923492,\"title\":\"2021 Beebe\",\"handle\":\"2021-beebe\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eOur 2021 Beebe is a sun dried white tea
        from Yunnan, made from camellia sinensis assamica (large leaf varietal) leaves
