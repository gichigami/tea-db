\",\"product_id\":4509360685193,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015-Gongmei-Aged-white-tea-5.jpg?v=1580901421\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"360g\",\"25g\"]}]},{\"id\":4509360652425,\"title\":\"Very
        Old Huangpian\",\"handle\":\"very-old-huangpian\",\"body_html\":\"Ages get
        thrown around quite loosely when describing older raw Puer teas these days.
        Not sure what to write about this tea except that it is one of the oldest
        cleanly stored huangpian I have had access to. This purchase is from a private
        collector who doesn't have a large amount of this production. Purchased for
        my own personal tea drinking, I decided to see if anybody else wanted to partake.
        This tea has been cleanly stored in dry Southern China storage. There is a
        strong sense of past bitterness and a strong personality that I associate
        with Bulang area material, but the true age and origin of this tea is anybody's
        guess. The flavors range from medicinal to wood and incense, with a thick
        body and presence.\\u003cbr\\u003e\\u003cbr\\u003eThe soup color pictured
        is from a ten second steep after a rinse.\\u003cbr\\u003e\\u003cbr\\u003eEach
        cake is roughly 357 grams. All of the usual aged tea caveats apply. Try a
        sample and see if you enjoy it. If you order a full cake, be aware that these
        cakes are messy in shape and size, with small bits of non-tea being common
        enough to mention. If you find anything egregious just let us know (particularly
        anything that detracts from the overall cake weight) and we will be happy
        to help out.\\u003cbr\\u003eCleanly stored aged raw Puer made from large leaves.
        Teas pressed at this time, particularly those with perceived low value, are
        likely to have random bits of this and that in the cake. If this type of risk
        scares you, this tea might not be for you.\\u003cbr\\u003e\\u003cbr\\u003eIf
        you would like a number for the age, this tea was presented to us as being
        from the late 1980's, however we feel that 1990's is a more conservative estimate.
        Numbers aside, we hope you have a chance to try this tea. It's a special one.\",\"published_at\":\"2020-01-24T19:39:24-08:00\",\"created_at\":\"2020-01-24T19:39:24-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
