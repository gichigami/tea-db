        Red Star\",\"handle\":\"2015-red-star-puer-stuffed-xinhui-mandarin\",\"body_html\":\"2015
        Red Star is made with blended aged ripe Puer material and a fresh 2015 Xinhui
        Mandarin.\\u003cbr\\u003e\\u003cbr\\u003eThe tea is meant to be drunk with
        the orange skin. Simply break off a few small pieces (roughly an 8:1 tea to
        skin ratio) and steep together. The red star is quite fresh and has a heavy
        fruity, citrus fragrance. For those interested in a more aged, medicinal taste,
        purchase this tea now in order to age it or check out the Black Star.\\u003cbr\\u003e\\u003cbr\\u003eMost
        of the cost of this tea is due to the high price of both the handmade labor
        and the prized skins of Xinhui Mandarins, which cost much more than most Puer
        tea by weight. If you are interested in better value for tea weight, check
        out our other Ripe Puer Teas.\\u003cbr\\u003e\\u003cbr\\u003eEach purchase
        is for one Red Star Mandarin.\\u003cbr\\u003eRipe Puer tea stuffed inside
        of a dried Xinhui Mandarin. The amount of tea varies by weight according to
        the size of the Mandarin, the total weight is roughly 35 grams. Most of the
        cost of this tea is due to the high price of both the handmade labor and the
        prized skins of Xinhui Mandarins. If you are interested in better value per
        tea weight, check out our other Ripe Puer Teas.\\u003cbr\\u003e\\u003cbr\\u003eThis
        tea is labeled as 2015 because the Mandarin is from 2015. The tea is blended
        from several years of older material in order to offer a taste that matches
        the rind. Each Mandarin is wrapped in paper and sealed in plastic. We recommend
        storing them this way until you are ready to drink them.\",\"published_at\":\"2020-01-24T19:33:33-08:00\",\"created_at\":\"2020-01-24T19:33:33-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
