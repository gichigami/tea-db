        Spot Guanyin\",\"handle\":\"three-spot-guanyin\",\"body_html\":\"\\u003cp\\u003eThe
        return of our sold out daily tie guan yin \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003eoolong\\u003c\\/a\\u003e\\u003c\\/strong\\u003e.\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        blend of three different Fujian oolong productions, with our sights set on
        excellent value for a daily oolong with enough oomph to power you through
        your day and enough complexity of aroma and flavor to keep you thoroughly
        engaged throughout a a session. Deceptively priced given the quality of the
