        Gongmei\",\"handle\":\"2015-gongmei\",\"body_html\":\"Stored in dry\\/natural
        conditions in Fujian until pressing in 2018, this \\u003cem\\u003ebaicha\\u003c\\/em\\u003e
        [white tea] from Fuding county in Fujian province is considered to be \\u003cem\\u003eGongmei
        \\u003c\\/em\\u003egrade white tea, which has more buds and higher grade leaf
        than a Shoumei.\\u003cbr\\u003e\\u003cbr\\u003eThe thick body of this tea
        has a heavy sweetness and beautiful array of fragrances, with a slightly youthful
        crispness when pushed. This tea is very versatile and suitable for further
        aging or drinking directly.\\u003cbr\\u003e\\u003cbr\\u003eEach cake is 360
        grams.\\u003cbr\\u003e\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:39:27-08:00\",\"created_at\":\"2020-01-24T19:39:27-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"White
