        Sunskate\",\"handle\":\"2021-sunskate\",\"body_html\":\"\\u003cp\\u003eA brand
        new black tea commission and the first time this tea was ever made by the
        farmer. Another lovely white2tea experiment gone right. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eSunskate
        was oxidized very lightly, so much so that we could probably refer to it as
        a strange oolong instead of a black tea. The goal was to leave room for further
        aging and oxidation in the coming years, but it's a beautiful tea fresh as
        well. Made from material usually destined for raw Puer production, Sunskate
        has a syrupy thick body with bright aromas uncommon in a black tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003ePressed
