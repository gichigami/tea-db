        Last Thoughts\",\"handle\":\"2016-last-thoughts\",\"body_html\":\"A blend
        of raw Puer material from Yiwu region. When we first made this blend in 2014,
        we wrote \\\"This tier of tea rarely sees the light of day in the open market,\\\"
        and we sincerely mean that. Not a blend we would recommend for beginners.
        The traits that make this tea special are often not apparent to most new Puer
        drinkers.\\u003cbr\\u003e\\u003cbr\\u003eWe will not be making this exact
        blend next year.\\u003cbr\\u003e\\u003cbr\\u003eEach cake is 357 grams. The
        per gram price and cake price of this tea are identical to facilitate people
