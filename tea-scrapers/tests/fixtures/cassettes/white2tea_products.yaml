        Teacup\"]}]},{\"id\":8625388519652,\"title\":\"2025 Dawuye Maocha Brick\",\"handle\":\"2025-dawuye-maocha-brick\",\"body_html\":\"\\u003cp\\u003eOr
        latest addition to our Dancong maocha brick lineup, the Dawuye varietal. Maocha
        is a bit of a misnomer, how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        [loose tea] and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. \\u003cbr\\u003e\\u003cbr\\u003eThe brick is fruity sweet,
        with a balance of fresh green apple sweetness in the aroma and a darker stone
        fruit flavor profile. Layered scents dance between steeps, leaving a long
        trail behind them.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur
        Dancong oolong tea bricks are a little tricky to brew. Very punchy when pushed,
        we recommend dropping your leaf down a couple of grams and doing flash steeps
        gongfu style. The tea can often be heavily fragmented when broken off of the
        brick, which means the surface area is multiplied and the tea steeps fast
        and strong. For example, we usually brew 6 grams of raw Puer in a 100ml gaiwan,
        but for this tea we drop down to around 4 grams for a more even session. \\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. This is a 2024 Dancong, pressed in early 2025.\\u003c\\/p\\u003e\",\"published_at\":\"2025-04-12T04:41:17-07:00\",\"created_at\":\"2025-04-12T00:37:04-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":46226264031460,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32408A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"59.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8625388519652,\"created_at\":\"2025-04-12T00:37:04-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":46226264064228,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32408B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"8.90\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8625388519652,\"created_at\":\"2025-04-12T00:37:04-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":75298832711908,\"created_at\":\"2025-04-12T00:37:15-07:00\",\"position\":1,\"updated_at\":\"2025-04-12T00:37:20-07:00\",\"product_id\":8625388519652,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025DaWuyeMaochaBrick.jpg?v=1744443440\",\"width\":800,\"height\":800},{\"id\":75298832777444,\"created_at\":\"2025-04-12T00:37:14-07:00\",\"position\":2,\"updated_at\":\"2025-04-12T00:37:20-07:00\",\"product_id\":8625388519652,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025DaWuyeMaochaBrick-2.jpg?v=1744443440\",\"width\":800,\"height\":800},{\"id\":75298832744676,\"created_at\":\"2025-04-12T00:37:14-07:00\",\"position\":3,\"updated_at\":\"2025-04-12T00:37:20-07:00\",\"product_id\":8625388519652,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025DaWuyeMaochaBrick-3.jpg?v=1744443440\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8625387897060,\"title\":\"2025
        Milan Maocha Top Shelf\",\"handle\":\"2025-milan-maocha-top-shelf\",\"body_html\":\"\\u003cp\\u003eA
        higher-end variation on our Milan Maocha brick. Maocha is a bit of a misnomer,
        how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea]
        and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. \\u003cbr\\u003e\\u003cbr\\u003eThe brick is incredibly fragrant,
        with deeper honey and floral flavors emerging throughout the course of a session.
        Beautiful complexity between the roast and traditional honey orchid style.
        Drink now or age as you please.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur
        Dancong oolong tea bricks are a little tricky to brew. Very punchy when pushed,
        we recommend dropping your leaf down a couple of grams and doing flash steeps
        gongfu style. The tea can often be heavily fragmented when broken off of the
        brick, which means the surface area is multiplied and the tea steeps fast
        and strong. For example, we usually brew 6 grams of raw Puer in a 100ml gaiwan,
        but for this tea we drop down to around 4 grams for a more even session. \\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. This is a 2024 Dancong, pressed in early 2025.\\u003c\\/p\\u003e\",\"published_at\":\"2025-04-12T04:41:16-07:00\",\"created_at\":\"2025-04-12T00:33:40-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":46226261999844,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32407A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"66.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8625387897060,\"created_at\":\"2025-04-12T00:33:40-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":46226262032612,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32407B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"9.90\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8625387897060,\"created_at\":\"2025-04-12T00:33:40-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":75298810200292,\"created_at\":\"2025-04-12T00:33:48-07:00\",\"position\":1,\"updated_at\":\"2025-04-12T00:34:01-07:00\",\"product_id\":8625387897060,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025MilanMaochaTopShelf.jpg?v=1744443241\",\"width\":800,\"height\":800},{\"id\":75298810134756,\"created_at\":\"2025-04-12T00:33:48-07:00\",\"position\":2,\"updated_at\":\"2025-04-12T00:34:01-07:00\",\"product_id\":8625387897060,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025MilanMaochaTopShelf-2.jpg?v=1744443241\",\"width\":800,\"height\":800},{\"id\":75298810167524,\"created_at\":\"2025-04-12T00:33:48-07:00\",\"position\":3,\"updated_at\":\"2025-04-12T00:34:01-07:00\",\"product_id\":8625387897060,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025MilanMaochaTopShelf-3.jpg?v=1744443241\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8625387831524,\"title\":\"2025
        Yulan Maocha Brick\",\"handle\":\"2025-yulan-maocha-brick\",\"body_html\":\"\\u003cp\\u003eOur
        new Yulan Maocha brick. Maocha is a bit of a misnomer, how can a tea be both
        \\u003cem\\u003emaocha\\u003c\\/em\\u003e [loose tea] and a brick? In this
        case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e refers to the Dancong
        oolong tea being left in its raw form before pressing. We commissioned this
        production to be left with stems and large leaves for this pressing. \\u003cbr\\u003e\\u003cbr\\u003eJuicy
        florals and fruity sweetness permeate from the rinse. The traditional magnolia
        aroma and style present throughout the session, leaving a lingering sugar
        cookie sweetness behind. Strong when pushed, some might prefer a lighter session
        with very little leaf. We look forward to this tea as it ages in the coming
        years.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur Dancong oolong
        tea bricks are a little tricky to brew. Very punchy when pushed, we recommend
        dropping your leaf down a couple of grams and doing flash steeps gongfu style.
        The tea can often be heavily fragmented when broken off of the brick, which
        means the surface area is multiplied and the tea steeps fast and strong. For
        example, we usually brew 6 grams of raw Puer in a 100ml gaiwan, but for this
        tea we drop down to around 4 grams for a more even session. \\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. This is a 2024 Dancong, pressed in early 2025.\\u003c\\/p\\u003e\",\"published_at\":\"2025-04-12T04:41:16-07:00\",\"created_at\":\"2025-04-12T00:31:00-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":46226261672164,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32409A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"73.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":8625387831524,\"created_at\":\"2025-04-12T00:31:00-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":46226261704932,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32409B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"10.90\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":8625387831524,\"created_at\":\"2025-04-12T00:31:00-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":75298803777764,\"created_at\":\"2025-04-12T00:31:11-07:00\",\"position\":1,\"updated_at\":\"2025-04-12T00:31:23-07:00\",\"product_id\":8625387831524,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025YulanMaochaBrickDancongoolong.jpg?v=1744443083\",\"width\":800,\"height\":800},{\"id\":75298803843300,\"created_at\":\"2025-04-12T00:31:10-07:00\",\"position\":2,\"updated_at\":\"2025-04-12T00:31:23-07:00\",\"product_id\":8625387831524,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025YulanMaochaBrickDancongoolong-2.jpg?v=1744443083\",\"width\":800,\"height\":800},{\"id\":75298803810532,\"created_at\":\"2025-04-12T00:31:11-07:00\",\"position\":3,\"updated_at\":\"2025-04-12T00:31:23-07:00\",\"product_id\":8625387831524,\"variant_ids