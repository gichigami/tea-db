        endurance and can steep for a very long time and can even withstand being
        simmered or boiled without becoming acrid.\\u003cbr\\u003e\\u003cbr\\u003eBoth
        the white tea and black tea have been sun dried and should age well together.
        However, this cake is the first of its kind; how it will age is anybody's
