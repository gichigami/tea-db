        Terry\",\"handle\":\"2026-terry\",\"body_html\":\"\\u003cp\\u003eOld arbor
        sun dried white tea from Yunnan sent to Fujian province in 2025 to be hand
        charcoal roasted in the Wuyi mountains by veteran yancha oolong makers. The
        Terry blend was rested until early 2026 when it was pressed.\\u003c\\/p\\u003e\\n\\u003cp\\u003eFragrances
        and flavor depth rarely present in white tea. Easy to veer off into long descriptors,
        stuff like almond butter on crispy toast with blackberry jam sweetness came
        up last session. It's the kind of tea that will yield different experiences
        with different ratios and water temps and keep you coming back for more because
