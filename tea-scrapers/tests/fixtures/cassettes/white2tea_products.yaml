        \\/ Jingmai\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003eYiwu\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\u003cbr\\u003eWe
        purchased all of these teas in their entirety as raw maocha in 2016. We then
        had them piled in individual small batches in 2017 using a technique where
        small batches of ripe Puer are fermented in bamboo baskets, off of the ground,
        using water from a mountain spring nearby Menghai. We were hands on during
        this entire process from start to finish and opted for a small batch pile
        process in order to ensure the integrity of the base material.\\u003cbr\\u003e\\u003cbr\\u003eThese
        teas were removed from the piling process in late 2017. Each tea was in the
        pile an average of 35 days.\\u003cbr\\u003e\\u003cbr\\u003eAlthough this is
        meant to be an educational set, the ripe Puer used in each cake is very high
        quality, making it appropriate for both beginners and experienced drinkers
        alike.\\u003cbr\\u003e\\u003cbr\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/make-puerh-tea-gong-fu-style\\\"
        target=\\\"_blank\\\" title=\\\"How to Make Puerh Tea, Gong Fu Style\\\" rel=\\\"noopener
        noreferrer\\\"\\u003eFor brewing instructions, we recommend reading this article\\u003c\\/a\\u003e.\\u003cbr\\u003eThe
        Tea Terroir Ripe Puer Tea Sample Set is a tool for learning about ripe Puer
        tea with 100 gram cakes of single origin, small batch ripe Puer tea. Each
        purchase is for one mini-tong containing four 100 gram mini-cakes from four
        regions; Menghai, Yiwu, Lancang, and Lincang. The total amount of tea is 400
        grams. Each cake was pressed by machine in 2018.\\u003cbr\\u003e\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:38:29-08:00\",\"created_at\":\"2020-01-24T19:38:29-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
