        It\u2019s from a forest. That the trees are old? They\u2019re old. All of
        those descriptors are bandied about so often they've lost all meaning.\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\" class=\\\"p1\\\"\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"
        class=\\\"s1\\\"\\u003eNothing gets to the core of why a tea like this is
        special or different other than the experience of it. \\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\" class=\\\"p1\\\"\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"
        class=\\\"s1\\\"\\u003eIt\u2019s soothing and sweet and has an intense feeling
        to it. If the budget fits, I\u2019d recommend people who love raw Puer experience
        it. It\u2019s probably not worth the cost of admission if you\u2019re new
        to raw Puer or on a tight tea budget, wait until you\u2019ve got years of
        experience under your belt before you try this tea. \\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003ePressed
