        target=\\\"_blank\\\" title=\\\"2017 Turtle Dove\\\" rel=\\\"noopener noreferrer\\\"\\u003e2017
        brick version\\u003c\\/a\\u003e.\\u003cbr\\u003e\\u003cbr\\u003eThe tea has
        a thick body, soft mouthfeel, and a unique natural fragrance. This tea is
        very forgiving with any type of brewing, including gongfu, western, or grandpa
        style. A perfect white tea to drink daily without much fuss.\\u003cbr\\u003e
