1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":8174283358436,\"title\":\"2024
        Jamrock Steady Minis\",\"handle\":\"2024-jamrock-steady-minis\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eA 7g sample of this tea was included in
        the \\u003ca rel=\\\"noopener\\\" title=\\\"white2tea Tea Club\\\" href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\"
        target=\\\"_blank\\\"\\u003eMarch 2024 tea club\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eAnother one of these white2tea years in
        the making experiments. Aged raw Puer maocha from the mid 2010's pressed alongside
        light ferment small batch shou Puer than is 2-4 years old in a blend meant
        to mimic tea with decades of age.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThe soup brews a dark red, with a the smoothness
        and body of shou Puer and the underlying complexity and aromatics of an aged
        raw Puer. Is it the same as drinking tea from the 1980's? Not really, but
        you'll save $10,000 compared to a real 1980's cake. Enjoyable daily tea for
        people seeking a more aged experience, or a novel experiment in blending.
        Even if you hate it, it'll be fun.\\u003c\\/p\\u003e\\n\\u003cbr\\u003e\\n\\u003cp\\u003eEach
        mini is ~7g.\\u003c\\/p\\u003e\",\"published_at\":\"2024-03-01T04:35:17-08:00\",\"created_at\":\"2024-02-29T22:10:11-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
