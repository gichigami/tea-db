        Dancong\",\"handle\":\"heaven-dancong\",\"body_html\":\"\\u003cp\\u003eTranslated
        from the name \\u003cem\\u003etong tian xiang\\u003c\\/em\\u003e in Chinese,
        which refers to a fragrance so strong that it can reach to the heavens. Can't
        argue with lofty aspirations, right?\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cem\\u003eTong
        tian xiang\\u003c\\/em\\u003e is thought to be a naturally occurring cross
        between well-known \\u003cem\\u003eshui xian \\u003c\\/em\\u003evarietals
        in Fenghuang.\\u003c\\/p\\u003e\\n\\u003cp\\u003eOur Heaven Dancong has pure
