        Natural Redhead\",\"handle\":\"2017-natural-redhead\",\"body_html\":\"The
        2017 Natural Redhead is a pressed black tea from Yunnan, made in the dianhong
        style. Made from large leaf varietal material, the tea is sun dried, with
        no machine processing involved. The tea is smooth, with a very thick body,
        and a soft natural fragrance.\\u003cbr\\u003e\\u003cbr\\u003eDrink now or
        age a few years before drinking.\\u003cbr\\u003e\\u003cbr\\u003eThis tea has
        been tested and passed the test for 440 of the pesticides and herbicides on
