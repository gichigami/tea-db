        Puer tea to anyone, anywhere.\\u003cbr\\u003e\\u003cbr\\u003eThe Basics Puer
        tea sample set is a tool for education and for introducing tea drinkers to
        raw Puer tea. The set contains the following four 100 gram mini-cakes:\\u003cbr\\u003e\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2015
        Spring Raw Puer Tea\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2014
        Autumn Raw Puer Tea\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2014
        Huangpian\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2007
