        Smoky Nugs Laochatou\",\"handle\":\"2026-smoky-nugs-laochatou\",\"body_html\":\"\\u003cp\\u003e\\u003cem\\u003eLaochatou\\u003c\\/em\\u003e
        are a condensed nugget of tea that naturally fuses together during the shou
        Puer pile process. These are from several of our small batches ranging from
        2021-2024.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe blended together
        several batches of laochatou from our shou productions and then sent to Tongmuguan
        in Fujian to be pine smoked like Lapsang. A real unique combination of campfire
        smoke and the smooth, woody profile of shou. Excellent endurance and a versatile
        brewing companion with one-of-a-kind character.\\u003c\\/p\\u003e\\n\\u003cp\\u003eAvailable
        in 50g and 250g bags of loose laochatou.\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        word of fair warning, normally shou Puer can be sorted out using machines
        to remove most unwanted bits like hair, stray threads and the like, but with
        chatou the tea is fused together. So, if you are faint of heart and scared
        of a few stray bits here and there, skip this tea and go for a pressed cake
        like Lumber Slut. If you're not afraid of some white spots and surprises,
        this is a rewarding pile of nuggets. No need to break them apart, just hit
        them with a boiling rinse and you're off to the races. \\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2026-03-05T07:06:42-08:00\",\"created_at\":\"2026-03-04T01:24:10-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
        Puer Tea\",\"tags\":[\"Ripe Puer Tea\",\"Small Batch Ripe Puer\",\"Smoked\"],\"variants\":[{\"id\":47992298012900,\"title\":\"50g\",\"option1\":\"50g\",\"option2\":null,\"option3\":null,\"sku\":\"12605B\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"9.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8941980778724,\"created_at\":\"2026-03-04T01:24:10-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":47992298045668,\"title\":\"250g\",\"option1\":\"250g\",\"option2\":null,\"option3\":null,\"sku\":\"12605A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"46.00\",\"grams\":50,\"compare_at_price\":null,\"position\":2,\"product_id\":8941980778724,\"created_at\":\"2026-03-04T01:24:10-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":80960689996004,\"created_at\":\"2026-03-04T22:26:25-08:00\",\"position\":1,\"updated_at\":\"2026-03-04T22:26:27-08:00\",\"product_id\":8941980778724,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025SmokyNugs-Laochatou-Shou-Puertea.jpg?v=1772691987\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"50g\",\"250g\"]}]},{\"id\":8941975240932,\"title\":\"2026
        Swerve\",\"handle\":\"2026-swerve\",\"body_html\":\"\\u003cp\\u003eSun dried
        old arbor assamica varietal from Yunnan province that is typically made into
        \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/raw-puer-tea\\\"
        title=\\\"Raw Puer Tea\\\" target=\\\"_blank\\\"\\u003eraw Puer tea\\u003c\\/a\\u003e.
        \\u003c\\/strong\\u003eWe commissioned this production in 2025, sent it to
        Wuyi in Fujian to be hand charcoal roasted by veteran yancha makers. Pressed
        in Yunnan in early 2026.\\u003c\\/p\\u003e\\n\\u003cp\\u003eSwerve is vibrantly
        aromatic and syrupy sweet. Spiced plums, toasted cinnamon and mulled wine
        tannins. Enough intrigue to entrance veteran oolong and black tea drinkers,
        coupled with heroic endurance. Spectacular tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003ePressed
