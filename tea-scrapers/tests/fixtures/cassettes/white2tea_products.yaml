        Milan Maocha Brick\",\"handle\":\"2019-milan-maocha-brick\",\"body_html\":\"The
        2019 Milan Maocha is a bit of a misnomer, how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        [loose tea] and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. The roast is medium-heavy, roasted for 24 hours with the highest
        temperature at 125 C. The heavier roast will evolve and calm in the coming
        years, despite having a slight bite at the time of pressing.\\u003cbr\\u003e\\u003cbr\\u003eThe
        brick is incredibly fragrant, with deeper honey and floral flavors emerging
        throughout the course of a session. This tea is still slightly punchy, but
        the tea has a complex interplay between the roast and the brighter aspects
        of a traditional Milan Dancong. Excellent endurance, this tea can be re-steeped
        for a very long time. Drink now or age as you please.\\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. Each tong is a bamboo leaf packed with two bricks.\\u003cbr\\u003ePressed
        in 2019 using Milan Dancong \\u003cem\\u003emaocha\\u003c\\/em\\u003e [in
        this case, referring to the unsorted tea directly after processing. This tea
        includes stems and larger leaves].  Each brick is 200g. Bricks are packed
        in bamboo leaves, with two bricks in a tong.\",\"published_at\":\"2020-01-24T19:39:35-08:00\",\"created_at\":\"2020-01-24T19:39:35-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Archived\"],\"variants\":[{\"id\":31961898745993,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"31901A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":{\"id\":14315120361609,\"product_id\":4509361045641,\"position\":1,\"created_at\":\"2020-02-05T11:52:04-08:00\",\"updated_at\":\"2020-02-05T11:54:27-08:00\",\"alt\":\"Oolong
