        Tie Guan Yin\",\"handle\":\"classic-tie-guan-yin\",\"body_html\":\"\\u003cp\\u003eOur
        Classic Tie Guan Yin is processed with an emphasis on traditional style processing.
        There is a heavier oxidation than is typically found in the \\\"green\\\"
        tieguanyin in the broader market. Our classic has bruised red leaves and a
        smoother soup. \\u003cbr\\u003e\\u003cbr\\u003eA thick and fruity excursion
