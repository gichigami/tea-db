        Sample\"]}]},{\"id\":4509353279625,\"title\":\"2016 Tuhao as F*ck\",\"handle\":\"2016-tuhao-as-fck\",\"body_html\":\"A
        blend of raw Puer material with character similar to Laobanzhang, without
        using any actual Laobanzhang material. Though Laobanzhang character is not
        a singular thing, and can mean literally hundreds of different things, we
        opted for a tea with a lighter bitterness and more sweetness and internal
        strength.\\u003cbr\\u003e\\u003cbr\\u003eThe tea itself is excellent quality.
