        Anhua Tianjian\",\"handle\":\"2015-anhua-tianjian\",\"body_html\":\"\\u003cp\\u003eAnhua
        \\u003cem\\u003eheicha\\u003c\\/em\\u003e, also known as dark tea, a post
        fermented tea from Hunan province in China. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eTianjian
        is a high grade production of Anhua heicha that contains younger leaves and
        buds. These baskets were stored in the mountains in Anhua for six years prior
        to moving to our Guangzhou storage. Their mountains storage is on the humid
        side, but will return to a more dry state with time.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        age on this tea has smoothed out of the corners of youth and it is well on
        its way to being a smooth, aged heicha. Spicy aroma with hints of age creeping
        into a smooth and sweet soup. Excellent daily tea for tianjian lovers.\_\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eBaskets
        contain ~1000g of loosely pressed tea.\\u003c\\/p\\u003e\",\"published_at\":\"2021-12-10T04:32:52-08:00\",\"created_at\":\"2021-12-08T23:31:16-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Heicha\",\"tags\":[\"Heicha\"],\"variants\":[{\"id\":42170705936612,\"title\":\"1kg\",\"option1\":\"1kg\",\"option2\":null,\"option3\":null,\"sku\":\"92110A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"322.00\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":7480118542564,\"created_at\":\"2021-12-08T23:31:16-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"},{\"id\":42170705969380,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"92110B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"8.50\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":7480118542564,\"created_at\":\"2021-12-08T23:31:16-08:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":36262602080484,\"created_at\":\"2021-12-08T23:31:34-08:00\",\"position\":1,\"updated_at\":\"2021-12-08T23:31:43-08:00\",\"product_id\":7480118542564,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015-Anhua-Heicha-Tianjian-Tea.jpg?v=1639035103\",\"width\":800,\"height\":800},{\"id\":36262602047716,\"created_at\":\"2021-12-08T23:31:34-08:00\",\"position\":2,\"updated_at\":\"2021-12-08T23:31:43-08:00\",\"product_id\":7480118542564,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015-Anhua-Heicha-Tianjian-Tea-2.jpg?v=1639035103\",\"width\":800,\"height\":800},{\"id\":36262601982180,\"created_at\":\"2021-12-08T23:31:34-08:00\",\"position\":3,\"updated_at\":\"2021-12-08T23:31:43-08:00\",\"product_id\":7480118542564,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.co