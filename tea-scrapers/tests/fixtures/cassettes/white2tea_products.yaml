        Lucky Puppy\",\"handle\":\"2021-lucky-puppy\",\"body_html\":\"The return of
        our classic blend.\\u003cbr\\u003e\\u003cbr\\u003eThe 2021 Lucky Puppy blend
        involves a wide range of high end material from several regions. The unique
        character of this tea is heavy with strength and depth. Lucky Puppy evolves
        from steep to steep in a gongfu brewing session, displaying a wide array of
        characteristics and a unique experience. The tea has a powerful aggressive
        character in earlier steeps, with a lasting \\u003cem\\u003ehuigan\\u003c\\/em\\u003e
        and complex returning flavors in the mouth. The later steeps trail off into
        a smooth, sweet sunset.\\u003cbr\\u003e\\u003cbr\\u003eDrink now or age for
        the longer term.\\u003cbr\\u003e\\u003cbr\\u003eEach cake is 200 grams.\\u003cbr\\u003e
