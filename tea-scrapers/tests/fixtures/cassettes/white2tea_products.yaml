        Teacup\"]}]},{\"id\":7010518827199,\"title\":\"2021 Bringer\",\"handle\":\"2021-bringer\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eOur Bringer blend marries several high end
        \\u003ca title=\\\"small batch shou Puer tea\\\" href=\\\"https:\\/\\/white2tea.com\\/blogs\\/blog\\/what-is-small-batch-shou-puerh-tea\\\"
        target=\\\"_blank\\\"\\u003esmall batch shou Puer teas\\u003c\\/a\\u003e of
        varied fermentation levels.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eMost
        of the shou Puer in this blend is from material qualities that very few people
        ever dare to ferment, much less blend. The result is a thick, rich and complex
        orchestra that evolves from steep to steep, rolling into the session like
        a cup of melted 90% dark chocolate and gliding through to the later steeps
        which resemble a well-aged raw Puer tea. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eEven freshly pressed, this tea is lovely.
        The prospect of further aging presses the limits of our patience.\\u003c\\/p\\u003e\\n\\u003cp
