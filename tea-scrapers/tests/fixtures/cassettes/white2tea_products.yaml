        Double Smoke Fuzhuan\",\"handle\":\"2022-double-smoke-fuzhuan\",\"body_html\":\"\\u003cp\\u003eAnhua
        heicha \\u003cem\\u003efu zhuan\\u003c\\/em\\u003e, or fu brick, is a post
        fermented tea from Hunan province in China that contains \\\"golden flowers\\\"
        (\\u003cem\\u003eeurotium cristatum).\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        white2tea commission, this is 2021 material that was pressed and smoked in
        2022. The tea was smoked once using a traditional \\u003cem\\u003eqixingzao
        \\u003c\\/em\\u003e(literally \\\"7 star stove\\\", the large multi-holed
        stove used to fire dry anhua heicha) which is typical of Anhua heicha, but
        then smoked an additional time using pine at our behest to increase the smokey
        depth of the tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA great
        fit as a daily drinker for those who love a bit of tooth to their brew. Tobacco
        and campfire notes over the typical strength of a fu brick. Perfect to drink
        now or age as you please.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        brick is ~1000g of pressed tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eDisclaimer:\\u003c\\/strong\\u003e
        We've heard that people suffering from gluten allergies may be sensitive to
