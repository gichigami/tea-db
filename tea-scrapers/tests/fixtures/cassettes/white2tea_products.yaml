9352689801,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015_Redstar_Ganpu_5.jpg?v=1581834422\",\"width\":1266,\"height\":1266}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"~35g\"]}]},{\"id\":4509352657033,\"title\":\"2015
        Big Leaf Bamboo\",\"handle\":\"big-leaf-bamboo-sheng-puer\",\"body_html\":\"This
        tea was produced in autumn of 2015 with 2014 Puer material \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        target=\\\"_blank\\\" title=\\\"What is Traditional Bamboo Puer Processing?\\\"
        rel=\\\"noopener noreferrer\\\"\\u003eusing a traditional technique for bamboo
        Puer pressing\\u003c\\/a\\u003e. The Big Leaf Bamboo is named for the Huanpian
        [larger, older Puer leaves] that were used in its making. The tea starts with
        a bitter character and becomes sweeter as the session progresses, the tea
        flavors meld with the bamboo throughout. The tea can also be boiled for a
        heavy syrupy drink, or used in cooking rice to impart a tea\\/bamboo flavor.
        Drink now or aged as desired.\\u003cbr\\u003e\\u003cbr\\u003eWe decided to
        produce this tea according to the natural shapes of the bamboo rather than
        waste pieces that didn't fit our ideal shape or size. We will break apart
        the amount you choose and send it in a sealed bag.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase amount is 50 grams.\\u003cbr\\u003eRoughly 350 grams of Bamboo Puer
        tea. Production using 2014 Huangpian material, pressed in 2015. Each purchase
