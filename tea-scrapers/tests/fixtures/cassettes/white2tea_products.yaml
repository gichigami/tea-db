        Auntie Stacks Mini\",\"handle\":\"2025-auntie-stacks-minis\",\"body_html\":\"\\u003cp\\u003eA
        blend of Yunnan raw Puer, sent to a smokehouse in Tongmuguan village in Fujian
        to be pine smoked by a veteran Lapsang smoker. The three day smoking process
        occurs at temperatures from 100C to 120C in an old style Lapsang smokehouse.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        natural fit for cigar lovers and Scotch whisky fanatics who want tea in the
        morning, but this tea is a surprise that will likely garner even fans who
        are wary of smoke as well.\\u003c\\/p\\u003e\\n\\u003cp\\u003eStrong bitterness
        and full body with heavy feeling. Top quality huangpian elevated with the
        added dimension of the flame. Seared leather and tobacco notes underneath
        the smoke cloud. Burly intensity when pushed, with a dynamic character that
        will only improve with age.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach mini is
        ~7g.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch5\\u003eFor aging, we recommend
        that smoked teas be sealed and separated from other teas, as the fresh smoke
