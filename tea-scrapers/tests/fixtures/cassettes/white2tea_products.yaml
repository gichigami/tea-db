        Jamrock Steady\",\"handle\":\"2024-jamrock-steady\",\"body_html\":\"\\u003cp\\u003eA
        7g sample of this tea was included in the \\u003ca rel=\\\"noopener\\\" title=\\\"white2tea
        Tea Club\\\" href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\" target=\\\"_blank\\\"\\u003eMarch
        2024 tea club\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp\\u003eAnother
        one of these white2tea years in the making experiments. Aged raw Puer maocha
        from the mid 2010's pressed alongside light ferment small batch shou Puer
        than is 2-4 years old in a blend meant to mimic tea with decades of age.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        soup brews a dark red, with a the smoothness and body of shou Puer and the
        underlying complexity and aromatics of an aged raw Puer. Is it the same as
        drinking tea from the 1980's? Not really, but you'll save $10,000 compared
        to a real 1980's cake. Enjoyable daily tea for people seeking a more aged
        experience, or a novel experiment in blending. Even if you hate it, it'll
