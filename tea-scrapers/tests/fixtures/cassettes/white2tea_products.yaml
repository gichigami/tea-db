        Blood Moon\",\"handle\":\"2025-blood-moon\",\"body_html\":\"\\u003cp\\u003eThe
        return of the Blood Moon. A bit of an odd hybrid Yunnan tea. Picked and processed
        most similarly to\_\\u003cem\\u003eyueguangbai \\u003c\\/em\\u003eor moonlight
        white tea that has been shade dried, this tea was also intentionally partially
        oxidized, about half way to being a black tea*. It's a unique tea that feels
        closer to an aged shade dried white.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        bright and clear soup is sweet and enduring, with a velvety softness and aromas
        that flit between vegetal and fruity. Soft strawberry flavors and grassy honey
        are at the forefront of its youth, though we suspect it will deepen and thicken
        up in the coming years. It's a beautiful experiment to experience.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        cake is 200g. The cakes are in bamboo tongs, with five cakes per tong. Pressed
        in 2025.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch6\\u003e*For categorical
        boxes, Blood Moon doesn't quite fit into either the white or black tea box,
        and technically is probably an oolong, due to it's partial oxidation during
        processing. However, for ease of understanding of this tea, since it drinks
        more like a black tea\\/white tea hybrid, we have listed it across those two
        categories rather than as an oolong tea, which in practice, it does not really
        resemble at all.\\u003c\\/h6\\u003e\",\"published_at\":\"2025-05-23T03:58:33-07:00\",\"created_at\":\"2025-05-22T03:50:17-07:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Black
