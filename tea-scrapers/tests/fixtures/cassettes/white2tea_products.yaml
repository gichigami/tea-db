        Dawn Oolong\",\"handle\":\"black-dawn-oolong\",\"body_html\":\"\\u003cp\\u003eThe
        name of this tea is a direct translation of the varietal called \\u003cem\\u003ehei
        dan\\u003c\\/em\\u003e (\u9ED1\u65E6). A branch off of the \\u003cem\\u003ehuang
        jin gui\\u003c\\/em\\u003e varietal from Luoyan, some local people also call
        it \\u003cem\\u003ehei jin gui\\u003c\\/em\\u003e.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eBlack
        Dawn has a unique fragrance of floral honey combined with the roasted character
        that drives the tea. The \\u003cem\\u003ehei dan\\u003c\\/em\\u003e varietal
        is rarely grown and sold in Fujian, as several other varietals dominate the
        market landscape and there isn't much demand for it.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        bad news is that this makes it slightly difficult to find with so few people
