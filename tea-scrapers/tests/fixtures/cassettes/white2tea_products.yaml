ed_at\":\"2020-02-05T03:38:39-08:00\",\"product_id\":4509352853641,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015_OldRealiable_Puer_tea_5.jpg?v=1580902719\",\"width\":1000,\"height\":1000},{\"id\":14309934923913,\"created_at\":\"2020-02-05T03:38:07-08:00\",\"position\":6,\"updated_at\":\"2020-02-05T03:38:39-08:00\",\"product_id\":4509352853641,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015_OldRealiable_Puer_tea_6.jpg?v=1580902719\",\"width\":1000,\"height\":1000},{\"id\":14309941182601,\"created_at\":\"2020-02-05T03:38:42-08:00\",\"position\":7,\"updated_at\":\"2020-02-05T03:38:42-08:00\",\"product_id\":4509352853641,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2015_OldRealiable_Puer_tea_7.jpg?v=1580902722\",\"width\":1000,\"height\":1000}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g
        Sample\"]}]},{\"id\":4509352788105,\"title\":\"Basics Ripe Puer Tea Sample
        Set\",\"handle\":\"basics-ripe-puer-tea-sample-set\",\"body_html\":\"\\u003cstrong\\u003eFree
        Shipping anywhere on Earth, coupon code: basics\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cbr\\u003eOur
        goal when making the basics set was to offer an affordable crash course in
        ripe Puer tea to anyone, anywhere.\\u003cbr\\u003e\\u003cbr\\u003eThe Basics
        Puer tea sample set is a tool for education and for introducing tea drinkers
        to ripe Puer tea. The set contains the following four 100 gram mini-cakes:\\u003cbr\\u003e\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2015
        Buds and Small Leaves (Grades: \\u003cem\\u003eGongting\\u003c\\/em\\u003e
        [Imperial], \\u003cem\\u003eTeji\\u003c\\/em\\u003e [Special], Grade 1)\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2015
        Medium Size Leaves (Grades 3-5)\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e2015
        Larger Coarse Leaves (Grades 7-9, including stems and \\u003cem\\u003ehuangpian\\u003c\\/em\\u003e
        [the largest leaf in Puer processing])\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\n\\u003col\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003e\\n\\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/products\\/2015-old-reliable-ripe-puer-house-blend\\\"
        target=\\\"_blank\\\" title=\\\"Ripe Puer House Blend\\\" rel=\\\"noopener
        noreferrer\\\"\\u003e2015 Old Reliable\\u003c\\/a\\u003e (Our house blend,
        which involves all of the above grades, but not identical teas)\\u003c\\/li\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003c\\/ol\\u003e\\n\\u003cbr\\u003e\\u003cbr\\u003eWe
        have separated ripe Puer tea into three distinct cakes; they ascend from the
        smallest leaf to the largest leaf. Each cake only has material from specific
        graded sizes in order to amplify the traits that each grade of leaf has to
        offer. The fourth cake is our house blend, Old Reliable, which can be used
        as a comparison to why a blend of ripe Puer tea tends to give a deeper experience
        than simply pressing a single grade.\\u003cbr\\u003e\\u003cbr\\u003eAlthough
        this is meant to be an educational set, the ripe Puer used in each cake is
        very good quality, making it appropriate for both beginners and experienced
        drinkers alike.\\u003cbr\\u003e\\u003cbr\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/make-puerh-tea-gong-fu-style\\\"
        target=\\\"_blank\\\" title=\\\"How to Make Puerh Tea, Gong Fu Style\\\" rel=\\\"noopener
        noreferrer\\\"\\u003eFor brewing instructions, we recommend reading this article\\u003c\\/a\\u003e.\\u003cbr\\u003eBasics
        Puer Tea Sample Set is a tool for learning about ripe Puer tea with samples.
        Each purchase is for one mini-tong containing four 100 gram mini-cakes. The
        total amount of tea is 400 grams. Each cake was pressed by machine in 2015.\\u003cbr\\u003e\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:33:37-08:00\",\"created_at\":\"2020-01-24T19:33:37-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Tea
