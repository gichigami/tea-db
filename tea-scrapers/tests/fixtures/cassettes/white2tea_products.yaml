        Raw Spring Liubao\",\"handle\":\"2022-raw-spring-liubao\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eLiubao \\u003cem data-mce-fragment=\\\"1\\\"\\u003eheicha\\u003c\\/em\\u003e,
        also known as dark tea, a post fermented tea from Guangxi province in China.
        \\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThis tea was made on commission for white2tea
        in early spring of 2022.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eNot the typical mass produced and pile fermented
        dark liubao. Raw may be a misnomer, but calling it green doesn\u2019t quite
        seem right either, and some folk have even suggested this tea qualify as a
        yellow tea or some hybrid unfermented heicha. In China people often call it
        \\u003cem data-mce-fragment=\\\"1\\\"\\u003enongjia\\u003c\\/em\\u003e or
        farmer style, though it is rarely sold on the open market due to small production
        sizes and lack of proper accreditation. You will find similarities in this
        tea that spans genres \u2013 green tea, yellow tea, heicha, raw Puer \u2013
        there is a reason you can\u2019t pin it down easily.\_\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eBright aromas and sweetness with a hefty
        \\u003cem data-mce-fragment=\\\"1\\\"\\u003e\uFEFFhuigan\\u003c\\/em\\u003e\uFEFF
        (returning sweetness) that is sticky and refreshing. Lovely to drink now or
        age as you desire.\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eEach
        sample purchase is for 25g of loose tea. Each basket contains ~250g of tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-06-17T05:43:48-07:00\",\"created_at\":\"2022-06-16T23:06:05-07:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Heicha\",\"tags\":[\"Heicha\"],\"variants\":[{\"id\":43046283018468,\"title\":\"250g\",\"option1\":\"250g\",\"option2\":null,\"option3\":null,\"sku\":\"92205A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"68.00\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":7689691988196,\"created_at\":\"2022-06-16T23:06:05-07:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"},{\"id\":43046283051236,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"92205B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"7.50\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":7689691988196,\"created_at\":\"2022-06-16T23:06:05-07:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":37916566225124,\"created_at\":\"2022-06-17T03:00:54-07:00\",\"position\":1,\"updated_at\":\"2022-06-17T03:00:57-07:00\",\"product_id\":7689691988196,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2022SpringLiubao.jpg?v=1655460057\",\"width\":800,\"height\":800},{\"id\":37916566323428,\"created_at\":\"2022-06-17T03:00:54-07:00\",\"position\":2,\"updated_at\":\"2022-06-17T03:00:57-07:00\",\"product_id\":7689691988196,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2022SpringLiubao-2.jpg?v=1655460057\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"250g\",\"25g\"]}]},{\"id\":7689689858276,\"title\":\"2022
        Horse Girl Clique\",\"handle\":\"2022-horse-girl-clique\",\"body_html\":\"\\u003cp
