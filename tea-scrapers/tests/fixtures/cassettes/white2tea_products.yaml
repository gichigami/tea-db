        Brutal!!!\",\"handle\":\"2023-brutal\",\"body_html\":\"A hearty mix of several
        small batches of raw Puer from old trees in pristine natural environments,
        none of which had much weight on their own, but that we just couldn't live
        without. We took those small productions and combined them to form one glorious
        mess of a blend called Brutal!!!. Bright aromatics, succulent soup and cloying
        huigan. \\u003cbr\\u003e\\u003cbr\\u003eEach cake is 200 grams.\\u003cbr\\u003e\\u003cbr\\u003ePressed
