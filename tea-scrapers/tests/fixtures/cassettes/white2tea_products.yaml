        Dahongpao is a blend of \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        target=\\\"_blank\\\" title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003eoolong
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003eOriginally
        used to describe the tea from a small group of bushes in Fujian, the name
        Dahongpao in a modern context is more commonly used to describe blends of
        \\u003cem\\u003eyancha\\u003c\\/em\\u003e [rock oolong] instead of denoting
        a varietal or processing distinction. Our Dahongpao is a blend that relies
        heavily on the \\u003cem\\u003eMeizhan\\u003c\\/em\\u003e varietal with traditional
        style processing that incorporates the roast, mineral nature and fragrances
        of typical yancha in a balanced way. Excellent as an introduction to quality
        yancha.\\u003cbr\\u003e\\u003cbr\\u003eEach purchase is for 25 grams of tea.\\u003cbr\\u003e\",\"published_at\":\"2026-02-27T05:22:29-08:00\",\"created_at\":\"2026-02-27T01:28:21-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":47968094650596,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32603A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"9.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8934043353316,\"created_at\":\"2026-02-27T01:28:21-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":36818383896804,\"created_at\":\"2022-03-23T00:34:41-07:00\",\"position\":1,\"updated_at\":\"2022-03-23T00:34:41-07:00\",\"product_id\":8934043353316,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/dahongpao-big-red-robe-oolong-1_ab8332e4-cdad-4d18-b60a-65000af5d049.jpg?v=1648020881\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8934039879908,\"title\":\"Iron
        Arhat\",\"handle\":\"iron-arhat\",\"body_html\":\"Iron Arhat is an Wuyi yancha
        \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003eoolong
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003eThe
        name \\u003cem\\u003etieluohan\\u003c\\/em\\u003e literally translates as
        Iron Arhat, one of the more famous varieties of \\u003cem\\u003eyancha\\u003c\\/em\\u003e
        (rock oolong). This is a medium-heavy three roast tea with deeper inner florality
        that rests beneath the cooling, minty character that lies under the fire.
