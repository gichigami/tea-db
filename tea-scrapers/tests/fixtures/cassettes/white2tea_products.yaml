        Bamboo Shu\",\"handle\":\"2020-bamboo-shu\",\"body_html\":\"The 2020 Bamboo
        Shu ripe Puer was processed using a \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        target=\\\"_blank\\\" title=\\\"What is Traditional Bamboo Puer Processing?\\\"
        rel=\\\"noopener noreferrer\\\"\\u003etraditional technique of bamboo processing\\u003c\\/a\\u003e
        where the tea is pressed into fresh fragrant bamboo and hand roasted over
        an open flame before being dried for long term storage.\\u003cbr\\u003e\\u003cbr\\u003eThe
        Bamboo Shu blend has a captivating aroma that balances the sweetness of our
        shou blend with the brighter fragrances of the bamboo. The tea is thick bodied
        and warming with a sweet character that will appeal to new ripe Puer drinkers
        and veteran Puer lovers alike. Drink immediately or age as you like.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase for a 200g piece will come enclosed in a bamboo shell similar to
        the one pictured, sizes and thicknesses will vary as one would expect with
        a plant.\\u003cbr\\u003e\",\"published_at\":\"2020-12-18T02:39:09-08:00\",\"created_at\":\"2020-12-18T02:34:20-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
        Puer Tea\",\"tags\":[\"Bamboo Roasted\",\"Ripe Puer Tea\",\"Ripe Puer Tea:
        2020\"],\"variants\":[{\"id\":37803155849407,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"12022A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"32.00\",\"grams\":200,\"compare_at_price\":null,\"position\":1,\"product_id\":6196162429119,\"created_at\":\"2020-12-18T02:34:20-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\"},{\"id\":37803155882175,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"12022B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"5.00\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":6196162429119,\"created_at\":\"2020-12-18T02:34:20-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\"}],\"images\":[{\"id\":23192743477439,\"created_at\":\"2020-12-18T02:34:45-08:00\",\"position\":1,\"updated_at\":\"2020-12-19T03:44:11-08:00\",\"product_id\":6196162429119,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020BambooShu.jpg?v=1608378251\",\"width\":800,\"height\":800},{\"id\":23192743280831,\"created_at\":\"2020-12-18T02:34:45-08:00\",\"position\":2,\"updated_at\":\"2020-12-19T03:44:12-08:00\",\"product_id\":6196162429119,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020BambooShu-2.jpg?v=1608378252\",\"width\":800,\"height\":800},{\"id\":23192743248063,\"created_at\":\"2020-12-18T02:34:45-08:00\",\"position\":3,\"updated_at\":\"2020-12-19T03:44:12-08:00\",\"product_id\":6196162429119,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020BambooShu-3.jpg?v=1608378252\",\"width\":800,\"height\":800},{\"id\":23192743510207,\"created_at\":\"2020-12-18T02:34:46-08:00\",\"position\":4,\"updated_at\":\"2020-12-19T03:44:13-08:00\",\"product_id\":6196162429119,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020BambooShu-4.jpg?v=1608378253\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":6196159676607,\"title\":\"2020
        Milan Maocha Brick\",\"handle\":\"2020-milan-maocha-brick\",\"body_html\":\"The
        2020 Milan Maocha is a bit of a misnomer, how can a tea be both \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        [loose tea] and a brick? In this case, the term \\u003cem\\u003emaocha\\u003c\\/em\\u003e
        refers to the Dancong oolong tea being left in its raw form before pressing.
        We commissioned this production to be left with stems and large leaves for
        this pressing. The roast is medium-heavy, roasted for 24 hours with the highest
        temperature at 125 C. The heavier roast will evolve and calm in the coming
        years, despite having a slight bite at the time of pressing.\\u003cbr\\u003e\\u003cbr\\u003eThe
        brick is incredibly fragrant, with deeper honey and floral flavors emerging
        throughout the course of a session. This tea is still slightly punchy, but
        the tea has a complex interplay between the roast and the brighter aspects
        of a traditional Milan Dancong. Excellent endurance, this tea can be re-steeped
        for a very long time. Drink now or age as you please.\\u003cbr\\u003e\\u003cbr\\u003eEach
        brick is 200 grams. \\u003cbr\\u003e\",\"published_at\":\"2020-12-18T02:39:01-08:00\",\"created_at\":\"2020-12-18T02:31:30-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Dancong\",\"Oolong\"],\"variants\":[{\"id\":37803145986239,\"title\":\"200g\",\"option1\":\"200g\",\"option2\":null,\"option3\":null,\"sku\":\"32009A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"65.00\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":6196159676607,\"created_at\":\"2020-12-18T02:31:30-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\"},{\"id\":37803146019007,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32009B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"9.80\",\"grams\":0,\"compare_at_price\":null,\"position\":2,\"product_id\":6196159676607,\"created_at\":\"2020-12-18T02:31:30-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\"}],\"images\":[{\"id\":23192726110399,\"created_at\":\"2020-12-18T02:32:05-08:00\",\"position\":1,\"updated_at\":\"2020-12-19T03:44:09-08:00\",\"product_id\":6196159676607,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020MilanMaochaDancongBrick.jpg?v=1608378249\",\"width\":800,\"height\":800},{\"id\":23192726143167,\"created_at\":\"2020-12-18T02:32:05-08:00\",\"position\":2,\"updated_at\":\"2020-12-19T03:44:09-08:00\",\"product_id\":6196159676607,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020MilanMaochaDancongBrick-2.jpg?v=1608378249\",\"width\":800,\"height\":800},{\"id\":23192726077631,\"created_at\":\"2020-12-18T02:32:05-08:00\",\"position\":3,\"updated_at\":\"2020-12-19T03:44:10-08:00\",\"product_id\":6196159676607,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020MilanMaochaDancongBrick-3.jpg?v=1608378250\",\"width\":800,\"height\":800},{\"id\":23192726044863,\"created_at\":\"2020-12-18T02:32:05-08:00\",\"position\":4,\"updated_at\":\"2020-12-19T03:44:11-08:00\",\"product_id\":6196159676607,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2020MilanMaochaDancongBrick-4.jpg?v=1608378251\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"200g\",\"25g\"]}]},{\"id\":6114644426943,\"title\":\"2020
        Supteaheads\",\"handle\":\"2020-supteaheads\",\"body_html\":\"\\u003cp\\u003eA
        limited edition tea pressed in 2020 using a blend of aged material.\\u003cbr\\u003e\\u003cbr\\u003eAbundant
        and complex flavors and aromas with a thick bodied soup and a long lasting
        \\u003cem\\u003ehuigan\\u003c\\/em\\u003e (returning sweetness in the mouth).
        A blend of a couple of teas with a little bit of age on them that come together
        in a forceful medley. Great for drinking straight away or aging as you see
        fit.\\u003c\\/p\\u003e\\n\\u003ch6\\u003e(No Tunji this year. The material
        wasn't up to our standards, so we made this blend of a few stockpiled favorites
        instead) \\u003cbr\\u003e\\u003cbr\\u003e\\n\\u003c\\/h6\\u003e\\n\\u003cp\\u003eThe
