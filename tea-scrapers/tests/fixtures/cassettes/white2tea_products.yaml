        Yesheng Gushu Hongcha\",\"handle\":\"2021-yesheng-gushu-hongcha\",\"body_html\":\"\\u003cp\\u003eYesheng
        Gushu Hongcha, literally translated as \\\"wild ancient tree red tea\\\",
        this tea comes from a wild varietal of tea leaf.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eAfter
        making appearances in our \\u003ca href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\"
        title=\\\"tea club\\\"\\u003etea club\\u003c\\/a\\u003e, there were angry
        pitchfork carrying members at the gates demanding more of this wild tea. We
        took the remainder of the 2021 production and pressed it for the site. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA
        gnarly little tea with wild characteristics far outside the norm of what is
        considered a black tea, best to leave preconceptions at the door. Pungent
        aromas that drift between fruit and funk over a body of bitter-sweetness.
        Worth the price of admission as a unique tea experience.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cbr\\u003e\\n\\u003cp\\u003eEach
