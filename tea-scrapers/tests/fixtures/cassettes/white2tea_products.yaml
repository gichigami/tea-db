        Sledgehammer\",\"handle\":\"2026-sledgehammer\",\"body_html\":\"\\u003cp data-mce-fragment=\\\"1\\\"\\u003eA
        blend of Yunnan raw Puer, sent to a smokehouse in Tongmuguan village in Fujian
        to be pine smoked by a veteran Lapsang smoker. The three day smoking process
        occurs at temperatures from 100C to 120C in an old style Lapsang smokehouse.\\u003cbr
        data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eA great
        fit for cigar lovers and Scotch whisky fanatics who want tea in the morning,
        but this tea is a surprise that will likely garner even fans who are wary
        of smoke as well.\\u003c\\/p\\u003e\\n\\u003cp\\u003eBurly character and balanced
        bitterness with a strong Menghai presence and strong huigan. Intense when
        pushed, this is a heavy hitter on a budget.\\u003cbr\\u003e\\u003cbr\\u003ePressed
        in 2020. Each cake is 200g. The cakes are wrapped in bamboo leaf tongs, with
        five cakes per tong.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch6\\u003eFor
        aging, we recommend that smoked teas be sealed and separated from other teas,
        as the fresh smoke will pass along to the teas next to it. Or you can keep
        them with your cigars.\\u003c\\/h6\\u003e\",\"published_at\":\"2026-03-05T07:06:49-08:00\",\"created_at\":\"2026-03-04T02:05:48-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
