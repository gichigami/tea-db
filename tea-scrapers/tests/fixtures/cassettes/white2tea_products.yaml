00g\",\"25g\"]}]},{\"id\":7786689102052,\"title\":\"2022
        Pretty Girls Mini\",\"handle\":\"2022-pretty-girls-mini\",\"body_html\":\"The
        Pretty Girls shou Puer blend has a beautiful aroma. If one were to try and
        place it in a broad category it might be a \\u003cem data-mce-fragment=\\\"1\\\"\\u003epulling
        a hot tray of freshly baked cherry danishes from a wood-fired oven \\u003c\\/em\\u003etype,
        but we will leave that up to you. Pretty Girls quickly proceeds into sweet
        shou territory after the rinse. The velvety texture of the soup and complex
        flavors develop over the coming steeps and eventually settle into a soft sweet
        profile that can be infused over and over. Drink immediately or age as your
        prefer.\\u003cbr\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        purchase is for one 7 gram mini.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-09-09T02:07:29-07:00\",\"created_at\":\"2022-09-07T05:44:21-07:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Ripe
        Puer Tea\",\"tags\":[\"Ripe Puer Tea\",\"Ripe Puer Tea: 2022\"],\"variants\":[{\"id\":43359413141732,\"title\":\"7g\",\"option1\":\"7g\",\"option2\":null,\"option3\":null,\"sku\":\"12202A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"1.40\",\"grams\":250,\"compare_at_price\":null,\"position\":1,\"product_id\":7786689102052,\"created_at\":\"2022-09-07T05:44:21-07:00\",\"updated_at\":\"2026-05-16T03:48:07-07:00\"}],\"images\":[{\"id\":39289740034276,\"created_at\":\"2022-09-07T05:44:32-07:00\",\"position\":1,\"updated_at\":\"2022-09-07T05:44:36-07:00\",\"product_id\":7786689102052,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2022-Pretty-Girls-Minis-Tea.jpg?v=1662554676\",\"width\":800,\"height\":800},{\"id\":39289739968740,\"created_at\":\"2022-09-07T05:44:32-07:00\",\"position\":2,\"updated_at\":\"2022-09-07T05:44:36-07:00\",\"product_id\":7786689102052,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/2022-Pretty-Girls-Minis-Tea-2.jpg?v=1662554676\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"7g\"]}]},{\"id\":7786684285156,\"title\":\"2022
        Lich Tears\",\"handle\":\"2022-lich-tears\",\"body_html\":\"\\u003cp\\u003e2022
        Lich Tears is a blend of \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/blog\\/what-is-small-batch-shou-puerh-tea\\\"
        title=\\\"Small batch shu Puerh tea\\\" target=\\\"_blank\\\"\\u003esmall
        batch shou Puer tea\\u003c\\/a\\u003e from Yunnan.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eSeveral
        productions spanning several years, all high-end material that is rarely processed
        into shou Puer tea. All under our supervision from raw through to ripe, to
        the point that I was personally involved in picking and processing some of
        the raw myself. (a few of those kill green steps had my own two hands in the
        wok) Every small batch pile supervised step by step from start to finish in
        Menghai, with plenty of experimentation on high risk, high reward light fermentation
        styles. Suffice it to say, very hands on productions and a very unique blend.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eLich
        Tears begins with succulent enveloping bitterness, intense feeling and viscous
        red liquor. Layers of lightly fermented raw character peak through the darkness
        steep by steep as the tea evolves into a sweet and thick shou Puer with a
        tawny hue that will make you think you're drinking aged sheng. A blend not
        like any tea you've ever tried.\\u003c\\/p\\u003e\\n\\u003cp\\u003eI'd recommend
        anybody who loves shou, aged sheng or unique tea experiments to try it at
        least once. It's freshly pressed in 2022 and already incredibly engaging,
        but with age it will truly shine.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cbr\\u003e\\n\\u003cp\\u003eEach
