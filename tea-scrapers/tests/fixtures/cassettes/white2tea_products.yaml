        about rougui.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eAn array
        of fragrances and flavors, baked apples, scorched nutmeg and cinnamon poured
        over smooth stones. Worthy of focused attention from steep to steep to engage
        with the subtle changes this tea has to offer.\_\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams of tea.\\u003cbr\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-14T07:59:12-08:00\",\"created_at\":\"2025-02-13T00:51:34-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":46057432154340,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32509A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"20.00\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8592792125668,\"created_at\":\"2025-02-13T00:51:34-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126454194404,\"created_at\":\"2025-02-13T00:51:43-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T00:51:44-08:00\",\"product_id\":8592792125668,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025-rouguino15Tea.jpg?v=1739436704\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8592791273700,\"title\":\"No.26
        Rougui\",\"handle\":\"no-26-rougui\",\"body_html\":\"\\u003cp\\u003eRougui
        is an oolong tea from the Fujian province of China.The name \\u003cem\\u003erougui\\u003c\\/em\\u003e
        literally translates as cinnamon, one of the most popular varieties of \\u003cem\\u003eyancha\\u003c\\/em\\u003e
        [rock oolong]. Every year we choose one or two to best represent what we love
        about rougui.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eLayered depth
        and complexity from the outset. The aromatics from the lid, to the empty cups,
        to the leaves themselves each express a unique role in a cast of characters.
        The flavors are reminiscent of spice and sandalwood, with a lingering mineral
        sweetness that lives in the throat long after the tea is gone.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams of tea.\\u003cbr\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-14T07:59:11-08:00\",\"created_at\":\"2025-02-13T00:45:19-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":46057421865188,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32508A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"22.00\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8592791273700,\"created_at\":\"2025-02-13T00:45:19-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126388166884,\"created_at\":\"2025-02-13T00:45:38-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T00:45:40-08:00\",\"product_id\":8592791273700,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025-rouguino26Tea.jpg?v=1739436340\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8592790978788,\"title\":\"Stone
        Milk\",\"handle\":\"stone-milk\",\"body_html\":\"Stone Milk is an \\u003cstrong\\u003e\\u003ca
        href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\" title=\\\"Oolong
        Tea\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003eoolong
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003eThe
        name \\u003cem\\u003eshiru\\u003c\\/em\\u003e literally translates as Stone
        Milk and is a lesser known variety of \\u003cem\\u003eyancha\\u003c\\/em\\u003e
        [rock oolong]. We find the Stone Milk to be one of the best balances of value
        and quality in our yancha lineup. Stone Milk has a robust roast and a creamy
        fragrance and flavor. The body of the tea is thick and has a mineral character
        that plays well with the aromas of the tea. Definitely worth trying for both
        beginners and experienced yancha drinkers alike.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams of tea.\",\"published_at\":\"2025-02-14T07:59:10-08:00\",\"created_at\":\"2025-02-13T00:43:26-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":46057419702500,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32308A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"14.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8592790978788,\"created_at\":\"2025-02-13T00:43:26-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126380171492,\"created_at\":\"2025-02-13T00:43:35-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T00:43:36-08:00\",\"product_id\":8592790978788,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025-StoneMilkTea.jpg?v=1739436216\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8592790257892,\"title\":\"DHP
        no.3\",\"handle\":\"dhp-no-3\",\"body_html\":\"\\u003cp\\u003eOur dhp no.3
        is a Wuyi Yancha [rock tea] from Fujian province made from the \\u003cem\\u003eQidan\\u003c\\/em\\u003e
        varietal.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eSpice and fatty minerality,
        incense and black strap molasses in a cigar closet. An elegant tea with a
        lingering fog of feeling.\\u003cbr data-mce-fragment=\\\"1\\\"\\u003e\\u003cbr
        data-mce-fragment=\\\"1\\\"\\u003eEach purchase is for 25 grams.\\u003cbr
        data-mce-fragment=\\\"1\\\"\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-14T07:59:10-08:00\",\"created_at\":\"2025-02-13T00:33:57-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":46057404924132,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32510A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"15.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8592790257892,\"created_at\":\"2025-02-13T00:33:57-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126342226148,\"created_at\":\"2025-02-13T00:35:38-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T00:35:40-08:00\",\"product_id\":8592790257892,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025-dhpno.3-Tea.jpg?v=1739435740\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8592789176548,\"title\":\"OBSX\",\"handle\":\"obsx\",\"body_html\":\"OBSX
        is an \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003eoolong
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003eThe
        long awaited return of a classic Wuyi \\u003cem\\u003eYancha \\u003c\\/em\\u003e(rock
        oolong) made from older bush material, this tea is often called \\u003cem\\u003elaocong
        shuixian\\u003c\\/em\\u003e which literally translates as old bush narcissus;
        \\u003cem\\u003eshuixian\\u003c\\/em\\u003e being the varietal of tea. Our
        old bush shuixian is a robust tea with deep aroma and character that evolves
        from steep to steep in a gongfu session.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams of tea.\",\"published_at\":\"2025-02-14T07:59:09-08:00\",\"created_at\":\"2025-02-13T00:24:18-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":46057397289188,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32505A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"19.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8592789176548,\"created_at\":\"2025-02-13T00:24:18-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126259257572,\"created_at\":\"2025-02-13T00:24:50-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T00:24:51-08:00\",\"product_id\":8592789176548,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025-obsxTea.jpg?v=1739435091\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8592788095204,\"title\":\"Gold
        Mercy\",\"handle\":\"gold-mercy\",\"body_html\":\"\\u003cp\\u003eGold Mercy
        is an \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003eoolong
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from the Fujian province of China.
        Though we've come up with our fair share of over the top tea names in our
        day, Gold Mercy is actually taken from the varietal name \\u003cem\\u003eJinguanyin\\u003c\\/em\\u003e,
        which directly translate to the Golden Goddess of Mercy.\\u003cbr\\u003e\\u003cbr\\u003eThis
        \\u003cem\\u003eyancha\\u003c\\/em\\u003e [rock tea] has a lighter oxidation
        and a softer roast. The fragrances are bright with a fruity apricot sweetness
        and a woody melody underneath. Osmanthus florals sit atop the light touch
        of roast, with a lingering minerality.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        purchase is for 25 grams of tea.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-14T07:59:08-08:00\",\"created_at\":\"2025-02-13T00:12:50-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[\"Oolong\",\"Yancha\"],\"variants\":[{\"id\":46057385296100,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"32502A\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"12.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":8592788095204,\"created_at\":\"2025-02-13T00:12:50-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126197948644,\"created_at\":\"2025-02-13T00:18:24-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T00:18:26-08:00\",\"product_id\":8592788095204,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025-goldmercyTea.jpg?v=1739434706\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"25g\"]}]},{\"id\":8592780951780,\"title\":\"2024
        Baicha Fuzhuan\",\"handle\":\"2024-baicha-fuzhuan\",\"body_html\":\"\\u003cp\\u003eA
        \\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/hybrid-teas\\\"
        title=\\\"white2tea hybrid tea\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\"\\u003ehybrid\\u003c\\/a\\u003e\_\\u003cem\\u003efu
        zhuan\\u003c\\/em\\u003e, or fu brick. A traditional style of post fermented
        tea from Hunan province in China that contains \\\"golden flowers\\\" (\\u003cem\\u003eeurotium
        cristatum).\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eAnother
        white2tea experiment; this white tea from Yunnan province was sent to Hunan
        to be pressed in traditional fu brick style.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eOriginally
        featured in our \\u003ca href=\\\"https:\\/\\/white2tea.com\\/pages\\/tea-club\\\"
        title=\\\"white2tea monthly tea club subscription\\\" rel=\\\"noopener\\\"
        target=\\\"_blank\\\"\\u003emonthly tea club\\u003c\\/a\\u003e, this white
        tea from Yunnan was sun-dried and has bright aromatics with a floral, fruity
        character that meld with the fu brick processing for a unique experience.
        Melon rinds, dipped in funky mountain honey. Thick bodied and intriguing.
        A beautiful tea and a rare experience of cross provincial processing that
        is rarely seen among the broader tea market.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        brick is ~450g of pressed tea. This tea can be drank now or is an ideal candidate
        for further aging.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eDisclaimer:\\u003c\\/strong\\u003e
        We've heard that people suffering from gluten allergies may be sensitive to
        Fu zhuan \\/ eurotium cristatum. Best to avoid this tea if you are sensitive
        or have Celiac disease.\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-14T07:59:07-08:00\",\"created_at\":\"2025-02-12T23:30:44-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Heicha\",\"tags\":[\"Hybrid\",\"White
        Tea\"],\"variants\":[{\"id\":46057325756644,\"title\":\"~450g\",\"option1\":\"~450g\",\"option2\":null,\"option3\":null,\"sku\":\"42424A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"75.50\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":8592780951780,\"created_at\":\"2025-02-12T23:30:44-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":46057325789412,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"42424B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"5.75\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":8592780951780,\"created_at\":\"2025-02-12T23:30:44-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74126778040548,\"created_at\":\"2025-02-13T01:43:54-08:00\",\"position\":1,\"updated_at\":\"2025-02-13T01:43:59-08:00\",\"product_id\":8592780951780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Baicha-Fuzhuan-Hybrid-Tea.jpg?v=1739439839\",\"width\":800,\"height\":800},{\"id\":74126778073316,\"created_at\":\"2025-02-13T01:43:54-08:00\",\"position\":2,\"updated_at\":\"2025-02-13T01:43:59-08:00\",\"product_id\":8592780951780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Baicha-Fuzhuan-Hybrid-Tea-3.jpg?v=1739439839\",\"width\":800,\"height\":800},{\"id\":74126778007780,\"created_at\":\"2025-02-13T01:43:54-08:00\",\"position\":3,\"updated_at\":\"2025-02-13T01:43:59-08:00\",\"product_id\":8592780951780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024-Baicha-Fuzhuan-Hybrid-Tea-2.jpg?v=1739439839\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"~450g\",\"25g\"]}]},{\"id\":8592779411684,\"title\":\"2024
        Chapo Mid\",\"handle\":\"2024-chapo-mid\",\"body_html\":\"\\u003cp data-mce-fragment=\\\"1\\\"\\u003eLiubao
        \\u003cem data-mce-fragment=\\\"1\\\"\\u003eheicha\\u003c\\/em\\u003e, also
        known as dark tea, a post fermented tea from Guangxi province in China. \\u003cbr
        data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eThis
        \\u003cem\\u003elaochapo\\u003c\\/em\\u003e was a commisioned production of
        the late autumn, early winter coarse leaf style popular in Liubao. This version
        was roasted and has a smokey edge from the flame that will age with a different
        character from our \\u003ca title=\\\"Lao Cha Po\\\" href=\\\"https:\\/\\/white2tea.com\\/products\\/2021-chapo\\\"
        target=\\\"_blank\\\"\\u003e2021 Chapo\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThis tea can be brewed gongfu style with
        long steeps or even simmered to release the flavors from the older leaves
        and stems. A very rustic style of tea, some of the bricks may have naturally
        occurring \\u003cem\\u003ejinhua \\u003c\\/em\\u003e(eurotium cristatum),
        as well as all manner of odd bits one can expect in a rural, lower grade heicha.\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eNot the typical mass produced and pile fermented
        dark liubao. Raw may be a misnomer, but calling it green doesn\u2019t quite
        seem right either, and some folk have even suggested this tea qualify as a
        yellow tea or some hybrid unfermented heicha. In China people often call it
        \\u003cem data-mce-fragment=\\\"1\\\"\\u003enongjia\\u003c\\/em\\u003e or
        farmer style, though it is rarely sold on the open market due to small production
        sizes and lack of proper accreditation. You will find similarities in this
        tea that spans genres \u2013 green tea, yellow tea, heicha, raw Puer \u2013
        there is a reason you can\u2019t pin it down easily.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        brick is ~500g of tea, pressed in late 2024.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-14T07:59:06-08:00\",\"created_at\":\"2025-02-12T23:25:35-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Heicha\",\"tags\":[\"Heicha\",\"Smoked\"],\"variants\":[{\"id\":46057305145572,\"title\":\"500g\",\"option1\":\"500g\",\"option2\":null,\"option3\":null,\"sku\":\"92402A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"39.00\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":8592779411684,\"created_at\":\"2025-02-12T23:25:35-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":46057305178340,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"92402B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"2.45\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":8592779411684,\"created_at\":\"2025-02-12T23:25:35-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":74125419708644,\"created_at\":\"2025-02-12T23:26:05-08:00\",\"position\":1,\"updated_at\":\"2025-02-12T23:26:28-08:00\",\"product_id\":8592779411684,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024ChapoMid.jpg?v=1739431588\",\"width\":800,\"height\":800},{\"id\":74125419643108,\"created_at\":\"2025-02-12T23:26:05-08:00\",\"position\":2,\"updated_at\":\"2025-02-12T23:26:28-08:00\",\"product_id\":8592779411684,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024ChapoMid-Guangxi-Heicha.jpg?v=1739431588\",\"width\":800,\"height\":800},{\"id\":74125419675876,\"created_at\":\"2025-02-12T23:26:05-08:00\",\"position\":3,\"updated_at\":\"2025-02-12T23:26:28-08:00\",\"product_id\":8592779411684,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2024ChapoMid-Guangxi-Heicha-2.jpg?v=1739431588\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"500g\",\"25g\"]}]},{\"id\":8592779280612,\"title\":\"2024
