        Great Blue Heron\",\"handle\":\"2024-great-blue-heron\",\"body_html\":\"\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eA blend of our own aged Yunnan raw Puer
        maocha spanning the mid-2010's, sent to a smokehouse in Tongmuguan village
        to be pine smoked by a veteran Lapsang smoker. The three day smoking process
        occurs at temperatures from 100C to 120C in an old style Lapsang smokehouse.\\u003cbr
        data-mce-fragment=\\\"1\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eA
        perfect fit for Scotch whisky lovers and cigar fans who want tea in the morning,
        but this tea is a surprise that will likely garner even fans who are wary
        of smoke as well. Smoked and meaty, with herbaceous tobacco aromas and a middle
        aged woody incense at the base. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003ePressed
        in 2024. Each cake is 200g. The cakes are wrapped in bamboo leaf tongs, with
        five cakes per tong.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch6\\u003eFor
        aging, we recommend that smoked teas be sealed and separated from other teas,
        as the fresh smoke will pass along to the teas next to it. Or you can keep
        them with your cigars. \\u003cbr\\u003e\\n\\u003c\\/h6\\u003e\",\"published_at\":\"2024-03-01T04:35:14-08:00\",\"created_at\":\"2024-02-29T02:01:57-08:00\",\"updated_at\":\"2026-05-16T03:48:06-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
