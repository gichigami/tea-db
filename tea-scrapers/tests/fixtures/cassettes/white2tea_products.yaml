        Raw Autumn Liubao\",\"handle\":\"2021-raw-autumn-liubao\",\"body_html\":\"\\u003cp\\u003eLiubao
        \\u003cem\\u003eheicha\\u003c\\/em\\u003e, also known as dark tea, a post
        fermented tea from Guangxi province in China. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea was made on commission for white2tea in autumn of 2021.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eNot
        the typical mass produced and pile fermented dark liubao. Raw may be a misnomer,
        but calling it green doesn\u2019t quite seem right either, and some folk have
        even suggested this tea qualify as a yellow tea or some hybrid unfermented
        heicha. In China people often call it \\u003cem\\u003enongjia\\u003c\\/em\\u003e
        or farmer style, though it is rarely sold on the open market due to small
        production sizes and lack of proper accreditation. You will find similarities
        in this tea that spans genres \u2013 green tea, yellow tea, heicha, raw Puer
        \u2013 there is a reason you can\u2019t pin it down easily.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eLively
        aromas with a sticky sweetness and refreshing taste. Lovely to drink now or
        age as you desire.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach basket contains
