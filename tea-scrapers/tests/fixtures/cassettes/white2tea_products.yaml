        Raw Autumn Liubao\",\"handle\":\"2025-raw-autumn-liubao\",\"body_html\":\"\\u003cp\\u003eLiubao
        \\u003cem\\u003eheicha\\u003c\\/em\\u003e, also known as dark tea, a post
        fermented tea from Guangxi province in China. \\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea was made on commission for white2tea in early autumn of 2025.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eNot
        the typical mass produced and pile fermented dark liubao. Raw may be a misnomer,
        but calling it green doesn\u2019t quite seem right either, and some folk have
        even suggested this tea qualify as a yellow tea or some hybrid unfermented
        heicha. In China people often call it \\u003cem\\u003enongjia\\u003c\\/em\\u003e
        or farmer style, though it is rarely sold on the open market due to small
        production sizes and lack of proper accreditation. You will find similarities
        in this tea that spans genres \u2013 green tea, yellow tea, heicha, raw Puer
        \u2013 there is a reason you can\u2019t pin it down easily.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eLively
        aromas with a sticky sweetness and refreshing taste. Lovely to drink now or
        age as you desire.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach basket contains
        ~250g of tea inside of a paper bag.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-11-20T07:39:20-08:00\",\"created_at\":\"2025-11-17T10:19:12-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Heicha\",\"tags\":[\"Heicha\"],\"variants\":[{\"id\":47052176064740,\"title\":\"250g\",\"option1\":\"250g\",\"option2\":null,\"option3\":null,\"sku\":\"92502A\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"48.00\",\"grams\":0,\"compare_at_price\":null,\"position\":1,\"product_id\":8825023398116,\"created_at\":\"2025-11-17T10:19:12-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"},{\"id\":47052176097508,\"title\":\"25g\",\"option1\":\"25g\",\"option2\":null,\"option3\":null,\"sku\":\"92502B\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"4.50\",\"grams\":250,\"compare_at_price\":null,\"position\":2,\"product_id\":8825023398116,\"created_at\":\"2025-11-17T10:19:12-08:00\",\"updated_at\":\"2026-05-16T03:32:50-07:00\"}],\"images\":[{\"id\":79259631288548,\"created_at\":\"2025-11-17T10:19:26-08:00\",\"position\":1,\"updated_at\":\"2025-11-17T10:19:50-08:00\",\"product_id\":8825023398116,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025AutumnLiubao.jpg?v=1763403590\",\"width\":800,\"height\":800},{\"id\":79259631190244,\"created_at\":\"2025-11-17T10:19:26-08:00\",\"position\":2,\"updated_at\":\"2025-11-17T10:19:50-08:00\",\"product_id\":8825023398116,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025AutumnLiubao-2.jpg?v=1763403590\",\"width\":800,\"height\":800},{\"id\":79259631223012,\"created_at\":\"2025-11-17T10:19:26-08:00\",\"position\":3,\"updated_at\":\"2025-11-17T10:19:50-08:00\",\"product_id\":8825023398116,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025AutumnLiubao-3.jpg?v=1763403590\",\"width\":800,\"height\":800},{\"id\":79259631255780,\"created_at\":\"2025-11-17T10:19:26-08:00\",\"position\":4,\"updated_at\":\"2025-11-17T10:19:50-08:00\",\"product_id\":8825023398116,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/files\\/2025AutumnLiubao-4.jpg?v=1763403590\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"250g\",\"25g\"]}]},{\"id\":8825021300964,\"title\":\"Canton
        Canon\",\"handle\":\"canton-canon\",\"body_html\":\"\\u003cp\\u003eA staple
        in Guangdong province tea culture, this Tieguanyin from Fujian was hand charcoal
        roasted in Chaozhou, Guangdong. It's an older style of tea roasting that has
        fallen out of favor in the broader market, but has fans (often among the older
        folk) in places like Guangzhou and Hong Kong to this day.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        charcoal roast is very heavy, riding the thin line between scorched and gorgeous.
        The base aspects of the the oolong peek through the flame and will continue
        to brighten up as this tea's roasted character settles in. The soothing fired
        profile is a favorite in our teacups during the cold autumn and winter months,
        but it's also a refreshing cold brew in the summer.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003eEach
