        Milan\",\"handle\":\"white-milan\",\"body_html\":\"This early spring 2019
        white tea is made in a sun dried white style. The tea has minimal processing,
        picked and sun dried. This tea was processed from tea that is usually destined
        to be made as Dancong oolong, made from the Milan varietal from Guangdong
        province.\\u003cbr\\u003e\\u003cbr\\u003eThe Milan White is sweet and succulent.
        The large leaves take several steeps to ramp up, pouring out a bright spectrum
        of fragrances during a gongfu session. Quite a unique experience, as this
        varietal of tea is seldom produced as white tea.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase is for 25 grams.\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:39:29-08:00\",\"created_at\":\"2020-01-24T19:39:29-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"White
