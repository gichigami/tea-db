        Roast Tieguanyin\",\"handle\":\"dark-roast-tieguanyin\",\"body_html\":\"Our
        dark roast Tieguanyin is an oolong tea from Fujian province that was roasted
        in a small batch. It is roasted along the fine line of allowing the character
        of the tea to express itself beneath a heavier roast style. The depth of aroma
        in the tea has a broad range of aroma from the rinsed leaf, to the flavor
        and through the residual fragrances of the cup; heavy roast coffee, tar, baked
        cinnamon apples, oak, seaweed, charred vegetables, toffee, dark chocolate,
        maple syrup, scotch, bourbon and gingerbread cookies. It is a tea with plenty
        going on for lovers of the complex, but it is also balanced enough to drink
        on regular basis.\\u003cbr\\u003e\\u003cbr\\u003eEach purchase is for 50g
        of tea.\\u003cbr\\u003e\\u003cbr\\u003e \\u003cbr\\u003eEach package contains
        50 grams of roasted Tieguanyin oolong tea from Fujian province.\",\"published_at\":\"2020-01-24T19:39:02-08:00\",\"created_at\":\"2020-01-24T19:39:02-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Oolong\",\"tags\":[],\"variants\":[{\"id\":32386760966281,\"title\":\"50g\",\"option1\":\"50g\",\"option2\":null,\"option3\":null,\"sku\":\"31808\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":false,\"price\":\"14.50\",\"grams\":50,\"compare_at_price\":null,\"position\":1,\"product_id\":4509360226441,\"created_at\":\"2020-02-23T00:20:22-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\"}],\"images\":[{\"id\":14316545015945,\"created_at\":\"2020-02-05T14:05:20-08:00\",\"position\":1,\"updated_at\":\"2020-02-05T14:06:29-08:00\",\"product_id\":4509360226441,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/Dark-Roast-Tieguanyin.jpg?v=1580940389\",\"width\":800,\"height\":800},{\"id\":14316551929993,\"created_at\":\"2020-02-05T14:05:56-08:00\",\"position\":2,\"updated_at\":\"2020-02-05T14:06:29-08:00\",\"product_id\":4509360226441,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/Dark-Roast-Tieguanyin-2.jpg?v=1580940389\",\"width\":800,\"height\":800},{\"id\":14316557762697,\"created_at\":\"2020-02-05T14:06:32-08:00\",\"position\":3,\"updated_at\":\"2020-02-05T14:06:32-08:00\",\"product_id\":4509360226441,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0313\\/6064\\/7305\\/products\\/Dark-Roast-Tieguanyin-3.jpg?v=1580940392\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Amount\",\"position\":1,\"values\":[\"50g\"]}]},{\"id\":4509360193673,\"title\":\"2018
