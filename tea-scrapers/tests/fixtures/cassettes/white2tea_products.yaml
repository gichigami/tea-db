        Bamboo Shu\",\"handle\":\"2018-bamboo-shu\",\"body_html\":\"The 2018 Bamboo
        Shu ripe Puer Tea from white2tea was processed using a \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        target=\\\"_blank\\\" title=\\\"What is Traditional Bamboo Puer Processing?
        \\\" rel=\\\"noopener noreferrer\\\"\\u003etraditional technique of bamboo
        processing\\u003c\\/a\\u003e where the tea is pressed into fresh fragrant
        bamboo and hand roasted over an open flame before being dried for long term
        storage.\\u003cbr\\u003e\\u003cbr\\u003eThe Bamboo Shu blend has an entrancing
        aroma that balances the sweetness of our shou blend with the brighter fragrances
        of the bamboo. The tea is thick bodied and warming with a sweet character
        that will appeal to new ripe Puer drinkers and veteran Puer lovers alike.
        Drink immediately or age as you like.\\u003cbr\\u003e\\u003cbr\\u003eEach
        purchase for a 200g piece will come enclosed in a bamboo shell similar to
