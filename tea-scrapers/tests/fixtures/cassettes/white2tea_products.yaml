        Title\"]}]},{\"id\":4509363470473,\"title\":\"Rock 4X4\",\"handle\":\"rock-4x4\",\"body_html\":\"Rock
        4X4 is an \\u003cstrong\\u003e\\u003ca href=\\\"https:\\/\\/white2tea.com\\/collections\\/oolong-tea\\\"
        target=\\\"_blank\\\" title=\\\"Oolong Tea\\\" rel=\\\"noopener noreferrer\\\"\\u003eoolong
        tea\\u003c\\/a\\u003e\\u003c\\/strong\\u003e from the Fujian province of China.\\u003cbr\\u003e\\u003cbr\\u003eThe
        name Rock 4X4 comes from this blend of rock oolongs, which contains 4 different
        yancha varietals (tieluohan, rougui, shuixian and qidan) with 4 roasts. This
