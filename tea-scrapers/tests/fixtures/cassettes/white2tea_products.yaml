        Peace Lily\",\"handle\":\"2018-peace-lily\",\"body_html\":\"This tea was produced
        in 2018 \\u003ca href=\\\"https:\\/\\/white2tea.com\\/blogs\\/photos\\/what-is-traditional-bamboo-puer-processing\\\"
        target=\\\"_blank\\\" title=\\\"What is Traditional Bamboo Puer Processing?\\\"
        rel=\\\"noopener noreferrer\\\"\\u003eusing a traditional technique for bamboo
        Puer pressing\\u003c\\/a\\u003e.\\u003cbr\\u003e\\u003cbr\\u003ePeace Lily
        is a production of Huanpian [larger, older Puer leaves] that were hand roasted
        in fragrant bamboo. The young tea still has a touch of astringency, with the
        sweet character and aroma of the tea peaking through the fragrances of the
        bamboo and the flame. A thick bodied and heavy tea when pushed, lighter amounts
        of tea can also be brewed for a refreshing, fragrant cup of tea. Suitable
        for aging or drinking now as your prefer.\\u003cbr\\u003e\\u003cbr\\u003eEach
        full piece is roughly 200 grams of tea, with samples available.\\u003cbr\\u003e\",\"published_at\":\"2020-01-24T19:39:20-08:00\",\"created_at\":\"2020-01-24T19:39:20-08:00\",\"updated_at\":\"2026-05-16T03:32:55-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
