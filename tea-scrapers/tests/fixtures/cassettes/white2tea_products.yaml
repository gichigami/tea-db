        Pretty Girls\",\"handle\":\"2018-pretty-girls\",\"body_html\":\"The 2018 Pretty
        Girls Ripe Puer Tea from white2tea is a newly improved upon nod to our sold
        out \\u003ca href=\\\"https:\\/\\/white2tea.com\\/products\\/2015-pretty-girls-ripe-puer\\\"
        title=\\\"2015 Pretty Girls - Ripe Puer\\\" target=\\\"_blank\\\"\\u003e2015
        blend\\u003c\\/a\\u003e.\\u003cbr\\u003e\\u003cbr\\u003eThe blend has a beautiful
        aroma. If one were to try and place it in a broad category in might be a \\u003cem\\u003epulling
        a hot tray of freshly baked cherry danishes from a wood-fired oven \\u003c\\/em\\u003etype,
        but we will leave that up to you. Pretty Girls quickly proceeds into sweet
        shou territory after the rinse. The velvety texture of the soup and complex
        flavors develop over the coming steeps and eventually settle into a soft sweet
