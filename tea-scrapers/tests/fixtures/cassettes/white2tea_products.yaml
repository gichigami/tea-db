        Hot Brandy\",\"handle\":\"2021-hot-brandy\",\"body_html\":\"The soup is thick,
        smooth, and fragrant. It fares well with both gongfu style and western style
        brewing. The tea has excellent endurance and can steep for a very long time
        and can even withstand being simmered or boiled without becoming acrid.\\u003cbr\\u003e\\u003cbr\\u003eBoth
        the white tea and black tea have been sun dried and should age well together.
        However, we are only \\u003cdel\\u003etwo\\u003c\\/del\\u003e three years
        deep on this experiment; though the results are promising, how it will age
        in the long term is anybody's guess.\\u003cbr\\u003e\\u003cbr\\u003e \\u003cbr\\u003eHot
        Brandy is a mix of both white tea and black tea. 200g cake pressed in 2021.
        Each bamboo tong contains 5 cakes.\",\"published_at\":\"2021-11-25T06:40:59-08:00\",\"created_at\":\"2021-11-24T21:58:06-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Black
