        White Tripel\",\"handle\":\"2018-white-tripel\",\"body_html\":\"\\u003cdiv
        class=\\\"short-description\\\"\\u003eThe 2018 White Tripel is a blend of
        white tea that incorporates six different teas from three different provinces.
        The provinces of Fujian, Yunnan, and Guizhou are all present in the blend.
        The broad range of materials unite together to form a layered experience of
        smooth, fragrant sweetness. The Tripel has a complex floral base and creamy
        texture in the mouth. The flavors evolve from steep to steep as different
        materials contribute their character. We prefer this tea brewed gongfu style,
        but it also does well grandpa style or even simmered.\\u003c\\/div\\u003e\\n\\u003cbr\\u003e\\n\\u003cdiv\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv
        class=\\\"short-description\\\"\\u003eWe hope you have the opportunity to
