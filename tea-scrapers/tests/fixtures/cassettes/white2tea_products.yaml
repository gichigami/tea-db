        Yiwu Raw Puer\",\"handle\":\"2009-yiwu-raw-puer\",\"body_html\":\"This Yiwu
        tea is made from 2009 Yiwu material, pressed and then stored in Guangzhou
        natural conditions soon after pressing. It is just nearing middle aged character,
        with a lingering sweetness and strong presence. The tea is already fairly
        smooth for those who prefer to enjoy it now, but would also benefit from long
        term aging.\\u003cbr\\u003e\\u003cbr\\u003eThe wrapper says \\\"Yiwu Gushu\\\"
        [old arbor tea] among other claims, all of which should be taken with a grain
        of salt. (Actual Yiwu Gushu would add a zero to this price) However, the tea
        is a very well priced quality tea for those looking to drink middle aged Yiwu
        or seeking to build a collection. A tong of this tea is quite affordable to
        put away for the years to come.\\u003cbr\\u003eThis \\u003cem\\u003eYiwu\\u003c\\/em\\u003e
        raw puer tea cake is 357 grams and is made of material from 2009. It was stored
        in dry\\/natural conditions in Guangzhou since 2010. Tongs are 7 cakes and
        wrapped in bamboo.\",\"published_at\":\"2020-01-24T19:33:45-08:00\",\"created_at\":\"2020-01-24T19:33:45-08:00\",\"updated_at\":\"2026-05-16T03:48:08-07:00\",\"vendor\":\"white2tea\",\"product_type\":\"Raw
