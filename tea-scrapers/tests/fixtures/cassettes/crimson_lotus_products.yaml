        Shou \\/ Ripe Puerh Tea Brick 250g :: Seattle Inventory\",\"handle\":\"2022-imperial-grade-shou-ripe-puerh-tea-brick-250g-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan mce-data-marked=\\\"1\\\"\\u003eWay
        back in the day when we first started selling puerh we had a delicious little
        number we called 2008 Bulang Imperial Grade. When we sold out of that we were
        pretty sad and have looked for something like it ever since. This is it!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        mce-data-marked=\\\"1\\\"\\u003eThis is an imperial grade shou puerh. That
        means the leaf material is entirely buds. You can see that clearly in the
        pictures. This tea comes on dark quickly! The buds always brew fast. There
        are strong mineral notes in this tea with some balanced bitterness and astringency
        characteristic of Bulang.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        mce-data-marked=\\\"1\\\"\\u003eIn general bud heavy blends don't last as
        many steeps as other blends with larger leaves. You'll get about 8 really
        nice steeps and then it becomes very sweet. It's very drinkable after that
        but the real magic happens in the early steeps.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-10-31T02:40:11-07:00\",\"created_at\":\"2022-10-29T22:51:08-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
