        Blended\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Crimson
        Lotus Tea\u2019s Spring 2016 Jingmai LOVE is a great young sheng with a lot
        going on. It\u2019s got some sweetness and honey, but a bit of sour rocking.
        The texture is the gem here with switching from cool to bubbly. This is a
        fun sheng to play with and have an energetic session with friends. I\u2019d
        say this is a party tea or solo like me you get to a chill warm up before
        you dance around like an idiot around your tea table.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
