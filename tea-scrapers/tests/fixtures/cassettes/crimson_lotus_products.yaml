        \\\"Rise of the Dark Lotus\\\" Shou \\/ Ripe Puerh Tea - 200g Cake :: Seattle
        Inventory\",\"handle\":\"2025-rise-of-the-dark-lotus-shou-ripe-puerh-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThis
        tea has been on our mind for a few years. We just needed to find the right
        material. The very last day we were in Kunming in the Summer of 2025 we found
        it. We were at our friend's tea shop and she had just one more tea for us
        to try. She warned us that it was a little weird and she wasn't sure if she
        liked it or not. From the first taste we knew this was the material we had
        been looking for.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe took what she had
        and started experimenting on blending it with some of the other shou we had
        gathered. It didn't take long to get the ratio right. This tea just wanted
        to be made. We bought all we could get and had it blended and pressed this
        fall.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is fun. It is a super
        clean and clear brewing tea. It is very smooth and creamy with a pronounced
        sweetness. This is a very generous tea that will brew for a great many silky
        smooth steeps. It brews dark. It has some wonderful tobacco earthiness in
        the aroma with what feels like a purple leaf shou funk without any purple
        leaf material used. It feels familiar and new at the same time. This is a
        very special shou that will be popular for a long time.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a pressed 200g cake
