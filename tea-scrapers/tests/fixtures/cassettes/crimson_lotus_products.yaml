        Title\"]}]},{\"id\":4503776690236,\"title\":\"2010 \\\"Black Gold\\\" Shou
        \\/ Ripe Puerh - 200g Cake :: Seattle Inventory\",\"handle\":\"2010-black-gold-shou-ripe-puerh-from-crimson-lotus-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWe
        were lucky to find a few more tongs of this classic tea in our Kunming storage
        during our trip to China this year. We are glad to have them available for
        sale again.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis shou puerh is made from
        the same Jingmai big tree material that is in our Midas Touch sheng puerh
        cakes. This material was aged loose for 7 years. This shou is smooth, aromatic,
        dark, and delicious and very drinkable.\\u003c\\/p\\u003e\\n\\u003caside class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"\u2026
        The flavor is sharp, sugary woodsy, with an interesting savory mushroom aftertaste.
        The texture is creamy and dense \u2026 The flavor is strong, creamy and dense.
        I got wood, molasses, hazelnuts. \u2026 The aroma of this sucker is high \u2013
        the smell of this tea rises with each sip that my sinuses can taste the woodsy
        darkness. \u2026\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca title=\\\"Crimson
        Lotus Tea Review - 2010 Black Gold Shou Puer from Crimson Lotus Tea\\\" href=\\\"http:\\/\\/oolongowl.com\\/2010-black-gold-shou-puer-crimson-lotus-tea\\/\\\"\\u003e--Oolong
        Owl\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"\u2026
        Black Gold first gave off refreshing tasting notes of black peppercorns, which
        left an aftertaste of Earth and tree bark. After a few more steeps, this tea
        quickly became bold \u2026 Overall, Black Gold is a great shou puer that\u2019s
        all around easy to drink, and to me, held great energy \u2026\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        title=\\\"Crimson Lotus Tea Review - 2010 Black Gold Shou Puer from Crimson
        Lotus Tea\\\" href=\\\"https:\\/\\/www.theoolongdrunk.com\\/single-post\\/2017\\/10\\/27\\/Black-Gold-by-Crimson-Lotus-Tea\\\"\\u003e--The
