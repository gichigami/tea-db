        Shou \\/ Ripe Puerh Tea - 200g Cake\",\"handle\":\"2024-yiwu-shousparilla-shou-ripe-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eThis
        is a special shou. Yiwu shou puerh teas are in a class of their own already,
        but this one really hooked us from the first session. We could not help but
        noticing a specific and unique soda style effervescence that reminded us of
        sarsparilla or root beer. We've never had a tea like that before.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea presents a forward herbal appearance. It is a very clean brewing shou
        with a delicate bitterness and a very sweet. smooth, and relaxing flavor.
        It's a very slippery and viscous tea. It doesn't brew super dark and dank.
        It has a reserved elegance. It has a very mellow energy.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Rinse twice for a few seconds each. Start with quick steeps under
        10s. With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-04-23T08:40:10-07:00\",\"created_at\":\"2025-04-22T08:41:39-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
