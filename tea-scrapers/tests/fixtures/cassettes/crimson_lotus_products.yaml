        \\\"Wild Sky\\\" Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2022-wild-sky-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\n\\u003cp\\u003e80
        years ago Yunnan was a much different place. Most of China was being ravaged
        by the Japanese in what they call \\\"The War of Japanese Aggression\\\".
        It was a tough time for everyone. Yunnan was able to remain free of Japanese
        occupation. This was the only province in China that was able to do so. They
        did so in large part because of the bravery of fighter pilots from America
        and Britain who volunteered to come and fight. It was dangerous and not\_exactly
        legal.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe planes they used were the\_Curtis
        P-40B Warhawk. They had shark mouths painted on them, but no one in Yunnan
        had seen a shark before. They had seen tigers and seeing these planes loudly
        growling across the skies with open mouths the locals quickly nicknamed them
        the \\\"Flying Tigers\\\". For a little over a year they saw great success
        defending the skies over Yunnan and Burma from attack from Japanese\_fighter
        planes. Yunnan was kept free and critical war supplies were able to be brought
        safely in from\_British controlled India.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is a really fascinating part of history and one in which many people have
        no idea. Yunnan, and by extension, the tea industry would be entirely different
        if the Japanese had been able to gain full control of China. Especially given
        current political climates it's important to remember a time when America
        and China were able to work together as friends.\\u003c\\/p\\u003e\\n\\u003cp\\u003eIn
        our research we found that just a few miles from our warehouse in China is
        where the Flying Tigers pilots stayed. Our weekly hikes in Kunming take us
        to the top of a local mountain where the original RADAR installation the Flying
        Tigers installed still operates. The airport they used is gone now and has
        been replaced with progress. It's easy to forget the sacrifices made when
        we're living in the good times.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe created
        this design and this blend to remember the shared history our two countries
        have in Yunnan and to commemorate the pilots who gave their lives to keep
        Yunnan free.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere is a lot of history
        in this design. The map used is the actual map that was printed on silk and
        kept in the jacket of each pilot. It contains everything they needed to escape
        via land if they were shot down. The Chinese characters were intended to offer
        them safe passage and reads\_\\\"This foreign person has come to China to
        help in the war effort. Soldiers and civilians, one and all, should rescue
        and protect him.\\\"\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou can learn more
        about the Flying Tigers here:\_https:\\/\\/en.wikipedia.org\\/wiki\\/Flying_Tigers\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch3\\u003eTastings
        Notes!\\u003c\\/h3\\u003e\\n\\u003cp\\u003eGreat story, but how does the tea
        taste?! This is a custom blended sheng puerh tea. It has a dense, floral,
        jungly aroma with lingering sweetness. The wet leaf introduces a brothy umami
        with a slight saltiness. It has a vibrant body with a distinct bitterness
        and grassy aftertaste. It is a smooth tea that is immediately centering. It
        has good throat sweetness with a pleasant fruitiness. It is a juicy tea with
        good energy.\\u003c\\/p\\u003e\\n\\u003cbr\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\",\"published_at\":\"2023-08-24T22:08:02-07:00\",\"created_at\":\"2023-08-24T17:45:23-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2021 and After\",\"2022\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":46615701815612,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2022_WildSky_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"62.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":8648714879292,\"created_at\":\"2023-08-24T17:45:23-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\"}],\"images\":[{\"id\":42706572902716,\"created_at\":\"2023-08-24T17:45:33-07:00\",\"position\":1,\"updated_at\":\"2023-08-24T17:45:33-07:00\",\"product_id\":8648714879292,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2022-Wild-Sky_c2504b60-d9b8-4c4b-857b-d7bd440bbb90.png?v=1692924333\",\"width\":2000,\"height\":2000},{\"id\":42706573033788,\"created_at\":\"2023-08-24T17:45:33-07:00\",\"position\":2,\"updated_at\":\"2023-08-24T17:45:33-07:00\",\"product_id\":8648714879292,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2022-Wild-Sky-Cake_d98b3af5-3a5f-4146-85ff-7b3eeb673e91.png?v=1692924333\",\"width\":2000,\"height\":2000},{\"id\":42706573132092,\"created_at\":\"2023-08-24T17:45:33-07:00\",\"position\":3,\"updated_at\":\"2023-08-24T17:45:33-07:00\",\"product_id\":8648714879292,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2022-Wild-Sky-Back_88861bd9-ef29-469e-bd73-f0986f1d313c.png?v=1692924333\",\"width\":2000,\"height\":2000},{\"id\":42706573263164,\"created_at\":\"2023-08-24T17:45:33-07:00\",\"position\":4,\"updated_at\":\"2023-08-24T17:45:33-07:00\",\"product_id\":8648714879292,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2022-Wild-Sky-Zoom_68edc1a5-087f-4e95-bee6-75dcbdcf72f9.png?v=1692924333\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":8648265957692,\"title\":\"2017 \\\"Underworld\\\" Shou
        \\/ Ripe Puerh Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2017-underworld-shou-ripe-puerh-tea-seattle-inventory\",\"body_html\":\"\\n\\u003cp\\u003eThere
        is another world; a world unseen. We focus on what we can see but forget what
        lies below. There is a world below our world that feeds our world. A world
        of darkness, soil, minerals, crystals, and mycelia. Our worlds form a perfect
        balance. One cannot exist without the other. For us the real magic of tea
        is that we get a chance to taste the earth as expressed by a single plant:
        camellia sinensis. The bigger the tree, the deeper the roots, and the more
        connected it is to the earth.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eCelebrate
        the other side! Drink to the Underworld.\\u003c\\/strong\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eStasia
