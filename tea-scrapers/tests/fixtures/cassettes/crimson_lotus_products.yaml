        Jingmai \\\"Lao Cha Tou\\\" Shou Puerh Tea\",\"handle\":\"2018-jingmai-lao-cha-tou-shou-puerh-tea-free-shipping\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eLao Cha Tou is a special shou puerh that is sure to
        please.\_During the wodui process to make shou puerh the heat and intense
        weight of the wet pile fermentation creates a perfect environment at the bottom
        to make 'Lao Cha Tou'. In Chinese 'Lao Cha Tou' (\u8001\u8336\u5934) means\_
        'Old Tea Head', where head refers to a boss or chief. Every wodui pile creates
        Lao Cha Tou, but not all are created equal. We have had many that were merely
        sub par experiences. We are very selective with\_the Lao Cha Tou we choose.
        This material came from a special Jingmai production.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis Lao Cha Tou brews up a little different than our
        Bulang variety. These are\\u003cspan\\u003e\_\\u003c\\/span\\u003every creamy
        and smooth. It doesn't brew thick but the flavors are smooth and clear, with
        simple, earthy\\/foresty notes.\_Aromas\_are Chinese medicine mixed with split
        peas and roasted\\u003cspan\\u003e\_\\u003c\\/span\\u003epotato. This tea
        swallows easy with a nice throat feel.\_There is a vibrancy after a few steeps
        that feels like you're sipping on a freshly carbonated cola. There is a warming
        energy that relaxes you.\_You can steep these long, or boil them til they're
        motor oil. They\_always brew smooth and mellow and delicious. They will seemingly
        steep forever!\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003ca href=\\\"https:\\/\\/crimsonlotustea.com\\/products\\/2018-jingmai-lao-cha-tou-shou-puerh-tea-with-jianshui-zitao-storage-jar-free-shipping\\\"
        target=\\\"_blank\\\" title='Crimson Lotus Tea - 2018 Jingmai \\\"Lao Cha
        Tou\\\" Shou Puerh Tea with Jianshui Zitao Storage Jar :: FREE SHIPPING' rel=\\\"noopener
        noreferrer\\\"\\u003e\\u003cspan\\u003eYou can buy this material in a Jianshui
