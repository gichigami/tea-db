        Cake\",\"20g Sample\"]}]},{\"id\":10359845011,\"title\":\"Handmade Silver
        Cup 50ml - Blue Waterfall Glazed\",\"handle\":\"handmade-silver-cup-50ml-blue-waterfall-glazed\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        are glazed\_tea cups that have been lined by hand with fine silver \\u003c\\/span\\u003e\\u003cspan\\u003ein\\u003c\\/span\\u003e\\u003cspan\\u003e\_Yunnan
        by local silversmiths. Drinking your tea in silver is a true pleasure. The
        silver reflects light and makes your tea vibrant in color; it almost glows.
        There is a noticeable difference in the taste as well.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        teacups hold\_50ml and measure\_\\u003c\\/span\\u003e2-5\\/8\u201D wide\_by
        1-3\\/8\u201D tall (6.6cm x 3.5cm).\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        product is a single cup. If you want more you need to purchase multiple items.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-06-24T22:03:09-07:00\",\"created_at\":\"2017-04-26T23:10:35-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
