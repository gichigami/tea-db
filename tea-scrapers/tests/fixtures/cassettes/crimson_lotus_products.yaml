        Sheng \\/ Raw Puerh from Crimson Lotus Tea :: Seattle Inventory\",\"handle\":\"spring-2016-jingmai-love-sheng-raw-puerh-from-crimson-lotus-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWe
        here at Crimson Lotus Tea are in love with Jingmai. Jingmai is an amazing
        area with deep history and fantastic teas. We have blogged about our\_\\u003ca
        title=\\\"Crimson Lotus Tea - Jingmai Mountain and Mangjing Village\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/13518649-jingmai-mountain-and-mangjing-village\\\"
        rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003eadventures in
        Jingmai\\u003c\\/a\\u003e. We wanted to create an affordable Jingmai cake
        and this blend is a result of that.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        blend captures the essence of Jingmai. You have depth, body, floral features,
        and an amazing honey aroma. With some age these features will really develop.\\u003c\\/p\\u003e\\n\\u003cp\\u003eIf
        you love Jingmai, you'll love \\\"Jingmai LOVE\\\"!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
