        Mega Brick!\"]}]},{\"id\":9550932377916,\"title\":\"Jianshui Dragon Boss Teapot
        - 280ml\",\"handle\":\"jianshui-dragon-boss-teapot-280ml\",\"body_html\":\"\\u003cp\\u003eLook
        at this beast of a teapot! This might be the largest one we've ever sold.
        If you wanna party, this teapot will party! When you absolutely have to brew
        tea for every last person in the room, accept no substitutes. If you've got
        tea boss ambitions what better way to set the record straight that you're
        the boss than with this absolute UNIT of a teapot. You deserve it. You've
        earned it boss!\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eJianshui
        teapots are amazing to brew with. We believe the quality of the clay speaks
        for itself. Our hope is that as many people as possible have the opportunity
        to purchase these teapots and brew their tea with them.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis was handmade by a group of artists who work together.
        It was single fired and unglazed. This is a true clay which lacks any sand.
        The natural minerals in the clay will enhance the flavor of your tea. Jianshui
        is in Yunnan, and the clay used in this teapot comes from the same mountains
        that grow puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        target=\\\"_blank\\\"\\u003eWe blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eYou are purchasing the teapot that
        you see. We only have the one for sale. The lid fits and it seals well. It
        pours fast and easy. The filter on the inside is multi-hole and very efficient
        at blocking whole leaves.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis teapot is polished, brown, Jianshui clay. The
        teapot is made entirely by hand.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eThis
        is a big teapot! You can brew tea for a lot of people with it. It measures
