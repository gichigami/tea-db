        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"tea-rex_teapet\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"14.99\",\"grams\":100,\"compare_at_price\":null,\"position\":1,\"product_id\":9531803959612,\"created_at\":\"2024-06-15T01:53:36-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":46972872261948,\"created_at\":\"2024-06-15T02:23:55-07:00\",\"position\":1,\"updated_at\":\"2024-06-15T02:23:57-07:00\",\"product_id\":9531803959612,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2024-Tea-Rex-Teapet-1.png?v=1718443437\",\"width\":2000,\"height\":2000},{\"id\":46972872327484,\"created_at\":\"2024-06-15T02:23:55-07:00\",\"position\":2,\"updated_at\":\"2024-06-15T02:23:57-07:00\",\"product_id\":9531803959612,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2024-Tea-Rex-Teapet-2.png?v=1718443437\",\"width\":2000,\"height\":2000},{\"id\":46972872294716,\"created_at\":\"2024-06-15T02:23:55-07:00\",\"position\":3,\"updated_at\":\"2024-06-15T02:23:57-07:00\",\"product_id\":9531803959612,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2024-Tea-Rex-Teapet-3.png?v=1718443437\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9550799765820,\"title\":\"Jianshui Black Lotus Teapot
        - Dragon's Egg Style\",\"handle\":\"jianshui-black-lotus-teapot-dragons-egg-style\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eThis is a true tea lovers teapot. We really love Jianshui
        clay. It has a purity and soul that comes through the tea session. For these
        teapots we used the rare Wanyao clay. \\u003cmeta charset=\\\"utf-8\\\"\\u003eWith
        changing government regulations it has become difficult or impossible to mine
        for new clay under Wanyao village in Jianshui. Most Jianshui teapots now are
        made of a blend of clay from as far as 25km away. It's still good clay, but
        the purists prefer the old Wanyao clay. We still have access to some of it
        but the stock is dwindling! The clay in these teapots was mined 20 years ago,
        processed, and has been aging since then.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eTo
        set these teapots apart we had them carved with a lotus and inlaid them with
        red glaze.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese are
        each handmade by a group of artists\_who work\_together.\_They are single
        fired and unglazed. This is a true clay which\_lacks any sand. The natural
        minerals in the clay will enhance the flavor of your tea. Jianshui is in Yunnan,
        and the clay used in these teapots comes from the same mountains that grow
        puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        target=\\\"_blank\\\"\\u003eWe blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince these are handmade products
        each are unique. There are slight variations to each. These are gorgeous teapots.
        The lids fit and they seal well. They pour fast and easy. They are ready to
        go!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThe
        volume is a close approximation. The exact volume of the teapot you receive
        may be 5% more or less. It will be pretty close! It's the perfect size for
        solo brewing or with a friend.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis teapot is polished black, Jianshui clay and
        is in\_\\u003cspan\\u003ethe\\u003c\\/span\\u003e\\u003cspan\\u003e \\\"Dragon's
        Egg\\\"\\u003c\\/span\\u003e style.\_\\u003cmeta charset=\\\"utf-8\\\"\\u003eThis
        teapot has a flat filter with 9 holes.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eThese
        are tiny teapots that will easily sit in a single hand. They measure on average
        10cm from tip of spout to end of handle and are around 8cm tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eYou can purchase a hard box and embroidered
        bag for $10USD additional.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eCheck
        out our video series from Jianshui:\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/H22bki_zsmA\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/GRGbbbX93bk\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/l3JUBMSPLGQ\\\" height=\\\"315\\\"
