        \\\"Low Rider\\\" 200g Cake - Sheng \\/ Raw Puerh Tea\",\"handle\":\"2019-spring-low-rider-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis
        is a custom blend of Spring 2019 sheng puerh tea materials. This is a custom
        blend in our style. Just like custom car culture in America we take classic
        ideas and add our own creative touches to them. There are familiar aspects
        to this tea and then ones you won't expect. We've taken the tea\_then chopped
        it and dropped it, lowered it and slapped a sick paint job on it. A new classic
        is born.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis tea has been a long time
        in the making. Our first year in Kunming we fell in love with a painting in
        a local tea shop. We spent years tracking down the artist and finally got
        a hold of him this year. His name is Cong and he is a Kunming local artist
        who loves puerh tea. His style is very modern and not well received in China.
        We love what he does and are super happy to have his work on our tea! He isn't
        on social media and has a limited online presence so we've got nothing to
        link you to.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is an easy drinking tea
        with hay and lemongrass in the aroma. Flavor is smooth, sweet and thick\_with
        a pleasant aftertaste. It is crisp, clean, and clear with minimal bitterness
        and a balanced astringency.\\u003c\\/p\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Low
        Rider Sheng Puer is an approachable, floral heavy tea with low bitterness
        and astringency. I would call this an excellent new puer drinker or oolong
        lover tea.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca title=\\\"Crimson
        Lotus Tea Review - Low Rider\\\" href=\\\"https:\\/\\/oolongowl.com\\/2019-low-rider-sheng-puer-from-crimson-lotus-tea\\/\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\",\"published_at\":\"2025-02-04T20:17:24-08:00\",\"created_at\":\"2019-09-16T22:34:38-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
