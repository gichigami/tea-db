        Spring Jingmai Old Tree 200g Cake - Sheng \\/ Raw Puerh Tea\",\"handle\":\"2022-spring-jingmai-old-tree-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"\\u003eThis
        is everything you want in Jingmai old tree sheng puerh tea. This is fantastic
        material.\_The aroma is thick with honey. The flavor is smooth and floral
        with just enough bitterness and astringency to keep your palate interested.
        This tea is very fresh! This is the same material we have used in our \\\"Planet
        Jingmai\\\" tea balls.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Pu'er \\/ Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 200g cake of compressed
        tea.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
