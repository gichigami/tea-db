        Title\"]}]},{\"id\":6982627164220,\"title\":\"2021 Pasha Shan Shou \\/ Ripe
        Puerh Tea :: Seattle Inventory\",\"handle\":\"2021-pasha-shan-shou-ripe-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eAs
        far as single origin shou puerh goes this is some of the best we've ever had.
        It brews so clean and clear with dark amber hues. The aroma spans from marzipan
        to fresh boiled potatoes. It drinks super smooth and sweet with a mouthfeel
        like warm chocolate milk. This is a very satisfying shou puerh that is a very
        easy drinker.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 200g cake.\\u003c\\/span\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
