        \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2023-bangdong-old-tree-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003e\\u003cspan
        data-mce-fragment=\\\"1\\\"\\u003eBangdong is pretty remote, it's a lot of
        work to get there. We're excited to be able to offer tea from this amazing
        garden yet again. This material impresses us year after year.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"\\u003eThis
        leaf is from the same garden that our Moon Princess cakes come from. This
        tea has melon, berry, and cane sugar aromas. There are plenty of stonefruit
        flavors. There is a complexity that builds on the solid body. This tea is
        crisp with a pleasant astringency.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        \\u003cmeta charset=\\\"utf-8\\\"\\u003ePu'er \\/ Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2000+ m\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
