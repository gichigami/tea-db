        Autumn Lao Man'E Old Tree 200g Cake - Sheng \\/ Raw Puerh Tea\",\"handle\":\"2018-autumn-lao-mane-old-tree-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis is one
        of the best Autumn teas we have ever had. We sold it loose last year and this\_Spring
        we took what we had left over from the 2018 harvest and pressed it into a
        handful of cakes. This is very tasty stuff, be sure to grab one!\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis is classic Lao Man'E sheng puerh tea. Even for
        an Autumn\_picking this tea has guts, personality, and strength. You don't
        sit down for this tea. You stand up and take notice. The strength of this
        tea is full bodied and balanced with sweetness and a long aftertaste. The
        aromatics are thick and floral. This material was picked and processed only
        from a select few old trees in the Autumn of 2018. The trees are a blend of
        bitter and sweet varietals. This tea is strong, bitter, and astringent, but
        we feel still very approachable for those new to sheng puerh like this.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eCheck out this video from Lao Man'E:\\u003c\\/p\\u003e\\n\\u003ciframe
        width=\\\"560\\\" height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/Ck3LVmBxF_c\\\"
        frameborder=\\\"0\\\" allow=\\\"accelerometer; autoplay; encrypted-media;
        gyroscope; picture-in-picture\\\" allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:27-08:00\",\"created_at\":\"2019-08-29T20:22:17-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Autumn\",\"Sheng
        \\/ Raw Puerh\",\"Single Origin\"],\"variants\":[{\"id\":29720211521596,\"title\":\"Default
