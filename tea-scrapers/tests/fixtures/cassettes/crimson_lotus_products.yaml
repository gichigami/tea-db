        - Xishi Style\",\"handle\":\"jianshui-white-lotus-teapot-xishi-style\",\"body_html\":\"\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis is a true tea lovers teapot. We really love
        Jianshui clay. It has a purity and soul that comes through the tea session.
        For these teapots we used the rare Wanyao clay. \\u003cmeta charset=\\\"utf-8\\\"\\u003eWith
        changing government regulations it has become difficult or impossible to mine
        for new clay under Wanyao village in Jianshui. Most Jianshui teapots now are
        made of a blend of clay from as far as 25km away. It's still good clay, but
        the purists prefer the old Wanyao clay. We still have access to some of it
        but the stock is dwindling! The clay in these teapots was mined 20 years ago,
        processed, and has been aging since then.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eTo
        set these teapots apart we had them carved with a lotus and inlaid them with
        red glaze.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese are
        each handmade by a group of artists\_who work\_together.\_They are single
        fired and unglazed. This is a true clay which\_lacks any sand. The natural
        minerals in the clay will enhance the flavor of your tea. Jianshui is in Yunnan,
        and the clay used in these teapots comes from the same mountains that grow
        puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" target=\\\"_blank\\\"\\u003eWe
        blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince these are handmade products
        each are unique. There are slight variations to each. These are gorgeous teapots.
        The lids fit and they seal well. They pour fast and easy. They are ready to
        go!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThe
        volume is a close approximation. The exact volume of the teapot you receive
        may be 5% more or less. It will be pretty close! It's the perfect size for
        solo brewing or with a friend.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis teapot is polished, pure white, Jianshui
        clay and is in \\u003cspan\\u003ethe\\u003c\\/span\\u003e\\u003cspan\\u003e
        \\\"Xishi\\\"\\u003c\\/span\\u003e\_style.\\u003cmeta charset=\\\"utf-8\\\"\\u003e\_\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis teapot has a flat filter with 7 holes.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eThese are tiny teapots that will
        easily sit in a single hand. They measure on average 10cm from tip of spout
        to end of handle and are around 6.5cm tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eYou can purchase a hard box and embroidered
        bag for $10USD additional.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp
