        Title\"]}]},{\"id\":10111967166780,\"title\":\"Lao Man'E \\\"BS\\\" Bitter\\/Sweet
        Sheng \\/ Raw Puerh Tea Dragon Balls\",\"handle\":\"lao-mane-bs-bitter-sweet-sheng-raw-puerh-tea-dragon-balls\",\"body_html\":\"\\u003cp\\u003eWe
        talk about Lao Man'E a lot. The teas available in the hills surrounding Lao
        Man'E village are in a class of their own. It's a bitter class, but what is
        a good sheng puerh tea without some bitterness. There are two major varietals
        in Lao Man'E. One is noticeably more bitter than the other. They are called
        Bitter and Sweet. You can for sure tell the difference.\\u003c\\/p\\u003e\\n\\u003cp\\u003eIn
        2019 we bought some ridiculously high end material from Lao Man'E and created
        a very pricy bitter \\/ sweet tasting set. We didn't press all of it and were
        saving it for a fun future project. This is what we came up with. We pressed
        all the bitter material into 5g dragon balls. We also pressed all the sweet
        material into 5g dragon balls. You will get 5 of each. Which is which? We
        don't know anymore. You'll have to taste them to find out.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        packet has 10x 5g dragon balls. That's 50g of very high end Lao Man'E material.
        These are really good teas. Five of the dragon balls will be the bitter varietal
        and the other five will be the sweet varietal.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003ePut
        your tastebuds to the Lao Man'E BS challenge. See if you can tell which are
        bitter and which are sweet. These are really potent teas and 1 5g ball is
        enough for a gongfu session where you would normally use 10g. Or just go full
        BS and steep with 2 balls.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThese steep super easy! Drop
        one ball into your brew vessel of choice 75-100ml or so. Add boiling water
        slowly. Let it steep for 30s and watch the ball open up. Discard this initial
        rinse. Wait 5 minutes with the lid on and the tea ball will be open and ready
        to brew. Start with quick steeps under 10s. With each re-steep adjust the
        steep time to your taste.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-08-15T01:15:43-07:00\",\"created_at\":\"2025-07-28T12:10:19-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
