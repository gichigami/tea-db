        \\\"Wild Ride\\\" Sheng \\/ Raw Puerh Tea\",\"handle\":\"2024-kunlu-shan-wild-ride-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cp\\u003eThese
        days it just seems like we're on a rollercoaster that you can't get off of.
        We are just leaves on the wind. We might as well enjoy ourselves! This tea
        is how you do that. This is a custom blend of big tree and small tree material
        from the top of Kunlu Shan.\\u003c\\/p\\u003e\\n\\u003cp\\u003eKunlu Shan
        rarely disappoints and this cake is no exception. This material was picked
        and processed in the Spring of 2024 and aged for a year as maocha. Even still
        it has a noticeable young sheng essence. It is fresh, clean, and vibrant.
        The aromas are stonefruit, dried plums, and sugar coated hawthorn.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is a juicy tea with a medium body. It has a present bitterness but it is balanced.
        There is a very good aftertaste that builds through the session. This is a
        refreshing tea that brews easily but can get a little rowdy if you push it.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_\\u003cmeta
        charset=\\\"utf-8\\\"\\u003ePu'er \\/ Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1700+m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eS\\u003cmeta
        charset=\\\"utf-8\\\"\\u003epring Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eInstead
        of traditional samples made from the cakes we opted to press this material
        into dragon balls as well. If you want to sample the material grab a set of
        dragon balls.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
