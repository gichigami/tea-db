        Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2024-spring-manzhuan-qiao-mu-sheng-raw-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003e\\u003cspan
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eManzhuan
        holds a special place in our hearts. We love their tea! This garden is an
        incredible mix of old and young trees. High on the side of the mountain slope
        these trees live and grow in a perfect place. The trees growing ecologically
        as part of the forest as a whole are always much better teas.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eThe
        dry aroma is fresh with floral jasmine notes. As the leaves warm it reveals
        a sweet grassiness. The wet leaf presents a dense orchid aroma.\\u003c\\/span\\u003e\\u003cbr\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        tea\_begins golden in color, strong and juicy, but with limited bitterness.
        The flavor starts off on the throat with a medium thickness. As you progress
        through the steeps the throat sweetness builds. It grows in strength but the
        bitterness is pleasant balanced with a great throat and body feel.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eWe have a limited number of these cakes available.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
