        Sheng \\/ Raw Puerh from Crimson Lotus Tea :: Seattle Inventory\",\"handle\":\"spring-2017-jinggu-bang-sheng-raw-puerh-from-crimson-lotus-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea is a fantastic representative of Jinggu area material. We were very pleased
        to find this tea this year. We were equally pleased to work with the talented
        \\u003ca href=\\\"https:\\/\\/youtu.be\\/Z4HWQiA0d14\\\" title=\\\"Crimson
        Lotus Tea : Interview with Du Xi\\\" target=\\\"_blank\\\"\\u003eDu Xi ( \u675C\u6EAA\_);
        a local Kunming artist\\u003c\\/a\\u003e. He created the original artwork
        which we adapted to the puerh cake.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eChinese
        mythology wouldn't be complete without the antics of the Monkey King,\_\\u003ca
        href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Sun_Wukong\\\" title=\\\"Wiki
        - Monkey King - Sun Wukong\\\"\\u003e\\\"Sun Wukong\\\"\\u003c\\/a\\u003e,\_and
        his magical staff the \\u003ca href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Ruyi_Jingu_Bang\\\"
        title=\\\"Wiki - Ruyi Jingu Bang\\\"\\u003e\\\"J\u012Bng\u016B B\xE0ng\\\"\\u003c\\/a\\u003e.
        He received this mythical weapon from the\_Dragon King of the East Sea. In
        the painting the Monkey King is doing battle with the Jingu Bang against \\u003ca
        href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Erlang_Shen\\\" title=\\\"Erlang
        Shen Wiki\\\" target=\\\"_blank\\\"\\u003eErlang Shen\\u003c\\/a\\u003e and
        his dog Xi\xE0oti\u0101n qu\u01CEn.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003ePleasant
        bitterness meets thick sweet aftertaste. It leans in the vegetal direction
        but has a clean energy.\\u003c\\/p\\u003e\\n\\u003cp\\u003eLearn more about
        Du Xi here: \\u003ca href=\\\"http:\\/\\/duxiart.com\\/\\\" title=\\\"Crimson
        Lotus Tea - Du Xi Art\\\" target=\\\"_blank\\\"\\u003ehttp:\\/\\/duxiart.com\\/\\u003c\\/a\\u003e\_and
        here: \\u003ca href=\\\"http:\\/\\/artand.cn\\/duxi\\\" title=\\\"Crimson
        Lotus Tea - Du Xi Art\\\" target=\\\"_blank\\\"\\u003ehttp:\\/\\/artand.cn\\/duxi\\u003c\\/a\\u003e\_.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2200m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Jinggu
        Bang is a sheng puer for those who prefer a clean vegetal leaning taste. It
        has a pleasing amount of bitterness, some thickness, and aftertaste. It is
        certainly energizing yet focused with the chill energy. Jinggu Bang has a
        little of everything and a solid puer tea\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2017-jinggu-bang-sheng-puer-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Jinggu Bang\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
