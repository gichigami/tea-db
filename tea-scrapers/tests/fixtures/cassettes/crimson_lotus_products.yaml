        Title\"]}]},{\"id\":6558858674236,\"title\":\"2020 \\\"Honeybomb\\\" Sheng
        \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2020-honeybomb-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eHoneybomb is pure Jingmai sweetness.
        This blend is all the best from this Spring in a very affordable package.
        We have old tree, big tree, young tree, and huang pian material blended to
        maximize that Jingmai honey sweetness. This tea is a mellow treat. There is
        just enough bitterness and astringency to keep things interesting. It brews
        up with a rich golden color. The aromas are in the floral sphere. This tea
        is sweet and vibrant in the mouth. This is easily a daily drinker sheng. Let
        this tea age for a couple years and the honey aroma will deepen.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003e200g
        Cake\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
