        target=\\\"_blank\\\"\\u003eYou can read all about that story here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eHekai
        is\_a hidden gem in Bulang. It gets overshadowed by Lao Ban Zhang and Lao
        Man'E. Even in Hekai this garden is special.\_There is an emotional vibe to
        the garden that makes you feel like you've stepped back into a prehistoric
        era.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea brews\_THICK!\_It is a
        gentler tea with minimal bitterness and astringency but flavor and aroma are
        quite nice. It has a great aftertaste and a very noticeable chaqi tea energy.
        It's like being kissed by a cobra.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
