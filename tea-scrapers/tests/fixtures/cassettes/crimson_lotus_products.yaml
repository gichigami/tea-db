        Title\"]}]},{\"id\":9229444841788,\"title\":\"2023 Bai Ying Shan \\\"Whispering
        Sunshine\\\" Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"copy-of-2023-spring-bai-ying-shan-whispering-sunshine-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan style=\\\"text-decoration:
        underline;\\\" mce-data-marked=\\\"1\\\"\\u003e\\u003c\\/span\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eWe have been sourcing this tea for 10 years now.
        We've never found another like it. We appreciate the farmers attention to
        his trees. This tea has a clean and perfumey aroma that is vegetal with a
        strong citrus note and a hint of tobacco. The flavor is bright, crisp, and
        juicy with smooth grass notes and an earthy vibrance.\_\_The bitterness and
        astringency are just enough to keep you interested. The body is mellow and
        the aftertaste pleasant. There is an energy to this tea that can come on strong.
        Listen close and hear the Sun whispering to you through this tea. There is
        a lot to tell.\\u003c\\/p\\u003e\\n\\u003cp\\u003eBai Ying Shan, or White
        Warbler Mountain, is a remote high altitude tea growing region in Lincang
        Prefecture. This mountain has more than 10 unique varietals of camellia sinensis.
        The material in this tea is composed entirely from one ancient tree varietal
        called 'dabaiyakou' which means 'big white buds' . The picking and processing
        of this tea is 100% done by hand.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe chose
        to call this puerh \\\"Whispering Sunshine\\\".\_The tea gardens in Bai Ying
        Shan are the highest elevation that we source tea from. Grown\_above 2200m
        (7200 feet or 1.3 miles)\_we imagined these tea trees were close enough to
        hear the gentle voice of the Sun. The Sun plays a critical role through the
        entire lifespan of puerh tea from growing the trees to drying the leaf. Puerh
        is defined by the sun drying stage. If it isn't sun dried, it isn't puerh.\_This
        puerh has been direct sun dried.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is
        our go to choice for a hiking tea. Brew up a thermos of this ahead of a hike
        and drink it when you're thirsty. It is clean, refreshing, and full of energy!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2200+\_m\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eS\\u003cmeta
        charset=\\\"utf-8\\\"\\u003epring Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        is a single origin sheng puerh tea offering that is unique and offers an incredible
        tea experience. It is are from a single garden and remains unblended and processed
        individually. \\u003c\\/span\\u003e\\u003cspan\\u003eThis tea was aged loose
        for a year before getting pressed. The extra time aging as loose material
        gives the tea a nice head start.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe
        pressed very few of these cakes and will not be able to offer samples.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:23-08:00\",\"created_at\":\"2024-04-02T17:24:26-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2021 and After\",\"2023\",\"Sheng
        \\/ Raw Puerh\",\"Single Origin\"],\"variants\":[{\"id\":48877488832828,\"title\":\"200g
        Cake\",\"option1\":\"200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2023_WhisperingSunshine_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"99.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":9229444841788,\"created_at\":\"2024-04-02T17:24:26-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":46121400893756,\"created_at\":\"2024-04-17T23:26:49-07:00\",\"position\":1,\"updated_at\":\"2024-04-17T23:26:56-07:00\",\"product_id\":9229444841788,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2023-Whispering-Sunshine.png?v=1713421616\",\"width\":2000,\"height\":2000},{\"id\":45852827451708,\"created_at\":\"2024-04-02T17:24:34-07:00\",\"position\":2,\"updated_at\":\"2024-04-17T23:26:56-07:00\",\"product_id\":9229444841788,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2023-Whispering-Sunshine-Maocha_b89ed975-980e-4469-b482-2e0e827a42fe.png?v=1713421616\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"200g
        Cake\"]}]},{\"id\":9229445693756,\"title\":\"2023 Hekai Old Tree Sheng \\/
        Raw Puerh Tea - 200g Cake\",\"handle\":\"2023-hekai-old-tree-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp data-mce-fragment=\\\"1\\\"\\u003eThis
        tea is pure king cobra old tree energy. This Hekai material continues to impress.
        Each leaf in this tea comes from the\_forest where we had a very close encounter
        with a 15ft long King Cobra.\\u003cspan data-mce-fragment=\\\"1\\\"\\u003e\_\\u003c\\/span\\u003e\\u003ca
        data-mce-fragment=\\\"1\\\" href=\\\"https:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/the-dangers-of-the-tea-industry-a-true-story-from-the-jungles-of-southwestern-china\\\"
        title=\\\"Crimson Lotus Tea - The Dangers of the Tea Industry. A true story
        from the jungles of Southwestern China.\\\" target=\\\"_blank\\\" data-mce-href=\\\"https:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/the-dangers-of-the-tea-industry-a-true-story-from-the-jungles-of-southwestern-china\\\"\\u003eYou
        can read all about that story here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eHekai is\_a hidden gem in Bulang. It gets
        overshadowed by Lao Ban Zhang and Lao Man'E. Even in Hekai this garden is
        special.\_There is an emotional vibe to the garden that makes you feel like
        you've stepped back into a prehistoric era.\_\\u003c\\/p\\u003e\\n\\u003cp
        data-mce-fragment=\\\"1\\\"\\u003eThis tea brews\_THICK!\_It is a gentler
        tea with minimal bitterness and astringency but flavor and aroma are quite
        nice. It has a great aftertaste and a very noticeable chaqi tea energy. It's
