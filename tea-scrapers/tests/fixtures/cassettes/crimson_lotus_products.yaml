        Sheng \\/ Raw Puerh Tea\",\"handle\":\"2024-honeybomb-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe've
        pressed this blend twice before and it's a huge hit. Honeybomb is a fantastic
        blend of the best that Jingmai has to offer. We've got old tree, big tree,
        young tree, and huang pian material perfectly blended to maximize the Jingmai
        honey experience.\\u003c\\/p\\u003e\\n\\u003cp\\u003eFor an affordable Jingmai
        blend this is about as good as it gets. This tea is great for a beginner intro
        to sheng puerh. It will also keep the seasoned pros happy. This tea treats
        you to a very mellow session with just enough bitterness and astringency to
        keep things interesting. It brews up with a rich golden color. Rich floral
        aromas envelop the entire session. This tea is sweet and vibrant in the mouth.
        This is easily a daily drinker sheng. Let this tea age for a couple years
        and the honey aroma will deepen.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:40-08:00\",\"created_at\":\"2024-09-13T13:09:51-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
