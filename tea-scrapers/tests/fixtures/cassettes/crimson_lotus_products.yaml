        Title\"]}]},{\"id\":10195279806780,\"title\":\"2019 \\\"Bingdao Yun\\\" Shou
        \\/ Ripe Puerh Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2019-bingdao-yun-shou-ripe-puerh-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eOoooh
        this tea! Every now and then you come across a very special tea. This shou
        is very special. This is a single origin tea from Bingdao. This tea has some
        really noticeable aged shou aromas. It tastes a lot like our \\\"Old Warrior\\\"
        tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"Yun\\\" \u97F5 in Chinese means
        \u201Ca beautiful sound, rhyming, or charming\\\". There's another definition
        that is best described as \\\"essence\\\" or \\\"gestalt\\\". In Chinese tea
        drinking circles people often discuss the \\\"yun\\\" of a mountain. If you
        truly understand the essence of a mountain. If you know the mountain \\\"yun\\\"
        you can recognize that tea anywhere regardless of the tea's flavor or aroma.
        It's a very interesting idea. The thought behind the name \\\"Bingdao Yun\\\"
        was that this tea truly carried the essence of Bingdao through the wet pile
        fermentation process.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is instantly
        memorable. It just connects with you. It oozes age and wisdom. Later steeps
        actually taste like aged sheng. There is a very pleasant mustiness that starts
        off this tea. It has your standard shou puerh earthiness but it adds a special
        minerality. You'll swear this was pressed with toasted almonds. The body is
        thick and rich. It is smooth and sweet with adequate darkness. This is a very
        pleasant tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 200g cake. It is a single origin offering that is unique and
        offers an incredible tea experience. It is are from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:00-07:00\",\"created_at\":\"2025-10-28T17:51:27-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2011 to 2020\",\"Shou
        \\/ Ripe Puerh\",\"Single Origin\"],\"variants\":[{\"id\":52356504944956,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2019_Bingdao_Yun_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"82.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":10195279806780,\"created_at\":\"2025-10-28T17:51:27-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":52393406071100,\"created_at\":\"2025-08-05T14:13:50-07:00\",\"position\":1,\"updated_at\":\"2025-08-05T14:14:12-07:00\",\"product_id\":10195279806780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/9C263BEC-14DA-4A75-8A73-9756E1D8331F.jpg?v=1754428452\",\"width\":3024,\"height\":3024},{\"id\":52393406103868,\"created_at\":\"2025-08-05T14:13:50-07:00\",\"position\":2,\"updated_at\":\"2025-08-05T14:13:52-07:00\",\"product_id\":10195279806780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/AB982E05-5219-4D30-8E32-0560C70586CA.jpg?v=1754428432\",\"width\":2891,\"height\":2891}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9964537839932,\"title\":\"Mystery Tea \\\"Loot Box\\\"
        :: Seattle Inventory\",\"handle\":\"mystery-tea-loot-box-seattle-inventory\",\"body_html\":\"\\u003ch3\\u003eWhat
        is this?\\u003c\\/h3\\u003e\\n\\u003cp\\u003eWe don't know. It's a mystery!
        That's the fun thing about it. We have gathered and collected and squirreled
        away truly obscene amounts of random tea cakes and bags of loose leaf tea.
        We'll be honest, it's gotten a bit ridiculous. These are all products we've
        purchased and then never made it into a product for one reason or another.
        These are all great teas, or maybe they're not (they are \u2764\uFE0F we're
        just kidding). Sometimes we decided to go a different way. Sometimes we couldn't
        get more of the material. Who knows anymore! It's been 12 years in the tea
        biz and our memories aren't that great these days.\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou
        will be doing us a favor! We just plain don't have the space to store a lot
        of these teas. Here's your chance to get something fun! You won't know what
        you'll get, but that's exciting right? Maybe it'll be sheng, shou, a black
        tea, or maybe some white. We are putting everything we've collected into these
        randomized loot boxes. We have 25g surprises and 50g surprises! Maybe it'll
        from Lao Ban Zhang?! Maybe it'll be something with a lot of age. There's no
        telling. If we do have the notes on what the material was we will write it
        on the package. If not, then you are on your own.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eAlso
        we like to add a little bit more than advertised. So if you get the 25g loot
        box it'll have closer to 30g. The 50g one will have closer to 60g We just
        want people to be happy. If you order more than one ( and you absolutely should!
        ) we will make every effort to make sure you don't get two duplicates. No
        promises though. It is a randomized loot box after all!\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:22:59-07:00\",\"created_at\":\"2025-03-25T11:17:41-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
