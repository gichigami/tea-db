        Cake\"]}]},{\"id\":6746327239,\"title\":\"120ml Celadon Stoneware Easy Gaiwan
        and Cup\",\"handle\":\"120ml-celadon-stoneware-easy-gaiwan-and-cup\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe ceramic process used to
        create the unique color in \\u003ca href=\\\"http:\\/\\/en.wikipedia.org\\/wiki\\/Celadon\\\"
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\"\\u003eceladon\\u003c\\/a\\u003e
        clayware has been used in China for more than a thousand years. Iron oxide
        transforms the glaze into the blue grey green color. The cracking effect (\\\"crazing\\\")
        is unique and gives each easy gaiwan personality.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEasy
        gaiwans are designed to be simpler\_to use than standard gaiwans. There is
        a built in strainer so all you have to do is pour. You don't need to worry
        about holding the gaiwan and lid at the same time. 120ml is a great size\_for
        brewing for individual use. The included\_cup can be used as a lid for holding
        the heat in while brewing and as a cup for drinking after you pour directly
        into it. You can also pour from the easy gaiwan while the lid\\/cup is in
        place into another fairness cup. You've got a lot of options.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is a compact setup\_that is suited well to office, travel, or home use.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
