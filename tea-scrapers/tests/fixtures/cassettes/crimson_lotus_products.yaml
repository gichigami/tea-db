921398\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9740859638076,\"title\":\"2024 \\\"White Christmas\\\"
        Yunnan Bai Cha \\/ White Tea\",\"handle\":\"2024-white-christmas-yunnan-bai-cha-white-tea\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eI'm dreaming of a White Christmas and you will be too
        with this tea!\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eWe are
        happy to release our second white tea and our first holiday cake. This white
        tea is fantastic. It is a blend of old tree material from Yunnan large leaf
        varietal trees. The beautiful aroma is very inviting with floral honey notes
        with a hint of stonefruit.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThe
        flavor is gentle and layers a delicate sweetness of melon and orchid. There
        is a smooth mouthfeel and a fulfilling aftertaste.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis is a fantastic tea and we are excited to see it
        become a part of your holiday traditions!\\u003c\\/p\\u003e\\n\\u003ch3\\u003eBrewing
        Instructions\\u003c\\/h3\\u003e\\n\\u003cp\\u003eWhen we're brewing this tea
        we more or less brew it that same as we do for sheng puerh. We like to brew
        it hot and strong. Most people will tell you to brew white tea at lower temps
        and you're welcome to do that. Find what works for you! This tea also works
        great brewed grandpa style.\\u003c\\/p\\u003e\\n\\u003cp\\u003eUse 5-10 grams
        of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near boiling.
        Rinse once for a few seconds. Start with quick steeps under 10s. With each
        re-steep adjust the steep time to your taste.\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:30-08:00\",\"created_at\":\"2024-10-26T02:53:12-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"White Tea\",\"tags\":[\"2021 and After\",\"2024\",\"White
