        Title\"]}]},{\"id\":9550935130428,\"title\":\"Peanut Teapet\",\"handle\":\"peanut-teapet\",\"body_html\":\"\\u003cp\\u003e\\u003cspan
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eThese
        things are hilarious and highly realistic. We've seen these at tea tables
        across Yunnan and they are always a treat. You really think they're real.
        Most tea tables in China have snacks on them already including peanuts so
        it's funny when people grab these and then realize they're clay.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eThese
        are made from natural Chinese clay and have not been glazed. They will absorb
        the tea oils from your gongfu sessions over time. The more tea you pour over
        them the more they look like a real peanut.\\u003c\\/span\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eRead
        about the history and use of teapets here:\_\\u003ca href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/15193849-tea-pets-are-the-perfect-companions-on-your-tea-journey\\\"
