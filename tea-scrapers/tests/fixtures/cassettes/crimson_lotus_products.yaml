        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eHoneybomb\_is a fantastic blend
        of the best that Jingmai has to offer. We've got old tree, big tree, young
        tree, and huang pian material\_perfectly blended to maximize the Jingmai honey
        experience.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a re-blend of our very
        popular 2020 offering.\_This tea treats you to a very mellow session with
        just enough bitterness and astringency to keep things interesting. It brews
        up with a rich golden color. Rich floral aromas envelop the entire session.
        This tea is sweet and vibrant in the mouth. This is easily a daily drinker
        sheng. Let this tea age for a couple years and the honey aroma will deepen.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
