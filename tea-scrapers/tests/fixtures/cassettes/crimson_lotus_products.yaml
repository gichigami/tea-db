        Title\"]}]},{\"id\":6982611533884,\"title\":\"2021 \\\"Crane Gang\\\" 100g
        Tuo Cha :: Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"copy-of-2021-crane-gang-100g-tuo-cha-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThere are many classic puerh
        tea recipes in Yunnan. This is our homage to the vintage blends we love. We
        call it Crane Gang. It is affordable and tasty. The smoky, floral aromas are
        like walking into a Tibetan kitchen. Fried yak cheese, boiled potato, and
        sweet hay. The first steeps start gentle but it picks up. The smokiness recedes
        into sweetness. You can drink this one all day long. Grab some yak butter
        and salt and settle into some high altitude Himalayan dreams.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        have pressed this into a traditional shape called \\\"tuo\\\". We've sold
        this shape before but this is our first pressing. This is an upside down birds
        nest shape. It has a lot of surface area in a small shape. Some producers
        prefer this shape. They believe that air gets trapped in the nest and helps
        with aging.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a 100g tuo cha.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-08-24T15:11:11-07:00\",\"created_at\":\"2022-08-03T19:58:52-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
