        Cake\",\"20g Sample\"]}]},{\"id\":6677632843836,\"title\":\"2021 \\\"Vibe\\\"
        Sheng \\/ Raw Puerh Tea\",\"handle\":\"2021-vibe-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis tea is dense. Right from
        the first wafting aromas you have thick, deep, low, heavy, sweet plum aromas.
        The wet leaf brings aged spice and Tibetan homes in winter. There is bitterness
        but it melts so fast. The flavors are rich and herbal with a subtle briny
        layer. It feels great in the body and in the throat. The energy is heady and
        relaxing; very, very relaxing. Vibe-y and chill and relaxed and balanced.
        You can get lost in this tea.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003eStasia
        Burrington has created the artwork for us. It's amazing and perfect and we
        love it. Follow here here:\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/stasiaburrington\\/\\\"
        target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/stasiaburrington\\/\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea contains a blend of old and new material.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eWe have 20g sample sessions
        available.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:56-08:00\",\"created_at\":\"2021-10-19T17:29:43-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2021\",\"2021 and
        After\",\"Sheng \\/ Raw Puerh\"],\"variants\":[{\"id\":39542207643708,\"title\":\"1x
        200g Cake\",\"option1\":\"1x 200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2021_Vibe_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"79.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":6677632843836,\"created_at\":\"2021-10-19T17:29:43-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"},{\"id\":39542207709244,\"title\":\"20g
        Sample\",\"option1\":\"20g Sample\",\"option2\":null,\"option3\":null,\"sku\":\"2021_Vibe_Sample\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"9.99\",\"grams\":30,\"compare_at_price\":null,\"position\":2,\"product_id\":6677632843836,\"created_at\":\"2021-10-19T17:29:43-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":28989563437116,\"created_at\":\"2021-10-22T14:15:16-07:00\",\"position\":1,\"updated_at\":\"2021-10-22T14:15:18-07:00\",\"product_id\":6677632843836,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2021-Vibe.png?v=1634937318\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"1x
        200g Cake\",\"20g Sample\"]}]},{\"id\":6677633663036,\"title\":\"2021 \\\"The
        Sprawl\\\" Sheng \\/ Raw Puerh Tea\",\"handle\":\"2021-the-sprawl-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cp
        style=\\\"font-family: monospace;\\\"\\u003eYou're a cyberspace console cowboy
        and The Sprawl is a long strange way home over the Pacific now. As you slot
        the bingcha\_your Hosaka tells you it's\_Kuang Grade Mark Eleven; an optimized,
        deep penetration, military icebreaker from China. It's user-friendly and even
        speaks English.\\u003c\\/p\\u003e\\n\\u003cp style=\\\"font-family: monospace;\\\"\\u003eYou\_ready\_your
        brew vessel and settle into a hover over your target. The\_icebreaker strobes
        and shifts in front of you. Translucent planes of color shuffle like a trick
        deck. The grid fills with hypnotically intricate traceries of rainbow, lattices
        as fine as snow crystal on a winter window.\_\\\"Well, you got time to kill,
        kid,\\\" the Flatline said. \\\"Ol' Kuang's slow but steady.\\\"\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"font-family: monospace;\\\"\\u003eThe density of information overwhelms
        the fabric of\_your matrix, triggering\_lucid imagery. Kaleidoscopic angles
        of sun dried leaf, clean and floral and fresh. The neon\_aroma of night pulls
        you along; a growing segment of that mass organism. A drifting chip of consciousness
        under the vibrant, young, sheng. Consensual hallucination.\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"font-family: monospace;\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThe
        leaves sprawl across the gaiwan\_like wind-blown grass, a field of jasmine
        shot through with sudden eddies of need and gratification. A sea of heavy
        perfume washes over you, recedes, and returns. Juiciness suddenly sprouting
        a humming forest of glass with a frequency whose name is rain and has the
        sound of trains.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp style=\\\"font-family:
        monospace;\\\"\\u003e\\\"Bang on. Killer virus.\\\"\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        have 20g sample sessions available.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:55-08:00\",\"created_at\":\"2021-10-19T17:32:45-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2021\",\"2021 and
        After\",\"Sheng \\/ Raw Puerh\"],\"variants\":[{\"id\":39542207873084,\"title\":\"1x
        200g Cake\",\"option1\":\"1x 200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2021_The_Sprawl_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"69.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":6677633663036,\"created_at\":\"2021-10-19T17:32:45-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"},{\"id\":39542207938620,\"title\":\"20g
