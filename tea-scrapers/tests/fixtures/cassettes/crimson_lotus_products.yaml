        Spring \\\"Danger Zone\\\" 100g Cake - Sheng \\/ Raw Puerh Tea :: Seattle
        Inventory\",\"handle\":\"2019-spring-danger-zone-100g-cake-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWelcome
        to the DANGER ZONE! After our experiences with a King Cobra in this Hekai
        garden last year this tea was a must purchase this year. We pre ordered the
        entire garden! Each leaf in this tea comes from the\_forest where we had a
        very close encounter with a 15ft long King Cobra. \\u003ca href=\\\"https:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/the-dangers-of-the-tea-industry-a-true-story-from-the-jungles-of-southwestern-china\\\"
        title=\\\"Crimson Lotus Tea - The Dangers of the Tea Industry. A true story
        from the jungles of Southwestern China.\\\" target=\\\"_blank\\\"\\u003eYou
        can read all about that story here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eHekai
        is pretty great already but this garden is truly special. There is an emotional
        vibe to the garden that makes you feel like you've stepped back into a prehistoric
        era.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe commissioned a custom piece of
        art from Jake Knapp ( \\u003ca href=\\\"https:\\/\\/www.instagram.com\\/knappuer\\/\\\"
        title=\\\"Instagram - Jake Knapp @knappuer\\\" target=\\\"_blank\\\"\\u003e@knappuer\\u003c\\/a\\u003e
        ) and we couldn't be more happy with it. His art perfectly captures the story
        and experience of this tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea brews\_THICK!\_It
        is a gentler tea with minimal bitterness and astringency but flavor and aroma
        are quite nice. It has a great aftertaste and a very noticeable chaqi tea
        energy. It's like being kissed by a cobra.\_\\u003c\\/p\\u003e\\n\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Danger
        Zone sheng puer is a high energy and thick textured sheng puer. If you love
        thick and oily young shengs, you need to get your claws on at least a sample.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2019-spring-danger-zone-sheng-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Danger Zone\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\u003cp\\u003eEach
        cake comes with a\_special Danger Zone sticker!\\u003c\\/p\\u003e\\n\\u003cp\\u003eCheck
        out this video from Hekai.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
