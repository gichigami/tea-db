        16\\\"\"]}]},{\"id\":6595801972796,\"title\":\"2009 Jingmai Sheng \\/ Raw
        Puerh Tea 357g Cake\",\"handle\":\"2009-jingmai-sheng-raw-puerh-tea-357g-cake\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis 2009 sheng puerh tea cake
        from Jingmai hits a lot of what we look for in an aged cake. It brews up with
        early strength and complexity. There\_is a rich stonefruit character layered
        with herbal notes and a long lasting sweetness. This tea has a lot of personality
        that reveals through the steeps. The liquor is a rich amber color that persists
        for many steeps. This tea is full bodied\_with minimal bitterness and enough
        astringency to balance the sweetness.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        was pressed in 2009 and stored in Puer City for 9 years. It has been stored
        in Kunming since then. Both storage setups are on the drier side. The tea
        remains floral and pleasant and isn't dank or musty. It is very similar to
        our 2005 Changtai \\\"Top of the Clouds\\\"!\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        loose compression on this tea makes it very easy to open and the leaves steep
        quickly.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe sweetness and throat feel
        of this tea is remarkable!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDry
        stored\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-07-24T02:09:35-07:00\",\"created_at\":\"2021-06-24T23:08:37-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
