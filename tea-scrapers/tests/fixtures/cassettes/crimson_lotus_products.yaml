        Girls\\\" Combo Set - Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"space-girls-combo-set-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWhen
        it comes to tea like this, why choose? Take home both Space Girls, \\\"Feist\\\"
        and \\\"Cosima\\\" for a discounted price.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        Space Girls are back! Our adventures exploring the remote corners of the puerh
        Yunniverse has introduced us to two new Space Girls; Cosima, and Feist. Each
        tea is a custom blend we crafted Spring of 2019. Cosima and Feist are unique
        and separate blends.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eCosima starts off
        on a vegetal approach with an incredibly sweet aftertaste. There is a cooling
        throat feel and a hint of caramelized sugar in the floral orchid aroma. The
        tea is thick, juicy, and lush. There is bitterness but it morphs it's way
        through your palate. It never sits in one place for long and is constantly
        changing until it becomes sweet. The astringency is balanced with the long
        sweet aftertaste. This is a very consistent tea through the steeps.\_Take
        your time with Cosima and she will reward you with a personalized tour of
        the Puerh Yunniverse. Don't judge a Space Girl by her spacesuit, Cosima is
        full of surprises!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eFeist
        has a bright aroma. This tea starts light but the thickness and density deepens.
        The bitterness and astringency are balanced and followed with a beautiful
        cane sugar sweetness. This tea is complex, smooth, and dense. There is an
        herbal\_aspect to the tea and a grassy finish. The complexity develops through
        the steeps and seemingly gets thicker. Feist is a mystery. Where will she
        take you? Her knowledge and experience\_of the Puerh Yunniverse will take
        you to places you've never known were possible.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eHow
        could we pass up the opportunity to work yet again with the\_talented Seattle
        artist\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca title=\\\"Stasia Burrington
        Art\\\" href=\\\"http:\\/\\/www.stasiaburrington.com\\/\\\" target=\\\"_blank\\\"\\u003eStasia
        Burrington\\u003c\\/a\\u003e?\_She did the artwork on the original Space Girls
        3 years ago and has done an amazing job yet again!\_Take the time to explore
        her amazing artwork:\_\\u003ca title=\\\"Stasia Burrington Art\\\" href=\\\"http:\\/\\/www.stasiaburrington.com\\/\\\"
        target=\\\"_blank\\\"\\u003ehttp:\\/\\/www.stasiaburrington.com\\/\\u003c\\/a\\u003e\_Each
        wrapper features a full page design.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        cake comes with a\_special\_Space Girls\\u003cspan\\u003e\_\\u003c\\/span\\u003esticker!\\u003c\\/p\\u003e\",\"published_at\":\"2020-11-26T18:05:23-08:00\",\"created_at\":\"2020-11-26T17:49:46-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2011 to 2020\",\"Sheng
