        Title\"]}]},{\"id\":10117805113660,\"title\":\"2020 Kunlu Shan Old Tree Aged
        Bai Cha \\/ White Tea - 357g Cake :: Seattle Inventory\",\"handle\":\"2020-kunlu-shan-old-tree-aged-bai-cha-white-tea-357g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWhat
        a find these cakes were! It's always great when we get out to Kunlu Shan.
        Imagine our surprise finding these aged white tea cakes there. These really
        won us over. This tea was made in 2020 using Kunlu old tree material. The
        cakes have been aging there ever since. This is a very lovely tea!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis tea has aged so well stored high up in the
        mountains of Kunlu Shan. It is full of aromas reminiscent of mango, rum raisin
        cake, brandy, Chinese dates, banana bread, and wild honey. The flavor is very
        smooth and this offers an emotional quality that is very relaxing. You just
        feel good after drinking this!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a pressed 357g cake.
        It is a single origin offering that is unique and offers an incredible tea
        experience. It is are from a single garden and remains unblended and processed
        individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
