        Title\"]}]},{\"id\":10118464635196,\"title\":\"2025 Spring Hua Zhu Liang Zi
        Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2025-spring-hua-zhu-liang-zi-sheng-raw-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eWe
        were honored to be able to get to Hua Zhu Liang Zi this year. We have wanted
        to check out their high altitude gardens for quite a while now. It's really
        incredible! Their gardens are pristine and you can feel the altitude. It takes
        a while to get to the village and from there you keep climbing until you get
        to the high altitude gardens. This is the highest altitude tea garden in all
        of Xishuangbanna. The trees in this cake were grown above 2000 meters. They
        have old trees and big trees growing ecologically in this garden. The big
        tree material was such a great value we had to get some.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eHua
        Zhu Liang Zi ( \u6ED1\u7AF9\u6881\u5B50 ) translates as \\\"Slippery Bamboo
        Ridge\\\". After visiting this tea mountain you will understand why. After
        climbing the steep, but well paved and cobble stoned roads we needed to switch
        to a 4WD vehicle. We packed in with the whole family and started driving higher.
        The roads after the village are all packed dirt which quickly turns to mud
        with the first rain. Higher and higher, steeper and steeper, the roads wound
        up into the clouds until we arrived at the tea garden they owned.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea has a unique foresty vibe to it. The aroma is zesty with dense floral
        aromas and citrus notes. The aftertaste is sweet with a licorice like herbal
        essence. It tastes like the forest it grows in. It has a pleasant throat cooling
        effect.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2000+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eBig
        Tree\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eS\\u003cmeta
        charset=\\\"utf-8\\\"\\u003epring Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is 200g cake of compressed sheng puerh tea.\\u003cmeta charset=\\\"utf-8\\\"\\u003e
        It is a single origin offering that is unique and offers an incredible tea
        experience. It is are from a single garden and remains unblended and processed
        individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
