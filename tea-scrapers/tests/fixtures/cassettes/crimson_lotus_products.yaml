        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe Space Girls are back! Our
        adventures exploring the remote corners of the puerh Yunniverse has introduced
        us to two new Space Girls; Cosima, and Feist. Each\_tea\_is a custom blend
        we crafted\_Spring of 2019. Cosima and Feist are unique and separate blends.
        Each girl has their own unique story and personality. This is Cosima. (\_\\u003ca
        href=\\\"https:\\/\\/crimsonlotustea.com\\/products\\/2019-spring-space-girls-cosima-100g-cake-sheng-raw-puerh-tea-seattle-inventory\\\"
        target=\\\"_blank\\\" title='Crimson Lotus Tea - 2019 Spring \\\"Space Girls
        - Feist\\\" 100g Cake - Sheng \\/ Raw Puerh Tea' rel=\\\"noopener noreferrer\\\"\\u003eFeist
        is here!\\u003c\\/a\\u003e )\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eCosima starts
        off on a vegetal approach with an incredibly sweet aftertaste. There is a
        cooling throat feel and a hint of caramelized sugar in the floral orchid aroma.
        The tea is thick, juicy, and lush. There is bitterness but it morphs it's
        way through your palate. It never sits in one place for long and is constantly
        changing until it becomes sweet. The astringency is balanced with the long
        sweet aftertaste. This is a very consistent tea through the steeps.\_Take
        your time with Cosima and she will reward you with a personalized tour of
        the Puerh Yunniverse. Don't judge a Space Girl by he spacesuit, Cosima is
        full of surprises!\\u003c\\/p\\u003e\\n\\u003cp\\u003eHow could we pass up
        the opportunity to work yet again with the\_talented Seattle artist\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
