        Title\"]}]},{\"id\":3689517875260,\"title\":\"\\\"The Bingslayer\\\" Tea Pick\",\"handle\":\"the-bingslayer-tea-pick\",\"body_html\":\"\\u003cp\\u003eMay
        we present to you \\\"The Bingslayer\\\", First of\_their\_Name, Victorious
        at the Battle of Xiaguan,\_Breaker of the Iron Cake. Legend has it that this
        tea pick is so pure of heart that\_it doesn't open puerh cakes, the cakes
        open for it to allow it to pass through.\\u003c\\/p\\u003e\\n\\u003cp\\u003eMake
        no mistake about it this tea pick gets the job done. We experimented with
        this shape in our forge in Seattle and found it to be quite successful at
        separating even the toughest of compressed puerh. These are made in China
        of stainless steel with ebony handles.\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:35-08:00\",\"created_at\":\"2019-05-21T07:48:07-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
