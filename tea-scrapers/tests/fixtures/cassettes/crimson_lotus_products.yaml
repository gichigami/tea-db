        Hong \\/ Black Tea\",\"Single Origin\"],\"variants\":[{\"id\":52369797775676,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2025_Pasha_Shan_Black_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"42.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":10202087194940,\"created_at\":\"2025-10-30T22:33:29-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":52432545841468,\"created_at\":\"2025-08-08T20:13:01-07:00\",\"position\":1,\"updated_at\":\"2025-08-08T20:13:03-07:00\",\"product_id\":10202087194940,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Pasha-Black-4-IG.png?v=1754709183\",\"width\":2048,\"height\":2048},{\"id\":52432565272892,\"created_at\":\"2025-08-08T20:19:20-07:00\",\"position\":2,\"updated_at\":\"2025-08-08T20:19:22-07:00\",\"product_id\":10202087194940,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/4F745A99-320B-42CE-B2F5-507C6FA015F5.jpg?v=1754709562\",\"width\":3024,\"height\":3024},{\"id\":52432565240124,\"created_at\":\"2025-08-08T20:19:20-07:00\",\"position\":3,\"updated_at\":\"2025-08-08T20:19:22-07:00\",\"product_id\":10202087194940,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/D92E2DD4-A485-40BB-8742-354BF3F5025D.jpg?v=1754709562\",\"width\":3024,\"height\":3024},{\"id\":52432565207356,\"created_at\":\"2025-08-08T20:19:20-07:00\",\"position\":4,\"updated_at\":\"2025-08-08T20:19:23-07:00\",\"product_id\":10202087194940,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/ED071049-4BCA-4B19-A020-59E34F8A2C73.jpg?v=1754709563\",\"width\":3024,\"height\":3024},{\"id\":52432565174588,\"created_at\":\"2025-08-08T20:19:20-07:00\",\"position\":5,\"updated_at\":\"2025-08-08T20:19:22-07:00\",\"product_id\":10202087194940,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/80603B35-BA0F-4689-8E51-D5B98F566C36.jpg?v=1754709562\",\"width\":3024,\"height\":3024},{\"id\":52432565141820,\"created_at\":\"2025-08-08T20:19:20-07:00\",\"position\":6,\"updated_at\":\"2025-08-08T20:19:22-07:00\",\"product_id\":10202087194940,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/C9433956-5050-4136-9BDB-DDB4A37745C1.jpg?v=1754709562\",\"width\":2788,\"height\":2788}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":10202080674108,\"title\":\"2025 Jingmai Gushu \\\"White
        Tiger\\\" Yunnan Bai Cha \\/ White Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2025-jingmai-gushu-white-tiger-yunnan-bai-cha-white-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThe
        high altitude tea gardens in Jingmai are lush and forested in the sprawling
        jungle that borders Burma. Historically wild tigers roamed free. In the pre-dawn
        morning the clouds have settled low in the valleys and Jingmai sits above
        the clouds. As the sun rises the clouds rise with the morning. The entire
        mountain is misted in the clouds. This \\\"White TIger\\\" cake is the essence
        of that beautiful start to the day.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        old tree material used in this white tea cake carries the very essence of
        the sheng puerh tea that it is traditionally made into. This tea is floral
        and bright. It fresh and young with a hint of grassiness. There is a warm
        and floral pollen aroma. The classic Jingmai honey aroma is here of course.
        The flavor is creamy, light, and smooth. There is a dense orchid perfume coming
        from the warm gaiwan.\\u003c\\/p\\u003e\\n\\u003cp\\u003eDrinking this tea
        is like walking in a garden of flowers. The sweet aftertaste spreads from
        your mouth like flowers in the air. The flavor and aroma lasts long. It is
        gentle and sweet and moves with the grace of a tiger through a cloudy morning
        jungle.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a 200g cake of compressed
        tea.\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003e It is a single
        origin offering that is unique and offers an incredible tea experience. It
        is are from a single garden and remains unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003ch3\\u003eBrewing
        Instructions\\u003c\\/h3\\u003e\\n\\u003cp\\u003eWhen we're brewing this tea
        we more or less brew it that same as we do for sheng puerh. We like to brew
        it hot and strong. Most people will tell you to brew white tea at lower temps
        and you're welcome to do that. Find what works for you! This tea also works
        great brewed grandpa style.\\u003c\\/p\\u003e\\n\\u003cp\\u003eUse 5-10 grams
        of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near boiling.
        Rinse once for a few seconds. Start with quick steeps under 10s. With each
        re-steep adjust the steep time to your taste.\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:02-07:00\",\"created_at\":\"2025-10-30T22:29:51-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2021 and After\",\"2025\",\"Single
        Origin\",\"White Tea\"],\"variants\":[{\"id\":52369788109116,\"title\":\"1x
        200g Cake\",\"option1\":\"1x 200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2025_White_Tiger_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"37.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":10202080674108,\"created_at\":\"2025-10-30T22:29:51-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":52415335465276,\"created_at\":\"2025-08-07T10:32:05-07:00\",\"position\":1,\"updated_at\":\"2025-08-07T10:32:07-07:00\",\"product_id\":10202080674108,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/White-Tiger-4-IG.png?v=1754587927\",\"width\":2048,\"height\":2048},{\"id\":52432600138044,\"created_at\":\"2025-08-08T20:26:08-07:00\",\"position\":2,\"updated_at\":\"2025-08-08T20:26:10-07:00\",\"product_id\":10202080674108,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/6A4C322E-FC34-41D5-83B7-E47F716961D4.jpg?v=1754709970\",\"width\":2835,\"height\":2835},{\"id\":52432600105276,\"created_at\":\"2025-08-08T20:26:08-07:00\",\"position\":3,\"updated_at\":\"2025-08-08T20:26:10-07:00\",\"product_id\":10202080674108,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/8DD7F953-8E63-4EB0-A5AF-12580134B6E7.jpg?v=1754709970\",\"width\":3024,\"height\":3024},{\"id\":52432600072508,\"created_at\":\"2025-08-08T20:26:08-07:00\",\"position\":4,\"updated_at\":\"2025-08-08T20:26:10-07:00\",\"product_id\":10202080674108,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/A1DA1F05-97C5-4D52-B01D-2AB1E46C7F13.jpg?v=1754709970\",\"width\":3024,\"height\":3024},{\"id\":52432600039740,\"created_at\":\"2025-08-08T20:26:08-07:00\",\"position\":5,\"updated_at\":\"2025-08-08T20:26:10-07:00\",\"product_id\":10202080674108,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/BADDC1F4-CBE9-44A6-A37B-386DBF7C8A7A.jpg?v=1754709970\",\"width\":2650,\"height\":2650}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"1x
        200g Cake\"]}]},{\"id\":10202071269692,\"title\":\"Lao Man'E \\\"BS\\\" Bitter\\/Sweet
        Sheng \\/ Raw Puerh Tea Dragon Balls :: Seattle Inventory\",\"handle\":\"lao-mane-bs-bitter-sweet-sheng-raw-puerh-tea-dragon-balls-copy\",\"body_html\":\"\\u003cp\\u003eWe
        talk about Lao Man'E a lot. The teas available in the hills surrounding Lao
        Man'E village are in a class of their own. It's a bitter class, but what is
        a good sheng puerh tea without some bitterness. There are two major varietals
        in Lao Man'E. One is noticeably more bitter than the other. They are called
        Bitter and Sweet. You can for sure tell the difference.\\u003c\\/p\\u003e\\n\\u003cp\\u003eIn
        2019 we bought some ridiculously high end material from Lao Man'E and created
        a very pricy bitter \\/ sweet tasting set. We didn't press all of it and were
        saving it for a fun future project. This is what we came up with. We pressed
        all the bitter material into 5g dragon balls. We also pressed all the sweet
        material into 5g dragon balls. You will get 5 of each. Which is which? We
        don't know anymore. You'll have to taste them to find out.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        packet has 10x 5g dragon balls. That's 50g of very high end Lao Man'E material.
        These are really good teas. Five of the dragon balls will be the bitter varietal
        and the other five will be the sweet varietal.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003ePut
        your tastebuds to the Lao Man'E BS challenge. See if you can tell which are
        bitter and which are sweet. These are really potent teas and 1 5g ball is
        enough for a gongfu session where you would normally use 10g. Or just go full
        BS and steep with 2 balls.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThese steep super easy! Drop
        one ball into your brew vessel of choice 75-100ml or so. Add boiling water
        slowly. Let it steep for 30s and watch the ball open up. Discard this initial
        rinse. Wait 5 minutes with the lid on and the tea ball will be open and ready
        to brew. Start with quick steeps under 10s. With each re-steep adjust the
        steep time to your taste.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:01-07:00\",\"created_at\":\"2025-10-30T22:24:58-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2011 to 2020\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":52369773035836,\"title\":\"Double the
        BS - 2x 10 packs of tea balls (100g)\",\"option1\":\"Double the BS - 2x 10
