        Spring Hekai Old Tree 200g Cake - Sheng \\/ Raw Puerh Tea\",\"handle\":\"2022-spring-hekai-old-tree-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis tea is pure king cobra
        old tree energy. This Hekai material continues to impress. Each leaf in this
        tea comes from the\_forest where we had a very close encounter with a 15ft
        long King Cobra. \\u003ca title=\\\"Crimson Lotus Tea - The Dangers of the
        Tea Industry. A true story from the jungles of Southwestern China.\\\" href=\\\"https:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/the-dangers-of-the-tea-industry-a-true-story-from-the-jungles-of-southwestern-china\\\"
        target=\\\"_blank\\\"\\u003eYou can read all about that story here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eHekai
        is\_a hidden gem in Bulang. It gets overshadowed by Lao Ban Zhang and Lao
        Man'E. Even in Hekai this garden is special.\_There is an emotional vibe to
        the garden that makes you feel like you've stepped back into a prehistoric
        era.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea brews\_THICK!\_It is a
        gentler tea with minimal bitterness and astringency but flavor and aroma are
        quite nice. It has a great aftertaste and a very noticeable chaqi tea energy.
        It's like being kissed by a cobra.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis is a 200g cake of compressed tea.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
