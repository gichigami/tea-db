        Huang Pian Shou Puerh Tea (250 grams) :: Seattle Inventory\",\"handle\":\"2014-yiwu-iron-forge-huang-pian-shou-puerh-tea-250-grams-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eForged
        deep in the forested mountains of Yiwu this tea brews mellow and smooth. With
        a potent warming energy that lights a fire in your belly this tea is perfect
        for cold, dark, winter mornings.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea
        is made from huang pian leaves.\_\\u003ca href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/15296929-what-is-huang-pian\\\"
        target=\\\"_blank\\\" title=\\\"What is Huang Pian?\\\" rel=\\\"noopener noreferrer\\\"\\u003eYou
        can read about huang pian in our blog here.\\u003c\\/a\\u003e\_It will brew
        mellow, sweet, and smooth with deep mineral notes and a\_petrichor aroma.\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cdiv\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
