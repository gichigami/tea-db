        Title\"]}]},{\"id\":9002705551676,\"title\":\"\\\"Space Girls\\\" a 2023 Sheng
        Puerh Tea Blend :: Seattle Inventory\",\"handle\":\"space-girls-a-2023-sheng-puerh-tea-blend-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThese
        four Space Girls have\_reunited for another delicious adventure. Back from
        their explorations into the far reaches\_of the\_puerh Yunniverse they have
        returned to tell their tales. They have\_known and seen places that few would
        believe.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is the same artwork we used
        on our original release of Space Girls in 2016.\_Each\_was\_painted with watercolor
        by Seattle artist Stasia Burrington. The artwork on these cakes comes from
        her 2014 \\\"Cosmonauts\\\" watercolor series. Take the time to explore her
        amazing artwork:\_\\u003ca title=\\\"Stasia Burrington Art\\\" href=\\\"http:\\/\\/www.stasiaburrington.com\\/\\\"
        target=\\\"_blank\\\"\\u003ehttp:\\/\\/www.stasiaburrington.com\\/\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea is a\_single mountain sheng puerh tea blend exclusively from Nannuo Shan.
        It brews fresh and floral with a sweet grassiness. It is\_juicy and strong
        with a rich color, minimal but present bitterness, and a clear Nannuo \\\"yun\\\".
        It is potent but perfectly palatable. It has a medium thickness with a growing
        throat sweetness.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach order comes with
        4x 50g cakes in a hand wrapped bamboo tong. Each cake is wrapped with a different
        Space Girl design.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        are excited for people to get their own bamboo wrapped tong. Receiving and
        opening a tong is exciting. Most people don't get the chance to experience
        opening their own tong. We don't offer samples of this tea because we want
        everyone to get their own tong to open.\\u003c\\/p\\u003e\\n\\u003ch2\\u003eBrewing
        Directions\\u003c\\/h2\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\",\"published_at\":\"2023-12-13T13:59:24-08:00\",\"created_at\":\"2023-12-13T13:33:52-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
