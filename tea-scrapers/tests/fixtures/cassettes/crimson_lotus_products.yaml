        100g Cakes\"]}]},{\"id\":1223295873,\"title\":\"\\\"What is Puerh?\\\" Level
        One - Educational Tea Tasting Set\",\"handle\":\"what-is-puerh-three-tea-educational-tasting-set\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003ePuerh tea cannot be defined
        simply. It is not one flavor or one aroma. It is not one experience. Puerh
        tea is a multitude of experiences that are nearly as diverse as all the other
        teas combined.\_There are many variables that each add an order of magnitude
        to the complexity\_of puerh.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003eRegion
        \\/ Terroir\\u003c\\/li\\u003e\\n\\u003cli\\u003eTea Tree Varietal\\u003c\\/li\\u003e\\n\\u003cli\\u003eTea
        Tree Age\\u003c\\/li\\u003e\\n\\u003cli\\u003eProcessing Skill\\u003c\\/li\\u003e\\n\\u003cli\\u003eType
        of Puerh: Sheng \\/ Raw or Shou \\/ Ripe\\u003c\\/li\\u003e\\n\\u003cli\\u003eStorage
        Type: Humid or Dry\\u003c\\/li\\u003e\\n\\u003cli\\u003eLength of Storage\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003eWith
        this educational tasting set we wanted to give a good picture of the range
        of flavor and aroma possible in puerh tea. Puerh has\_two main categories.
        There is the traditional puerh called Sheng or Raw puerh; this is largely
        unchanged for 1,500 years. Then you have Shou or Ripe\\/Cooked puerh; this
        was created with methods discovered in the 1970's. Traditionally sheng puerh
        was allowed to age over the decades to become aged puerh. Shou puerh was created
        during the attempt to mimic what aged sheng puerh tasted like.\_Shou puerh
        starts as sheng puerh but is then allowed to undergo enhanced aging in a tightly
        controlled hot and humid environment. The original idea was to create aged
        sheng puerh without waiting decades, but what ultimately resulted is a new
        category of puerh.\\u003c\\/p\\u003e\\n\\u003cp\\u003eYoung sheng puerh, aged
        sheng puerh, and shou puerh makes up the triangle of modern day puerh. Young
        sheng puerh is often floral, fruity, bitter, and astringent with grassy notes
        of hay. It will brew light and clear and is biologically very similar to green
        tea. Over the years young sheng puerh will change. There is an active bacteriological
        fungal fermentation happening inside the leaf. Each year it changes in flavor
        and aroma.\\u003c\\/p\\u003e\\n\\u003cp\\u003eAged sheng puerh is thoroughly
        unique in the tea world. It is deep and memorable with a musty smoothness
        and earthiness reminiscent of walking through an old cathedral or opening
        an ancient book. It will brew thick and dark.\\u003c\\/p\\u003e\\n\\u003cp\\u003eShou
        puerh\_is very difficult to make. It takes multiple tons of sheng puerh leaf
        material and several months to do right. Without constant attention from experts
        it can create stinking garbage that smells of rotting fish or a muddy stagnant
        pond. Well crafted shou puerh however is a true delight. It will be earthy
        with strong mineral notes. It can smell like the forest after a rain. It will
        often have notes of mushroom or chocolate. It is delicious. Because shou puerh
        has undergone an artifically enhanced aging process there is less effect of
        aging it over time. It is intended to be drunk now.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        offer this discounted educational tasting set as a way to explore the three
        pillars of puerh in an affordable way. There is a total of 70grams of high
        quality puerh in these three samples.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e20g
        aged sheng puerh: \\u003ca href=\\\"https:\\/\\/crimsonlotustea.com\\/products\\/2007-changtai-menghai-sheng-raw-tuo-cha-100g\\\"
        title=\\\"Crimson Lotus Tea : 2007 Changtai Menghai Sheng \\/ Raw Tuo Cha
        (100g)\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003e2007
        Changtai \\\"Menghai\\\" Tuo Cha\\u003c\\/a\\u003e\\n\\u003c\\/li\\u003e\\n\\u003cli\\u003e20g
        young sheng puerh: \\u003ca href=\\\"https:\\/\\/crimsonlotustea.com\\/collections\\/sheng-raw-puerh\\/products\\/2022-honeybomb-sheng-raw-puerh-tea\\\"
        title='Crimson Lotus Tea - 2022 \\\"Honeybomb\\\" Sheng \\/ Raw Puerh Tea'
        rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003e2022 \\\"Honeybomb\\\"\\u003c\\/a\\u003e\\n\\u003c\\/li\\u003e\\n\\u003cli\\u003e20g
        shou puerh:\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca href=\\\"https:\\/\\/crimsonlotustea.com\\/products\\/2014-yiwu-iron-forge-huang-pian-shou-puerh-tea\\\"
        title='Crimson Lotus Tea - 2014 Yiwu \\\"Iron Forge\\\" Huang Pian Shou Puerh
        Tea (250 grams) :: FREE SHIPPING' rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003e2014\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\\"Iron
        Forge\\\"\\u003c\\/a\\u003e\\n\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003eEach
        sample comes with enough puerh to experiment a couple of times. Each session
        these teas can be steeped\_10+ times easily. We recommend brewing gongfu style
        in a gaiwan for the best experience.\\u003cbr\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:18:11-08:00\",\"created_at\":\"2015-06-16T12:08:26-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
