        Title\"]}]},{\"id\":9550836400444,\"title\":\"Huaning \\\"We Come in Peace\\\"
        Teacup - 80ml\",\"handle\":\"huaning-we-come-in-peace-teacup-80ml\",\"body_html\":\"\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThese are really beautiful cups. Just look at
        them. The gorgeous patterns make our imaginations run wild. Maybe we were
        a little tea drunk when we named them but they look like an alien invasion.
        Some sort of a deep space sentient race of tea beings coming down to Earth
        in peace with cool tea cups. Resistance is futile.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThese cups are incredibly difficult
        to photograph. They are so shiny and reflective and we tried so hard to capture
        them perfectly. We boosted the colors and contrast to really show off what
        these cups are capable of in the right light. These cups will not disappoint!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eHuaning
        ( \\u003c\\/span\\u003e\u534E\u5B81 ) is a town in Yunnan province with a
        long history of ceramics. The locals harvest clay from the nearby\_hills.
        They source available\_minerals and hand blend their own glazes. Intense blues
        and greens are a common theme. These provide a beautiful contrast to both
        their white clay and the deep red of their iron rich clay.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe
        appreciate the connection this teaware has with Yunnan and puerh tea. Puerh
        is a product of the soil and hands of Yunnan, and so is this teaware.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        tea cups hold 80ml and measure 7.5cm Wide x 6cm Tall. These are a handmade
        product and each will vary slightly. The one you receive might differ from
        the ones pictured. These cups are sold individually. \\u003c\\/span\\u003e\\u003cspan\\u003eIf
        you want more you need to\_\\u003c\\/span\\u003e\\u003cspan\\u003epurchase
        more than one. If you fill the cups to the brim they will get hot to the touch.
        We usually fill them half way.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003ciframe
