        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis is our
        third trip Beneath the Emerald Sea! Traveling through Southern Yunnan each\_Spring
        is a beautiful part of what we do.\_South of the Tropic of Cancer the rich
        green forested hills of Yunnan look like a rolling emerald sea during. Drinking
        this tea is like swimming in that ocean of flavor and aroma.\_We love it!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        year we worked with Sara Breakfield ( @twigandsnip ) and commissioned a custom
        piece of art for this tea. This tea is a favorite of hers and she was excited
        to get to create the wrapper for it. We feel this wrapper adds a fun Pacific
        Northwest chapter to this tea. Follow her here:\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/twigandsnip\\/\\\"
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\"\\u003ehttps:\\/\\/www.instagram.com\\/twigandsnip\\/\\u003c\\/a\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        tea never disappoints.\_It is vibrant with youthful energy and brews thick
        and juicy. It's both floral and fruity with an occasional note similar to
        unsweetened baking chocolate. There is bitterness but it balances with sweetness.
        This tea has stamina and can brew for a long time.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eOur
        2016 blend has aged quite well and we are sure this year will as well.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1900+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Blended\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSpring
        material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
