        #2 - 55ml\",\"handle\":\"huaning-deep-space-teacup-2-55ml\",\"body_html\":\"\\u003cp\\u003e\\u003cspan\\u003eThese
        are intense! There is an incredible depth of color in this glaze. It's like
        peering into deep space through a powerful telescope. The color in these tends
