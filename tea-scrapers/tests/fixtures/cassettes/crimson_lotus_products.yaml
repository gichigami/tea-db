        Title\"]}]},{\"id\":9975361569084,\"title\":\"2023 Kunlu \\\"Slumbering Dragon\\\"
        Sheng \\/ Raw Puerh Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2023-kunlu-slumbering-dragon-sheng-raw-puerh-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan style=\\\"text-decoration: underline;\\\"\\u003e\\u003c\\/span\\u003eWe
        are always happy to be able to offer this unique tea from the deep depths
        of the mountainous forests of Kunlu Shan. Year after year this is one of the
        most interesting and singularly unique puerh teas that we source. This is
        a rare puerh. Of all the tea we sell\_this is the hardest to source and the
        hardest to pick. There is a village in Kunlu Shan that isn't even on Google
        maps. Once you're there you need to hike another 3 kilometers into the mountains
        to get to these trees. The hike is often steep. You gain\_500 meters and it
        takes more than 3 hours to get there. No one there knows how long the trees
        have been there or anything about their history. When you ask locals\_the
        age they simply reply that\_they are as old as the earth itself. Check out
        the video below.\\u003c\\/p\\u003e\\n\\u003cp\\u003eOn the north slope\_of
        a steep mountain ridge, surrounded by dense forest, these trees reach to the
        sky. The trees at 20-40 feet tall literally scrape the ceiling of the forest.
        Impressive does not begin to describe these ancient beings. The Chinese call
        these trees '\u9AD8\u6746' \\/ g\u0101o g\u0101n which means \\\"Tall Pole\\\".\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"text-align: center;\\\"\\u003e\\u003cimg style=\\\"float: none;\\\"
        src=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2015-Spring-KSSD-Wide-Forest-800x_grande.jpg?10927791457707797572\\\"
        alt=\\\"\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese skinny trees
        often grow\_in a trio and remain branchless until near the top. Barefoot,
        only the young and the brave, carefully climb to the top to pick the Spring
        harvest. There are no ropes, harnesses, or soft landings. It is dangerous
        work. In an attempt to conserve their strength for the ages these trees each
        produce precious few buds and new spring growth. A day's harvest for a young
        eager picker often maxes out around just 2kg of fresh leaf. After roasting
        and sun drying perhaps half a kilo is all they have to show for the days work.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThere is not that much material available each year
        from these trees. We get as much as we can. This is a very unique puerh.\_The
        flavor is strong, pure, natural, and\_noticeably bitter, but with a\_transcendent\_chaqi.
        There is an aroma in the dry leaves that is reminiscent of wild blueberries.
        Wet aroma is honeysuckle and alfalfa. This is a tea that is hard to define.
        The aromas are both familiar and mysterious. Everything about this tea is
        distinct and individual. The profile is at times sharp and distinct. The energy
        is mentally energizing. It creates a calm, but it is a waking calm.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThe bitterness in this tea isn't off putting. It moves
        from the mouth to the tongue to the back of the throat and lingers beside
        the aftertaste.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eWe named
        this puerh \\\"Slumbering Dragon\\\" because of the visual image of these
        ancient trees growing so peacefully in the mountains. They seem to us like
        dragons of a previous era\_in a deep slumber for eons. The strong energy in
        this tea mirrors the strength of dragons in our active imaginations.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eWe present this tea as is. This is pure single origin,
        high altitude, wild tree puerh. It will not taste\_like a lot of the puerh
        out there. Even in Kunlu Shan this tea is unique. It is strong and intense
        with a very\_unique bitterness that can linger. The intensity of bitterness
        will fade with age. The material we offered in 2014 has mellowed quite nicely.
        The energy in this tea is quite strong, it will sneak up on you. We hope you
        get a chance to try this amazing and unique tea.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        \\u003cmeta charset=\\\"utf-8\\\"\\u003ePu'er \\/ Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2000+m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSpring
        Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        is a single origin sheng puerh tea offering that is unique and offers an incredible
        tea experience. It is are from a single garden and remains unblended and processed
        individually. \\u003c\\/span\\u003e\\u003cspan\\u003eThis tea was aged loose
        for a year before getting pressed. The extra time aging as loose material
        gives the tea a nice head start.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe
        pressed very few of these cakes and will not be able to offer samples.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"text-align: center;\\\"\\u003e\\u003cimg style=\\\"float: none;\\\"
        src=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2015-Spring-KSSD-Tall-Forest-800x_1024x1024.jpg?10531037292695988676\\\"
        alt=\\\"\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\nWatch
        video from Kunlu Shan here: \\u003ciframe src=\\\"https:\\/\\/www.youtube.com\\/embed\\/L5mJ3L3ieqw\\\"
        height=\\\"315\\\" width=\\\"560\\\" allowfullscreen=\\\"\\\" allow=\\\"autoplay;
        encrypted-media\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e \\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\",\"published_at\":\"2025-04-03T17:38:09-07:00\",\"created_at\":\"2025-04-03T17:36:47-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2021 and After\",\"2023\",\"Single
        Origin\"],\"variants\":[{\"id\":51561319563580,\"title\":\"200g Cake\",\"option1\":\"200g
        Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2023_KunluWild_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"122.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":9975361569084,\"created_at\":\"2025-04-03T17:36:47-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":46102866657596,\"created_at\":\"2024-04-16T23:55:15-07:00\",\"position\":1,\"updated_at\":\"2024-04-16T23:55:21-07:00\",\"product_id\":9975361569084,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2023-Slumbering-Dragon-1.png?v=1713336921\",\"width\":2000,\"height\":2000},{\"id\":45852860055868,\"created_at\":\"2024-04-02T17:31:00-07:00\",\"position\":2,\"updated_at\":\"2024-04-16T23:55:21-07:00\",\"product_id\":9975361569084,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2023-Kunlu-Wild_6e2bee70-38d8-472e-a074-5461aa183628.png?v=1713336921\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"200g
        Cake\"]}]},{\"id\":9611003068732,\"title\":\"2014 \\\"Gamechanger\\\" Shou
        \\/ Ripe Puerh Tea :: Seattle Inventory\",\"handle\":\"2014-gamechanger-shou-ripe-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThis
        is a really interesting shou! It is a blend of Lincang, Simao, and Xishuangbanna
        gardens. There are BIG leaves in this cake. It has a medicinal aroma with
        hints of warm baked bread. As the fairness cup cools it leads into a sweet,
        creamy, and floral aroma. Smelling the wet leaves is like being in the kitchen
        rolling fresh dough.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis has a lighter
        wodui ( wet pile fermentation ). It has some aged sheng personality.It is
        very interesting and it is very body warming. The liquor is clean with a dark
        amber color. It is very easy drinking with a creamy and slick body and a slightly
        herbal aftertaste.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eI wouldn't call this
        a strong tea but it has a lot going on and is very interesting!\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 357g cake. The material
        is from 2012, the wodui was done in 2013, and it was pressed in 2014.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cem\\u003eThe
        design on this cake was created by us using a combination of AI and human
        artist created elements. The final design was a creation and composition of
        our own making. We intended this cake a conversation starter for the role
        of AI generated art being used in commercial products.\\u003c\\/em\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Rinse once for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-04-03T17:36:18-07:00\",\"created_at\":\"2024-07-17T23:54:00-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2011 to 2020\",\"Shou
        \\/ Ripe Puerh\"],\"variants\":[{\"id\":49831599538492,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2012_Gamechanger_357_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"54.99\",\"grams\":375,\"compare_at_price\":null,\"position\":1,\"product_id\":9611003068732,\"created_at\":\"2024-07-17T23:54:00-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":46563872407868,\"created_at\":\"2024-05-19T10:14:51-07:00\",\"position\":1,\"updated_at\":\"2024-05-19T10:14:53-07:00\",\"product_id\":9611003068732,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2024-Gamechanger.png?v=1716138893\",\"width\":2000,\"height\":2000},{\"id\":46778493501756,\"created_at\":\"2024-06-02T23:01:32-07:00\",\"position\":2,\"updated_at\":\"2024-06-02T23:01:34-07:00\",\"product_id\":9611003068732,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/AF5D7DA3-A4F1-496B-BDF0-01F15CDC6D6D.jpg?v=1717394494\",\"width\":986,\"height\":986}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9911980327228,\"title\":\"2024 \\\"Game Night\\\" 3 Tea
        Adventure Set :: Seattle Inventory\",\"handle\":\"2024-game-night-3-tea-adventure-set-seattle-inventory\",\"body_html\":\"\\u003ch3\\u003e\\u003cstrong\\u003eThree
        Teas. Three Quests. One incredible adventure!\\u003c\\/strong\\u003e\\u003c\\/h3\\u003e\\n\\u003cp\\u003eThis
        is the adventure you've been waiting for. You have been chosen. You are needed.
        \\u003cmeta charset=\\\"utf-8\\\"\\u003eAll your training has led to this.
        Deep in the dense forests of Jinggushan the Dabaicha grows. This unique tea
        tree varietal produces a beautiful and enticing leaf.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        have taken the material from a single varietal, grown on a single farm, picked
        at the same time (Spring 2024), and processed by the same family into three
        unique teas; sheng puerh tea, black tea, and white tea. This tasting set holds
        a specialized educational value.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        tea is presented with a unique story and quest. The wrapper for each 100g
        cake unfolds to reveal the quest details. Our hope is that these teas create
        an adventure in each tasting. Form a party with other friendly adventurers
        and taste these teas together. Or go it alone! If you dare...\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese
        quests are not for the faint of heart and will require bravery, cunning, skill,
        and a bit of luck. Pack your favorite gongfu tea brewing tools and join these
        adventurers on three quests of great significance.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003ch3\\u003e\\u003cstrong\\u003eThe
