        200g Cake\"]}]},{\"id\":814031011900,\"title\":\"2017 \\\"Moon Princess\\\"
        Sheng \\/ Raw Puerh from Crimson Lotus Tea\",\"handle\":\"2017-moon-princess-sheng-raw-puerh-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe legend of the Moon Princess
        is a famous one in Chinese history. Her name is \\u003ca href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Chang%27e\\\"
        target=\\\"_blank\\\" title=\\\"Wikipedia - Moon Princess - Chang'e\\\" rel=\\\"noopener
        noreferrer\\\"\\u003eChang'e\\u003c\\/a\\u003e and she lives on the moon with
        a giant rabbit. She is immortal, but is banished to the moon and cannot leave.
        She plays an important role in the Autumn harvest and festivals.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        continue to be impressed with this tea. We pressed the 2016 material last
        year and this year's material is just as good! This material is a delicious
        example of Autumn material. Autumn material often lacks the strength that
        similar Spring material will have. The material comes from Bangdong. Bangdong
        is so close and so similar to Xigui that most people would sell this material
        as Xigui 'area'.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe aroma is vegetal
        with hints of sweet corn. The body is thick and immediate. The flavor is orchid
        sweetness with a slight bitterness and some astringency. There is a sweet
        aftertaste that lingers. The tea can brew quite strong if you let it.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1600m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse 5-10 grams
        of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near boiling.
        Rinse once\_for a few seconds. Start with quick steeps under 10s. With each
        re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:40-08:00\",\"created_at\":\"2018-10-26T23:46:07-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
