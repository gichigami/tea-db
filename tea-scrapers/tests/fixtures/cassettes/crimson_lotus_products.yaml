        Title\"]}]},{\"id\":8834633433404,\"title\":\"2023 \\\"Ten Tuo\\\" 10th Anniversary
        Tuo Cha :: Sheng \\/ Raw Puerh Tea\",\"handle\":\"2023-ten-tuo-10th-anniversary-tuo-cha-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis is a special pressing for
        our 10th anniversary. This\_blend is the culmination of 10 years of puerh
        tea blending experience. We like to think we made a very special one. This
        is a multi year, multi region blend. This tea has aromas ranging from sweet
        orchids to baked apple pie to cotton candy to a fresh pine forest.\_There
        is a delightful peachiness with plenty of sweet aftertaste and a heady energy.
        This is a fun and playful tea with good body and a juicy astringency.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        material is 100 grams\_pressed into a traditional shape called \\\"tuo\\\".\_
        This is an upside down birds nest shape. It has a lot of surface area in a
        small shape. Some producers prefer this shape. They believe that air gets
        trapped in the nest and helps with aging.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThere are no samples available
        for this tea.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:30-08:00\",\"created_at\":\"2023-10-07T00:40:57-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
