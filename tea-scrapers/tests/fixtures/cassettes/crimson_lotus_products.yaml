        Title\"]}]},{\"id\":9837111705916,\"title\":\"2024 \\\"Pure Nannuo\\\" Sheng
        \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2024-pure-nannuo-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWe
        are super proud of this tea! You are going to love it. It turned out so good.
        We spent time in Nannuo Shan this year and worked on this blend. It's a fantastic
        mix of old tree and big tee material. This year the environmental conditions
        were just right and this tea really blossomed.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere
        is a sweet floral aroma that is fresh and green. This is the very definition
        of easy drinking. It swallows so smooth and easy. It has the trademark Nannuo
        Shan potency but it is very well balanced. The mouthfeel is fun. That's the
        best way to describe it. It is an absolute joy to drink!\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou
        won't be disappointed. You can grab a sample first if you want but this cake
        is worth it. \U0001F605\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1400+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2024-12-19T02:04:13-08:00\",\"created_at\":\"2024-12-19T00:39:00-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
