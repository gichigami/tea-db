        200g Cake\",\"20g Sample\"]}]},{\"id\":3664080732220,\"title\":\"Brown Jianshui
        Zitao Teapot - Tall Shi Piao Style ~90ml\",\"handle\":\"brown-jianshui-zitao-teapot-tall-shi-piao-style\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan style=\\\"text-decoration: underline;\\\"\\u003e\\u003cem\\u003e\\u003cstrong\\u003e\\u003c\\/strong\\u003e\\u003c\\/em\\u003e\\u003c\\/span\\u003eThis
        is a true tea lovers\_teapot. We worked hard this last year with a pottery
        studio in Jianshui to improve the efficiency of their techniques to allow
        us to sell quality Jianshui at an affordable price. This teapot is a result
        of that collaboration.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eJianshui
        teapots are amazing to brew with.\_We believe the quality of the clay speaks
        for itself. Our hope is that as many people as possible have the opportunity
        to purchase these teapots and brew their tea with them. These are simple,
        efficient teapots made to be tea brewing workhorses.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThese are each handmade by a group of artists\_who
        work\_together.\_They are single fired and unglazed. This is a true clay which\_lacks
        any sand. The natural minerals in the clay will enhance the flavor of your
        tea. Jianshui is in Yunnan, and the clay used in these teapots comes from
        the same mountains that grow puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" target=\\\"_blank\\\"\\u003eWe
        blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince
        these are\_handmade products each are unique.\_There are slight variations
        to each. They're not perfect pots but will be perfect for your tea. The lids
        fit and they seal well. They pour fast and easy. They are ready to go!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThe volume is an approximation. The volume of the teapot
        you receive may be 10% more or less. It will be pretty close! It's the perfect
        size for solo brewing or with a friend.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis
        teapot is polished, red, Jianshui clay\_and is in a\_\\u003cspan\\u003e'Tall
        Shi Piao'\\u003c\\/span\\u003e\_style.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eThese are tiny teapots that will
        easily sit in a single hand. They measure on average 10cm from tip of spout
        to end of handle and are around 7cm tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eYou
        can purchase a hard box and embroidered bag for $10USD additional.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003e\\u003cem\\u003eThe
        teapots were given a final polish using olive oil to make them shine. We removed
        as much as we could. Give them a boiling water wash when you get them and
        then dry with a rag if they still feel a little\_oily.\\u003c\\/em\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eCheck
        out our video series from Jianshui:\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/H22bki_zsmA\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/GRGbbbX93bk\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/l3JUBMSPLGQ\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:36-08:00\",\"created_at\":\"2019-05-10T10:44:24-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
