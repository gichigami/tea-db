        class=\\\"p1\\\"\\u003eThis is a rare tea blend. We are quite pleased to be
        able to offer it. This tea has been aging in Jingmai loose since 2008. This
        is a blend of young and old tree material. Back in 2008 in Jingmai they didn't
        differentiate material as much. It's rare to find Jingmai stored material.
        Jingmai is a protected export only tea growing region. Once leaf material
        leaves Jingmai it can't come back. Protecting their borders is a task they
        take seriously.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis
        tea is phenomenal! The honey aromas are so deep and rich it's almost unbelievable.
        Were we to press this material it would lose the magic\_aroma it has now.
        We're happy to offer this tea as\_maocha.\_This material is packaged into
        sealed foil bags which come with an included sealing clip to keep the tea
        fresh.\\u003c\\/p\\u003e\\n\\u003ch2\\u003eVideo Tour of Jingmai\\u003c\\/h2\\u003e\\n\\u003cp\\u003e\\u003ciframe
