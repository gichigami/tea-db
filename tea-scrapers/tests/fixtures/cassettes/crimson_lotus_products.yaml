ng-Full-800x_67f7211b-e7b0-4509-a01a-3f2753f1d058.jpg?v=1503553870\",\"width\":800,\"height\":800},{\"id\":30435720403,\"created_at\":\"2017-08-23T22:50:28-07:00\",\"position\":6,\"updated_at\":\"2017-08-23T22:51:10-07:00\",\"product_id\":12095640467,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2017-Tong-Closeup-800x_d87da13f-b65c-4f0b-bd15-ffae2800cf12.jpg?v=1503553870\",\"width\":800,\"height\":800},{\"id\":31564752339,\"created_at\":\"2017-10-04T13:19:25-07:00\",\"position\":7,\"updated_at\":\"2017-10-04T13:19:25-07:00\",\"product_id\":12095640467,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/Moon-Princess-Vertical.jpg?v=1507148365\",\"width\":800,\"height\":1506}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"200g
        Cake\",\"20g Sample\"]}]},{\"id\":12095595859,\"title\":\"Spring 2017 \\\"Slumbering
        Dragon\\\" Sheng \\/ Raw Puerh from Crimson Lotus Tea\",\"handle\":\"spring-2017-slumbering-dragon-sheng-raw-puerh-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis
        is a rare puerh. Of all the tea we sell\_this is the hardest to source and
        the hardest to pick. There is a village in Kunlu Shan that isn't even on Google
        maps. Once you're there you need to hike another 3 kilometers into the mountains
        to get to these trees. The hike is often steep. You gain\_500 meters and it
        takes more than 3 hours to get there. No one there knows how long the trees
        have been there or anything about their history. When you ask locals\_the
        age they simply reply that\_they are as old as the earth itself.\\u003c\\/p\\u003e\\n\\u003cp\\u003eOn
        the north slope\_of a steep mountain ridge, surrounded by dense forest, these
        trees reach to the sky. The trees at 20-40 feet tall literally scrape the
        ceiling of the forest. Impressive does not begin to describe these ancient
        beings. The Chinese call these trees '\u9AD8\u6746'\\/g\u0101og\u0101n which
        means \\\"Tall Pole\\\".\\u003c\\/p\\u003e\\n\\u003cp style=\\\"text-align:
        center;\\\"\\u003e\\u003cimg alt=\\\"\\\" src=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2015-Spring-KSSD-Wide-Forest-800x_grande.jpg?10927791457707797572\\\"
        style=\\\"float: none;\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese
        skinny trees often grow\_in a trio and remain branchless until near the top.
        Barefoot, only the young and the brave, carefully climb to the top to pick
        the Spring harvest. There are no ropes, harnesses, or soft landings. It is
        dangerous work. In an attempt to conserve their strength for the ages these
        trees each produce precious few buds and new spring growth. A day's harvest
        for a young eager picker often maxes out around just 2kg of fresh leaf. After
        roasting and sun drying perhaps half a kilo is all they have to show for the
        days work.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThere is
        not that much material available each year from these trees. We get as much
        as we can. We pressed less than 100 cakes this year. This is a very unique
        puerh.\_The flavor is strong, pure, natural, and quite bitter, but with a\_transcendent\_chaqi.
        There is an aroma in the dry leaves that is reminiscent of wild blueberries.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eWe had a new family process this material for us this
        year and it is better than it has ever been. It is fantastic this year!\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eWe named this puerh \\\"Slumbering Dragon\\\" because
        of the visual image of these ancient trees growing so peacefully in the mountains.
        They seem to us like dragons of a previous era\_in a deep slumber for eons.
        The strong energy in this tea mirrors the strength of dragons in our active
        imaginations.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eWe present
        this tea as is. This is unblended, single origin, high altitude, wild tree
        puerh. It will not taste\_like a lot of the puerh out there. It is strong
        and intense with a very pronounced bitterness that can linger. The intensity
        of bitterness will fade with age. Our 2014 has mellowed quite nicely. The
        energy in this tea is quite strong, it will sneak up on you. We hope you get
        a chance to try this amazing and unique tea.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Pu'er\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2000+m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\_\\u003c\\/span\\u003e\\u003cspan\\u003e\\u003cspan\\u003eThis
        tea is generous and can be re-steeped many times.\_\\u003c\\/span\\u003e\\u003c\\/span\\u003eExperiment
        with brew times and ratios to find what suits your palate.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"text-align: center;\\\"\\u003e\\u003cimg alt=\\\"\\\" src=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2015-Spring-KSSD-Tall-Forest-800x_1024x1024.jpg?10531037292695988676\\\"
        style=\\\"float: none;\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\nWatch
        video from Kunlu Shan here: \\u003ciframe width=\\\"560\\\" height=\\\"315\\\"
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/L5mJ3L3ieqw\\\" frameborder=\\\"0\\\"
