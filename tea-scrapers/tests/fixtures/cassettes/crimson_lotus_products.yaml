        \\\"Beneath an Emerald Sea\\\" Sheng \\/ Raw Puerh from Crimson Lotus Tea\",\"handle\":\"spring-2018-beneath-an-emerald-sea-sheng-raw-puerh-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe have re-crafted
        this classic blend. Traveling through Southern Yunnan each\_Spring is a beautiful
        part of what we do.\_South of the Tropic of Cancer the rich green forested
        hills of Yunnan look like a rolling emerald sea during. Drinking this tea
        is like swimming in that ocean of flavor and aroma. It's fantastic.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        is a fantastic tea. It is vibrant with youthful energy and brews thick and
        juicy. It's both floral and fruity with an occasional note similar to unsweetened
        baking chocolate. There is bitterness but it balances with sweetness. This
        tea has stamina and can brew for a long time.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1900+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Blended\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Beneath
        an Emerald Sea is a well-balanced tea with pleasing notes of floral, sweet
        fruits, and bitterness. The early and middle infusions are tasty, sporting
        a thick texture and long aftertaste.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2018-beneath-an-emerald-sea-sheng-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Beneath an Emerald Sea\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:39-08:00\",\"created_at\":\"2019-03-22T20:40:00-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
