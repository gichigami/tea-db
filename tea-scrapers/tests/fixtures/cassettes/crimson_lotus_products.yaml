        that comes through the tea session. For these teapots we used the rare Wanyao
        clay. \\u003cmeta charset=\\\"utf-8\\\"\\u003eWith changing government regulations
        it has become difficult or impossible to mine for new clay under Wanyao village
        in Jianshui. Most Jianshui teapots now are made of a blend of clay from as
        far as 25km away. It's still good clay, but the purists prefer the old Wanyao
        clay. We still have access to some of it but the stock is dwindling! The clay
        in these teapots was mined 20 years ago, processed, and has been aging since
        then.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eTo set these teapots
        apart we had them carved with a lotus and inlaid them with red glaze.\_\\u003c\\/p\\u003e\\n\\u003cp
