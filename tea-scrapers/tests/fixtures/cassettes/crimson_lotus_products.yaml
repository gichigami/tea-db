        200g Cake\"]}]},{\"id\":4464276471868,\"title\":\"2018 \\\"Forgotten Nebula\\\"
        Sheng \\/ Raw Puerh Tea Blend :: Seattle Inventory\",\"handle\":\"2018-forgotten-nebula-sheng-raw-puerh-tea-blend-seattle-inventory\",\"body_html\":\"\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eDeep
        in the tasty reaches of the Puerh Yunniverse lies a forgotten nebula of synesthetic
        beauty. Thanks to the hard work of our intrepid space explorers they have
        rediscovered this lost treasure. We are\_pleased to offer access to this incredible
        place once again. Enjoy the journey!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        blend of sheng puerh tea is composed entirely of first Spring picked tea from
        the 2018 harvest. This is a lush and lively tea that is a true joy to drink.
        It is refreshing with a mouth watering sweetness that keeps on giving. This
        tea is smooth and easy drinking with a nice bitterness to balance the sweetness.
        It will surprise you how many steeps you can get from this tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        wrapper is a special, one of a kind, piece of marbled artwork from Violet
        Pitsker; The Marble Mistres. Violet uses traditional marbling techniques to
        create complex designs with vibrant colors and patterns. Check out Violet
        on Instagram: \\u003ca href=\\\"https:\\/\\/www.instagram.com\\/marble_mistress\\/\\\"
        title=\\\"Jones Pitsker Instagram\\\" target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/marble_mistress\\/\\u003c\\/a\\u003e
        and Etsy: \\u003ca href=\\\"https:\\/\\/www.etsy.com\\/shop\\/TheMarbleMistress\\\"
        title=\\\"Jones Pitsker Etsy\\\" target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.etsy.com\\/shop\\/TheMarbleMistress\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eJust
        for fun, if you buy a cake you get a \\\"Forgotten Nebula\\\" sticker too!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Forgotten
        Nebula is a sweet and mineral\\/metallic young puer with a strong rocking
        fruity aftertaste. It does resteep incredibly well for its youth, so you do
        get your money\u2019s worth there.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2018-forgotten-nebula-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Forgotten Nebula\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
