        Hooded Sweatshirt\",\"handle\":\"dont-tariff-my-tea-hooded-sweatshirt\",\"body_html\":\"\\u003cp\\u003e\\u003c!--
        x-tinymce\\/html --\\u003e\\u003cstrong\\u003eWhat more can we say? Tea should
        forever be tariff free!\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        unisex heavy blend hooded sweatshirt is relaxation itself. Made with a thick
        blend of cotton and polyester, it feels plush, soft and warm, a perfect choice
        for any cold day. In the front, the spacious kangaroo pocket adds daily practicality
        while the hood's drawstring is the same color as the base sweater for extra
        style points.\\u003c\\/p\\u003e\\n\\u003cp\\u003e.: Made with a medium-heavy
        fabric (8.0 oz\\/yd\xB2 (271 g\\/m\xB2)) that consists of 50% cotton and 50%
        polyester for that cozy feel and warmth you need in a hoodie.\\u003cbr\\u003e.:
        The classic fit along with the pouch pocket and the tear-away label make for
        a highly comfortable, scratch-free wearing experience. \\u003cbr\\u003e.:
        The color-matched drawcord and the double-lined hood add a stylish flair and
        durability that tie everything together.\\u003cbr\\u003e.: Made using 100%
        ethically grown US cotton. Gildan is also a proud member of the US Cotton
        Trust Protocol ensuring ethical and sustainable means of production. The blank
        tee's dyes are OEKO-TEX-certified dyes with low environmental impact.\\u003c\\/p\\u003e\\n\\u003ctable
