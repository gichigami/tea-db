        Title\"]}]},{\"id\":3887030075452,\"title\":\"2018 Autumn Hekai Old Tree 200g
        Cake - Sheng \\/ Raw Puerh Tea\",\"handle\":\"2018-autumn-hekai-old-tree-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis Autumn maocha has been quite popular. We sold
        this material loose but saved some to press into cakes this Spring. This is
        a stellar tea. This tea was picked and processed Autumn 2018 from old trees
        in Manmai Lao Zhai in Hekai.\_Material from this village is arguably the best
        available in Hekai. It demands a high price in Spring, but this Autumn material
        is affordable and fantastic to drink.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis
        tea is full in the mouth and very fresh. It feels like you're drinking in
        the forests. The aroma is thick with an orchid like sweetness. The flavor
        is complex and layered with great energy and is very relaxing. We love drinking
        this tea!\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eCheck out these
        videos from Hekai.\\u003c\\/p\\u003e\\n\\u003ciframe width=\\\"560\\\" height=\\\"315\\\"
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/QlxvJUK0z2g\\\" frameborder=\\\"0\\\"
        allow=\\\"accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture\\\"
        allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e \\u003ciframe width=\\\"560\\\"
        height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube-nocookie.com\\/embed\\/gJ2KDV4Ryaw\\\"
        frameborder=\\\"0\\\" allow=\\\"accelerometer; autoplay; encrypted-media;
        gyroscope; picture-in-picture\\\" allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:26-08:00\",\"created_at\":\"2019-08-29T21:10:31-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Autumn\",\"Sheng
        \\/ Raw Puerh\",\"Single Origin\"],\"variants\":[{\"id\":29720211718204,\"title\":\"Default
