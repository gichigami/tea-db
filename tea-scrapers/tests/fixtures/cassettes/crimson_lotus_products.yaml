        Title\"]}]},{\"id\":7070062182460,\"title\":\"2022 \\\"Night Shift\\\" Shou
        \\/ Ripe Puerh Tea 200g Cake :: Seattle Inventory\",\"handle\":\"2022-night-shift-shou-ripe-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eSmoke
        and mirrors! If you've never had a late night session with a dark brewing
        shou like this you are missing out. There is a magic in the cup that is hard
        to describe. The impenetrable black liquid releases a dancing white cloud.
        The obsidian darkness of night is what you'll find in a cup of this tea.\_Explore
        the mysteries\_of Tezcatlipoca as you steep.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        Aztec deity of night and war featured on this cake is a custom piece of art
        from Jose Rodriguez III. He is a local Seattle artist and does incredible
        work. Be sure to check him out:\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003ca
        href=\\\"https:\\/\\/www.instagram.com\\/joserodriguez3rd\\/\\\" target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/joserodriguez3rd\\/\\u003c\\/a\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003ca
        href=\\\"https:\\/\\/www.joserodriguez3rd.com\\/\\\" target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.joserodriguez3rd.com\\/\\u003c\\/a\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003eThis
        is a super creamy tea. It brews dark\_with an almond nuttiness and just a
        hint of a floral aroma. It's not too thick but has a well rounded body in
        the mouth. There is a bitterness that teases you but melts right away into
        a caramel sweetness. Smooth drinking chocolate and nuttiness defines this
        tea. Lovely stuff!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-10-31T02:40:14-07:00\",\"created_at\":\"2022-10-29T22:50:59-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
