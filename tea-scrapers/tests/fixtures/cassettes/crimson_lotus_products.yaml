        \\\"Intrigue\\\" Sheng \\/ Raw Puerh Tea Blend :: Seattle Inventory\",\"handle\":\"2018-spring-intrigue-sheng-raw-puerh-tea-blend-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis
        is a custom tea blend of Spring 2018 first picked material. We worked a long
        time\_perfecting this blend. We wanted something that matched the complexity
        and depth of the artwork.\_The amazing wrapper was\_designed by\_\\u003ca
        href=\\\"https:\\/\\/bevbyrnes.com\\/\\\" title=\\\"Bev Byres - Seattle Artist\\\"
        target=\\\"_blank\\\"\\u003eBev Byrnes\\u003c\\/a\\u003e. ( check her out
        on\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/bevbyrnes\\/\\\" title=\\\"Bev
        Byrnes Instagram\\\" target=\\\"_blank\\\"\\u003eInstagram\\u003c\\/a\\u003e\_)
        She is a local Seattle artist who has been into puerh tea for a very long
        time. Her collection of aged puerh tea would put most professional tea shops
        in China to shame.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is a special
        treat. It starts off sweet and builds from there. The aroma is warm bread,
        tree moss, wild honey, and mountain meadow grass. It brews thick and rich.
        The flavor is on the savory side with early notes of smoked green beans. This
        develops into a citrus vibrancy with a finish of honeydew melon. This tea
        will brew forever. It is a very satisfying tea, and we hope an intriguing
        one.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eStone
        Compressed\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003cli\\u003e200g
        Cake\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Intrigue
        is just a cut above the rest for the price. 2018 Intrigue is a complex sheng
        with a long laundry list of flavours that evolve as you drink. If you love
        your tea to make you think and put a puzzle together, this is the perfect
        tea for you. \\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca href=\\\"https:\\/\\/oolongowl.com\\/2018-intrigue-sheng-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Intrigue\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
