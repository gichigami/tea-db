        Title\"]}]},{\"id\":10112081068348,\"title\":\"2025 Pasha Shan Hong Cha \\/
        Black Tea - 200g Cake\",\"handle\":\"2025-pasha-shan-hong-cha-black-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eWe
        had a good time in Pasha Shan this year. We were impressed with the teas that
        we found. We had our eye on some of their sheng puerh but then found this
        incredible black tea made from the same trees.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        cake has a good balance of buds and large leaves. The aromas are floral and
        chocolate with the most delicate yet intoxicating pungency; like fruit that
        is just starting to ferment. It's lovely. The aroma is also very uplifting.
        It just invites you in to start steeping. The color is immediately rich. This
        tea is perfect from the first sip. It is so smooth and sweet with just the
        right balanced tannic notes. It is a dense and rich tea with a lot of flavor
        to unpack. It is a very easy drinking tea that swallows smooth and leaves
        good aftertaste.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 200g cake. It is a single origin offering that is unique and
        offers an incredible tea experience. It is from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-08-15T01:15:41-07:00\",\"created_at\":\"2025-07-28T14:11:56-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
