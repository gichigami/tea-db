        Sample\"]}]},{\"id\":8488530631,\"title\":\"Spring 2016 Jingmai \\\"Midas
        Touch\\\" Sheng \\/ Raw Puerh from Crimson Lotus Tea\",\"handle\":\"spring-2016-jingmai-midas-touch-sheng-raw-puerh-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe
        old growth tea forests of Jingmai ( pronounced 'jing my' ) \\u003ca href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/13518649-jingmai-mountain-and-mangjing-village\\\"
        title=\\\"Jingmai Mountain and Mangjing Village\\\" rel=\\\"noopener noreferrer\\\"
        target=\\\"_blank\\\"\\u003eare nothing short of idyllic\\u003c\\/a\\u003e.
        These ancient forests border Burma and hide smuggler trade routes still in
        use today. The biodiversity of the region and the nearly untainted old world
        methods and rituals of tea cultivation and harvesting make this area unique
        among world tea production. Large tea trees planted before Columbus discovered
        the Americas are commonplace.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        blend is single region pure Jingmai big tree material. In Jingmai they refer
        to trees in terms of size rather than age. They have 3 main sizes of trees
        that fall into their big tree category. This is a blend of all three.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe
        named this tea Midas Touch because of the processing skill used to create
        this tea has turned the leaf into gold. This years blend is slightly different
        than last years. We think it's better.\_\\u003c\\/span\\u003eThis tea is strong\_despite
        the young age.\_The honey aroma is just starting to develop.\_This tea brews
        both gentle and strong at the same time. It can surprise you. Stick this on
        a shelf for 10 years and you will have a truly amazing tea!\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eIndoor
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Blended\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Crimson
        Lotus Tea\u2019s 2016 Midas Touch is a delicate, bright, and sunny tea with
        features you will miss if you drink it too fast.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"http:\\/\\/oolongowl.com\\/2016-midas-touch-sheng-puer-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - 2016 Midas Touch Sheng Puer from Crimson
        Lotus Tea\\\"\\u003e--Oolong Owl\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"This
        puer blend is fantastic and intoxicating, along with beautifully highlighting
        the greater attributes of the Jingmai region, such as its characteristics
        and quality, in such a positive light. \u2026 King Midas was resurrected in
