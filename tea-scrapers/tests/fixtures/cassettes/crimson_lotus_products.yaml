        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eYou'll fall in love. You can't
        help it. No one can resist the mythical seductress charms of Hulijing ( \\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"\\u003e\u72D0\u72F8\u7CBE\\u003c\\/span\\u003e\_).
        This shape shifting, 9 tailed, fox mistress of Chinese legend will have her
        way with you. You will be tempted by her siren call and enchanting gaze. Satiate
        your deep desire and sit down for a session with this foxy fox.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eShe\_lounges
        in front of you and the heat from the brew vessel warms the leaves\_revealing
        a sensual aroma of freshly cut citrus mixed with gunpowder in the rain.\_Are
        the fireworks outside, or are they in here? The aromas\_pull you into an herbal
        sphere that is fresh, bright, lively, and vibrant. She\_catches your eye\_and
        then slowly glances down. You follow her gaze and there is\_a cup in your
        hand. Your heart rate increases as cup comes to mouth. The first sip flows
        down your throat as easy as a spring brook. You focus on the tea and can still
        feel it. It hangs in the throat like a peach candy chandelier. She smiles
        and says \\\"We're just getting started!\\\"\\u003c\\/p\\u003e\\n\\u003cp\\u003eWhen
        does the session end? How long have you been here? Where did she go and when
        will she be back?\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003eStasia
        Burrington has created the artwork for \\\"Love Potion\\\". It's amazing and
        so is she. Please follow her here:\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/stasiaburrington\\/\\\"
        target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/stasiaburrington\\/\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan
        data-mce-fragment=\\\"1\\\"\\u003eThis is a 200g cake.\\u003c\\/span\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-08-24T15:11:14-07:00\",\"created_at\":\"2022-08-24T13:26:03-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
