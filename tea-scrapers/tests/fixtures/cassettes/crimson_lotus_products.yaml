        Title\"]}]},{\"id\":10202258112828,\"title\":\"2025 Kunlu Gushu Shou Puerh
        Tea :: Seattle Inventory\",\"handle\":\"2025-kunlu-gushu-shou-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eShou puerh tea is very rarely made from Kunlu material.
        When we bought this tea earlier this year we were very excited. It was not
        cheap, but this tea really speaks for itself. It is well worth the price.
        Kunlu Shan is one of our favorite mountains. This shou puerh tea was made
        from the old tree material at the top.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis
        is a tea to experience and savor. You just know right away that you are drinking
        something special. I don't even know that it's helpful for us to try and describe
        this tea. Trust us, it is worth the price of admission to be able to experience
        it.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eUse
        5-10 grams of nugs and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Be sure to rinse this material twice for at least 10 seconds each
        time. They need a good rinse! Start with quick steeps under 10s. With each
        re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:04-07:00\",\"created_at\":\"2025-10-30T22:49:08-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2021 and After\",\"2025\",\"Shou
        \\/ Ripe Puerh\",\"Single Origin\"],\"variants\":[{\"id\":52369987305788,\"title\":\"50
        grams of old tree shou\",\"option1\":\"50 grams of old tree shou\",\"option2\":null,\"option3\":null,\"sku\":null,\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"59.99\",\"grams\":60,\"compare_at_price\":null,\"position\":1,\"product_id\":10202258112828,\"created_at\":\"2025-10-30T22:49:09-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":53342008312124,\"created_at\":\"2025-10-31T04:29:03-07:00\",\"position\":1,\"updated_at\":\"2025-10-31T04:29:16-07:00\",\"product_id\":10202258112828,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Kunlu-Gushu-Shou.png?v=1761910156\",\"width\":1024,\"height\":1024},{\"id\":53341977248060,\"created_at\":\"2025-10-31T04:20:37-07:00\",\"position\":2,\"updated_at\":\"2025-10-31T04:29:16-07:00\",\"product_id\":10202258112828,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/IMG-0758.jpg?v=1761910156\",\"width\":2609,\"height\":2609}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"50
        grams of old tree shou\"]}]},{\"id\":10202097287484,\"title\":\"2024 Yiwu
        \\\"Shousparilla\\\" Lao Cha Tou Shou Puerh Tea :: Seattle Inventory\",\"handle\":\"2024-yiwu-shousparilla-lao-cha-tou-shou-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eHere
        at Crimson Lotus Tea we LOVE Lao Cha Tou. If you are craving some chunky nugs
        of tea these will absolutely not disappoint. These nugs are special. They
        came from the same fermentation pile that produced our Yiwu Shousparilla tea.
        I wouldn't call these a beginner shou. These chunky nugs are funky. They are
        straight out of the pile and look it. They are dirty and funky.\\u003c\\/p\\u003e\\n\\u003cp\\u003eHowever...
        if you can get past their shaggy appearance (and give them a couple rinses
        with boiling water) these nugs will give you an amazing shou puerh experience.
        They are so mellow and sweet and rich and creamy. The flavor is similar to
        the herbal-ness from Shousparilla but realistically these are their own tea.
        They will literally brew forever. You will not out steep them. Not even close.
        They just go and go and go and go.\\u003c\\/p\\u003e\\n\\u003cp\\u003eGongfu
        style brew them in a gaiwan or boil them on the stove. They just keep on giving.
        If you're not hooked on Lao Cha Tou yet you will be.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eLao Cha Tou is a special shou puerh that is sure to
        please. During the wodui process to make shou puerh the heat and intense weight
        of the wet pile fermentation creates a perfect environment at the bottom to
        make 'Lao Cha Tou'. In Chinese 'Lao Cha Tou' (\u8001\u8336\u5934) means\_
        'Old Tea Head', where head refers to a boss or chief. Every wodui pile creates
        Lao Cha Tou, but not all are created equal. We have had many that were merely
        sub par experiences. We are very selective with the Lao Cha Tou we choose.\\u003c\\/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eUse 5-10 grams of nugs and brew with
        75-150ml ( 2.5-5oz ) of water at or near boiling. Be sure to rinse this material
        twice for at least 10 seconds each time. They need a good rinse! Start with
        quick steeps under 10s. With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:03-07:00\",\"created_at\":\"2025-10-30T22:38:51-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
