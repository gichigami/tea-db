        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWelcome to the DANGER ZONE!
        We weren't able to get enough of this tea this year to do a full pressing
        of it. We've made what we have available loose and as dragon balls. This is
        the tea from the garden where we had a very close call with a 15ft King Cobra.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"https:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/the-dangers-of-the-tea-industry-a-true-story-from-the-jungles-of-southwestern-china\\\"
        target=\\\"_blank\\\" title=\\\"Crimson Lotus Tea - The Dangers of the Tea
        Industry. A true story from the jungles of Southwestern China.\\\" rel=\\\"noopener
        noreferrer\\\"\\u003eYou can read all about that story here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is a special tea from a very special garden. There is an emotional vibe to
        the garden that makes you feel like you've stepped back into a prehistoric
        era.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere is a deep magic to this tea.
        Sessions with it are always memorable.\_This year it is seemingly more potent.
        The brew is thick, with a blessed balance of astringency and bitterness that
        melts\_as fast as a pat of butter on a hot skillet. The tea is complex but
        gentle. It swallows so easy that you hardly notice until you're reaching for
        another sip.\_It is grassy and floral with a dense humidity like walking through
        a greenhouse full of orchids.\_The energy is heady and palpable.\_It's like
        being kissed by a cobra.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"Elemental
        Puerh\\\" is our collection of single origin, direct sourced, hand rolled\_puerh
        tea dragon balls. These are high quality examples of individual mountain personality.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        wrapper is stamped with an infographic containing all the important origin
        details. You have the year of picking, the season of picking, the mountain
        name and symbol, the distance from the equator, and special indicators for
        wild or old tree material.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach\_dragon\\u003cspan\\u003e\_\\u003c\\/span\\u003eball
        is individually steamed and hand rolled. They weigh 8 grams and are perfect
        for a session in your gongfu2go portable tea brewer or gaiwan \\/ teapot.
        Each order contains 6x 8g dragon balls.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        material is from Spring of\_2020 and was picked from\_old tree material growing
