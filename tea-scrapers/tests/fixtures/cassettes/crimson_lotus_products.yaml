        200g Pasha Shan Shou Puerh Cake\",\"20g Pasha Shan Shou Puerh Sample\"]}]},{\"id\":6740225294396,\"title\":\"2021
        Pasha Shan \\\"Lao Cha Tou\\\" Shou Puerh Tea\",\"handle\":\"2021-pasha-shan-lao-cha-tou-shou-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eLao Cha Tou is a special shou puerh that is sure to
        please.\_During the wodui process to make shou puerh the heat and intense
        weight of the wet pile fermentation creates a perfect environment at the bottom
        to make 'Lao Cha Tou'. In Chinese 'Lao Cha Tou' (\u8001\u8336\u5934) means\_
        'Old Tea Head', where head refers to a boss or chief. Every wodui pile creates
        Lao Cha Tou, but not all are created equal. We have had many that were merely
        sub par experiences. We are very selective with\_the Lao Cha Tou we choose.
        This material came from a special Jingmai production.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis Lao Cha Tou came from the same pile that fermented
        our Pasha Shan Shou Puerh Cakes.\_\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan
        data-mce-fragment=\\\"1\\\"\\u003eThe aroma spans from marzipan to fresh boiled
        potatoes. It drinks super smooth and sweet with a mouthfeel like warm chocolate
        milk. This is a very satisfying shou puerh that is a very easy drinker.\\u003c\\/span\\u003e
        You can steep these long, or boil them til they're motor oil. They\_always
        brew smooth and mellow and delicious. They will seemingly steep forever!\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eUse
        5-10 grams of nugs and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Be sure tor\_rinse this material twice for a few seconds\_each. Start
        with quick steeps under 10s. With each re-steep adjust the steep time to your
        taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:49-08:00\",\"created_at\":\"2021-12-16T22:00:48-08:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
