oduct_id\":10114685305148,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/A9B0BCF9-58AD-4452-8514-4E470563A251.jpg?v=1754854778\",\"width\":2456,\"height\":2456},{\"id\":52380659876156,\"created_at\":\"2025-08-04T13:11:48-07:00\",\"position\":24,\"updated_at\":\"2025-08-10T12:39:38-07:00\",\"product_id\":10114685305148,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/0A9CD674-0A54-4283-8F7E-E1133E06F414.jpg?v=1754854778\",\"width\":2565,\"height\":2565},{\"id\":52380659843388,\"created_at\":\"2025-08-04T13:11:48-07:00\",\"position\":25,\"updated_at\":\"2025-08-10T12:39:38-07:00\",\"product_id\":10114685305148,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/451B49F4-25BE-48F8-BC71-D681EB7D4111.jpg?v=1754854778\",\"width\":2489,\"height\":2489}],\"options\":[{\"name\":\"Choose
