        Cake\"]}]},{\"id\":12095640467,\"title\":\"2016 \\\"Moon Princess\\\" Sheng
        \\/ Raw Puerh from Crimson Lotus Tea\",\"handle\":\"fall-2016-moon-princess-sheng-raw-puerh-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe legend of the Moon Princess
        is a famous one in Chinese history. Her name is \\u003ca href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Chang%27e\\\"
        title=\\\"Wikipedia - Moon Princess - Chang'e\\\" rel=\\\"noopener noreferrer\\\"
        target=\\\"_blank\\\"\\u003eChang'e\\u003c\\/a\\u003e and she lives on the
        moon with a giant rabbit. She is immortal, but is banished to the moon and
        cannot leave. She plays an important role in the Autumn harvest and festivals.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        material is a delicious example of Autumn material. Autumn material often
        lacks the strength that similar Spring material will have. We have been more
        than impressed with this material and it is the first Autumn material we have
        chosen to sell. The material comes from Bangdong. Bangdong is so close and
        so similar to Xigui that most people would sell this material as Xigui 'area'.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        aroma is vegetal with hints of sweet corn. The body is thick and immediate.
        The flavor is orchid sweetness with a slight bitterness and some astringency.
        There is a sweet aftertaste that lingers. The tea can brew quite strong if
        you let it.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1600m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
