        be a followup to our super popular \\u003ca href=\\\"http:\\/\\/crimsonlotustea.com\\/products\\/2008-bulang-imperial-grade-shou-ripe-puerh\\\"
        title=\\\"Crimson Lotus Tea - 2008 Bulang Imperial Grade Shou \\/ Ripe Puerh
        250g Brick\\\" rel=\\\"noopener noreferrer\\\" target=\\\"_blank\\\"\\u003e\\\"2008
        Bulang Imperial Grade\\\"\\u003c\\/a\\u003e.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        material is from Simao and was picked and processed in 2015. It was pressed
        in the Spring of 2016. It has been aging in Kunming since 2016.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003ch4\\u003eBrewing
        Instructions\\u003c\\/h4\\u003e\\n\\u003cp\\u003eThis is a generous tea and
