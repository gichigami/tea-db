        Ying Shan \\\"Whispering Sunshine\\\" 200g Cake - Sheng \\/ Raw Puerh Tea\",\"handle\":\"2022-spring-bai-ying-shan-whispering-sunshine-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eThis\_tea
        has a clean and perfumey aroma that is vegetal\_with a\_strong citrus\_note\_and
        a hint of tobacco. The flavor is bright, crisp, and juicy with\_smooth\_grass
        notes and an earthy vibrance.\_\_The bitterness and astringency are just enough
        to keep you interested. The body is mellow and the aftertaste pleasant. There
        is an energy to this tea that can come on strong. Listen close and hear\_the
        Sun whispering to you through this tea. There is a lot to tell.\\u003c\\/p\\u003e\\n\\u003cp\\u003eBai
        Ying Shan, or White Warbler Mountain, is a remote high altitude tea growing
        region in Lincang Prefecture. This mountain has more than 10 unique varietals
        of camellia sinensis. The material in this tea is composed entirely from one
        ancient tree varietal called 'dabaiyakou' which means 'big white buds' . The
        picking and processing of this tea is 100% done by hand.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        chose to call this puerh \\\"Whispering Sunshine\\\".\_The tea gardens in
        Bai Ying Shan are the highest elevation that we source tea from. Grown\_above
        2200m (7200 feet or 1.3 miles)\_we imagined these tea trees were close enough
        to hear the gentle voice of the Sun. The Sun plays a critical role through
        the entire lifespan of puerh tea from growing the trees to drying the leaf.
        Puerh is defined by the sun drying stage. If it isn't sun dried, it isn't
        puerh.\_This puerh has been direct sun dried.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is our go to choice for a hiking tea. Brew up a thermos of this ahead of a
        hike and drink it when you're thirsty. It is clean, refreshing, and full of
        energy!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2200m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 200g cake of compressed
        tea.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:46-08:00\",\"created_at\":\"2022-04-11T23:38:00-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
