        200g Cake\",\"20g Sample\"]}]},{\"id\":814029799484,\"title\":\"2017 \\\"Stargazer\\\"
        Sheng \\/ Raw Puerh Tea\",\"handle\":\"2017-stargazer-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe
        Puerh Yunniverse is a fascinating place. We've been real excited for this
        tea. This has been a long term project for us. We worked with artist and puerh
        tea lover M. L. Macdonald \\u003ca href=\\\"https:\\/\\/www.instagram.com\\/alchemichael\\/\\\"
        target=\\\"_blank\\\"\\u003e@alchemichael\\u003c\\/a\\u003e\_who created a
        custom piece for this tea.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is
        made with Autumn small arbor tree material from Hekai that was picked and
        processed in 2017. The full wrapper features a star-field that matches the
        night sky at the tea garden when this tea was picked. If you are in Hekai
        in Autumn and hold this wrapper to the night sky these are the stars you'll
        see.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea presents a traditional sheng
        experience with plenty of hay, alfalfa, and sweet grass aroma. There is a
        floral finish and sweet aftertaste. The sweetness is balanced with a mild
        bitterness.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1200m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Garden\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"This
        tea packs a punch but in a really nice way. I would particularly recommend
        it for those that are fairly new to sheng and looking to explore more.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/www.teaformeplease.com\\/crimson-lotus-tea-stargazer\\/\\\"
        title=\\\"Crimson Lotus Tea Review - 2017 Stargazer\\\"\\u003e--teaformeplease.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse 5-10 grams
