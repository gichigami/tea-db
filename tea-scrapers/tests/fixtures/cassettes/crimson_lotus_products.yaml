        Title\"]}]},{\"id\":9580744933692,\"title\":\"Silver Repaired Wood Fired Jianzhan
        Teacup #05 70ml\",\"handle\":\"silver-repaired-wood-fired-jianzhan-teacup-05-70ml\",\"body_html\":\"\\u003cp\\u003eSometimes
        teaware gets broken. That is just the sad reality of this business. Most teaware
        that gets broken will just get discarded. When you're dealing with vintage
        teaware of historical value you do what you can to give the teaware new life.
        These cups were damaged during or shortly after firing and were discarded.
        We found them in the bottom of a box of broken teaware in Jianzhan. They were
        filthy and in need of some love. We meticulously cleaned them and sent them
        to the master silversmiths that we work with. They did their magic with silver
        and created these gorgeous beauties!\\u003c\\/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003eJianzhan
        is the original custom teaware. With a\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        title=\\\"Wiki Jianzhan Teaware\\\" href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Jian_ware\\\"
        data-mce-href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Jian_ware\\\"\\u003ehistory
        nearly a thousand years old\\u003c\\/a\\u003e\\u003cspan\\u003e\_\\u003c\\/span\\u003ethis
        gorgeous glazed clay teaware from Fujian was designed exclusively\_to enhance
        the experience of drinking tea. The iron rich glaze creates unique patterns.
        No two are ever the same.\_The long history of this teaware is truly fascinating.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere
        is a magic that happens with tea in these cups. The iron content works to
        soften the water and enhance the experience. Some people claim these cups
        cheat; the difference can be that noticeable. When we're analyzing teas for
        purchase we can't use these cups. They make everything taste better.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eJianzhan
        tea cups are in general thicker and heavier than other clay cups. These are
        no exception. These cups are dense and feel great in the hand. They are high
        fired and made from naturally sourced glazes. They will be an amazing addition
        to your tea ware collection!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003eThis tea cup holds 70ml and
        measures 8.5cm Wide x 4cm Tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThe
        glaze used in this cup was blended by hand from the old Jianzhan glaze sources
        in Fujian. \\\\ The glaze isn't available anymore. The modern cups just can't
        compete.\_\\u003cmeta charset=\\\"utf-8\\\"\\u003eThese were wood fired 20
        years ago in a traditional dragon kiln that has since been dismantled.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eJianzhan
        is notoriously difficult to photograph. We did our best with these product
        shots. There's such a range of color and light interactions that we tried
        to capture them in different poses and light sources. These cups never disappoint
        when you hold them in your hand.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis\_cup\_was
        entirely handmade and\_is unique. The one you get will be\_the exact\_one
        in the photograph.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e \\u003cstrong\\u003eThis teacup will come with
        a tea towel and teacup bag.\\u003c\\/strong\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:48-08:00\",\"created_at\":\"2024-07-03T22:56:37-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
