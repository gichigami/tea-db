-08:00\",\"position\":4,\"updated_at\":\"2025-02-03T00:41:11-08:00\",\"product_id\":9901400785212,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/3425969608443476257_2048.jpg?v=1738572071\",\"width\":2048,\"height\":2048},{\"id\":50332601090364,\"created_at\":\"2025-02-03T00:41:10-08:00\",\"position\":5,\"updated_at\":\"2025-02-03T00:41:12-08:00\",\"product_id\":9901400785212,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/11482944969623975709_2048.jpg?v=1738572072\",\"width\":2048,\"height\":2048},{\"id\":50332601188668,\"created_at\":\"2025-02-03T00:41:12-08:00\",\"position\":6,\"updated_at\":\"2025-02-03T00:41:13-08:00\",\"product_id\":9901400785212,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/14039358343272547545_2048.jpg?v=1738572073\",\"width\":2048,\"height\":2048}],\"options\":[{\"name\":\"Color\",\"position\":1,\"values\":[\"Black\"]},{\"name\":\"Size\",\"position\":2,\"values\":[\"S\",\"M\",\"L\",\"XL\",\"2XL\",\"3XL\",\"4XL\"]}]},{\"id\":9858119696700,\"title\":\"\\\"Bad
        Idea\\\" Sheng \\/ Raw Puerh Tea Dragon Balls :: Seattle Inventory\",\"handle\":\"bad-idea-sheng-raw-puerh-tea-dragon-balls-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eYeah,
        this tea is a bad idea.\_\\u003cmeta charset=\\\"utf-8\\\"\\u003e\U0001F923
        You like bitter? This tea is for you. I mean it's not really bad bad, but
        you won't forget this tea. This tea is like the last pet at the shelter that
        no one else wants. It looks at you with those eyes and you say to yourself
        \\\"what's the worst that could happen?\\\". Then that pet comes home and
        wrecks everything you own, but you still love it. This is that tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        full story with this tea starts with our love of bitter teas. \U0001F61D We're
        always looking for a really nice sheng that has that special bitter edge that
        balances with everything else. This tea is just the edge. There's no balance,
        it's just all bitter, but that's ok. We picked this material up to creatively
        work into some blends. A little bitter tea tossed into a super sweet tea can
        be magic. This tea though... it walks straight into the room and promptly
        marks it's territory right on your leg. It overwhelmed any tea we blended
        it with. We've sat on this material for years without knowing what to do with
        it. This year, I was drinking this tea and I looked at Lamu and said \\\"Buying
        this tea was a bad idea.\\\" Then a light bulb went off. This tea is a \\\"Bad
        Idea\\\". \U0001F62F\\u003c\\/p\\u003e\\n\\u003cp\\u003eYeah, ok, it's bitter,
        but how does it taste? Well this tea has some very intriguing aromas. It has
        a nice introductory aged sheng aroma going on. It is for sure smokey. I swear
        there are some hints of a dutch oven cooked peach cobbler in there. Lamu thinks
        I'm making that up. It comes out strong! \U0001F623 First steeps and your
        first thought is \\\"Oh this is much more bitter than I remember it being.\\\"
        Honestly I say that to myself every single time. Lamu and I look each other
        in the eye without blinking as we take the first sip and see who will make
        a sour face first. It's always her.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        tea can brew very smooth with a silky body. There's no real taste other than
        bitter though. Surely the aftertaste can't also be bitter can it? Yup! Bitter.
        The wet leaves even smell bitter. After a lot of steeps the tea really does
        mellow into something smooth and pleasant but you gotta work for it. Can you
        work for it? Hah!\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eYeah, this tea is a
        bad idea. You gotta try it! Challenge your tea friends to see who can steep
        it the longest and still drink it without making a face.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea has been pressed into 5 gram dragon balls. That it turns out is a very
        handy size. If you want to solo brew just use one. \\u003cem\\u003ePlease
        don't try to break these in half; you're just going to hurt yourself!\\u003c\\/em\\u003e
        If you've got some friends over do a double ball brew.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou
        get 8x 5g tea balls in one cutesy little plastic packet for one low price!
        That's 40 grams of total tea for the mathematically challenged.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"This
        tea has no redeeming qualities at all. That's a naw from me dawg!\\\"\\u003c\\/em\\u003e
        \\u003cbr\\u003e--Bobby T's Hobby Tea Blog\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"How
        do I undrink this?\\\"\\u003c\\/em\\u003e \\u003cbr\\u003e--Fancy Teas Quarterly\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"I
        actually quite liked it!\\\"\\u003c\\/em\\u003e \\u003cbr\\u003e--Frankie's
        Fernet Forum\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Tired
        of your friends stopping by for hours long gongfu sessions slurping down your
        finest single tree shengs? Start brewing this for them and you won't have
        any more friends. More tea for you!\\\"\\u003c\\/em\\u003e \\u003cbr\\u003e--\\/u\\/tea_review_dude_8663
        on reddit\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"When
        dealing with a ground up restoration of a vintage muscle car you're gonna
        have to handle rust. That's just a fact of life. I swear by Crimson Lotus
        Tea's \\\"Bad Idea\\\" bitter tea balls. Drop 8 balls in a gallon of boiling
        water for an hour. Apply liberally to any rust with a spray bottle. It's like
        magic!\\\"\\u003c\\/em\\u003e \\u003cbr\\u003e--Resto-pros Magazine\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        steep super easy! Drop one ball into your brew vessel of choice 75-100ml or
        so. Add boiling water slowly. Let it steep for 30s and watch the ball open
        up. Discard this initial rinse; or drink it if you're super brave! Wait 5
        minutes with the lid on and the tea ball will be open and ready to brew. Start
        with quick steeps under 10s. With each re-steep adjust the steep time to your
        taste. Enjoy and don't say we didn't warn you! \U0001F61C\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-01-06T11:57:58-08:00\",\"created_at\":\"2025-01-06T11:35:58-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
