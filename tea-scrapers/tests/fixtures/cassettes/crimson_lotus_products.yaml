        Title\"]}]},{\"id\":10203148452156,\"title\":\"2025 \\\"Mountain Shadow\\\"
        Shou \\/ Ripe Puerh Tea - 200g Cake\",\"handle\":\"2025-mountain-shadow-shou-ripe-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eThe
        crown of the Cascade Mountains in Washington State is Mt. Rainier. When the
        conditions are just right the rising or setting sun creates a shadow of Mt,
        Rainier on the clouds. It is a rare event, but part of the magic and mystery
        of the Pacific Northwest. This tea is meant to embrace that magic to share
        with you.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a lovely shou puerh
        tea blend that really has a magical essence to it. It has your standard shou
        puerh earthiness but there's something more.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a pressed 200g cake
        made from a custom blend of shou puerh tea.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:06-07:00\",\"created_at\":\"2025-10-31T01:36:38-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
