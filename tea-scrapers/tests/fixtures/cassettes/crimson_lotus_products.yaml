        White Jianshui Zitao Teapot - Dragon's Egg Style ~115ml\",\"handle\":\"polished-white-jianshui-zitao-teapot-dragons-egg-style\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis is a true tea lovers\_teapot. This belongs to
        a special collection we commissioned in Jianshui to our exact specifications.
        Jianshui teapots are amazing to brew with.\_We believe the quality of the
        clay speaks for itself and\_had these custom teapots made to exhibit Jianshui
        clay at an affordable price. These are simple, efficient teapots made to be
        tea brewing workhorses. They are small in size and\_medium\_polished.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThese are each handmade by a group of artists\_who
        work\_together.\_They are single fired and unglazed. This is a true clay which\_lacks
        any sand. The natural minerals in the clay will enhance the flavor of your
        tea. Jianshui is in Yunnan, and the clay used in these teapots comes from
        the same mountains that grow puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" target=\\\"_blank\\\"\\u003eWe
        blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eSince these are\_handmade products each are unique.\_There
        are slight variations to each. Each teapot was hand tested by us before sale.
        The lids fit and they seal well. They pour fast and easy. They are ready to
        go!\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThe
        volume is an approximation. The volume of the teapot you receive may be 10%
        more or less. It will be pretty close! It's the perfect size for solo brewing
        or with a friend.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis\_teapot
        is polished\_white Jianshui clay\_and is in\_\\u003cspan\\u003ethe\\u003c\\/span\\u003e\\u003cspan\\u003e
        \\\"Long Dan\\\", or \\\"Dragon's Egg\\\" style\\u003c\\/span\\u003e.\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"\\u003e\_The
        white clay is more rare and therefore is more expensive. It also requires
        more\_\\u003c\\/span\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"\\u003elabor
        to\\u003c\\/span\\u003e\\u003cspan data-mce-fragment=\\\"1\\\"\\u003e\_polish.
        This is why the cost is higher.\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eThese
        are tiny teapots that will easily sit in a single hand. They measure on average
        9cm from tip of spout to end of handle and are around 7cm tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cspan\\u003eYou
        can purchase a hard box and embroidered bag for $10USD additional.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eCheck
        out our video series from Jianshui:\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/H22bki_zsmA\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/GRGbbbX93bk\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/l3JUBMSPLGQ\\\" height=\\\"315\\\"
        width=\\\"560\\\" allowfullscreen=\\\"\\\" frameborder=\\\"0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:48-08:00\",\"created_at\":\"2018-07-08T00:15:28-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
