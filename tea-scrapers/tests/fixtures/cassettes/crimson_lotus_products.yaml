20116071\",\"width\":2000,\"height\":2000},{\"id\":47258478838076,\"created_at\":\"2024-07-04T11:01:10-07:00\",\"position\":6,\"updated_at\":\"2024-07-04T11:01:11-07:00\",\"product_id\":9581375062332,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Vintage_Jianzhan_16-2.jpg?v=1720116071\",\"width\":2000,\"height\":2000},{\"id\":47258479034684,\"created_at\":\"2024-07-04T11:01:10-07:00\",\"position\":7,\"updated_at\":\"2024-07-04T11:01:12-07:00\",\"product_id\":9581375062332,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Vintage_Jianzhan_16-3.jpg?v=1720116072\",\"width\":2000,\"height\":2000},{\"id\":47258478903612,\"created_at\":\"2024-07-04T11:01:10-07:00\",\"position\":8,\"updated_at\":\"2024-07-04T11:01:11-07:00\",\"product_id\":9581375062332,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Vintage_Jianzhan_16-1.jpg?v=1720116071\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9686557819196,\"title\":\"2024 \\\"No Escape\\\" Yunnan
        Bai Cha \\/ White Tea\",\"handle\":\"2024-no-escape-yunnan-bai-cha-white-tea\",\"body_html\":\"\\u003cp\\u003eIt
        was inevitable! There was no escaping it. We've sourced and blended our very
        first white tea. We know you love white tea. Our first love was puerh, but
        this tea really changed our minds. This is a special blend of sun dried Yunnan
        white. It is delicately crafted from old tree and wild material. It's amazing.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        art on this wrapper is a creation of Carl Faulkner ( \\u003ca href=\\\"https:\\/\\/www.instagram.com\\/visualtaffy\\/\\\"\\u003ehttps:\\/\\/www.instagram.com\\/visualtaffy\\/\\u003c\\/a\\u003e
        ) . The original is a large format oil on canvas painting done in 2006 called
        \\u003cem\\u003e\\\"A Study For The (De)struction of A Hero #2\\\"\\u003c\\/em\\u003e.
        It is an incredible piece of art and we are blessed to have it on a cake of
        our tea. Carl also did the art work for our \\\"Dark Depths\\\" cake. I've
        known Carl for a long time. He ran an amazing studio out of the 619 Building
        in Seattle's Pioneer Square called X17. I loved the place and the art that
        he and his friends created. I would visit every month during open gallery
        night. I couldn't get enough. I've followed his work over the years and when
        we started Crimson Lotus Tea we knew we wanted to feature his art whenever
        we could!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is fresh and floral.
        The dry leaf is a pleasant mix of Chinese date cake and coconut. The wet leaf
        is slightly smoky with a hint of habanero. This is a juicy, viscous tea with
        crisp early flavor like fresh squeezed apple juice. This tea is very easy
        to drink. It swallows effortlessly without bitterness of astringency. This
        is definitely a daily drinker with good mouthfeel and great aftertaste.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis is the kind of tea where one sip isn\u2019t enough.
        You just have to have more. It wants you to drink it. You don\u2019t have
        to go light with this tea. You can push it and it will just reward you with
        more depth! When you push it hard there's a fresh mintiness to it that is
        very enjoyable.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eBrew it
        gongfu or grandpa style. This tea will leave you wanting more. There's no
        escape!\\u003c\\/p\\u003e\\n\\u003ch3\\u003eBrewing Instructions\\u003c\\/h3\\u003e\\n\\u003cp\\u003eWhen
        we're brewing this tea we more or less brew it that same as we do for sheng
        puerh. We like to brew it hot and strong. Most people will tell you to brew
        white tea at lower temps and you're welcome to do that. Find what works for
        you! This tea also works great brewed grandpa style.\\u003c\\/p\\u003e\\n\\u003cp\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Rinse once for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:41-08:00\",\"created_at\":\"2024-09-13T12:39:33-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"White Tea\",\"tags\":[\"2021 and After\",\"2024\",\"Single
        Origin\",\"White Tea\"],\"variants\":[{\"id\":50089682108732,\"title\":\"1x
