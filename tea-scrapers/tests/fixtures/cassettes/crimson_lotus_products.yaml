        Xiaguan \\\"Holy Flame\\\" Baoyan Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2019-xiaguan-holy-flame-baoyan-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis tea is a literal staple
        of the Tibetan diet. Xiaguan is the largest supplier of tea to the people
        of Tibet. This brick is cheap and affordable and a great source of energy.
        It is primarily used to make Tibetan Yak Butter Tea. It is consumed daily
        with barley powder. These bricks are called \\\"Baoyan\\\" (\u5B9D\u7130)
        which means \\\"Holy Flame\\\".\\u003c\\/p\\u003e\\n\\u003cp\\u003eLike our
        previous\_offering we purchased these from Tibet, but the material comes from
        Yunnan. This isn't a fancy tea. It is however unique and cheap. It is meant
        as a daily drinker for people living in the highlands of the Himalayas. This
        is a very strong tea. It will be smoky with hay and alfalfa notes. It brews
        smooth but with bitterness and astringency. It pairs perfectly with yak butter.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        Chinese characters\_stamped into the face of the brick say Xiaguan (\u4E0B\u5173).\\u003c\\/p\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Like
        being hit with a big thick hard-packed brick. Of sheng. And you like it.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"http:\\/\\/www.buddhamomtea.com\\/2016\\/08\\/crimson-lotus-2013-xiaguan-holy-flame.html\\\"
        title=\\\"Crimson Lotus Tea Review - Holy Flame Brick\\\"\\u003e--buddhamomtea.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eSamples
        are not available.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2020-10-30T12:13:00-07:00\",\"created_at\":\"2020-10-25T14:41:45-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2011 to 2020\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":32564841971772,\"title\":\"250g Brick\",\"option1\":\"250g
        Brick\",\"option2\":null,\"option3\":null,\"sku\":\"2019_HolyFlame_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"19.99\",\"grams\":260,\"compare_at_price\":null,\"position\":1,\"product_id\":4665125077052,\"created_at\":\"2020-10-25T14:41:45-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\"}],\"images\":[{\"id\":15335294042172,\"created_at\":\"2020-10-25T18:10:50-07:00\",\"position\":1,\"updated_at\":\"2020-10-25T18:10:50-07:00\",\"product_id\":4665125077052,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2019-Holy-Flame-1_8a7d658f-6960-4193-93ca-6d17aa6906fd.png?v=1603674650\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"250g
        Brick\"]}]},{\"id\":4642225487932,\"title\":\"2020 Spring Kunlu Gushu Redux
        - Sheng \\/ Raw Puerh Tea\",\"handle\":\"kunlu-gushu-redux\",\"body_html\":\"\\u003cp\\u003e\\u003cstrong\\u003eThe
        opportunity for this tea is back! This is easily the tea of the year for us.
        We\_have the final 2kg of material this farmer has left. You can buy it per
        gram for $3.75. Buy as much as you want. If you buy enough to have pressed
        into a cake let us know and we can do something special for you. Otherwise
        the exact gram amount that you purchase will be shipped in sealed foil bags.\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        have been hoping for years to be able to offer this tea. Kunlu Shan is probably
        our year after year favorite tea mountain. We love their small arbor tree
        material as it offers a great balance of experience for the cost. Their big
        tree material is quite a lot more expensive and their old tree material is
        borderline unattainable. Each year when we visit Kunlu Shan we've tried these
        special teas. We've waited for the opportunity to be able to share them with
        you.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere isn't a whole lot of Kunlu old
        tree material on the market each year. We were only able to procure a\_few\_hundred
        grams. This material was picked and processed with a great attention to detail.
        Nearly all Kunlu old tree material is pre purchased each year. There are only
        a few hundred old trees in Kunlu Shan. Even in the puerh markets in China
        this tea is quite rare. This material is a blend from a handful of old trees
        that at some point\_in history were heavily trimmed. They have thick trunks
        but are relatively short. We have included pics of a few of the trees.\\u003c\\/p\\u003e\\n\\u003cp\\u003eFrom
        the first steep you can tell that this tea is unique.\_The jasmine floral
        aroma\_teases with hints of dried apple and a longjing style nuttiness. This
        tea is juicy and syrupy thick with great energy. It never gets bitter and
        stays super smooth. Steep after steep is incredibly consistent. This tea will
        brew for a long time. This is a stupendous tea that is a true gift from the
        earth.\_We could drink this tea and only this tea for the rest of our lives
        and be perfectly happy.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eHistorically
        the teas from Kunlu Shan were\_required\_as tribute to the emperor. It is
        entirely possible that the tea from this old tree was drank in the imperial
        courts of ancient China. How cool is that?\\u003c\\/p\\u003e\\n\\u003cp\\u003eIf
        you have an Instagram account check out this video where we do a live tea
        tasting:\_https:\\/\\/www.instagram.com\\/tv\\/CEz-M86pypP\\/ .\\u003c\\/p\\u003e\",\"published_at\":\"2020-09-18T00:10:32-07:00\",\"created_at\":\"2020-09-15T23:38:10-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Limited\",\"tags\":[\"2011 to 2020\",\"Single
        Session Experience\"],\"variants\":[{\"id\":32493083459644,\"title\":\"1 gram\",\"option1\":\"1
        gram\",\"option2\":null,\"option3\":null,\"sku\":\"1x_2020_Kunlu_Gushu_Session\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"3.75\",\"grams\":2,\"compare_at_price\":null,\"position\":1,\"product_id\":4642225487932,\"created_at\":\"2020-09-15T23:38:10-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\"}],\"images\":[{\"id\":15296054526012,\"created_at\":\"2020-10-17T00:40:53-07:00\",\"position\":1,\"updated_at\":\"2020-10-17T00:40:59-07:00\",\"product_id\":4642225487932,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2020-Kunlu-Gushu-Single-Tree-6-2048x.png?v=1602920459\",\"width\":2048,\"height\":2048},{\"id\":15141643452476,\"created_at\":\"2020-09-15T23:39:34-07:00\",\"position\":2,\"updated_at\":\"2020-10-17T00:40:59-07:00\",\"product_id\":4642225487932,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2020-Kunlu-Gushu-Single-Tree-3-2048x.png?v=1602920459\",\"width\":2048,\"height\":2048},{\"id\":15141643485244,\"created_at\":\"2020-09-15T23:39:34-07:00\",\"position\":3,\"updated_at\":\"2020-10-17T00:40:59-07:00\",\"product_id\":4642225487932,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2020-Kunlu-Gushu-Single-Tree-2-2048x.png?v=1602920459\",\"width\":2048,\"height\":2048},{\"id\":15152362455100,\"created_at\":\"2020-09-17T23:54:21-07:00\",\"position\":4,\"updated_at\":\"2020-10-17T00:40:59-07:00\",\"product_id\":4642225487932,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2020-Kunlu-Gushu-Single-Tree-5-2048x.png?v=1602920459\",\"width\":2048,\"height\":2048},{\"id\":15152362487868,\"created_at\":\"2020-09-17T23:54:21-07:00\",\"position\":5,\"updated_at\":\"2020-10-17T00:40:59-07:00\",\"product_id\":4642225487932,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2020-Kunlu-Gushu-Single-Tree-42048x.png?v=1602920459\",\"width\":2048,\"height\":2048}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"1
        gram\"]}]},{\"id\":4614232899644,\"title\":\"Elemental Puerh - 2020 Bulang
        Sheng Puerh Tea Dragon Balls\",\"handle\":\"elemental-puerh-2020-bulang-sheng-puerh-tea-dragon-balls\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis is your classic \\\"Bulang\\\"
        young sheng puerh! It hits all the points. It's grassy with barnyard overtones
        and roasted sweet corn aroma. There are hints of smokiness wisping through
        the\_lingering edge\_brought by the bitterness and astringency. This tea has
        strength and long legs. What it lacks in body it makes up for in energy. Ride
        the Bulang wave and see where it takes you!\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"Elemental
        Puerh\\\" is our collection of single origin, direct sourced, hand rolled\_puerh
        tea dragon balls. These are high quality examples of individual mountain personality.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        wrapper is stamped with an infographic containing all the important origin
        details. You have the year of picking, the season of picking, the mountain
        name and symbol, the distance from the equator, and special indicators for
        wild or old tree material.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach\_dragon\\u003cspan\\u003e\_\\u003c\\/span\\u003eball
        is individually steamed and hand rolled. They weigh 8 grams and are perfect
        for a session in your gongfu2go portable tea brewer or gaiwan \\/ teapot.
        Each order contains 6x 8g dragon balls.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        material is from Spring of\_2020 and was picked from\_small arbor tree material
        growing in Bulang.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse\_a
        single tea ball\_in a brewing vessel between 100 and 150ml.\_Use water at
        or near boiling. Do a long initial rinse between 15 and 30s. Let the tea sit
        for a few minutes. Start with quick steeps under 10s. With each re-steep adjust
        the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2020-08-24T19:59:39-07:00\",\"created_at\":\"2020-08-07T23:20:21-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
