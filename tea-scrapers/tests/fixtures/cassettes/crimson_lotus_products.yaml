        Title\"]}]},{\"id\":740166697020,\"title\":\"2018 Spring \\\"Honeymoon\\\"
        Sheng \\/ Raw Puerh Tea Blend\",\"handle\":\"2018-spring-honeymoon-sheng-raw-puerh-tea-blend\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis
        tea is just pure happiness. You're sitting on a beach in the warm sun without
        a care in the world. You have a maitai in your hand and nowhere to be. You
        close your eyes and find that you're actually at home drinking this tea. This
        tea is very relaxing. It has a lot of body, relaxing energy, minor fruity
        and floral notes with just enough bitterness and astringency to keep it interesting.
        This tea is soft and smooth and very easy to drink and lose yourself.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea was a cooperative project with Cody\_of\_\\u003ca href=\\\"https:\\/\\/www.theoolongdrunk.com\\/\\\"
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\"\\u003e'The Oolong Drunk'\\u003c\\/a\\u003e
        and Stephanie (\\u003ca href=\\\"http:\\/\\/www.stephanieosborne.com\\\" target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer\\\"\\u003estephanieosborne.com\\u003c\\/a\\u003e).
        Cody approached us with an idea for a blend and wrapper and we worked to source
        the material and make it happen. Stephanie did the design work. This blend
        is a custom piece of work that took us quite a while to nail down this year.
        It is a Manzhuan based blend and features all first Spring picking old tree
        material. We are very happy with how it turned out and hope you are too!\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003eElevation:
        1300m +\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eOld
        Tree Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eStone
        Compressed\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003cli\\u003e200g
        Cake\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:47-08:00\",\"created_at\":\"2018-07-10T11:41:08-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
