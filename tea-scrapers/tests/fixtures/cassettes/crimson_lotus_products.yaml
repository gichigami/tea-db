        A\\\" Gushu Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2024-spring-lincang-section-a-gushu-sheng-raw-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003e\\u003c\\/span\\u003eThis
        has become a favorite tea of ours over the years. It has some real potential
        for aging. It is still young, fresh, vibrant and approachable. It has an inviting
        floral, grassy aroma with hints of citrus and a memory of jasmine in the taste.
        It is a real pleaser. There is a lush vibrancy normally only associated with
        fresh young sheng the week of production that this tea maintains for a very
        long time. This has been part of our personal collection for a while and have
        had so many great sessions with it.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        farmers have broken their tea gardens up into sections. \\\"Section A Gushu\\\"
        is our hands down favorite. It's so good!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eWe have a limited number of these cakes available.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
