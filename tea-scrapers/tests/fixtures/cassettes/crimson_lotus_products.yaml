        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis is the
        same lovely material that went into our pressed Manzhuan cakes. The aromas
        are floral but subdued and delicate. This tea shines in body and peaceful
        energy. This tea is thick and stays thick through the steeps. It's a real
        pleasure to drink and just seems to always hit the spot whatever mood we're
        in.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"Elemental
        Puerh\\\" is our collection of single origin, direct sourced, hand rolled\_puerh
        tea dragon balls. These are high quality examples of individual mountain personality.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        wrapper is stamped with an infographic containing all the important origin
