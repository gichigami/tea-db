        Dian Hong Black Tea Blend 200g Cake\",\"handle\":\"2021-roam-dian-hong-black-tea-blend-200g-cake\",\"body_html\":\"\\u003cp\\u003e\\u003cspan\\u003eThis
        black tea is clean and\_vibrant with a pleasant herbal profile and\_low in
        tannins. This is a\_perfect daily drinker.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThe\_hearty
        aroma is brisk and greets you with a\_hint of citrus.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"font-weight: 400;\\\"\\u003eOur passion is puerh tea but we can't
        ignore the amazing black tea offerings that come from Yunnan.\_\\u003c\\/span\\u003eDian
        hong ( \u6EC7\u7EA2 ) is a special black tea that comes from\_Yunnan's\\u003cspan\\u003e\_\\u003c\\/span\\u003elarge
        leaf varietal camellia sinensis assamica. The connection to puerh tea is undeniable.
        This tea was made from the exact same trees that get processed as puerh.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"font-weight: 400;\\\"\\u003eThese\_cakes are loosely pressed at
        200 grams.\_You can brew this tea gongfu style, grandpa style, or even boil
        it on the stove.\_\\u003c\\/span\\u003eOur favorite method is boiling a chunk
        on the stove for more than 10 minutes, straining off the leaves, then adding
        honey and milk for an incredible Hong Kong style milk tea that is very addictive.\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:57-08:00\",\"created_at\":\"2021-09-20T13:46:41-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Black Tea\",\"tags\":[\"2021\",\"2021 and After\",\"Dian
        Hong \\/ Black Tea\"],\"variants\":[{\"id\":39498646061116,\"title\":\"200g
        Cake\",\"option1\":\"200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2021_Roam_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"29.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":6651993882684,\"created_at\":\"2021-09-20T13:46:42-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"},{\"id\":39498646093884,\"title\":\"20g
