        200g Cake\",\"20g Sample\"]}]},{\"id\":4665126191164,\"title\":\"2019 Xiaguan
        \\\"Holy Flame\\\" Baoyan Sheng \\/ Raw Puerh Tea\",\"handle\":\"2019-xiaguan-holy-flame-baoyan-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis tea is a literal staple
        of the Tibetan diet. Xiaguan is the largest supplier of tea to the people
        of Tibet. This brick is cheap and affordable and a great source of energy.
        It is primarily used to make Tibetan Yak Butter Tea. It is consumed daily
        with barley powder. These bricks are called \\\"Baoyan\\\" (\u5B9D\u7130)
        which means \\\"Holy Flame\\\".\\u003c\\/p\\u003e\\n\\u003cp\\u003eLike our
        previous\_offering we purchased these from Tibet, but the material comes from
        Yunnan. This isn't a fancy tea. It is however unique and cheap. It is meant
        as a daily drinker for people living in the highlands of the Himalayas. This
        is a very strong tea. It will be smoky with hay and alfalfa notes. It brews
        smooth but with bitterness and astringency. It pairs perfectly with yak butter.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        Chinese characters\_stamped into the face of the brick say Xiaguan (\u4E0B\u5173).\\u003c\\/p\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Like
        being hit with a big thick hard-packed brick. Of sheng. And you like it.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"http:\\/\\/www.buddhamomtea.com\\/2016\\/08\\/crimson-lotus-2013-xiaguan-holy-flame.html\\\"
        title=\\\"Crimson Lotus Tea Review - Holy Flame Brick\\\"\\u003e--buddhamomtea.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eSamples
        are not available.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:02-08:00\",\"created_at\":\"2020-10-25T14:52:35-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":32564847050812,\"title\":\"250g Brick\",\"option1\":\"250g
        Brick\",\"option2\":null,\"option3\":null,\"sku\":\"2019_HolyFlame\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"14.99\",\"grams\":260,\"compare_at_price\":null,\"position\":1,\"product_id\":4665126191164,\"created_at\":\"2020-10-25T14:52:35-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":15335293976636,\"created_at\":\"2020-10-25T18:10:41-07:00\",\"position\":1,\"updated_at\":\"2020-10-25T18:10:41-07:00\",\"product_id\":4665126191164,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2019-Holy-Flame-1.png?v=1603674641\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"250g
        Brick\"]}]},{\"id\":4665136644156,\"title\":\"2020 \\\"Baby Dragon\\\" Sheng
        \\/ Raw Puerh Tea\",\"handle\":\"2020-baby-dragon-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eEveryone needs a baby dragon
        in their life. Think of this tea as \\\"Slumbering Dragon\\\" lite. We love
        our Slumbering Dragon tea and many of you do as well, but it is a potent tea
        and quite pricy. We wanted to share a tamer experience that was easier on
        the budget. We have\_taken the wild Kunlu material of Slumbering Dragon and
        blended it with material from nearby gardens. It turns out so good! We created
        a blend that harnesses the Slumbering Dragon essence and energy but is more
        approachable and affordable.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a
        potent little tea. Don't let the cutesy wrapper art fool you, this baby dragon
        has got a lot to give.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eStasia Burrington
        has created the artwork for us. It's amazing and perfect and we love it. Follow
        here here:\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/stasiaburrington\\/\\\"
        target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/stasiaburrington\\/\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Pu'er\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1900+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Blended\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSpring
        Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
