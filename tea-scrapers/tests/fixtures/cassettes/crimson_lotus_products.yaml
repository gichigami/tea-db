        200g Cake\",\"20g Sample\"]}]},{\"id\":2474112483388,\"title\":\"Spring 2018
        \\\"Jingmai LOVE\\\" Sheng \\/ Raw Puerh from Crimson Lotus Tea\",\"handle\":\"spring-2018-jingmai-love-sheng-raw-puerh-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan style=\\\"text-decoration:
        underline;\\\"\\u003e\\u003cem\\u003e\\u003cstrong\\u003e\\u003c\\/strong\\u003e\\u003c\\/em\\u003e\\u003c\\/span\\u003eWe
        here at Crimson Lotus Tea are in love with Jingmai. Jingmai is an amazing
        tea growing area with deep history and fantastic teas. We have blogged about
        our \\u003ca title=\\\"Crimson Lotus Tea - Jingmai Mountain and Mangjing Village\\\"
        target=\\\"_blank\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/13518649-jingmai-mountain-and-mangjing-village\\\"
        rel=\\\"noopener noreferrer\\\"\\u003eadventures in Jingmai\\u003c\\/a\\u003e.
        We crafted the original Jingmai LOVE\_as an affordable Jingmai opportunity.
        There is a lot of amazing material in Jingmai but much of it is pricy. This
        tea won't break the bank and still has everything we've come to love from
        a Jingmai puerh.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis blend re-captures
        the essence of Jingmai. You have depth, body, floral features, and an amazing
        honey aroma. With some age these features will really develop.\\u003c\\/p\\u003e\\n\\u003cp\\u003eIf
        you love Jingmai, you'll love \\\"Jingmai LOVE\\\"!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1300+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Blended\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003ch2\\u003eVideo
        Tour of Jingmai\\u003c\\/h2\\u003e\\n\\u003cp\\u003e\\u003ciframe width=\\\"560\\\"
        height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/sifAYPk3qns\\\"
        frameborder=\\\"0\\\" allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e \\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:38-08:00\",\"created_at\":\"2019-03-22T20:41:06-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Sheng
        \\/ Raw Puerh\",\"Single Origin\"],\"variants\":[{\"id\":22265107447868,\"title\":\"1x
