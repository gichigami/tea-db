        of tea balls (100g)\",\"A Load of BS - 1x 10 pack of tea balls (50g)\"]}]},{\"id\":10112071729468,\"title\":\"2025
        Kunlu Shan Old Tree Bai Cha \\/ White Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2025-kunlu-shan-old-tree-bai-cha-white-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWe
        went to Kunlu Shan sheng hunting but were impressed with the white teas that
        we found. We bought a lot of aged white tea but we got a little bit of new
        material too. This new production stood out and we bought a kilo of it. We
        pressed it into 5x 200g cakes. This is all we have to sell! That's not a lot.
        If these teas are popular we can for sure get more next year. So let us know
        what you think of it!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is very
        floral with blood orange citrus notes and a hint of ripe banana. The color
        is rich. It is sweet, juicy, and creamy. This is a very clean brewing tea
        with good flavor and aroma. We're sure it will age well; if you can refrain
        from drinking it.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 200g cake. It is a single origin offering that is unique and
        offers an incredible tea experience. It is from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
