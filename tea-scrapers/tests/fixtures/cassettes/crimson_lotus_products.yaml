        ready to smash your gourd! This tea is a potent cha qi powerhouse. We had
        fun with this tea. It's got a classic sheng profile with good bitterness and
        astringency. It's a strong tea though. It will sneak up on you. This is a
        fun tea to go hard steeping on with friends.\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou
