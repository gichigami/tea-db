        Title\"]}]},{\"id\":6558859493436,\"title\":\"2007 Changtai Menghai Sheng
        \\/ Raw Tuo Cha (100g) :: Seattle Inventory\",\"handle\":\"2007-changtai-menghai-sheng-raw-tuo-cha-100g-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWe have enjoyed a good relationship
        with Changtai since we first started selling tea. We have bought and sold
        a lot of tea from them including the \\\"Top of the Clouds\\\" and \\\"Memorial\\\".
        We tried this 2007 offering this year and were quite pleased with it. We bought
        what we could and are making it available to you now. It is a\_great value.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea is in a great place age-wise right now. It brews up with a gorgeous deep
        caramel color. In the early steeps it has enough bitterness and astringency
        to keep things interesting. It is very smooth with a thick menthol cooling
        in the throat. The aromas are fantastic. It has all the woodsy, musty, earthy,
        aged aromas you hope for in a sheng with some age.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003e\\u003cem\\u003e\\u003c\\/em\\u003e\\u003c\\/strong\\u003eThis
        aged sheng puerh comes from the Yunnan Changtai Tea Industry Group. They have
        been in the puerh business since the late 90's. This 100 gram mini tuo is
        called \\\"Menghai Cha Tuo\\\". The shape is reminiscent of a birds nest and
        is called \\\"tuo cha\\\". It has been in use in China for\_a very long time.
        Some consider this shape to be superior because you get a large surface area
        in a small package. Others contend that air gets trapped in the pocket which
        helps with aging.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea\_been stored
        in hot, humid Xishuangbanna until recently. They are now stored\_in Kunming.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eTh\\u003c\\/span\\u003e\\u003cspan\\u003eis
        is a 100g tuo cha.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEnjoy!\\u003c\\/p\\u003e\",\"published_at\":\"2022-08-24T15:11:11-07:00\",\"created_at\":\"2021-04-14T20:58:46-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
