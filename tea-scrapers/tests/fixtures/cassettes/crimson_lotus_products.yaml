        Teacup #05 - 70ml\",\"handle\":\"huaning-super-glaze-teacup-5-70ml\",\"body_html\":\"\\u003cp\\u003e\\u003cspan\\u003eThe
        glaze on these Huaning cups is some of the best we've ever seen. The rich
        colors just pop. Brewing with these cups are your tea table can really enhance
        your tea session.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eWe know that purchasing teaware online can be
        difficult. We try to make it as easy as possible. You will get exactly the
        cup pictured. There is only one. We took time and effort to capture this cups
        beauty as accurately as possuble. These cups are incredibly difficult to photograph.
        They are so shiny and reflective and it is very hard to capture them honestly.
        We tried to edit the photos as little as possible. We did adjust the exposure
        and contrast to really show off what these cups are capable of in the right
        light. These cups will not disappoint!\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eHuaning ( \\u003c\\/span\\u003e\u534E\u5B81
        ) is a town in Yunnan province with a long history of ceramics. The locals
        harvest clay from the nearby hills. They source available minerals and hand
        blend their own glazes. Intense blues and greens are a common theme. Each
        shop protects their special glaze blend like an industrial secret. These provide
        a beautiful contrast to both their white clay and the deep red of their iron
        rich clays.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe appreciate
        the connection this teaware has with Yunnan and puerh tea. Puerh is a product
        of the soil and hands of Yunnan, and so is this teaware.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003eThese tea cups hold 70ml and
        measure 9.5cm Wide x 5.5cm Tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eYou
        will receive the teacup pictured. There is only one.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003ciframe
