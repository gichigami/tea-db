        brewing workhorses. They are small in size and medium polished.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThese are each handmade by a group of artists\_who
        work\_together.\_They are single fired and unglazed. This is a true clay which\_lacks
