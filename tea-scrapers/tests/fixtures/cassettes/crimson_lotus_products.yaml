        \\\"Rise of the Dark Lotus\\\" Cake\",\"20g \\\"Rise of the Dark Lotus\\\"
        Sample\"]}]},{\"id\":4687906668604,\"title\":\"2018 \\\"Dark Depths\\\" Shou
        \\/ Ripe Puerh :: Seattle Inventory\",\"handle\":\"2018-dark-depths-shou-ripe-puerh-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis tea has been a long time
        coming. We started working on this blend early in 2018. We had a vision for
        what we wanted and stuck it out until we found exactly the right\_material
        to blend. It wasn't an easy hunt. A few of you had a chance to try it loose
        but we ran out of time to get it pressed last year. The issue really was that
        we needed the right piece of art.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe missing
        piece was created by Carl Faulkner (\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/visualtaffy\\/\\\"\\u003ehttps:\\/\\/www.instagram.com\\/visualtaffy\\/\\u003c\\/a\\u003e\_)
        . I've known Carl for a long time. He ran an amazing studio out of the 619
        Building in Seattle's Pioneer Square called X17. I loved the place and the
        art that he and his friends created. I would visit every month during open
        gallery night. I couldn't get enough. I've followed his work over the years
        and when we started Crimson Lotus Tea I knew I wanted to work with him on
        a project somehow.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eLate last year we
        messaged Carl who lives in Portland now and asked if we could stop by, brew
        tea for him, and chat about a potential collaboration. We drank tea for hours.
        It was great. I shared my vision for this tea and Carl was more than happy
        to help us out.\_\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eDark Depths is something
        I've envisioned since our earliest days. The shou puerh that truly captivates
        me is the super thick, super dark brewing, inky black, raven's wing in the
        dark of night versions. The ones that offer no reflection and seem to pull
        in all available light. We missed the chance on a perfect material our second
        year and have focused hard until we got what we needed for this tea.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea is a monster. It is hiding in the deep waiting to be called forth. It
        rises in your cup and provides steep after steep of thick, dark, motor oily
        goodness.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eAs good as the\_loose leaf
        blend was it turned out 10x better after pressing. This tea is aromatic like
        the Nannuo Mini Mushrooms and just keeps on going. It is rich and thick and
        luscious and sweet. It's so much more than most shou puerh. It's herbal and
        earthy and as deep as the Marianas.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003e\\u003cem\\u003eDescend
        friend and drink from the deep!\\u003c\\/em\\u003e\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Dark
        Depths Shou Puer is perfect for those who love their shou with a generously
        thick texture, sweetness, and balance. It has not a lick of funk, wet pile
        or fishiness. That said, it is amazing easy drinking. \\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2018-dark-depths-shou-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Dark Depths\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T06:03:24-07:00\",\"created_at\":\"2020-11-26T17:34:03-08:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
