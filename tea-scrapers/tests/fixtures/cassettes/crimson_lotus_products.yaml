        Anywhere! The Gongfu2go Portable Tea Brewer.\",\"handle\":\"gongfu2go\",\"body_html\":\"\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\u2026
        I love the Gongfu2go and it is a cool device that is much needed for the gongfu
        tea drinker on the go.\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca href=\\\"http:\\/\\/oolongowl.com\\/gongfu2go-portable-gongfu-style-tea-brewer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Oolong Owl Reviews - Gongfu2go \u2013 Portable Gongfu Style Tea
        Brewer from Crimson Lotus Tea\\\" target=\\\"_blank\\\" rel=\\\"noopener noreferrer\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\u2026
        this is a pretty nifty device from Crimson Lotus Tea.\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/www.theoolongdrunk.com\\/single-post\\/2019\\/08\\/07\\/GongFu2Go-by-Crimson-Lotus-Tea\\\"
        title=\\\"The Oolong Drunk Reviews - GongFu2Go by Crimson Lotus Tea\\\" target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer\\\"\\u003e--theoolongdrunk.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003caside
        class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\u2026
        I have to say that it\u2019s amazing. This is a necessity for any self-respecting
        tea lover!\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca href=\\\"https:\\/\\/tea-adventures.net\\/gongfu2go\\/\\\"
        title=\\\"Tea Adventures Reviews - GongFu2Go by Crimson Lotus Tea\\\" target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer\\\"\\u003e--tea-adventures.net\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cp\\u003eUntil
        now, portable brewing of tea in the gongfu style hasn't been easy. Sure you
        can carefully pack a travel gaiwan, fairness cup, filter, and tea cup to take
        with you, but you still can't brew on the go. You've got to sit down and set
        up a tasting space. That's fine, but we've always wanted a truly portable
        option that\_allowed actual gongfu brewing. We never found anything that allowed
        for that, so we had to make one. This tea brewer is the result of years of
        experimentation and research.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is the
        last tea brewer you\u2019ll ever need. This has been designed exclusively
        for portable gongfu style brewing. Many portable tea brewers don't allow for
        full leaf expansion; the brew chambers are too tiny. In our brewer the large
        volume steeping chamber keeps the leaves from getting compacted and allows
        for free and easy brewing of any type of tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea brewer is versatile. It is designed to simulate the gongfu brewing experience.
        This is just like brewing with a 150ml gaiwan and fairness cup. Everything
        that you do when you brew gongfu style you can do with this. You can use it
        as a flip brewer. You can use it as a pourover brewer. You can even use the
        full volume and brew grandpa style.\_\\u003c\\/p\\u003e\\n\\u003ch3\\u003eFeatures\\u003c\\/h3\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003eLarge
        150ml tea brewing chamber\\u003c\\/li\\u003e\\n\\u003cli\\u003eIdentical sized
        150ml tea drinking chamber\\u003c\\/li\\u003e\\n\\u003cli\\u003eDouble wall
        borosilicate glass construction\\u003c\\/li\\u003e\\n\\u003cli\\u003eStainless
        steel filter\\u003c\\/li\\u003e\\n\\u003cli\\u003eFood grade silicone seals\\u003c\\/li\\u003e\\n\\u003cli\\u003eCeramic
        valve with twist to open\\/close feature\\u003c\\/li\\u003e\\n\\u003cli\\u003eStainless
        steel inner caps\\u003c\\/li\\u003e\\n\\u003cli\\u003eOpens from both ends
        to allow for pressure relief\\u003c\\/li\\u003e\\n\\u003cli\\u003eIntegrated
        carrying handle\\u003c\\/li\\u003e\\n\\u003cli\\u003eMinimized plastic \\/
        water interaction\\u003c\\/li\\u003e\\n\\u003cli\\u003e7.5cm Wide by 24cm
        Tall ( 3\\\" x 9.5\\\" )\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003eOne
        issue we wanted to address with this design was the ability to release the
        pressures that build up in tea brewers like this. When you add boiling water
        to double wall glass enclosed tea brewers a significant amount of pressure
        can build up. If you're not careful it can spray boiling water when you open
        it. This tea brewer allows you to open the tea brewer from either end to release
        pressure. Being able to do this while steeping is a unique and necessary safety
        feature.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea brewer allows the gongfu
        experience to be mobile for the first time.\_Use this\_brewer in airplanes,
        trains, buses, and cars.\_Use\_it while walking, hiking, shopping, and working
        in an office. All you need is hot water!\\u003c\\/p\\u003e\\n\\u003ch3\\u003eDetailed
        Instructions\\u003c\\/h3\\u003e\\n\\u003cp style=\\\"text-align: left;\\\"\\u003e\\u003ca
        href=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/gongfu2go-instructions-page-1_2048x2048.png\\\"
        target=\\\"_blank\\\" title=\\\"Crimson Lotus Tea - gongfu2go Instructions\\\"
        rel=\\\"noopener noreferrer\\\"\\u003e\\u003cimg src=\\\"\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/gongfu2go-instructions-page-1_large.png?v=1565186977\\\"
        alt=\\\"gongfu2go instructions\\\"\\u003e\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"text-align: left;\\\"\\u003e\\u003ca href=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/gongfu2go-instructions-page-2_2048x2048.png\\\"
        target=\\\"_blank\\\" title=\\\"Crimson Lotus Tea - gongfu2go Instructions\\\"
        rel=\\\"noopener noreferrer\\\"\\u003e\\u003cimg src=\\\"\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/gongfu2go-instructions-page-2_large.png?v=1565187009\\\"
