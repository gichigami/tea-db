        Yiwu Gao Shan Sheng \\/ Raw Puerh Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2024-spring-yiwu-gao-shan-sheng-raw-puerh-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eYiwu
        is a very large tea growing area in Yunnan and has a lot of diversity of character
        in the teas produced there. Gao Shan village is located in the NW of Yiwu
        town and has a lot of high quality tea tree gardens. We are excited to be
        able to offer a Gao Shan cake.\\u003c\\/p\\u003e\\n\\u003cp\\u003eGao Shan
        sheng puerh tea is characteristically sweet and delicate with wild honey notes.
        This tea does not disappoint! It has very clean and clear forest notes. It
        has hints of campfire aroma. It is a very enchanting tea. It is smooth and
        soft with delicate herbal notes followed with a simple bitterness.\\u003c\\/p\\u003e\\n\\u003cp\\u003eFor
        a sheng puerh tea it has a very special earthiness. You can really taste the
        forest. This is a very grounding tea with a lot of depth. The bitterness and
        astringency are very well balanced.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eWe only have a few of these cakes available for
        sale.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003ePrefecture:\_\\u003c\\/span\\u003e\\u003cspan\\u003eXishuangbanna\\u003c\\/span\\u003e\\n\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1100+m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSpring
        Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 200g cake.\\u003cmeta charset=\\\"utf-8\\\"\\u003e It is a single
        origin offering that is unique and offers an incredible tea experience. It
        is from a single garden and remains unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
