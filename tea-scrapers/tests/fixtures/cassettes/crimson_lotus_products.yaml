        Title\"]}]},{\"id\":4611657072700,\"title\":\"2006 \\\"Troublemaker\\\" Sheng
        \\/ Raw Puerh Fang Cha (100g) :: Seattle Inventory\",\"handle\":\"2006-troublemaker-sheng-raw-puerh-fang-cha-100g-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWe first tried this exact tea
        a few years ago and loved it. We wanted to buy as much as we could to offer
        it to you. Between then and now has been a rollercoaster of negotiations with
        the owner. Long story short, we finally have the tea and got it for a decent
        price.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis type of 100g square brick
        is called a \\\"fang cha\\\". For whatever reason this exact pressing mold
        was used by countless factories in the mid 2000's. You see them everywhere.
        The material in this brick is the first that really interested us. There are
        a lot of buds in this material and you don't normally see that.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        front of the brick says \u666E\u6D31\u65B9\u8336 \\\"Pu Erh Fang Cha\\\".
        That means Pu Erh Brick Tea. The back has the\_traditional Zhong Cha logo.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        material pressed into this brick is Bulang in origin and you can tell. The
        tea is up front, strong, and smoky. It's just perfect. The smokiness is what
        makes this tea. It is really fun to drink. If you are at all into scotch this
        tea will be your new favorite tea.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        thought the name \\\"Troublemaker\\\" fit. The art is from a 500 year old
        Chinese brush stroke painting and we just love it\\u003c\\/p\\u003e\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Crimson
        Lotus Tea\u2019s 2006 Troublemaker fang cha is a potent dry-aged sheng with
        notes of peat, smoke, and sweetness. This tea will generate many reinfusions
        and likely you can go a bit easier on the leaf too.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2006-troublemaker-sheng-puer-fang-cha-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Troublemaker\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEnjoy!\\u003c\\/p\\u003e\\n\\u003ciframe
        width=\\\"560\\\" height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/jcE8YmGZStY\\\"
