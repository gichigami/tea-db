        200g Cake\"]}]},{\"id\":739111895100,\"title\":\"Budget Jianshui Zitao Teapots\",\"handle\":\"budget-jianshui-zitao-teapots\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eSometimes even the best potters make mistakes. We have
        a pretty high standard for the teaware that we sell. When we find teapots
        that have noticeable cosmetic flaws we can't sell them for full price. Our
        loss is your gain! You could consider these \\\"Factory Seconds\\\".\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThese teapots have no issues that will affect tea brewing.
        They seal and pour well. The issues are largely cosmetic and you may not even
        notice. If you are interested in a Jianshui pot for daily brewing but have
        been hesitant about the high price then these teapots are perfect for you.
        These teapots have the same high quality clay that our more expensive teapots
        do. They are tea brewing workhorses!\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese
        teapots are single fired and unglazed. This is a true clay which\_lacks any
        sand. The natural minerals in the clay will enhance the flavor of your tea.
        Jianshui is in Yunnan, and the clay used in these teapots comes from the same
        mountains that grow puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" rel=\\\"noopener
        noreferrer\\\" target=\\\"_blank\\\"\\u003eWe blogged about this unique town
        here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eSince
        these are\_handmade products each are unique.\_There are slight variations
        and flaws to each. We will not be accepting returns on these items. Additionally
        these teapots do not include the hard cover box and embroidered bag. You are
        welcome to add those to your order for an additional $10.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eWe have 3 styles of teapots available right now and
        each are highly polished Jianshui white clay. The volume measurements are
        approximate. If you need a precisely sized teapot please look at our higher
        end options.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003ePolished White Xishi - 90-100ml\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan
