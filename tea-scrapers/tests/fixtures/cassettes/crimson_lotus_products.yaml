        Title\"]}]},{\"id\":10111962579260,\"title\":\"\\\"Jade Rabbit\\\" Sheng \\/
        Raw Puerh Tea Dragon Balls\",\"handle\":\"jade-rabbit-sheng-raw-puerh-tea-dragon-balls\",\"body_html\":\"\\u003cp\\u003eJade
        Rabbit has been a very popular blend of ours for nearly a decade now. We had
        a small amount of each of the particular components of this blend left over
        after pressing the original batch. We decided it would be fun to blend it
        all together and press it into dragon balls.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWhat
        we have are tiny little tastes of the full Jade Rabbit experience. This is
        a very complex tea. You can steep this tea for many times. This tea has energy,
        depth, body, incredible aroma, a thick sweetness, and a long lingering aftertaste.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        steep super easy! Drop one ball into your brew vessel of choice 75-100ml or
        so. Add boiling water slowly. Let it steep for 30s and watch the ball open
        up. Discard this initial rinse. Wait 5 minutes with the lid on and the tea
        ball will be open and ready to brew. Start with quick steeps under 10s. With
        each re-steep adjust the steep time to your taste.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-08-15T01:15:44-07:00\",\"created_at\":\"2025-07-28T12:07:59-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":51958112846140,\"title\":\"Double Bunnies
