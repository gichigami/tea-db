        Rabbit - 1x 10 pack of tea balls (50g)\",\"option1\":\"Solo Rabbit - 1x 10
        pack of tea balls (50g)\",\"option2\":null,\"option3\":null,\"sku\":\"Jade_Rabbit_Tea_Balls_1x\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"24.99\",\"grams\":60,\"compare_at_price\":null,\"position\":2,\"product_id\":10111962579260,\"created_at\":\"2025-07-28T12:07:59-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":52415621333308,\"created_at\":\"2025-08-07T11:04:56-07:00\",\"position\":1,\"updated_at\":\"2025-08-07T11:04:58-07:00\",\"product_id\":10111962579260,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Jade-Rabbit-Tea-Balls-4-IG.png?v=1754589898\",\"width\":2048,\"height\":2048},{\"id\":52432316629308,\"created_at\":\"2025-08-08T19:22:50-07:00\",\"position\":2,\"updated_at\":\"2025-08-08T19:22:52-07:00\",\"product_id\":10111962579260,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/B8A09551-5899-40A6-9AA2-CCAD4A90251C.jpg?v=1754706172\",\"width\":2846,\"height\":2846}],\"options\":[{\"name\":\"How
        many do you want?\",\"position\":1,\"values\":[\"Double Bunnies - 2x 10 packs
        of tea balls (100g)\",\"Solo Rabbit - 1x 10 pack of tea balls (50g)\"]}]},{\"id\":10111961104700,\"title\":\"2024
        Spring Lao Man'E Gushu  Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2024-spring-lao-mane-gushu-sheng-raw-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eThis
        is a truly lovely tea. Lao Man'E is no slouch in the puerh tea world. This
        is a potent tea. The tea trees in Lao Man'E, in the heart of Bulang, are known
        for being some of the most bitter in all of Yunnan. There is so much more
        than that though. These are complex and layered tea experiences. Bitterness
        in tea isn't something that you should shy from or try to avoid. Take it in
        stride. Embrace the bitterness and it will reward you. These teas will gift
        you with a long and lingering sweetness.\\u003c\\/p\\u003e\\n\\u003cp\\u003eAdd
        the leaves to a warmed vessel and let it sit for a minute. Open it and inhale.
        The aroma is immediately inviting. You just want to crawl right in. It's a
        very clean aroma and reminiscent of baked apple pie. The wet leaf aroma is
        figs and dates..\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe tea starts off light.
        It is sweet and slightly minty with a pleasant throat cooling sensation. From
        there the tea begins to develop with each steep. The bitterness grows but
        it's so good. It's thick and very refreshing. There is a very clear aftertaste
        with each sip.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a very generous
        tea and will steep for. a long time. You can use far less leaf than you normally
        would. Or just leaf it up and ride it out. \\u003cmeta charset=\\\"utf-8\\\"\\u003eThis
        is a luscious and lovely tea. You won't be disappointed.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBitterness
        isn't something to fear in a tea like this. If you feel the need you can manage
