        Title\"]}]},{\"id\":6608686874684,\"title\":\"2019 \\\"Nevermore\\\" Shou
        \\/ Ripe Puerh Tea 357g Cake\",\"handle\":\"2019-nevermore-ripe-puerh-tea-357g-cake\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWe are excited to be able to
        offer this bud heavy shou puerh. Just look at that pressed cake. The last
        \\\"gongting \\/ imperial grade\\\" shou we had was the 2008 Bulang which
        we sold out of a long time ago. This one featuring a fantastic photo from
        @TheTeaFairy is\_destined to be a new favorite.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        little buddy (see what I did there?) comes on dark and rich and strong. The
        buds give so much in the early steeps. Things smooth out after 6-8 steeps
        but after that it's all sweetness and the tea can keep going into the teens
        easily.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe loose compression
        lets you easily get right into the thick of it. The buds brew dark and the
        tea is milky smooth. It just disappears down your throat with\_hints of almond
        cookies and toasted caramel over the base of rich soil and forested earthiness.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-07-24T02:09:03-07:00\",\"created_at\":\"2021-07-22T22:13:18-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
