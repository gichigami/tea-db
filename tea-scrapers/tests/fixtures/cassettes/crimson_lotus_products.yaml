        Zone\\\" 100g Cake - Autumn Sheng \\/ Raw Puerh Tea\",\"handle\":\"2019-fall-into-the-danger-zone-100g-cake-autumn-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eAre
        you ready to Fall into the Danger Zone?! We are back in the snake garden of
        the Hekai King Cobra with a pressed fall offering featuring\_updated artwork
        from Jake Knapp ( \\u003ca href=\\\"https:\\/\\/www.instagram.com\\/knappuer\\/\\\"
        title=\\\"Instagram - Jake Knapp @knappuer\\\" target=\\\"_blank\\\"\\u003e@knappuer\\u003c\\/a\\u003e
        ) .\\u003c\\/p\\u003e\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Fall
        into the Danger Zone starts off alluring thick, and well balanced. This tea
        gets bitter in the later infusions but holds onto the awesome floral aftertaste.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"https:\\/\\/oolongowl.com\\/2019-fall-into-the-danger-zone-autumn-sheng-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Troublemaker\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\u003cp\\u003eIf
        you don't know the amazing story behind this tea\_\\u003ca href=\\\"https:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/the-dangers-of-the-tea-industry-a-true-story-from-the-jungles-of-southwestern-china\\\"
        title=\\\"Crimson Lotus Tea - The Dangers of the Tea Industry. A true story
        from the jungles of Southwestern China.\\\" target=\\\"_blank\\\"\\u003eread
        all about it here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eCheck
        out this video from Hekai.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        width=\\\"560\\\" height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/QlxvJUK0z2g\\\"
        frameborder=\\\"0\\\" allow=\\\"accelerometer; autoplay; encrypted-media;
        gyroscope; picture-in-picture\\\" allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
