20117034\",\"width\":2000,\"height\":2000},{\"id\":47258614399292,\"created_at\":\"2024-07-04T11:17:12-07:00\",\"position\":6,\"updated_at\":\"2024-07-04T11:17:14-07:00\",\"product_id\":9581391577404,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Vintage_Jianzhan_20-3.jpg?v=1720117034\",\"width\":2000,\"height\":2000},{\"id\":47258614333756,\"created_at\":\"2024-07-04T11:17:12-07:00\",\"position\":7,\"updated_at\":\"2024-07-04T11:17:14-07:00\",\"product_id\":9581391577404,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Vintage_Jianzhan_20-2.jpg?v=1720117034\",\"width\":2000,\"height\":2000},{\"id\":47258614169916,\"created_at\":\"2024-07-04T11:17:12-07:00\",\"position\":8,\"updated_at\":\"2024-07-04T11:17:14-07:00\",\"product_id\":9581391577404,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Vintage_Jianzhan_20-1.jpg?v=1720117034\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9581375062332,\"title\":\"Vintage Wood Fired Jianzhan
        Teacup #16 80ml \\\"Oil Drop\\\"\",\"handle\":\"vintage-wood-fired-jianzhan-teacup-16-80ml-oil-drop\",\"body_html\":\"\\u003cp\\u003eJianzhan
        is the original custom teaware. With a\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Jian_ware\\\" title=\\\"Wiki
        Jianzhan Teaware\\\"\\u003ehistory nearly a thousand years old\\u003c\\/a\\u003e\\u003cspan\\u003e\_\\u003c\\/span\\u003ethis
        gorgeous glazed clay teaware from Fujian was designed exclusively\_to enhance
        the experience of drinking tea. The iron rich glaze creates unique patterns.
        No two are ever the same.\_The long history of this teaware is truly fascinating.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere
        is a magic that happens with tea in these cups. The iron content works to
        soften the water and enhance the experience. Some people claim these cups
        cheat; the difference can be that noticeable. When we're analyzing teas for
        purchase we can't use these cups. They make everything taste better.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eJianzhan
        tea cups are in general thicker and heavier than other clay cups. These are
        no exception. These cups are dense and feel great in the hand. They are high
        fired and made from naturally sourced glazes. They will be an amazing addition
        to your tea ware collection!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003eThis tea cup holds 80ml and
        measures 9.5cm Wide x 5cm Tall. It weighs 220g.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThe glaze variations in this cup are truly stunning!
        You can gaze into it for hours. This is a very special cup.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThe
        glaze used in this cup was blended by hand from the old Jianzhan glaze sources
        in Fujian. The glaze isn't available anymore. The modern cups just can't compete.\_\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThese were wood fired 20 years ago in a traditional
        dragon kiln that has since been dismantled.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eJianzhan
        is notoriously difficult to photograph. We did our best with these product
        shots. There's such a range of color and light interactions that we tried
        to capture them in different poses and light sources. These cups never disappoint
        when you hold them in your hand.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        cup was entirely handmade and is unique. The one you get will be the exact
        one you see in the photographs.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e \\u003cstrong\\u003eThis teacup will come with
        a tea towel and teacup bag.\\u003c\\/strong\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:42-08:00\",\"created_at\":\"2024-07-04T11:00:42-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
