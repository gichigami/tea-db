        Cake\"]}]},{\"id\":4611641540668,\"title\":\"2003 Changtai \\\"Ji Nian \\/
        Memorial\\\" Sheng \\/ Raw Tuo Cha (100g) :: Seattle Inventory\",\"handle\":\"2003-changtai-ji-nian-memorial-sheng-raw-tuo-cha-100g-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThis
        tea has a classic aged sheng experience that belies the age.\_ This tea is
        rich, aromatic, and a truly pleasant experience. The warming leaves reveal
        an inviting, deep, dark musty aroma of age. As water washes the leaves a refreshing
        aroma of earthiness with a rich sweetness comes out. The liquor is a hue of
        dark amber. The flavor is smooth and thick with a strong mustiness. It is
        sweet and heavy without bitterness or astringency. It's a very comforting
        experience that immediately feels familiar.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003e\\u003cem\\u003e\\u003c\\/em\\u003e\\u003c\\/strong\\u003eThis
        aged sheng puerh comes from the Yunnan Changtai Tea Industry Group. They have
        been in the puerh business since the late 90's. This 100 gram mini tuo is
        called \\\"Ji Nian\\\" which means \\\"Memorial\\\". Changtai chose this name
        and blend to memorialize their history. The shape is reminescent of a birds
        nest and is called \\\"tuo cha\\\". It has been in use in China for\_a very
        long time. Some consider this shape to be superior because you get a large
        surface area in a small package. Others contend that air gets trapped in the
        pocket which helps with aging.\\u003c\\/p\\u003e\\n\\u003cp\\u003eChangtai
        is well known for the quality of their early 2000's puerh. Their master blenders
        created this blend from Menghai area Da Shu (Big Tree) puerh tea trees in
        2003. It has been stored in hot, humid Xishuangbanna until around 2013. It
        has been in Kunming since then. This blend\_contains a higher ratio of large
        leaves than buds.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003e\_This
        is a 100g tuo cha. We have very few of these left.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eEnjoy!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        width=\\\"560\\\" height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/TXiLASDoQdg?rel=0\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-08-09T14:04:18-07:00\",\"created_at\":\"2020-08-03T13:48:41-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
