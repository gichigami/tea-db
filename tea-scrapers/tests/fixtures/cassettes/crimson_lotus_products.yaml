        Sample\"]}]},{\"id\":6735765897276,\"title\":\"2021 Pasha Shan Shou \\/ Ripe
        Puerh Tea\",\"handle\":\"2021-pasha-shan-shou-ripe-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eAs
        far as single origin shou puerh goes this is some of the best we've ever had.
        It brews so clean and clear with dark amber hues. The aroma spans from marzipan
        to fresh boiled potatoes. It drinks super smooth and sweet with a mouthfeel
        like warm chocolate milk. This is a very satisfying shou puerh that is a very
