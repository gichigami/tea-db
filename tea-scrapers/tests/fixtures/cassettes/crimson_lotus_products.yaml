        200g Brick\"]}]},{\"id\":4687905980476,\"title\":\"2000 \\\"Old Warrior\\\"
        Shou \\/ Ripe Puerh 250g Golden Melon :: Seattle Inventory\",\"handle\":\"2000-old-warrior-shou-ripe-puerh-250g-golden-melon-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis award winning and rare
        shou puerh is certainly worth experiencing. We are pleased to be able to offer
        something of this vintage and quality. The origin details of this tea are
        lost to time.\_What we know is that this tea is from the turn of the millennia,
        has been well stored, and is a great pleasure to drink. We call this one \\\"Old
        Warrior\\\" or\_'\u8001\u52C7\u58EB \\/ lao yong shi' in Chinese. This tea
        has seen it all and lived to tell about it.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        vintage shou\_brews smooth, clean, and clear with an intense amber color.
        The aroma has vibrant mineral notes that reveal a depth of maturity like reading
        an old book or walking through a deep forest. The flavor is slightly nutty
        with a pleasing earthiness of fertile soil. There is no bitterness or astringency.
        The aftertaste is sweet and comfortable in the throat.\_The energy is calming.
        This is a tea to be cherished and shared.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        wrappers on these from our Seattle inventory have been through a lot to get
        here. They have some\_rips and tears. Yours may be wrapped with a second wrapper
        on the outside to hold it all together.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        shape is called '\u91D1\u74DC \\/ jin gua', which means 'golden melon'. This
        is one of the classic puerh shapes.\\u003c\\/p\\u003e\\n\\u003caside class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Words
        can\u2019t quite explain the depth or longevity of this tea.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca
        href=\\\"http:\\/\\/www.aguywithagaiwan.com\\/2016\\/08\\/11\\/2000-old-warrior-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - 2000 Old Warrior\\\"\\u003e--aguywithagaiwan.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eWinner
        of the 2016 Best Aged Puerh\\u003c\\/strong\\u003e from theoolongdrunk.com\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"...\_showcased
        for their excellence in releasing an exceptional aged puer. This puer was
        not only clean and in excellent condition, but carried exceptional flavor
        which was accessible for all tea drinkers. \\\"\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ca
        href=\\\"http:\\/\\/coolcodyc.wixsite.com\\/theoolongdrunk\\/single-post\\/2016\\/12\\/28\\/WINNERS-of-The-Best-of-2016\\\"
        title=\\\"2016 Winners - Best Aged Puerh\\\" target=\\\"_blank\\\"\\u003e--theoolongdrunk.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse twice for a few seconds\_each. Start with quick steeps under
        10s. With each re-steep adjust the steep time to your taste.\\u003c\\/p\\u003e\\n\\u003cp\\u003e(250
