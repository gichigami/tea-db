        \\\"Sunlicker\\\" Sheng \\/ Raw Puerh Tea\",\"handle\":\"2021-sunlicker-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cp\\u003eThis
        is a fantastic blend of 2021 Spring material we worked on for quite a while
        last year.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is floral and fruity
        with a dry aroma like a fresh picked bushel of apples. It is very sweet with
        cotton candy notes. This tea makes your mouth happy. It is juicy and full
        and bright with a great mouthfeel.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThere
        is a noticeable bitterness but it is perfectly balanced. This is a very tasty
        tea with a good pucker in the mouth and plenty of returning sweetness in the
        throat!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe sun plays such a large role
        in the production of puerh tea. The high altitude puerh tea gardens in Yunnan
        that we source from are some of the highest in the world. The altitude averages
        more than a mile above sea level. Being that close to the sun does something
        special to the tea as it grows.\_After picking and firing the teas are set
        to dry in the direct sun. There is a special essence imparted to puerh tea
        that is lacking\_in other teas. The teas are quite literally sun kissed. You
        taste the sun when you drink young sheng. It's sun lickin' good!\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:48-08:00\",\"created_at\":\"2022-03-11T09:22:17-08:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
