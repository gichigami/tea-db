2022-08-24T13:18:16-07:00\",\"product_id\":6999578869820,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/Sunlicker-4-IG_5712f61c-428d-4c2b-a04e-aafd05692611.jpg?v=1661372296\",\"width\":2048,\"height\":2048}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":6999572217916,\"title\":\"\\\"519 Shanghai\\\" Memorial
        Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"519-shanghai-memorial-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eMay
        19th, 2020 was a dark day for the tea industry. This is the day when thousands
        of tea packages just went missing in Shanghai. Their last tracking update
        looked like this: 2020-05-19 15:49 \u4E0A\u6D77\u5E02, \u5DF2\u4EA4\u822A\u7A7A\u516C\u53F8\u8FD0\u8F93
        (Shanghai, has been handed over to airline transportation). That was it. That
        is the last we saw of them.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe had hundreds
        of orders whose last status update was this. China Post claims they all left
        the country. They even gave us a flight number \\\"Airbus A320-240\\\". As
        far as we can tell that's not even a plane capable of flying from Shanghai
        to San Francisco. The mystery deepened. After many hopeful months we realized
        that these packages were lost forever. We reached out to other tea companies
        and found that they had also lost a great many packages. This was tough for
        us but we know it was tough for our customers as well.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        had a special on 5\\/19\\/2021 to commemorate the event but wanted to do more.
        We have pressed a special\_blend and we're calling it \\\"519 Shanghai\\\".
        This is a really great blend we spent a lot of time crafting. We had a very
        specific story we wanted to tell with this tea.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        would not describe this as a beginner sheng. This tea comes out swinging.
        It has some of the richest aromas we've ever had.\_The aroma is sweet citrus
        \\/ berry with floral undertones.\_It smells like a mix between a lemon drop
        and hawthorn berries. It's very enchanting.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        tea has very noticeable early bitterness. It feels fantastic in the throat
        and the mouth. You can underleaf this tea and still get plenty of enjoyable
        sessions out of it. Once you get into the later steeps this tea is all sweetness.
        The flavors hover in the umami sphere with a nice brininess.\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou'll
        want to eat before a strong session with this tea. We have high hopes for
        this one aging over the years. There is some really amazing material in this
        blend.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a 200g cake.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-08-24T15:11:13-07:00\",\"created_at\":\"2022-08-24T13:12:21-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2021\",\"2021 and After\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":40341781839932,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"519Shanghai_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"72.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":6999572217916,\"created_at\":\"2022-08-24T13:12:52-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\"}],\"images\":[{\"id\":31096448974908,\"created_at\":\"2022-08-24T13:12:32-07:00\",\"position\":1,\"updated_at\":\"2022-08-24T13:12:32-07:00\",\"product_id\":6999572217916,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2021-519-Shanghai-Product-Pics-3_d55c8c3a-73e1-4366-9c91-97003669b5ab.png?v=1661371952\",\"width\":2000,\"height\":2000},{\"id\":31096449007676,\"created_at\":\"2022-08-24T13:12:33-07:00\",\"position\":2,\"updated_at\":\"2022-08-24T13:12:33-07:00\",\"product_id\":6999572217916,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2021-519-Shanghai-Product-Pics-1_1d3efc3c-f250-4345-b5b5-ff3787619be3.png?v=1661371953\",\"width\":2000,\"height\":2000},{\"id\":31096449040444,\"created_at\":\"2022-08-24T13:12:33-07:00\",\"position\":3,\"updated_at\":\"2022-08-24T13:12:33-07:00\",\"product_id\":6999572217916,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2021-519-Shanghai-Product-Pics-2_106a9032-d8e4-4598-aa37-6b26e1b213bc.png?v=1661371953\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":6982769475644,\"title\":\"2021 \\\"Altered State\\\" Sheng
        \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2021-altered-state-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWe
        are back at it again with this mind-bending tea. If you're familiar with the
        first Altered State then this tea will need no introduction. If not, just
        know that this tea is the essence of Cha Qi \\/ Tea Energy. If you\_have ever
        been curious about what Cha Qi is then this is the tea for you. If you already
        know what Cha QI is then this tea is for you.\\u003c\\/p\\u003e\\n\\u003cp\\u003eJust
        like the original this tea lays down heavy hitting Cha Qi and doesn't let
        up. This tea is a creative blend of all of the most intense, hardest hitting,
        mental lobotomizing, consciousness opening, face melting sheng puerh we could
        find this year. These cakes are hand blended and sure to impress.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        artwork is a custom piece by PNW\_\\u003cspan\\u003eartist and puerh tea lover
        M. L. Macdonald\_\\u003c\\/span\\u003e\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/alchemichael\\/\\\"
        target=\\\"_blank\\\"\\u003e@alchemichael\\u003c\\/a\\u003e\\u003cspan\\u003e\_.
        The background image is courtesy of NASA\\u003c\\/span\\u003e\\/JPL-Caltech\\/UCLA.\\u003c\\/p\\u003e\\n\\u003cp\\u003eNailing
        down an exact flavor and aroma profile has proved elusive. This tea has many
        faces. It has a base in the fruity \\/ floral sphere but it will surprise
        you. There are times when this tea gives strong recollections of\_our coffee
        days brewing a pour-overs of small batch roasted Colombian Geisha beans. It
        provides a very delightful session.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 200g cake.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-08-24T15:11:13-07:00\",\"created_at\":\"2022-08-03T22:35:01-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Seattle\",\"tags\":[\"2021\",\"2021 and After\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":40301253263420,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2021_AlteredState_Cake_Seattle\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"99.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":6982769475644,\"created_at\":\"2022-08-03T22:35:01-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\"}],\"images\":[{\"id\":30947604234300,\"created_at\":\"2022-08-03T22:35:06-07:00\",\"position\":1,\"updated_at\":\"2022-08-03T22:35:06-07:00\",\"product_id\":6982769475644,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2021-Altered-State_9f255441-37a4-4963-b636-dec51d855b15.png?v=1659591306\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":6982768689212,\"title\":\"2021 \\\"Dark Depths\\\" Shou
        \\/ Ripe Puerh Tea :: Seattle Inventory\",\"handle\":\"2021-dark-depths-shou-ripe-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\\"And when you steep long
        enough into the abyss the abyss steeps into you!\\\"\\u003c\\/p\\u003e\\n\\u003cp\\u003eFire
        up your kettles and get ready for the black. Back to the abyss we stare; once
        more descending to that deep darkness. The original depths call out to you
        and you will answer.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cem\\u003eDescend
        friend and drink from the deep!\\u003c\\/em\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        gorgeous artwork is by PNW artist\_Carl Faulkner (\_\\u003ca href=\\\"https:\\/\\/www.instagram.com\\/visualtaffy\\/\\\"\\u003ehttps:\\/\\/www.instagram.com\\/visualtaffy\\/\\u003c\\/a\\u003e\_)
        .\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe original Dark Depths was an instant
        hit, then we lost most of it in a sad incident with a USPS facility in New
        Jersey. This is Dark Depths 2: The Re-Darkening. It wasn't possible to recreate
        the original blend perfectly but we worked diligently this year to make something
        we were proud of.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a thick and meaty
        shou. There are dark chocolate notes with a slight coffee-like bitterness.
        Dark and\_inky black like a raven's wing in\_a moonless night. The ones that
        offer no reflection and seem to pull in all available light.\_\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea is a monster. It is hiding in the deep waiting to be called forth. It
        rises in your cup and provides steep after steep of thick, dark, motor oily
        goodness.\_It is rich and thick and luscious and sweet and creamy. It's herbal
        and earthy and as deep as the Marianas.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 200g cake.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-08-24T15:11:12-07:00\",\"created_at\":\"2022-08-03T22:32:20-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
