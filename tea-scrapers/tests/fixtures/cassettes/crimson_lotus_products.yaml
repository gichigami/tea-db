        Title\"]}]},{\"id\":6558857330748,\"title\":\"2019 \\\"Moon Princess\\\" Sheng
        \\/ Raw Puerh :: Seattle Inventory\",\"handle\":\"2019-moon-princess-sheng-raw-puerh-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThe legend of the Moon Princess
        is a famous one in Chinese history. Her name is \\u003ca title=\\\"Wikipedia
        - Moon Princess - Chang'e\\\" href=\\\"https:\\/\\/en.wikipedia.org\\/wiki\\/Chang%27e\\\"
        target=\\\"_blank\\\"\\u003eChang'e\\u003c\\/a\\u003e and she lives on the
        moon with a giant rabbit. She is immortal, but is banished to the moon and
        cannot leave. She plays an important role in the Autumn harvest and festivals.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        have pressed this tea a few times now. This Autumn material is potent! This
        is a really great tea the hits far above the price point. The material comes
        from Bangdong. Bangdong is so close and so similar to Xigui that most people
        would sell this material as Xigui 'area'.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        aroma is vegetal with hints of sweet corn. The body is thick and immediate.
        The flavor is orchid sweetness with a slight bitterness and some astringency.
        There is a sweet aftertaste that lingers. The tea can brew quite strong if
        you let it.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis year we commissioned
        a custom piece of artwork by tea lover and PNW artist Jake Knapp. We couldn't
        be happier with the design. It is gorgeous and adds so much to the story of
        this tea. Check out Jake ( @knappuer ) and his work here:\_\\u003ca title=\\\"Jake
        Knapp Art Knappuer\\\" href=\\\"https:\\/\\/www.instagram.com\\/knappuer\\/\\\"
        target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/knappuer\\/\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003e200g
        Cake\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1600m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
