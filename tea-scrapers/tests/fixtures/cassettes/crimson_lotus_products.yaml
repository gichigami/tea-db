        floral bitterness in this tea but that just sets you up for the sweetness
        that quickly follows. The astringency is there too but all you'll care about
        is the body, the aftertaste, and the aroma. Well, that and the energy. The
        first couple steeps in you'll be asking yourself where the energy is, but
        it's there climbing up your brain like ivy on a university brick wall. Before
        you know it you're covered and random kids are applying for admission and
        asking for scholarships.\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:\_1700m
