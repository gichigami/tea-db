        Sunshine\\\" Sheng \\/ Raw Puerh Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2024-spring-bai-ying-shan-whispering-sunshine-sheng-raw-puerh-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003e\\u003c\\/span\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThis tea has a clean and perfumey aroma that is
        vegetal with a strong citrus note and a hint of tobacco. The flavor is bright,
        crisp, and juicy with smooth grass notes and an earthy vibrance.\_\_The bitterness
        and astringency are just enough to keep you interested. The body is mellow
        and the aftertaste pleasant. There is an energy to this tea that can come
        on strong. Listen close and hear the Sun whispering to you through this tea.
        There is a lot to tell.\\u003c\\/p\\u003e\\n\\u003cp\\u003eBai Ying Shan,
        or White Warbler Mountain, is a remote high altitude tea growing region in
        Lincang Prefecture. This mountain has more than 10 unique varietals of camellia
        sinensis. The material in this tea is composed entirely from one ancient tree
        varietal called 'dabaiyakou' which means 'big white buds' . The picking and
        processing of this tea is 100% done by hand.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        chose to call this puerh \\\"Whispering Sunshine\\\".\_The tea gardens in
        Bai Ying Shan are the highest elevation that we source tea from. Grown\_above
        2200m (7200 feet or 1.3 miles)\_we imagined these tea trees were close enough
        to hear the gentle voice of the Sun. The Sun plays a critical role through
        the entire lifespan of puerh tea from growing the trees to drying the leaf.
        Puerh is defined by the sun drying stage. If it isn't sun dried, it isn't
        puerh.\_This puerh has been direct sun dried.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is our go to choice for a hiking tea. Brew up a thermos of this ahead of a
        hike and drink it when you're thirsty. It is clean, refreshing, and full of
        energy!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eWe
        have a limited number of these cakes available.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2200+\_m\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
