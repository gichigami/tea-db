        \\\"Fall Into The Danger Zone\\\" Cake\"]}]},{\"id\":4322752102460,\"title\":\"Split
        Personality\\\" Sheng \\/ Shou Comparison Tasting Set\",\"handle\":\"split-personality-sheng-shou-comparison-tasting-set\",\"body_html\":\"\\u003cp\\u003eThis
        is an amazing opportunity to understand puerh tea production and how the wodui
        processing methods convert sheng puerh into shou puerh. We are offering a
        side by side pressed cake tasting set of sheng puerh and shou puerh from the
        same material.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe sheng puerh tea was
        picked and processed in Spring 2018 from high quality old tree material in
        Lao Man'E. This material was then put through the wodui process to create
        a very unique shou puerh. Before the wodui processing began we kept out 10kg
        of the natural sheng to create this before and after educational tasting opportunity.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        sheng is a balanced blend of Lao Man'E material and creates a balanced sweet
        aftertaste for the bitterness. It's amazing to see how much original personality
        continues to through to the final shou puerh product. Take these cakes and
        do side by side sessions with the sheng and the shou. You'll see why we call
        them \\\"Split Personality\\\".\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tasting
        set contains 2x 40g pressed cakes. One sheng, and one shou!\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:22-08:00\",\"created_at\":\"2019-10-30T16:28:22-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Educational\",\"Sheng
        \\/ Raw Puerh\",\"Single Origin\"],\"variants\":[{\"id\":31069531373628,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2019_Split_Personality\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"34.99\",\"grams\":90,\"compare_at_price\":null,\"position\":1,\"product_id\":4322752102460,\"created_at\":\"2019-10-30T16:28:22-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":13342580965436,\"created_at\":\"2019-10-31T00:19:32-07:00\",\"position\":1,\"updated_at\":\"2019-10-31T00:19:32-07:00\",\"product_id\":4322752102460,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/Split-Personality.png?v=1572506372\",\"width\":1889,\"height\":1889}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
