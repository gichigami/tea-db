        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eKunlu Shan is one of our year after
        year favorites. We have been sourcing tea from the same garden and farmers
        for more than 10 years. It never disappoints. This material is from their
        small arbor trees that is called Xiao Qiao Mu (that just means small arbor
        tree). We call it KXQM for short.\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThe tea is full bodied and creamy with minimal bitterness
        or astringency. It is very floral with potent orchid notes. There is a finishing
        sweetness like cotton candy. This tea always hits the spot!\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eWe have a limited
