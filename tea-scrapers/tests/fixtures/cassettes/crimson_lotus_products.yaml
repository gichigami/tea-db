        only have 3 of these left. When they're gone, they are gone!\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis is a true tea lovers teapot. This belongs to a
        special collection we commissioned in Jianshui to our exact specifications.
        Jianshui teapots are amazing to brew with The extra work takes many hours
        and adds to the cost. We believe the quality of the clay speaks for itself
        and had these custom teapots made to exhibit Jianshui clay at an affordable
        price. These are simple, efficient teapots made to be tea brewing workhorses.
        They are small in size and medium polished.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese
        are each handmade by a group of artists\_who work\_together.\_They are single
        fired and unglazed. This is a true clay which\_lacks any sand. The natural
        minerals in the clay will enhance the flavor of your tea. Jianshui is in Yunnan,
        and the clay used in these teapots comes from the same mountains that grow
        puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
