        Cake\"]}]},{\"id\":9229447463228,\"title\":\"2023 Kunlu \\\"Slumbering Dragon\\\"
        Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2023-kunlu-slumbering-dragon-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan style=\\\"text-decoration: underline;\\\"\\u003e\\u003c\\/span\\u003eWe
        are always happy to be able to offer this unique tea from the deep depths
        of the mountainous forests of Kunlu Shan. Year after year this is one of the
        most interesting and singularly unique puerh teas that we source. This is
        a rare puerh. Of all the tea we sell\_this is the hardest to source and the
        hardest to pick. There is a village in Kunlu Shan that isn't even on Google
        maps. Once you're there you need to hike another 3 kilometers into the mountains
        to get to these trees. The hike is often steep. You gain\_500 meters and it
        takes more than 3 hours to get there. No one there knows how long the trees
        have been there or anything about their history. When you ask locals\_the
        age they simply reply that\_they are as old as the earth itself. Check out
        the video below.\\u003c\\/p\\u003e\\n\\u003cp\\u003eOn the north slope\_of
        a steep mountain ridge, surrounded by dense forest, these trees reach to the
        sky. The trees at 20-40 feet tall literally scrape the ceiling of the forest.
        Impressive does not begin to describe these ancient beings. The Chinese call
        these trees '\u9AD8\u6746' \\/ g\u0101o g\u0101n which means \\\"Tall Pole\\\".\\u003c\\/p\\u003e\\n\\u003cp
        style=\\\"text-align: center;\\\"\\u003e\\u003cimg style=\\\"float: none;\\\"
        src=\\\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2015-Spring-KSSD-Wide-Forest-800x_grande.jpg?10927791457707797572\\\"
        alt=\\\"\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese skinny trees
        often grow\_in a trio and remain branchless until near the top. Barefoot,
        only the young and the brave, carefully climb to the top to pick the Spring
        harvest. There are no ropes, harnesses, or soft landings. It is dangerous
        work. In an attempt to conserve their strength for the ages these trees each
        produce precious few buds and new spring growth. A day's harvest for a young
        eager picker often maxes out around just 2kg of fresh leaf. After roasting
        and sun drying perhaps half a kilo is all they have to show for the days work.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThere is not that much material available each year
        from these trees. We get as much as we can. This is a very unique puerh.\_The
        flavor is strong, pure, natural, and\_noticeably bitter, but with a\_transcendent\_chaqi.
        There is an aroma in the dry leaves that is reminiscent of wild blueberries.
        Wet aroma is honeysuckle and alfalfa. This is a tea that is hard to define.
        The aromas are both familiar and mysterious. Everything about this tea is
        distinct and individual. The profile is at times sharp and distinct. The energy
        is mentally energizing. It creates a calm, but it is a waking calm.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThe bitterness in this tea isn't off putting. It moves
        from the mouth to the tongue to the back of the throat and lingers beside
        the aftertaste.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eWe named
        this puerh \\\"Slumbering Dragon\\\" because of the visual image of these
        ancient trees growing so peacefully in the mountains. They seem to us like
        dragons of a previous era\_in a deep slumber for eons. The strong energy in
        this tea mirrors the strength of dragons in our active imaginations.\_\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eWe present this tea as is. This is pure single origin,
        high altitude, wild tree puerh. It will not taste\_like a lot of the puerh
        out there. Even in Kunlu Shan this tea is unique. It is strong and intense
        with a very\_unique bitterness that can linger. The intensity of bitterness
        will fade with age. The material we offered in 2014 has mellowed quite nicely.
        The energy in this tea is quite strong, it will sneak up on you. We hope you
        get a chance to try this amazing and unique tea.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        \\u003cmeta charset=\\\"utf-8\\\"\\u003ePu'er \\/ Simao\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        2000+m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSpring
        Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        is a single origin sheng puerh tea offering that is unique and offers an incredible
        tea experience. It is are from a single garden and remains unblended and processed
        individually. \\u003c\\/span\\u003e\\u003cspan\\u003eThis tea was aged loose
        for a year before getting pressed. The extra time aging as loose material
        gives the tea a nice head start.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe
        pressed very few of these cakes and will not be able to offer samples.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp
