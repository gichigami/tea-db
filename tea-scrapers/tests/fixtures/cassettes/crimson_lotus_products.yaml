        200g Cake\",\"20g Sample\"]}]},{\"id\":9703292109116,\"title\":\"\\\"Gourdsmasher\\\"
        Sheng \\/ Raw Puerh Tea Dragon Balls\",\"handle\":\"gourdsmasher-sheng-raw-puerh-tea-dragon-balls\",\"body_html\":\"\\u003cp\\u003eGet
        ready to smash your gourd! This tea is a potent cha qi powerhouse. We had
        fun with this tea. It's got a classic sheng profile with good bitterness and
        astringency. It's a strong tea though. It will sneak up on you. This is a
        fun tea to go hard steeping on with friends.\\u003c\\/p\\u003e\\n\\u003cp\\u003eYou
        can get either 6x or 12x 5g tea balls in one packet. That's 30 or 60 grams
        of total tea. 5 grams is perfect for a solo session. Add a second ball if
        you're brewing for friends.\\u003c\\/p\\u003e\\n\\u003caside class=\\\"pquote\\\"\\u003e\\n\\u003cblockquote\\u003e\\u003c\\/blockquote\\u003e\\n\\u003c\\/aside\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        steep super easy! Drop one ball into your brew vessel of choice 75-100ml or
        so. Add boiling water slowly. Let it steep for 30s and watch the ball open
        up. Discard this initial rinse; or drink it if you're super brave! Wait 5
        minutes with the lid on and the tea ball will be open and ready to brew. Start
        with quick steeps under 10s. With each re-steep adjust the steep time to your
        taste. Enjoy and don't say we didn't warn you! \U0001F61C\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:37-08:00\",\"created_at\":\"2024-09-25T22:29:44-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"2020\",\"Sheng
