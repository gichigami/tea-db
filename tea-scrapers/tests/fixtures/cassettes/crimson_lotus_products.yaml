      string: "{\"products\":[{\"id\":10357718024508,\"title\":\"2025 \\\"The Spellbound
        Stag\\\" Kunlu Shan Big Tree Bai Cha \\/ White Tea - 200g Cake\",\"handle\":\"2025-kunlu-shan-old-tree-aged-bai-cha-white-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eWe
        went to Kunlu Shan sheng hunting but were impressed with the white teas that
        we found. We created this blend to highlight the amazing experience we had
        with these white teas. This is primarily a blend of their big tree white,
        but there is some old tree material in there as well.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea is very floral with blood orange citrus notes and a hint of ripe banana.
        The color is rich. It is sweet, juicy, and creamy. This is a very clean brewing
        tea with good flavor and aroma. We're sure it will age well; if you can refrain
        from drinking it.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 200g cake. It is a single origin offering that is unique and
        offers an incredible tea experience. It is from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
