        Sea\\\" Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2024-beneath-an-emerald-sea-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThis
        is the 4th time we have pressed this blend. This is one of our earliest creations
        and goes back to our first year in Yunnan. As we travelled further south the
        forests got lusher and thicker and greener. As we drank more incredible teas
        on our journey it was easy to imagine ourselves beneath an emerald sea.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThe
        art on this cake is an update on the original piece created by Sara Breakfield
        ( @twigandsnip ). Follow her here:\_\\u003ca rel=\\\"noopener noreferrer\\\"
        href=\\\"https:\\/\\/www.instagram.com\\/twigandsnip\\/\\\" target=\\\"_blank\\\"\\u003ehttps:\\/\\/www.instagram.com\\/twigandsnip\\/\\u003c\\/a\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        tea never disappoints. This latest pressing is no exception. It is vibrant
        with youthful energy and brews thick and juicy. It is fruity and floral with
        a creamy body. The bitterness and astringency adds a pleasant tanginess. The
        aromas are inviting. This tea has stamina and can brew for a long time.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eIn
        our experience this tea ages very well. Our 2016 pressing is quite tasty.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1900+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Blended\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSpring
        material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Rinse once for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2024-12-19T02:04:14-08:00\",\"created_at\":\"2024-12-19T00:41:44-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
