        of each!\"]}]},{\"id\":65428389907,\"title\":\"Custom Gongfu Tea Table\",\"handle\":\"custom-gongfu-tea-table\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eAfter a long time looking for
        the perfect tea table we set out to make our own. This is the product of many
        months of work designing and\_testing mockups. This gonfu tea table works
        great! It is made of bamboo and lacquered black. It is wide and roomy\_with
        space for teacups, teapot, fairness cup, and even a handful of teapets. The
        table slopes slightly to allow water to drain easily. The drain line cut into
        the table slopes to the drain hole. The drain was made large enough to house
        a tiny frog teapet which comes included! The tiny frog\_acts as a blocker
        for larger leaves that might get stuck in the hose.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea table measures (9.5\\\" long x 15.75\\\" wide x ~1\\\" tall) (24cm x 40cm
        x 3.5cm). It weighs under 750grams. A drainage hose is included.\\u003c\\/p\\u003e\\n\\u003cdiv\\u003eEnjoy
        the journey of puerh!\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\_\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\u003cem\\u003eWith
        first use there is a slight lacquer aroma that goes away in a day or so.\\u003c\\/em\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\u003cem\\u003e\_\\u003c\\/em\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\u003cem\\u003e\\u003c\\/em\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\u003cem\\u003e\\u003c\\/em\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\n\\u003cem\\u003e\\u003cem\\u003eFor
        proper drainage ensure placement on a level surface or adjust table appropriately.\\u003c\\/em\\u003e\\u003c\\/em\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cem\\u003e\\u003cspan\\u003e\_\\u003c\\/span\\u003eIf
        the included hose is too short check your local hardware store for a cheap
        replacement.\\u003c\\/em\\u003e\\n\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\u003c\\/div\\u003e\\n\\u003cdiv\\u003e\\u003cmeta
