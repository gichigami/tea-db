4690351420,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/E9685873-8410-46FC-B96E-9662BF5541F0.jpg?v=1754721390\",\"width\":2587,\"height\":2587},{\"id\":52486772752700,\"created_at\":\"2025-08-14T11:56:01-07:00\",\"position\":12,\"updated_at\":\"2025-08-14T11:56:06-07:00\",\"product_id\":10114690351420,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/44070D1B-5706-4ED8-A118-DCC00E6E6C88.jpg?v=1755197766\",\"width\":3024,\"height\":3024}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":10114688844092,\"title\":\"Jianshui Black Clay Lotus Tea
        Cup - 65ml\",\"handle\":\"jianshui-black-clay-lotus-tea-cup-65ml\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eThese cups were designed to match our Black Clay Lotus
        Gaiwans. These are really solid little cups. They have the same lotus design
        inlaid with a red glaze. The clay is the same aged Wanyao clay. These are
        really great little cups.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eWe really love Jianshui clay. It has a purity
        and soul that comes through the tea session. For these cups we used the rare
        Wanyao clay. With changing government regulations it has become difficult
        or impossible to mine for new clay under Wanyao village in Jianshui. Most
        Jianshui teaware now are made of a blend of clay from as far as 25km away.
        It's still good clay, but the purists prefer the old Wanyao clay. We still
        have access to some of it but the stock is dwindling! The clay in these cups
        was mined 20 years ago, processed, and has been aging since then.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eJianshui clay is amazing to brew with. We believe the
        quality of the clay speaks for itself.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese
        are each handmade by a group of artists who work together. They are single
        fired and unglazed. This is a true clay which lacks any sand. The natural
        minerals in the clay will enhance the flavor of your tea. Jianshui is in Yunnan,
        and the clay used in these cups comes from the same mountains that grow puerh
        tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" target=\\\"_blank\\\"\\u003eWe
        blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince these are handmade products
        each are unique. There are slight variations to each.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis teacup is polished black, Jianshui clay and are
