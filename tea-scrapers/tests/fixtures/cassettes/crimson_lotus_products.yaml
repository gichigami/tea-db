ds\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2023-TenTuo-4_81f88f44-20f6-4951-ac83-9b0be9215e14.png?v=1702504145\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9002715447612,\"title\":\"2023 \\\"#PNWLOVE\\\" Shou \\/
        Ripe Puerh Tea :: Seattle Inventory\",\"handle\":\"2023-pnwlove-shou-ripe-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWe
        are absolutely in love the Pacific Northwest and this tea is an expression
        of that. There are so many strong connections to be made between shou puerh
        and exploring the amazing Cascade and Olympics mountains. There's something
        special about hiking through old growth coastal forests after the rain. The
        mustiness of the damp forest floor, the wet pine trees, and the ever present
        moss are what dreams are made of. At least they are for us. \U0001F49A\\u003c\\/p\\u003e\\n\\u003cp\\u003e#PNWLOVE
        is\_our love song to the Pacific Northwest. This custom blend is very creamy
        with clean earthy soil notes. There are some marzipan and sticky rice notes.
        This is just a super mellow, easy drinking, extra creamy, smooth drinking
        shou.\\u003c\\/p\\u003e\\n\\u003cp\\u003eGrab a cake of this and share our
        love of the great PNW!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2023-12-13T13:59:28-08:00\",\"created_at\":\"2023-12-13T13:42:04-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
