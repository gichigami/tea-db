        underline;\\\" data-mce-style=\\\"text-decoration: underline;\\\" mce-data-marked=\\\"1\\\"\\u003e\\u003c\\/span\\u003eThis
        is such a lovely little tea! We've really fallen in love with this over the
        last couple years. It is so fresh and vibrant and approachable. It has an
        inviting floral, grassy aroma with hints of citrus and a memory of jasmine
        in the taste.\_It is a real pleaser. There is a lush vibrancy normally only
        associated with fresh young sheng the week of production that this tea maintains
        for a very long time.\_This has been part of our personal collection for a
        while and have had so many great sessions with it.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        farmers have broken their tea gardens up into sections. \\\"Section A Gushu\\\"
        is our hands down favorite. It's so good!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Lincang\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
