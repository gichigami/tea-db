        title=\\\"Crimson Lotus Tea - Slumbering Dragon Sheng Puerh Tea\\\" target=\\\"_blank\\\"\\u003eSlumbering
        Dragon\\u003c\\/a\\u003e\\\" cakes.\\u003cspan\\u003e\_\\u003c\\/span\\u003eThis
        is one of\_the\_more interesting sheng puerh material that we source each
        year. It comes from high growing trees in the mountains above Kunlu Shan.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThis
        is a very unique and fascinating puerh.\_The flavor is strong, pure, natural,
        and\_noticeably bitter, but with a\_transcendent\_chaqi. There is an aroma
        in the dry leaves that is reminiscent of wild blueberries. Wet aroma is honeysuckle
        and alfalfa. This is a tea that is hard to define. The aromas are both familiar
        and mysterious. Everything about this tea is distinct and individual. The
        profile is at times sharp and distinct. The energy is mentally energizing.
        It creates a calm, but it is a waking calm.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"Elemental
        Puerh\\\" is our collection of single origin, direct sourced, hand rolled\_puerh
        tea dragon balls. These are high quality examples of individual mountain personality.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        wrapper is stamped with an infographic containing all the important origin
        details. You have the year of picking, the season of picking, the mountain
        name and symbol, the distance from the equator, and special indicators for
        wild or old tree material.\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach\_dragon\\u003cspan\\u003e\_\\u003c\\/span\\u003eball
        is individually steamed and hand rolled. They weigh 8 grams and are perfect
        for a session in your gongfu2go portable tea brewer or gaiwan \\/ teapot.
        Each order contains 6x 8g dragon balls.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        material is from Spring of\_2020 and was picked from\_wild tree material growing
