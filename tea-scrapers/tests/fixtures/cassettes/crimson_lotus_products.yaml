        Zhai Sheng \\/ Raw Puerh Tea - 200g Cake\",\"handle\":\"2024-spring-nannuo-banpo-lao-zhai-sheng-raw-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003e\\u003cspan
        style=\\\"text-decoration: underline;\\\"\\u003e\\u003c\\/span\\u003e2024
        was a great year for Nannuo Shan. We pressed our \\\"Pure Nannuo\\\" cake
        as a blend of old and big tree materials. We kept some very nice material
        aside and use it in these cakes. The material in this cake is from a famous
        tea village in Nannuo Shan called Banpo Lao Zhai (\u534A\u5761\u8001\u5BE8).\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese
        ancient trees have a rich floral aroma with a nutty, grassy finish. It is
        soft and sweet in the mouth with full body and noticeable sweetness. It brews
        long with a light bitterness\\/astringency and finishes with a long-lasting
        sweetness. This is really a great tea. You can tell that from the first sip
        through to the last!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eWe
        have a limited number of these cakes available.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1400m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eSingle
        Varietal\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eS\\u003c\\/span\\u003epring
        Material\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a pressed 200g cake.\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e It is a single origin offering that is unique
        and offers an incredible tea experience. It is from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
