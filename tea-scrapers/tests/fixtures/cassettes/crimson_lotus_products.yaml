        Sheng \\/ Raw Puerh Tea 100g :: Seattle Inventory\",\"handle\":\"2001-yiwu-da-shu-tuo-cha-sheng-raw-puerh-tea-100g-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eOur friends pressed this\_big
        tree (da shu) material in 2001. It comes from Wangong village in Yiwu. Wangong
        is a few miles north of Yiwu township and in a very diverse ecological environment.
        This is a very special tea and we are excited to be able to offer it.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThere is a slight smokiness in the dry aroma.
        As you being to steep there is a rich orchid floral note\_with the tiniest
        hint of grassiness. The aged aroma is very clean. The tea brews with an immediate
        thickness! The tea is very smooth and cooling in the throat. There is a very
        mellow and centering energy.\_This tea is not aggressive at all and really
        showcases the delicate beauty of aged Yiwu material. The huigan (returning
        sweetness) builds in the throat from the first sip. This beautiful tea stays
        smooth even with a heavy hand. As you progress through the steeps it evolves
        into sweet peach flavors.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eCounty:
        Mengla\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eVillage:
        Wangong\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1000+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eMenghai\_natural\_storage\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-10-31T02:40:21-07:00\",\"created_at\":\"2022-10-29T22:50:21-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
