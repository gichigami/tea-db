        Cake\",\"20g Sample\"]}]},{\"id\":6595750133820,\"title\":\"Jianshui \\\"Crimson
        Sky\\\" Fairness Cup \\/ Cha Hai 150ml\",\"handle\":\"jianshui-crimson-sky-fairness-cup-cha-hai-150ml\",\"body_html\":\"\\u003cp\\u003eAdd
        to your Jianshui collection with this stylish \\\"Crimson Sky\\\" fairness
        cup.\_Each features a hand carved Yunnan cloud motif with a crimson glaze
        background.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis is a
        true clay which\_lacks any sand. The natural minerals in the clay will enhance
        the flavor of your tea. Jianshui is in Yunnan, and the clay used in these\_fairness
        cups comes from the same mountains that grow puerh tea trees. We appreciate
        that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca title=\\\"Crimson
        Lotus Tea Jian Shui Zi Tao Pottery\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        target=\\\"_blank\\\"\\u003eWe blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince these are\_handmade products
        each are unique.\_There are slight variations to each. They're approximately\_150ml.
        They pour\_precise with a good flow. It's probably a good idea to dedicate
        them to teas with a similar taste and aroma profile.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2021-07-24T02:09:23-07:00\",\"created_at\":\"2021-06-24T18:10:23-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
