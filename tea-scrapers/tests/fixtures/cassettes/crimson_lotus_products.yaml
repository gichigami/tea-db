        Sheng \\/ Raw Puerh Tea Huang Pian Brick from Lao Man'E :: Seattle Inventory\",\"handle\":\"2018-spring-stone-lion-sheng-raw-puerh-tea-huang-pian-brick-from-lao-mane-seattle-inventory\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eBold,
        brash, heavy handed, and unapologetic; this tea does not mess around. This
        200g brick is 100% Lao Man'E, first Spring picking, old tree, huang pian material.
        Lao Man'E is known for very aggressive puerh. They actually have two varietals
        Extra Aggressive and Less Aggressive. This tea is \\\"Less Aggressive\\\".
        That means that it will eventually get sweet. The steeps until then are a
        lot of fun if you like bold, bitter teas. Since this is huang pian material
        the edge is taken off but it still packs a punch. This is honestly a very\_pleasant
        tea. It will brew for many steeps and reward your patience with endless sweetness.
        Stone Lion may be a pussycat underneath that rough exterior.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        commissioned this awesome piece of artwork from Tibetan artist 'Tashi' who
        totally gets us and created such a stunning piece that perfectly represents
        this tea.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eBonus: We had a ton of Stone
        Lion stickers made and if you want one just order a cake and we will include
        one for free. 1 sticker per brick.\_\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_Xishuangbanna\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eVillage:
        Lao Man'E\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1200m +\\u003cbr\\u003e\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eOld
        Tree Huang Pian Material\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eHeavy\_Compression\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cem\\u003eSo
        there were some issues getting these bricks wrapped correctly. Some have the
        wrappers on a little bit crooked. We didn't have the time, materials, or the
        patience to have the factory rewrap. If you get one that is a little bit goofy
        just know that the tea inside will be amazing!\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\n\\n\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Stone
        Lion is the sheng puer for you if you love bitter and strong teas without
        breaking the bank. It has some good thickness and aftertaste too especially
        for the price.\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca href=\\\"https:\\/\\/oolongowl.com\\/2018-stone-lion-sheng-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Stone Lion\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\n\\n\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
