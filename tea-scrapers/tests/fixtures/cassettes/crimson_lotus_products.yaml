        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThis is a multi
        year blend. The past few years we've had extra material left over. We've been
        aging it loose. We pressed what we had into these cakes.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThis material is from their small arbor trees that
        is called Xiao Qiao Mu (that just means small arbor tree). We call it KXQM
        for short. We have sourced this material every year since our first and it
        is so good!\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThe tea is
        full bodied and creamy with minimal bitterness or astringency. It is very
        floral with potent orchid notes. There is a finishing sweetness like cotton
        candy. This tea always hits the spot!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:\_\\u003cmeta
