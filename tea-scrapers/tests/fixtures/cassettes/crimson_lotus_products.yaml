        G - Black w\\/ Bird\",\"Style H - Black w\\/ Flower\",\"Style I - Brown w\\/
        Bird and Flower\"]}]},{\"id\":10114690351420,\"title\":\"Wood Fired Jianshui
        Clay Lotus Tea Cup - 65ml\",\"handle\":\"wood-fired-jianshui-clay-lotus-tea-cup-65ml\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eThis year we had the opportunity to fire a load of
        teaware in one of the new style Jianshui wood fired kilns. There is some real
        magic being done in the kilns of Jianshui. The kilns are managed in Jianshui
        by pottery masters from Fujian. They have really upped the game on what is
        possible to be produced in Jianshui!\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eWood
        fired kilns in China use prepared pine wood. There are multiple firings where
        the kilns are manned 24\\/7 with 4 people. Temperatures are kept constant
        around 1270\xB0C (~2300\xB0F). It is a hot and labor intensive job. The fires
        must be managed precisely to avoid temperature spikes or drops. The risk is
        high and pieces often fail. Between firings the kiln is allowed to cool down
        entirely. \\u003cmeta charset=\\\"utf-8\\\"\\u003eThe entire process for firing
        these cups takes nearly half a month. It was an incredibly expensive endeavor
        and the cost of these cups reflects that.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eDuring
        the wood firing process the pitch in the pine vaporizes into the smoke and
        settles on to the shelves above the tea cups. As the pitch gathers it drips
        on to the teacups creating the wiid fired pitch glaze you see on these cups.
        As the smoke and heat swirl through the kiln additional pitch is deposited
        on the sides as well. This wood fired pitch glaze balances and smooths the
        flavor of the tea. You can really tell the difference when drinking with these
        cups.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese really are
        gorgeous cups. These were fired in the same wood fired kiln as our other teaware
        from this trip.\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eWe really love
        Jianshui clay. It has a purity and soul that comes through the tea session.
        For these cups we used the rare Wanyao clay. With changing government regulations
        it has become difficult or impossible to mine for new clay under Wanyao village
        in Jianshui. Most Jianshui teaware now are made of a blend of clay from as
        far as 25km away. It's still good clay, but the purists prefer the old Wanyao
        clay. The clay in these cups was mined 20+ years ago, processed, and has been
        aging since then.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eJianshui
        clay is amazing to brew with. We believe the quality of the clay speaks for
        itself.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese are single
        fired and unglazed. This is a true clay which lacks any sand. The natural
        minerals in the clay will enhance the flavor of your tea. Jianshui is in Yunnan,
        and the clay used in these teapots comes from the same mountains that grow
        puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" target=\\\"_blank\\\"\\u003eWe
        blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince these are handmade products
        each are unique. There are slight variations to each. \\u003c\\/span\\u003eThe
        pine wood smoke and pitch glaze create unique wood fired patterns. No two
        cups are the same. We will pick the perfect one for you!\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThese cups are 65ml. \\u003cspan\\u003eThey measure
        on average 6.5cm Wide x 4cm Tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eEach
        cup comes with a padded tea cup bag.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003eCheck
        out our video series from Jianshui:\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/H22bki_zsmA\\\" height=\\\"315\\\"
        width=\\\"560\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/GRGbbbX93bk\\\" height=\\\"315\\\"
        width=\\\"560\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003ciframe
        src=\\\"https:\\/\\/www.youtube.com\\/embed\\/l3JUBMSPLGQ\\\" height=\\\"315\\\"
