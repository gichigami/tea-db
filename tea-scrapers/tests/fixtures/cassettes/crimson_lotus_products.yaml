        Cake\"]}]},{\"id\":10114685305148,\"title\":\"Jianshui Zitao Clay Easy Gaiwan
        - 180ml\",\"handle\":\"jianshui-zitao-clay-easy-gaiwan-180ml\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eWe love brewing in Jianshui clay and we love the simplicity
        of easy gaiwans. An easy gaiwan is like a regular gaiwan but easier to use.
        The lid doesn't slide off so your manual dexterity doesn't need to be as precise.
        The holes allow the tea leaves to be filtered automatically. They are a lot
        of fun to use. They are also super easy to clean!\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eThese are each handmade by a group of artists who work
        together. They are single fired and unglazed. This is a true clay which lacks
        any sand. The natural minerals in the clay will enhance the flavor of your
        tea. Jianshui is in Yunnan, and the clay used in these teapots comes from
        the same mountains that grow puerh tea trees. We appreciate that connection.\\u003cspan\\u003e\_\\u003c\\/span\\u003e\\u003ca
        title=\\\"Crimson Lotus Tea Jian Shui Zi Tao Pottery\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/12799169-jian-shui-zi-tao-pottery\\\"
        target=\\\"_blank\\\"\\u003eWe blogged about this unique town here.\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan\\u003eSince these are handmade products
        each are unique. There are slight variations to each.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eWe have a few of these each with a different design.
        They are polished Jianshui clay and are around 180ml.\_\\u003cspan\\u003eThey
        measure on average 16cm Wide x 9cm Tall.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cstrong\\u003eWe only have what is listed here.
        You can choose the style you want from the pull down menu. There is only 1
        of each. When they are gone, they are gone.\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eCheck
