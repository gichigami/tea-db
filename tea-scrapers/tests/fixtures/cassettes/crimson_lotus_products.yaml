        Title\"]}]},{\"id\":10112068911420,\"title\":\"2020 Kunlu Shan Old Tree Aged
        Bai Cha \\/ White Tea - 357g Cake\",\"handle\":\"2020-kunlu-shan-old-tree-aged-bai-cha-white-tea-357g-cake\",\"body_html\":\"\\u003cp\\u003eWhat
        a find these cakes were! It's always great when we get out to Kunlu Shan.
        Imagine our surprise finding these aged white tea cakes there. These really
        won us over. This tea was made in 2020 using Kunlu old tree material. The
        cakes have been aging there ever since. This is a very lovely tea!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        tea has aged so well stored high up in the mountains of Kunlu Shan. It is
        full of aromas reminiscent of mango, rum raisin cake, brandy, Chinese dates,
        banana bread, and wild honey. The flavor is very smooth and this offers an
        emotional quality that is very relaxing. You just feel good after drinking
        this!\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 357g cake. It is a single origin offering that is unique and
        offers an incredible tea experience. It is from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-08-15T01:15:43-07:00\",\"created_at\":\"2025-07-28T13:41:56-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
