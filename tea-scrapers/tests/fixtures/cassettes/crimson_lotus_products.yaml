        tea brewing\_volume\\u003c\\/li\\u003e\\n\\u003cli\\u003eDouble wall borosilicate
        glass construction\\u003c\\/li\\u003e\\n\\u003cli\\u003e6.5cm Wide by 16cm
        Tall ( 2.5\\\" x 6.25\\\" )\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003c\\/div\\u003e\\n\\u003cp\\u003eThese
        are left over from our original \\\"gongfu2go\\\" portable tea brewer. That
        project didn't work out so well and we've got a lot of these left over. We
        removed the troublesome filter and brew basket. There is no lid. This is just
        a simple glass brewer.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese are perfect
