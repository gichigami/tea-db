        Raw Puerh Tea - 200g Cake\",\"handle\":\"2023-yiwu-xiao-gaogan-200g-cake-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan style=\\\"text-decoration:
        underline;\\\" mce-data-marked=\\\"1\\\" data-mce-style=\\\"text-decoration:
        underline;\\\"\\u003e\\u003c\\/span\\u003eHooo boy, this tea! Yiwu is just
        an amazing place with really incredible teas. These are unusually dark leaves.
        There is a noticeable mintiness in the dry leaf.\_As you dive into this tea
        you're welcomed with clear minty notes with a menthol vibe. Background aromas
        of pine resin and a floral cotton candy add to the complexity. There is a
        lot of flavor but it's gentle. It has a great body and plenty of returning
        throat sweetness!\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese trees are called\\u003cspan\\u003e
        '\u5C0F\u9AD8\u6746' \\/ xi\u0103o g\u0101o g\u0101n which means \\\"Small
        Tall Pole\\\". This is an interesting varietal similar to the Kunlu Wild material
        we source each year. These trees are found in denser forests and they do grow
        quite tall to fight for the sunlight. This garden is close to Yibang.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
