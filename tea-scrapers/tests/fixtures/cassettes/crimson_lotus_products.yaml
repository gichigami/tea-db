17-11-27T15:03:53-08:00\",\"product_id\":65428389907,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2017-Starter-Set-Table-Cup-Frog-800x_d094d610-70cf-48bd-a4e0-7b18b67a1025.jpg?v=1511823833\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":731426226236,\"title\":\"2016 \\\"Cloudy Days\\\" Shou
        \\/ Ripe Puerh 200g Cake\",\"handle\":\"2016-cloudy-days-shou-ripe-puerh-200g-cake\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eIn 2014\_we created a shou puerh
        blend called Cloudy Days and it was quite a hit. This is the new blend of
        that tea. The original inspiration for this blend was the \\u003ca href=\\\"http:\\/\\/crimsonlotustea.com\\/products\\/2006-kunlu-mountain-tribute-tea-shou-ripe-puerh-full-bing-400-grams\\\"
        title='Crimson Lotus Tea - 2006 \\\"Kunlu Mountain Tribute Tea\\\" Shou \\/
        Ripe Puerh Full Bing (400 grams)' target=\\\"_blank\\\"\\u003e2006 \\\"Kunlu
        Mountain Tribute Tea\\\"\\u003c\\/a\\u003e.\_That was the first shou puerh
        we ever sold! This is a blend of material from 2016, grown\_and processed
        in Simao.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis tea is\_nutty and earthy
        with strong mineral notes and is so very sweet. It has everything we came
        to love in the \\\"Kunlu Mountain Tribute Tea\\\" shou.\_This tea is ready
        to drink now, but with a few years of aging it will be extra awesome.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        named this tea \\\"Cloudy Days\\\" because of the common factor between Yunnan
        and Seattle: cloudy weather. The name Yunnan literally means \\\"Southern
        Clouds\\\". The clouds on the wrapper are typical of the designs used by Yunnan
        minorities. We hope this tea is a perfect companion for whichever day you
        choose to brew it; cloudy days or not!\\u003c\\/p\\u003e\\n\\u003cp\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse twice for a few seconds\_each. Start with quick steeps under
        10s. With each re-steep adjust the steep time to your taste.\\u003c\\/p\\u003e\\n\\u003cp\\u003eBecause
        this tea is so affordable we are not offering samples.\_\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:17:51-08:00\",\"created_at\":\"2018-06-28T09:31:38-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Shou Puerh\",\"tags\":[\"2011 to 2020\",\"Shou
        \\/ Ripe Puerh\"],\"variants\":[{\"id\":8762651344956,\"title\":\"1x 200g
        Cake\",\"option1\":\"1x 200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2016_CloudyDays_1_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"24.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":731426226236,\"created_at\":\"2018-06-28T09:31:38-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":2789418598460,\"created_at\":\"2018-06-28T10:05:26-07:00\",\"position\":1,\"updated_at\":\"2018-06-28T10:07:04-07:00\",\"product_id\":731426226236,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2016-Cloudy-Days-Front-800x.png?v=1530205624\",\"width\":800,\"height\":800},{\"id\":2789417975868,\"created_at\":\"2018-06-28T10:04:52-07:00\",\"position\":2,\"updated_at\":\"2018-06-28T10:07:04-07:00\",\"product_id\":731426226236,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2016-Cloudy-Days-Back-800x.png?v=1530205624\",\"width\":800,\"height\":800},{\"id\":2789416960060,\"created_at\":\"2018-06-28T10:04:10-07:00\",\"position\":3,\"updated_at\":\"2018-06-28T10:07:04-07:00\",\"product_id\":731426226236,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2016-Cloudy-Days-Cake-800x.png?v=1530205624\",\"width\":800,\"height\":800},{\"id\":2789416304700,\"created_at\":\"2018-06-28T10:03:25-07:00\",\"position\":4,\"updated_at\":\"2018-06-28T10:07:04-07:00\",\"product_id\":731426226236,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2016-Cloudy-Days-Closeup-800x.png?v=1530205624\",\"width\":800,\"height\":800},{\"id\":2789305188412,\"created_at\":\"2018-06-28T09:31:39-07:00\",\"position\":5,\"updated_at\":\"2018-06-28T10:07:04-07:00\",\"product_id\":731426226236,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/products\\/2014-Cloudy-Days-The-Pour-800x_27665937-0726-4813-aa1f-3e5049d635bf.jpg?v=1530205624\",\"width\":800,\"height\":800}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"1x
        200g Cake\"]}]},{\"id\":669193011260,\"title\":\"\\\"Jade Rabbit\\\" Sheng
        \\/ Raw Puerh Tea Blend from Crimson Lotus Tea\",\"handle\":\"jade-rabbit-sheng-raw-puerh-tea-blend-from-crimson-lotus-tea\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eWe are very excited to offer
        this tea! We created this multi year, multi mountain blend in 2017 but were
        very particular about the ratio used. We wanted to make sure that each cake
        was blended by hand to ensure the correct experience. Most factories blend
        in a giant pile on the floor with pitchforks. That is not satisfactory for
        our needs. You have no guarantee that what ends up in a specific cake is an
        accurate blend. It could be all one material. We weren't able to press this
        last year because we couldn't find a factory willing to work with us on this
        special project.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis year we found a new
        factory and guided them through the process of hand blending each cake before
        pressing. It was time consuming, tedious, and demanding work but the result
        is impressive.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis is a complex tea that
        creates a story through the many steepings. Explore this tea beyond 15 steeps
        and you will be rewarded. This tea has energy, depth, body, incredible aroma,
        a thick sweetness, and a long lingering aftertaste. This is not a blend that
        we will be able to recreate. What we pressed in this batch is all that we
        will ever have.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003e\\u003cem\\u003e\\\"Jade
        Rabbit is an awesome tea for those who want a fruity sweet, high energy, and
        good resteeper of a young puer. I will stick a \u201Chighly recommended\u201D
        sticker on Jade Rabbit\\\"\\u003c\\/em\\u003e\\u003cbr\\u003e\\u003ca href=\\\"https:\\/\\/oolongowl.com\\/2018-jade-rabbit-sheng-puer-from-crimson-lotus-tea\\/\\\"
        title=\\\"Crimson Lotus Tea Review - Jade Rabbit\\\"\\u003e--oolongowl.com\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003c\\/blockquote\\u003e\\n\\u003cp\\u003e\_\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan
        style=\\\"color: #00ff00; font-size: 60%;\\\"\\u003efollow the jade rabbit\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003ciframe
        width=\\\"560\\\" height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/UrpDHIriO1A\\\"
        frameborder=\\\"0\\\" allow=\\\"autoplay; encrypted-media\\\" allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e\",\"published_at\":\"2025-02-04T20:17:51-08:00\",\"created_at\":\"2018-05-11T20:11:42-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2011 to 2020\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":8056151736380,\"title\":\"200g Cake\",\"option1\":\"200g
