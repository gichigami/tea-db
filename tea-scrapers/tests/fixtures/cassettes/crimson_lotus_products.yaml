        Anniversary Tuo Cha :: Sheng \\/ Raw Puerh Tea :: Seattle Inventory\",\"handle\":\"2025-dirty-dozen-12th-anniversary-tuo-cha-sheng-raw-puerh-tea-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eThis
        tea was twelve years in the making!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is our 12th year in business. It hasn't always been pretty but we're still
        hear and we've still got amazing teas for you. This anniversary blend is our
        most ambitious yet. We took 12 interesting sheng puerh teas we've sourced
        over the last 12 years and blended them all together into this. This is a
        very special blend. It perfectly encapsulates our 12 years of Yunnan tea exploration
        and adventure.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eGrab a tuo of this tea
        and think of us while you're drinking it. We certainly thought of you while
        we were making it!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis material is 100
        grams\_pressed into a traditional shape called \\\"tuo\\\".\_ This is an upside
        down birds nest shape. It has a lot of surface area in a small shape. Some
        producers prefer this shape. They believe that air gets trapped in the nest
        and helps with aging.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThere
        are no samples available for this tea.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
