        of tea balls (100g)\",\"Solo Rabbit - 1x 10 pack of tea balls (50g)\"]}]},{\"id\":10195280757052,\"title\":\"\\\"Shou
        Girls\\\" a 2025 Shou \\/ Ripe Puerh Tea Blend\",\"handle\":\"shou-girls-a-2025-shou-ripe-puerh-tea-blend\",\"body_html\":\"\\u003cp\\u003eThese
        four Shou Girls put on a great show! This is a custom blended shou puerh that
        is super cozy and comforting. It's a very smooth, easy drinking shou. It just
        feels right. It is a relaxing, daily drinker shou.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        wrapper design was painted with watercolor by Seattle artist Stasia Burrington.
        She is the same artist from our Space Girls cakes. Take the time to explore
        her amazing artwork:\_\\u003ca href=\\\"http:\\/\\/www.stasiaburrington.com\\/\\\"
        title=\\\"Stasia Burrington Art\\\" target=\\\"_blank\\\"\\u003ehttp:\\/\\/www.stasiaburrington.com\\/\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eJust
        like with \\\"Space Girls\\\" each order comes with 4x 50g cakes in a hand
        wrapped bamboo tong. Each cake is wrapped with a different Shou Girl design.
        The tea is the same in each cake.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe cakes
        are heavily pressed and it's easiest to break them into brewable chunks by
        snapping the cakes with your hands instead of using a tea knife.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        are excited for people to get their own bamboo wrapped tong. Receiving and
        opening a tong is exciting. Most people don't get the chance to experience
        opening their own tong. We don't offer samples of this tea because we want
        everyone to get their own tong to open.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:01-07:00\",\"created_at\":\"2025-10-28T17:55:47-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
