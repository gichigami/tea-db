        200g Cake\",\"20g Sample\"]}]},{\"id\":7019201527868,\"title\":\"2014 \\\"Capitalist
        Lion Tamer\\\" Shou \\/ Ripe Puerh Tea 357g\",\"handle\":\"2022-capitalist-lion-tamer-shou-ripe-puerh-tea-357g\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan mce-data-marked=\\\"1\\\"\\u003eThis
        is a very interesting shou puerh made with purple bud leaf material. The leaves
        come from trees that are a naturally occurring varietal the produces a darker
        leaf color. This material was picked in 2012. The wet pile fermentation (wodui)
        was done a year later and then allowed to rest another year before it was
        finally pressed in late 2014. It was stored in Puer City until recently.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe've
        been hunting for a while to find some nice purple shou. This material brews
        a lot different than the shou puerh we normally source. It's lighter but brews
        red and very clean and clear with mineral notes and a sweet soil finish. In
        the aroma is a hint of barbecued salmon skin and wet forest moss. Later steeps
        bring out a unique herbal note with more forest and soil. This is not a super
        dark heavy hitter like some of our other shou. It is delicate and nuanced
        and makes for a very enjoyable session.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe
        wrapper on this full sized cake features the classic painting \\\"The Jealous
        Lioness\\\" by Paul Friedrich Meyerheim.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:38-08:00\",\"created_at\":\"2022-09-12T14:07:30-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
