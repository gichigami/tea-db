        White Lotus Gaiwan - 150ml\",\"handle\":\"jianshui-white-lotus-gaiwan-150ml\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003eWe have used many gaiwans over the years. The one shape
        we always come back to is this one. This is an exact duplicate of the celadon
        gaiwans we sold years ago. The shape is on the larger size and might not be
        great for small hands but we love them! The extra wide brim means your fingers
        will never get burnt. The extra thick clay really holds the heat in. For a
        tea like puerh you want it brewed as hot as possible.\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eTo set these
        gaiwans apart we had them carved with a lotus on the bowl and lid and inlaid
        them with red glaze.\_\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003eWe really
        love Jianshui clay. It has a purity and soul that comes through the tea session.
