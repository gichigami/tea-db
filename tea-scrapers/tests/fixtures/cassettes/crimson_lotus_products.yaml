        Dozen\\\" 12th Anniversary Tuo Cha :: Sheng \\/ Raw Puerh Tea\",\"handle\":\"2025-dirty-dozen-12th-anniversary-tuo-cha-sheng-raw-puerh-tea\",\"body_html\":\"\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        is our 12th year in business. It hasn't always been pretty but we're still
        hear and we've still got amazing teas for you. This anniversary blend is our
        most ambitious yet. We took 12 interesting sheng puerh teas we've sourced
        over the last 12 years and blended them all together into this. This is a
        very special blend. It perfectly encapsulates our 12 years of Yunnan tea exploration
        and adventure.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eGrab a tuo of this tea
        and think of us while you're drinking it. We certainly thought of you while
        we were making it!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis material is 100
        grams\_pressed into a traditional shape called \\\"tuo\\\".\_ This is an upside
        down birds nest shape. It has a lot of surface area in a small shape. Some
        producers prefer this shape. They believe that air gets trapped in the nest
        and helps with aging.\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThere
        are no samples available for this tea.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:03-07:00\",\"created_at\":\"2025-10-30T22:36:43-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Sheng Puerh\",\"tags\":[\"2021 and After\",\"2025\",\"Sheng
        \\/ Raw Puerh\"],\"variants\":[{\"id\":52369808916796,\"title\":\"1x 100g
        Tuo\",\"option1\":\"1x 100g Tuo\",\"option2\":null,\"option3\":null,\"sku\":\"2025_Dirty_Dozen\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"19.99\",\"grams\":110,\"compare_at_price\":null,\"position\":1,\"product_id\":10202093257020,\"created_at\":\"2025-10-30T22:36:43-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":53341634068796,\"created_at\":\"2025-10-31T02:58:17-07:00\",\"position\":1,\"updated_at\":\"2025-10-31T02:58:20-07:00\",\"product_id\":10202093257020,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/Dirty-Dozen-Product-Pics.png?v=1761904700\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"1x
        100g Tuo\"]}]},{\"id\":10202087194940,\"title\":\"2025 Pasha Shan Hong Cha
        \\/ Black Tea - 200g Cake :: Seattle Inventory\",\"handle\":\"2025-pasha-shan-hong-cha-black-tea-200g-cake-seattle-inventory\",\"body_html\":\"\\u003cp\\u003eWe
        had a good time in Pasha Shan this year. We were impressed with the teas that
        we found. We had our eye on some of their sheng puerh but then found this
        incredible black tea made from the same trees.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        cake has a good balance of buds and large leaves. The aromas are floral and
        chocolate with the most delicate yet intoxicating pungency; like fruit that
        is just starting to ferment. It's lovely. The aroma is also very uplifting.
        It just invites you in to start steeping. The color is immediately rich. This
        tea is perfect from the first sip. It is so smooth and sweet with just the
        right balanced tannic notes. It is a dense and rich tea with a lot of flavor
        to unpack. It is a very easy drinking tea that swallows smooth and leaves
        good aftertaste.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a pressed 200g cake. It is a single origin offering that is unique and
        offers an incredible tea experience. It is from a single garden and remains
        unblended and processed individually.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong
        style=\\\"font-family: -apple-system, BlinkMacSystemFont, 'San Francisco',
        'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 0.875rem;\\\"\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003cbr\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-10-31T05:23:02-07:00\",\"created_at\":\"2025-10-30T22:33:29-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
