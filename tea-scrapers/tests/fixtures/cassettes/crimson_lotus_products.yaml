        200g Cake\"]}]},{\"id\":9800488321340,\"title\":\"2024 \\\"Game Night\\\"
        3 Tea Adventure Set\",\"handle\":\"2024-game-night-3-tea-adventure-set\",\"body_html\":\"\\u003ch3\\u003e\\u003cstrong\\u003eThree
        Teas. Three Quests. One incredible adventure!\\u003c\\/strong\\u003e\\u003c\\/h3\\u003e\\n\\u003cp\\u003eThis
        is the adventure you've been waiting for. You have been chosen. You are needed.
        \\u003cmeta charset=\\\"utf-8\\\"\\u003eAll your training has led to this.
        Deep in the dense forests of Jinggushan the Dabaicha grows. This unique tea
        tree varietal produces a beautiful and enticing leaf.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        have taken the material from a single varietal, grown on a single farm, picked
        at the same time (Spring 2024), and processed by the same family into three
        unique teas; sheng puerh tea, black tea, and white tea. This tasting set holds
        a specialized educational value.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eEach
        tea is presented with a unique story and quest. The wrapper for each 100g
        cake unfolds to reveal the quest details. Our hope is that these teas create
        an adventure in each tasting. Form a party with other friendly adventurers
        and taste these teas together. Or go it alone! If you dare...\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese
        quests are not for the faint of heart and will require bravery, cunning, skill,
        and a bit of luck. Pack your favorite gongfu tea brewing tools and join these
        adventurers on three quests of great significance.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003ch3\\u003e\\u003cstrong\\u003eThe
        Wild Hunt for the L\u01DCs\xE8de Elixir\\u003c\\/strong\\u003e\\u003c\\/h3\\u003e\\n\\u003cp\\u003eHelp
        this intrepid ranger on his quest to travel to the remote and mystical highlands
        of the L\u01DCs\xE8de Peaks to perfect the ancient elixir known as \\\"Immortal
        Jade\\\".\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch3\\u003e\\u003cstrong\\u003eThe
        Forgefire Brew of L\xEDngzh\xF9-Sh\u0101ng\u01D4\\u003c\\/strong\\u003e\\u003c\\/h3\\u003e\\n\\u003cp\\u003eJoin
        this hearty dwarf on a quest of ancient tradition and deep significance as
        he forges the mightiest of all dwarven brews \u2014 The Forgefire Brew.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003ch3\\u003e\\u003cstrong\\u003eThe
        Whispering Leaves of Jinggush\u0101n\\u003c\\/strong\\u003e\\u003c\\/h3\\u003e\\n\\u003cp\\u003eAccompany
        this elusive elf on a quest to craft a rare and exquisite potion known as
        the Silver Dew of Ti\u0101nt\xE1ng.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003eHeed
        the call fellow tea adventurers. Each adventuring set contains 3x 100g cakes;
        a sheng puerh tea cake, a dianhong black tea cake, and a white tea bai cha
        cake. A special bonus bag of holding is included to help you on your adventures!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eVillage:
        Yangta\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eMountain:
        Jinggu\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003ePrefecture:
        Puer\\u003c\\/span\\u003e\\u003cspan\\u003e\\u003c\\/span\\u003e\\n\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eElevation:
        1800+ m\\u003c\\/span\\u003e\\u003cspan\\u003e\\u003c\\/span\\u003e\\n\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eVarietal:
        Dabaicha\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:15:29-08:00\",\"created_at\":\"2024-11-29T00:27:22-08:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
