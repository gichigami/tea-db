        200g Cake\",\"20g Sample\"]}]},{\"id\":760934203452,\"title\":\"2018 Spring
        \\\"Daydream\\\" Sheng \\/ Raw Puerh Tea Blend\",\"handle\":\"2018-spring-daydream-sheng-raw-puerh-tea-blend\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003eThis
        is a multi year blend with a core of Spring 2018 material. We commissioned
        a custom piece of artwork for this cake from \\u003ca title=\\\"Seattle Artist
        Stasia Burrington\\\" href=\\\"https:\\/\\/www.stasiaburrington.com\\/\\\"
        target=\\\"_blank\\\"\\u003eSeattle artist Stasia Burrington\\u003c\\/a\\u003e.
        (\_\\u003ca title=\\\"Seattle Artist Stasia Burrington\\\" href=\\\"https:\\/\\/www.instagram.com\\/stasiaburrington\\/\\\"
        target=\\\"_blank\\\"\\u003e\\u003cspan\\u003einstagram.com\\/stasiaburrington\\u003c\\/span\\u003e\\u003c\\/a\\u003e\_).
        She is the artist we used for our \\u003ca title='\\\"Space Girls\\\" a 2016
        Sheng Puerh Tea Blend' href=\\\"https:\\/\\/crimsonlotustea.com\\/products\\/space-girls-a-2016-sheng-puerh-tea-blend\\\"
        target=\\\"_blank\\\"\\u003e\\\"Space Girls\\\"\\u003c\\/a\\u003e bricks.
        The artwork and this tea work perfectly together. This\_puerh is a tea garden
        daydream. Cute little black piglets are a common sight in the old growth tea
        gardens in Yunnan.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe put a lot of time
        into this blend. We had a very specific experience we were hoping to create.
        This tea has a very distinct, creative, and inspirational energy for us when
        we drink it. The aromas are floral, grass, hay, and honeysuckle with a hint
        of aged sheng. This tea has sugarcane sweetness from the beginning. There
        is a medium to thick body that persists across many steepings. There is a
        long aftertaste that is reminiscent of jasmine. There is astringency but not
        bitterness.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThe tea energy hits after
        the second steep. It is very heady and direct. This is probably one of our
        stronger teas energy-wise. Brew this tea strong, sit back, close your eyes
        and imagine you are in an old growth tea forest soaking in a giant teapot
        as adorable little piggies dart in and around chasing each other through the
        trees. The breeze cools you down as it whispers through the leaves. It's a
        good day!\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eWood
        Fired\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eHand
        Rolled\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eDirect
        Sun Dried\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eYoung
        \\/ Old Tree Blend\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\n\\u003cspan\\u003eStone
        Compressed\\u003c\\/span\\u003e\_\\u003c\\/li\\u003e\\n\\u003cli\\u003e200g
