        \\\"Chunk-o-melon\\\" Sheng \\/ Raw Puerh Tea 250g Chunk\",\"handle\":\"2005-chunk-o-melon-sheng-raw-puerh-tea-250g-chunk\",\"body_html\":\"\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003ePressing puerh tea into giant
        melon shapes and then stacking them in a tower is a long held tradition in
        Yunnan. You will still find these occasionally around Yunnan. We\_tried this
        tea and really liked it so we bought\_some stacks and broke them up into 250g
        chunks. We kept the top sections whole and you can purchase those directly,
        but we only have a couple to sell.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis
        was pressed in 2005 and stored in Puer City for\_17\_years. In 2022 it was
        moved to Kunming. Both storage setups are on the drier side.\_This tea tastes
        like the love child between \\\"Top of the Clouds\\\" and \\\"Troublemaker\\\".
        It has a great aged flavor and aroma with some nice smokiness and balanced
        bitterness. It's a very enjoyable tea to gongfu.\\u003c\\/p\\u003e\\n\\u003cp\\u003eGrab
        a chunk of these melons and get to steeping.\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePrefecture:
        Simao \\/ Puer\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003eElevation:
        1800+ m\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003cli\\u003e\\u003cspan\\u003ePuer
        City natural\_storage\\u003c\\/span\\u003e\\u003c\\/li\\u003e\\n\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2022-09-14T11:58:53-07:00\",\"created_at\":\"2022-07-12T00:50:35-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
