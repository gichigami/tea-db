        \\/ Ripe Puerh\",\"Single Origin\"],\"variants\":[{\"id\":48877544735036,\"title\":\"200g
        Cake\",\"option1\":\"200g Cake\",\"option2\":null,\"option3\":null,\"sku\":\"2016_YiwuShou_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"74.99\",\"grams\":210,\"compare_at_price\":null,\"position\":1,\"product_id\":9229451166012,\"created_at\":\"2024-04-02T17:37:35-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"},{\"id\":48877544833340,\"title\":\"20g
        Sample\",\"option1\":\"20g Sample\",\"option2\":null,\"option3\":null,\"sku\":\"2016_YiwuShou_Sample\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":false,\"price\":\"9.99\",\"grams\":30,\"compare_at_price\":null,\"position\":2,\"product_id\":9229451166012,\"created_at\":\"2024-04-02T17:37:35-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":47243502387516,\"created_at\":\"2024-07-03T00:15:21-07:00\",\"position\":1,\"updated_at\":\"2024-07-03T00:15:23-07:00\",\"product_id\":9229451166012,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/DSC_0844-Edit.png?v=1719990923\",\"width\":2000,\"height\":2000},{\"id\":47243523752252,\"created_at\":\"2024-07-03T00:17:46-07:00\",\"position\":2,\"updated_at\":\"2024-07-03T00:17:48-07:00\",\"product_id\":9229451166012,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/DSC_0845_cf412c95-ea71-48e8-a85b-d5c93ffe132b.jpg?v=1719991068\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Options\",\"position\":1,\"values\":[\"200g
        Cake\",\"20g Sample\"]}]},{\"id\":9432954700092,\"title\":\"2023 Jingmai \\\"Lucky
        Cloud\\\" Shou \\/ Ripe Puerh Tea 357g Cake\",\"handle\":\"2023-lucky-cloud-shou-ripe-puerh-tea-357g-cake\",\"body_html\":\"\\u003cp\\u003eThis
        shou puerh is made 100% from Jingmai material. When you can find Jingmai shou
        puerh it is always a treat! We're pleased to be able to offer this one.\\u003c\\/p\\u003e\\n\\u003cp\\u003eWe
        named this tea \\\"Lucky Cloud\\\" because it is so smooth and creamy it's
        like floating on a cloud. The term \\\"Lucky Cloud\\\" ( xiang-yun \\/ \u7965\u4E91
        ) holds special meaning in Yunnan. Yunnan itself is known for billowing white
        clouds. The name Yunnan means \\\"Southern Clouds\\\".\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese
        are beautiful leaves with plenty of buds. The aroma is clean soil with a slight
        nuttiness. It is very inviting!\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis brews
        clean and clear and very creamy. There is a sort of banana bread essence to
        it. It is very drinkable. This brews thick and very juicy with almost a minty
        aftertaste.\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\\"Every cloud
        has a silver lining!\\\"\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis
        is a 357g cake. The material is from 2013, the wodui was done in 2014, and
        it was pressed in 2023.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cem\\u003eThe
        design on this cake was created by us using a combination of AI and human
        artist created elements.\\u003c\\/em\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Rinse once for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:09-08:00\",\"created_at\":\"2024-05-19T08:43:00-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Shou Puerh\",\"tags\":[\"2011 to 2020\",\"Shou
        \\/ Ripe Puerh\"],\"variants\":[{\"id\":49544985182524,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2013_LuckyCloud_357_Cake\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"49.99\",\"grams\":375,\"compare_at_price\":null,\"position\":1,\"product_id\":9432954700092,\"created_at\":\"2024-06-02T21:38:05-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":46563870572860,\"created_at\":\"2024-05-19T10:14:07-07:00\",\"position\":1,\"updated_at\":\"2024-05-19T10:14:09-07:00\",\"product_id\":9432954700092,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2024-Lucky-Cloud.png?v=1716138849\",\"width\":2000,\"height\":2000},{\"id\":46778486751548,\"created_at\":\"2024-06-02T23:00:44-07:00\",\"position\":2,\"updated_at\":\"2024-06-02T23:00:46-07:00\",\"product_id\":9432954700092,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/FC1C77BB-CE45-437A-BC3D-341C5308C68F.jpg?v=1717394446\",\"width\":986,\"height\":986}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9432973246780,\"title\":\"2014 \\\"Gamechanger\\\" Shou
        \\/ Ripe Puerh Tea 357g Cake\",\"handle\":\"2014-gamechanger-shou-ripe-puerh-tea-357g-cake\",\"body_html\":\"\\u003cp\\u003eThis
        is a really interesting shou! It is a blend of Lincang, Simao, and Xishuangbanna
        gardens. There are BIG leaves in this cake. It has a medicinal aroma with
        hints of warm baked bread. As the fairness cup cools it leads into a sweet,
        creamy, and floral aroma. Smelling the wet leaves is like being in the kitchen
        rolling fresh dough.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThis has a lighter
        wodui ( wet pile fermentation ). It has some aged sheng personality.It is
        very interesting and it is very body warming. The liquor is clean with a dark
        amber color. It is very easy drinking with a creamy and slick body and a slightly
        herbal aftertaste.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003eI wouldn't call this
        a strong tea but it has a lot going on and is very interesting!\\u003cbr\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003e\\u003cspan\\u003eThis is a 357g cake. The material
        is from 2012, the wodui was done in 2013, and it was pressed in 2014.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cem\\u003eThe
        design on this cake was created by us using a combination of AI and human
        artist created elements. The final design was a creation and composition of
        our own making. We intended this cake a conversation starter for the role
        of AI generated art being used in commercial products.\\u003c\\/em\\u003e\\u003c\\/p\\u003e\\n\\u003cul\\u003e\\u003c\\/ul\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz ) of water at or near
        boiling. Rinse once for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:08-08:00\",\"created_at\":\"2024-05-19T10:02:55-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Shou Puerh\",\"tags\":[\"2011 to 2020\",\"Shou
        \\/ Ripe Puerh\"],\"variants\":[{\"id\":49540731961660,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"2012_Gamechanger_357_Cake_Printed\",\"requires_shipping\":true,\"taxable\":false,\"featured_image\":null,\"available\":true,\"price\":\"54.99\",\"grams\":375,\"compare_at_price\":null,\"position\":1,\"product_id\":9432973246780,\"created_at\":\"2024-06-01T09:42:17-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":46563872407868,\"created_at\":\"2024-05-19T10:14:51-07:00\",\"position\":1,\"updated_at\":\"2024-05-19T10:14:53-07:00\",\"product_id\":9432973246780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/2024-Gamechanger.png?v=1716138893\",\"width\":2000,\"height\":2000},{\"id\":46778493501756,\"created_at\":\"2024-06-02T23:01:32-07:00\",\"position\":2,\"updated_at\":\"2024-06-02T23:01:34-07:00\",\"product_id\":9432973246780,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/AF5D7DA3-A4F1-496B-BDF0-01F15CDC6D6D.jpg?v=1717394494\",\"width\":986,\"height\":986}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9550757134652,\"title\":\"Huaning Wood Fired \\\"Blue
        Galaxy\\\" Tea Cup - 45ml\",\"handle\":\"huaning-wood-fired-blue-galaxy-tea-cup-45ml\",\"body_html\":\"\\u003cp\\u003e\\u003cspan\\u003eWood
        fired Huaning teaware is a real special treat. These gorgeous little cups
        are no exception. They fit in the hand so well. They have this tiny little
        ridge at the edge of the cup that fits your lip perfectly. Then you've got
        the incredible glazing with a deep depth of blue. \\u003cmeta charset=\\\"utf-8\\\"\\u003eIt's
        like peering into a remote galaxy through a powerful telescope.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003e\\u003cmeta
        charset=\\\"utf-8\\\"\\u003eThese cups are incredibly difficult to photograph.
        They are so shiny and reflective and we tried so hard to capture them perfectly.
        We boosted the colors and contrast to really show off what these cups are
        capable of in the right light. These cups will not disappoint!\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eHuaning
        ( \\u003c\\/span\\u003e\u534E\u5B81 ) is a town in Yunnan province with a
        long history of ceramics. The locals harvest clay from the nearby\_hills.
        They source available\_minerals and hand blend their own glazes. Intense blues
        and greens are a common theme. These provide a beautiful contrast to both
        their white clay and the deep red of their iron rich clay.\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eWe
        appreciate the connection this teaware has with Yunnan and puerh tea. Puerh
        is a product of the soil and hands of Yunnan, and so is this teaware.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eThese
        tea cups hold 45ml and measure 8.5cm Wide x 4.5cm Tall. These are a handmade
        product and each will vary slightly. The one you receive might differ from
        the ones pictured. These cups are sold individually. \\u003c\\/span\\u003e\\u003cspan\\u003eIf
        you want more you need to\_\\u003c\\/span\\u003e\\u003cspan\\u003epurchase
        more than one.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003ciframe
        width=\\\"560\\\" height=\\\"315\\\" src=\\\"https:\\/\\/www.youtube.com\\/embed\\/tTsCpp4iWak\\\"
        frameborder=\\\"0\\\" allow=\\\"autoplay; encrypted-media\\\" allowfullscreen=\\\"\\\"\\u003e\\u003c\\/iframe\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:07-08:00\",\"created_at\":\"2024-06-23T00:31:14-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
        Lotus Tea\",\"product_type\":\"Tea Accessories\",\"tags\":[\"CLT2024\",\"Huaning\",\"New
        Teaware\",\"Tea Cups\"],\"variants\":[{\"id\":49687231037756,\"title\":\"Default
        Title\",\"option1\":\"Default Title\",\"option2\":null,\"option3\":null,\"sku\":\"HN_BlueGalaxy_TeaCup\",\"requires_shipping\":true,\"taxable\":true,\"featured_image\":null,\"available\":true,\"price\":\"44.99\",\"grams\":200,\"compare_at_price\":\"0.00\",\"position\":1,\"product_id\":9550757134652,\"created_at\":\"2024-06-23T00:31:14-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\"}],\"images\":[{\"id\":47097283379516,\"created_at\":\"2024-06-24T07:44:55-07:00\",\"position\":1,\"updated_at\":\"2024-06-24T07:44:57-07:00\",\"product_id\":9550757134652,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/DSC_0683.jpg?v=1719240297\",\"width\":2000,\"height\":2000},{\"id\":47097283641660,\"created_at\":\"2024-06-24T07:44:55-07:00\",\"position\":2,\"updated_at\":\"2024-06-24T07:44:57-07:00\",\"product_id\":9550757134652,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/DSC_0684.jpg?v=1719240297\",\"width\":2000,\"height\":2000},{\"id\":47097283707196,\"created_at\":\"2024-06-24T07:44:55-07:00\",\"position\":3,\"updated_at\":\"2024-06-24T07:44:57-07:00\",\"product_id\":9550757134652,\"variant_ids\":[],\"src\":\"https:\\/\\/cdn.shopify.com\\/s\\/files\\/1\\/0303\\/0437\\/files\\/DSC_0686.jpg?v=1719240297\",\"width\":2000,\"height\":2000}],\"options\":[{\"name\":\"Title\",\"position\":1,\"values\":[\"Default
        Title\"]}]},{\"id\":9531803959612,\"title\":\"Tea-Rex Teapet\",\"handle\":\"tea-rex-teapet\",\"body_html\":\"\\u003cp\\u003eNo
        need to run, this adorable little dino comes in peace. It just wants some
        tea. They might need a little help when pouring tea though. Evolution didn't
        grace them with long arms.\\u003c\\/p\\u003e\\n\\u003cp\\u003eThese are made
        from natural Chinese clay and have not been glazed. They will absorb the tea
        oils from your gongfu sessions over time. Just pour a little bit over their
        head each time.\\u003c\\/p\\u003e\\n\\u003cp\\u003eRead about the history
        and use of teapets here:\_\\u003ca title=\\\"Crimson Lotus Tea Tea pets are
        the perfect companions on your tea journey!\\\" href=\\\"http:\\/\\/crimsonlotustea.com\\/blogs\\/puerh\\/15193849-tea-pets-are-the-perfect-companions-on-your-tea-journey\\\"
        target=\\\"_blank\\\"\\u003eTea pets are the perfect companions on your tea
        journey!\\u003c\\/a\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eM\\u003c\\/span\\u003e\\u003cspan\\u003eeasures
        3\\\" x 3\\\" x 3.5\\\" ( LWH in inches )\_\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:07-08:00\",\"created_at\":\"2024-06-15T01:53:36-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
