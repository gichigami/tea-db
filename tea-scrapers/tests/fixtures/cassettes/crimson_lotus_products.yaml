        Cake\"]}]},{\"id\":9229451166012,\"title\":\"2016 Yiwu Gushu Shou \\/ Ripe
        Puerh Tea - 200g Cake\",\"handle\":\"2016-yiwu-gushu-shou-ripe-puerh-tea-200g-cake\",\"body_html\":\"\\u003cp\\u003eWhat
        a lovely Yiwu shou! We adore Yiwu area teas and this old tree shou is no exception.\\u003c\\/p\\u003e\\n\\u003cp\\u003eIt
        brews up super thick, smooth, creamy, and gentle with a lot of dark body.
        You get the steep just right and it tastes like dark chocolate! The aromas
        are very earthy and woodsy. This is a very mellow and chill shou. This tea
        has some very noticeable energy though.\_\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eBrewing
        Instructions\\u003c\\/strong\\u003e\\u003c\\/p\\u003e\\n\\u003cp\\u003e\\u003cspan\\u003eUse
        5-10 grams of leaves and brew with 75-150ml ( 2.5-5oz )\_of water at or near
        boiling. Rinse once\_for a few seconds. Start with quick steeps under 10s.
        With each re-steep adjust the steep time to your taste.\\u003c\\/span\\u003e\\u003c\\/p\\u003e\",\"published_at\":\"2025-02-04T20:16:16-08:00\",\"created_at\":\"2024-04-02T17:37:35-07:00\",\"updated_at\":\"2026-05-16T03:32:58-07:00\",\"vendor\":\"Crimson
