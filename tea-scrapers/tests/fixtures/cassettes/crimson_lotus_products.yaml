        100g Box\"]}]},{\"id\":2143858433,\"title\":\"2015 Spring \\\"Gu Ming Xiang
        Bing\\\" Yiwu - Bulang Blend Sheng \\/ Raw Puerh :: Seattle Inventory\",\"handle\":\"2015-spring-gu-ming-xiang-bing-yiwu-bulang-blend-sheng-raw-puerh\",\"body_html\":\"\\u003cp
        class=\\\"p1\\\"\\u003e\\u003cspan style=\\\"text-decoration: underline;\\\"\\u003e\\u003cstrong\\u003eWe
        are all sold out of this tea!\\u003c\\/strong\\u003e\\u003c\\/span\\u003e\\u003c\\/p\\u003e\\n\\u003cp
        class=\\\"p1\\\"\\u003eBordering the western and eastern edges of Xishuangbanna
        in southern Yunnan are the famous tea mountains of Yiwu and Bulang. Tea from
        each are defined by unique imagery. Yiwu is called 'The Queen' with a soft,
        sweet flavor and delicate floral aroma. Bulang is 'The King' with bitter notes
        and strong tea energy.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eThese
        two mountains were blended into this special puerh by Master Feng of Gu Ming
        Xiang. This tea is a dance. It has the Bulang energy with the soft Yiwu sweetness.
        Brew it short and experience the delicate Yiwu. Or brew it long and feel the
        strength of Bulang.\\u003c\\/p\\u003e\\n\\u003cp class=\\\"p1\\\"\\u003eUse
        5-10 grams of leaves and brew with 75-150ml of water at or near boiling. Wash
        once for 3s, then start with a quick steep of around 6s. Brew quickly for
        the first few steeps. This tea is very generous and can brew quite strong.\\u003c\\/p\\u003e\",\"published_at\":\"2017-09-22T21:54:12-07:00\",\"created_at\":\"2015-09-30T00:13:48-07:00\",\"updated_at\":\"2026-05-16T03:33:00-07:00\",\"vendor\":\"Crimson
