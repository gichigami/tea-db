# Alembic configuration for tea-scrapers.
#
# Database URL is intentionally blank here — env.py pulls it from
# tea_scrapers.config.Settings at runtime so a single source of truth
# (the env / .env file) drives both the app and migrations.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

# Use timestamp + slug for new migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

# Path separator used by script_location / prepend_sys_path.
path_separator = os

[post_write_hooks]
# Optional: format newly-generated migration files with ruff.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
