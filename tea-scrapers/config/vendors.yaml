# Per-vendor Shopify configuration.
# Spec reference: specs/tea_scrapers_v1_spec.md §6.1.
#
# §12 endpoint spot-check resolved 2026-05-16:
#   - crimsonlotustea.com → valid Shopify /products.json (kept below)
#   - bitterleafteas.com → WooCommerce, not Shopify (removed; would need a
#     separate WooCommerce scraper, out of V1 scope per design doc §8)

shopify_vendors:
  yunnan_sourcing_us:
    display_name: "Yunnan Sourcing USA"
    base_url: "https://yunnansourcing.us"
    rate_limit_rps: 2

  yunnan_sourcing_com:
    display_name: "Yunnan Sourcing China"
    base_url: "https://yunnansourcing.com"
    # KNOWN ISSUE: CF JA3 fingerprint block. httpx requests 403; curl
    # succeeds from the same IP/UA in the same minute. Lowering rate does
    # NOT fix this (verified 2026-05-16). Likely needs curl-cffi or HTTP/2
    # in httpx. See spec §12 step-7 follow-up #9 for diagnosis +
    # mitigation options.
    rate_limit_rps: 2

  white2tea:
    display_name: "white2tea"
    base_url: "https://white2tea.com"
    rate_limit_rps: 2

  crimson_lotus:
    display_name: "Crimson Lotus Tea"
    base_url: "https://crimsonlotustea.com"
    rate_limit_rps: 2

# ---------------------------------------------------------------------------
# Steepster (community review site; spec §6.2).
#
# Not a "vendor" — it's a single community source whose payload references
# many upstream tea producers via per-company URL slugs. Lives here rather
# than in a separate `config/sources.yaml` because the existing schema
# already cleanly accommodates "list of upstream-slug entries with a shared
# scrape policy" and adding a parallel file would just split the config
# surface needlessly. See spec §12 step-7 architectural-decision note.
#
# `rate_limit_rps: 0.1` honors steepster's robots.txt `Crawl-Delay: 10`
# (spec §6.2). `timeout_seconds: 60` accommodates the slow first-hit render
# times observed on tea-detail pages (15–25s) and the ~9MB sitemap.
# `vendor_slugs` is the V1 allowlist (spec §6.2 "Vendor slugs to crawl").
# ---------------------------------------------------------------------------
steepster:
  base_url: "https://steepster.com"
  rate_limit_rps: 0.1
  timeout_seconds: 60
  vendor_slugs:
    - "yunnan-sourcing"
    - "white2tea"
    - "crimson-lotus-tea"
    - "bitterleaf-teas"
    - "menghai-tea-factory"
    - "xiaguan-tea-factory"
    - "dayi"
