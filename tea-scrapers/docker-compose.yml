services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tea-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tea
    ports:
      - "5432:5432"
    volumes:
      - tea_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tea"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tea_pgdata:
